<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>quick-todo — 진입</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--color-bg);color:var(--color-text);font-size:var(--fs-14);line-height:var(--lh-base);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--sp-6);
    transition:background-color var(--dur-2) var(--ease-standard),color var(--dur-2) var(--ease-standard);}
  .toggle{position:absolute;top:var(--sp-4);right:var(--sp-4);display:inline-flex;align-items:center;gap:var(--sp-2);
    border:1px solid var(--color-border-strong);background:var(--color-surface);color:var(--color-text-muted);
    font:inherit;font-size:var(--fs-13);font-weight:var(--fw-medium);padding:var(--sp-2) var(--sp-3);
    border-radius:var(--r-2);cursor:pointer;transition:border-color var(--dur-1) var(--ease-standard),color var(--dur-1) var(--ease-standard);}
  .toggle:hover{border-color:var(--color-primary);color:var(--color-text)}
  .card{width:100%;max-width:440px;background:var(--color-surface);border:1px solid var(--color-border);
    border-radius:var(--r-3);box-shadow:var(--shadow-2);padding:var(--sp-8) var(--sp-6)}
  h1{font-size:var(--fs-22);font-weight:var(--fw-bold);letter-spacing:-.02em;margin:0 0 var(--sp-2);line-height:var(--lh-tight)}
  .lede{margin:0 0 var(--sp-6);color:var(--color-text-muted);font-size:var(--fs-16)}
  .cta{display:inline-flex;align-items:center;gap:var(--sp-2);text-decoration:none;
    background:var(--color-primary);color:var(--color-on-primary);font-weight:var(--fw-medium);font-size:var(--fs-16);
    padding:var(--sp-3) var(--sp-5);border-radius:var(--r-2);box-shadow:var(--shadow-1);
    transition:background-color var(--dur-1) var(--ease-standard),transform var(--dur-1) var(--ease-standard)}
  .cta:hover{background:var(--color-primary-hover)} .cta:active{transform:scale(.98)}
  .cta:focus-visible{outline:none;box-shadow:0 0 0 3px var(--color-primary-weak)}
  ul.feat{list-style:none;margin:var(--sp-6) 0 0;padding:var(--sp-5) 0 0;border-top:1px solid var(--color-border);
    color:var(--color-text-muted);font-size:var(--fs-13);display:grid;gap:var(--sp-2)}
  ul.feat li{display:flex;align-items:center;gap:var(--sp-2)}
  ul.feat svg{color:var(--color-success);flex:none}
</style>
</head>
<body>
  <button class="toggle" id="themeToggle" aria-label="테마 전환" aria-pressed="false"><span class="label">다크 모드</span></button>
  <div class="card">
    <h1>quick-todo</h1>
    <p class="lede">머릿속 할 일을 빠르게 적고, 끝낸 것을 표시하고, 지운다. 단일 사용자·로컬 전용의 가벼운 할 일 관리.</p>
    <a class="cta" href="main.html">할 일 목록 열기
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
    </a>
    <ul class="feat">
      <li><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6L9 17l-5-5"/></svg>추가 · 완료 토글 · 삭제 · 상태별 필터</li>
      <li><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6L9 17l-5-5"/></svg>라이트 / 다크 · 반응형(모바일·데스크톱)</li>
    </ul>
  </div>
<script>
  var KEY='quick-todo';
  function load(){ try{ var r=localStorage.getItem(KEY); if(r) return JSON.parse(r);}catch(e){} return null; }
  function save(s){ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){} }
  var state = load() || { todos:[], filter:'all', theme:'light' };
  var btn=document.getElementById('themeToggle'), lbl=btn.querySelector('.label');
  function applyTheme(){ document.documentElement.setAttribute('data-theme',state.theme);
    var d=state.theme==='dark'; btn.setAttribute('aria-pressed',d?'true':'false'); lbl.textContent=d?'라이트 모드':'다크 모드'; }
  btn.addEventListener('click',function(){ state.theme=state.theme==='dark'?'light':'dark'; applyTheme(); save(state); });
  applyTheme();
</script>
</body>
</html>
