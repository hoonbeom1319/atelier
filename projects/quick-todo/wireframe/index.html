<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>quick-todo — 진입 (와이어)</title>
<style>
  *{box-sizing:border-box}
  body{font-family:system-ui,sans-serif;margin:0;background:#fff;color:#111;
       display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
  [data-theme="dark"] body{background:#111;color:#eee}
  .card{border:1px solid #999;padding:32px;max-width:440px;width:100%}
  h1{margin:0 0 8px;font-size:22px}
  p{margin:0 0 24px;line-height:1.5;color:#444}
  [data-theme="dark"] p{color:#bbb}
  .cta{display:inline-block;border:1px solid #111;padding:10px 18px;text-decoration:none;color:inherit}
  [data-theme="dark"] .cta{border-color:#eee}
  .toggle{position:absolute;top:16px;right:16px;border:1px solid #999;background:none;color:inherit;padding:6px 12px;cursor:pointer}
  ul{padding-left:18px;color:#555}[data-theme="dark"] ul{color:#aaa}
</style>
</head>
<body>
  <button class="toggle" id="themeToggle" aria-label="테마 전환" aria-pressed="false">다크 모드</button>
  <div class="card">
    <h1>quick-todo</h1>
    <p>머릿속 할 일을 빠르게 적고, 끝낸 것을 표시하고, 지운다. 단일 사용자·로컬 전용의 가벼운 할 일 관리.</p>
    <a class="cta" href="main.html">할 일 목록 열기 →</a>
    <ul>
      <li>추가 · 완료 토글 · 삭제 · 상태별 필터</li>
      <li>라이트 / 다크 · 반응형(모바일·데스크톱)</li>
    </ul>
  </div>
<script>
  // 테마 토글(영속) — index와 main이 같은 키를 공유
  var KEY='quick-todo';
  function load(){ try{ var r=localStorage.getItem(KEY); if(r) return JSON.parse(r);}catch(e){} return null; }
  function save(s){ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){} }
  var state = load() || { todos:[], filter:'all', theme:'light' };
  var btn = document.getElementById('themeToggle');
  function applyTheme(){
    document.documentElement.setAttribute('data-theme', state.theme);
    var dark = state.theme==='dark';
    btn.setAttribute('aria-pressed', dark ? 'true':'false');
    btn.textContent = dark ? '라이트 모드' : '다크 모드';
  }
  btn.addEventListener('click', function(){
    state.theme = state.theme==='dark' ? 'light':'dark';
    applyTheme(); save(state);
  });
  applyTheme();
</script>
</body>
</html>
