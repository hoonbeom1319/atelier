<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>컴포넌트 — 빈 상태(empty-state)</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{font-family:system-ui,sans-serif;background:var(--color-bg);color:var(--color-text);margin:0;padding:var(--sp-6)}
  h1{font-size:var(--fs-18)} .muted{color:var(--color-text-muted);font-size:var(--fs-13)}
  .lbl{font-size:var(--fs-12);color:var(--color-text-muted);margin:var(--sp-4) 0 var(--sp-1)}
  .panel{max-width:560px;background:var(--color-surface);border:1px dashed var(--color-border-strong);border-radius:var(--r-3);padding:var(--sp-8) var(--sp-5);text-align:center}
  .panel h2{font-size:var(--fs-16);margin:0 0 var(--sp-1)} .panel p{margin:0;color:var(--color-text-muted);font-size:var(--fs-13)}
</style>
</head>
<body>
  <h1>빈 상태 (empty-state)</h1>
  <p class="muted">절제된 안내(정보밀도 톤, 과한 일러스트 금지). 두 종류: 전체 0개 / 필터 매칭 0개.</p>
  <div class="lbl">전체 0개</div>
  <div class="panel"><h2>할 일이 없습니다</h2><p>첫 할 일을 추가해 보세요.</p></div>
  <div class="lbl">필터 매칭 0개 (완료 탭)</div>
  <div class="panel"><h2>완료된 할 일이 없습니다</h2><p>아직 끝낸 항목이 없어요.</p></div>
</body>
</html>
