<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>컴포넌트 — 입력+추가(input-add)</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{font-family:system-ui,sans-serif;background:var(--color-bg);color:var(--color-text);margin:0;padding:var(--sp-6)}
  h1{font-size:var(--fs-18)} .muted{color:var(--color-text-muted);font-size:var(--fs-13)}
  .lbl{font-size:var(--fs-12);color:var(--color-text-muted);margin:var(--sp-4) 0 var(--sp-1)}
  .row{display:flex;gap:var(--sp-2);max-width:560px}
  .field{flex:1;display:flex;align-items:center;background:var(--color-surface);border:1px solid var(--color-border-strong);border-radius:var(--r-2);padding:0 var(--sp-3)}
  .field.focus{border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-weak)}
  .field input{flex:1;border:0;outline:0;background:none;color:var(--color-text);font:inherit;font-size:var(--fs-16);padding:var(--sp-3) 0}
  .field input::placeholder{color:var(--color-text-muted)}
  .add{border:0;background:var(--color-primary);color:var(--color-on-primary);font:inherit;font-weight:var(--fw-medium);border-radius:var(--r-2);padding:0 var(--sp-5);cursor:pointer}
</style>
</head>
<body>
  <h1>입력 + 추가 (input-add)</h1>
  <p class="muted">단일 라인 입력 + 추가 버튼. Enter로도 추가. 상태: 비어있음(placeholder) / 포커스 / 입력됨.</p>
  <div class="lbl">비어있음 (placeholder)</div>
  <div class="row"><div class="field"><input placeholder="할 일을 입력하세요" aria-label="새 할 일"></div><button class="add">추가</button></div>
  <div class="lbl">포커스 + 입력됨</div>
  <div class="row"><div class="field focus"><input value="발표 자료 정리" aria-label="새 할 일"></div><button class="add">추가</button></div>
</body>
</html>
