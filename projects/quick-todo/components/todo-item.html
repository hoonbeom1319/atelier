<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>컴포넌트 — 할 일 항목(todo-item)</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{font-family:system-ui,sans-serif;background:var(--color-bg);color:var(--color-text);margin:0;padding:var(--sp-6)}
  h1{font-size:var(--fs-18)} .muted{color:var(--color-text-muted);font-size:var(--fs-13)}
  .panel{max-width:560px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--r-3);overflow:hidden;margin-top:var(--sp-4)}
  .item{display:flex;align-items:flex-start;gap:var(--sp-3);padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--color-border)}
  .item:last-child{border-bottom:0}
  .cb{width:18px;height:18px;border:1.5px solid var(--color-border-strong);border-radius:var(--r-1);margin-top:2px;flex:none;display:grid;place-items:center}
  .cb.on{background:var(--color-primary);border-color:var(--color-primary);color:var(--color-on-primary);font-size:12px}
  .title{flex:1;font-size:var(--fs-16);word-break:break-word}
  .item.done .title{text-decoration:line-through;color:var(--color-text-muted)}
  .del{border:1px solid transparent;background:none;color:var(--color-text-muted);border-radius:var(--r-1);padding:2px 8px;cursor:pointer}
  .item:hover .del{border-color:var(--color-border);color:var(--color-danger)}
  .lbl{font-size:var(--fs-12);color:var(--color-text-muted);margin:var(--sp-4) 0 var(--sp-1)}
</style>
</head>
<body>
  <h1>할 일 항목 (todo-item)</h1>
  <p class="muted">행 구조: [체크박스] [텍스트] [삭제]. 상태: 미완료 / 완료 / 긴 텍스트 줄바꿈. 삭제는 항상 노출(모바일), hover 시 강조.</p>
  <div class="lbl">미완료 / 완료</div>
  <div class="panel">
    <div class="item"><span class="cb" aria-hidden="true"></span><span class="title">장보기 — 우유, 달걀</span><button class="del" aria-label="삭제">✕</button></div>
    <div class="item done"><span class="cb on" aria-hidden="true">✓</span><span class="title">메일 확인</span><button class="del" aria-label="삭제">✕</button></div>
  </div>
  <div class="lbl">긴 텍스트(줄바꿈, 가로 스크롤 0)</div>
  <div class="panel">
    <div class="item"><span class="cb" aria-hidden="true"></span><span class="title">분기 보고서 초안 작성하고 팀에 공유한 뒤 피드백 반영해서 최종본까지 마무리하기</span><button class="del" aria-label="삭제">✕</button></div>
  </div>
</body>
</html>
