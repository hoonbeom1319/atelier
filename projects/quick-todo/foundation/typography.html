<!-- @dsCard group="Foundation" -->
<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>quick-todo — 타이포 스케일</title>
<link rel="stylesheet" href="tokens.css">
<style>
  body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--color-bg);color:var(--color-text);margin:0;padding:var(--sp-6);line-height:var(--lh-base)}
  h1{font-size:var(--fs-22)}
  .row{display:flex;align-items:baseline;gap:var(--sp-4);padding:var(--sp-3) 0;border-bottom:1px solid var(--color-border)}
  .tag{width:120px;color:var(--color-text-muted);font-size:var(--fs-12)}
  .muted{color:var(--color-text-muted)}
</style>
</head>
<body>
  <h1>타이포 스케일</h1>
  <p class="muted">시스템 폰트 스택. 정보밀도 톤 — 또렷한 위계, 본문 14px 기준.</p>
  <div class="row"><span class="tag">--fs-22 / bold</span><span style="font-size:var(--fs-22);font-weight:var(--fw-bold)">앱 제목 · 페이지 헤더</span></div>
  <div class="row"><span class="tag">--fs-18 / medium</span><span style="font-size:var(--fs-18);font-weight:var(--fw-medium)">섹션 제목</span></div>
  <div class="row"><span class="tag">--fs-16 / regular</span><span style="font-size:var(--fs-16)">할 일 항목 본문 텍스트</span></div>
  <div class="row"><span class="tag">--fs-14 / regular</span><span style="font-size:var(--fs-14)">기본 UI 텍스트 · 버튼</span></div>
  <div class="row"><span class="tag">--fs-13 / regular</span><span style="font-size:var(--fs-13)" class="muted">보조 설명 · 카운터</span></div>
  <div class="row"><span class="tag">--fs-12 / regular</span><span style="font-size:var(--fs-12)" class="muted">메타 · 라벨</span></div>
</body>
</html>
