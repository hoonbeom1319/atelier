<!-- @dsCard group="Foundation" -->
<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>quick-todo — 색 토큰</title>
<link rel="stylesheet" href="tokens.css">
<style>
  body{font-family:system-ui,sans-serif;background:var(--color-bg);color:var(--color-text);margin:0;padding:var(--sp-6)}
  h1{font-size:var(--fs-22)} h2{font-size:var(--fs-16);margin-top:var(--sp-6)}
  .toggle{border:1px solid var(--color-border-strong);background:var(--color-surface);color:var(--color-text);
          border-radius:var(--r-1);padding:var(--sp-2) var(--sp-3);cursor:pointer;float:right}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:var(--sp-3)}
  .sw{border:1px solid var(--color-border);border-radius:var(--r-2);overflow:hidden;background:var(--color-surface)}
  .chip{height:56px} .meta{padding:var(--sp-2) var(--sp-3);font-size:var(--fs-12)}
  .meta b{display:block;font-size:var(--fs-13)} .meta span{color:var(--color-text-muted)}
</style>
</head>
<body>
  <button class="toggle" id="t" aria-label="테마 전환" aria-pressed="false">다크 모드</button>
  <h1>색 토큰 (semantic)</h1>
  <p style="color:var(--color-text-muted)">컴포넌트·화면은 아래 semantic 역할 토큰만 쓴다. 라이트/다크는 같은 역할명, 값만 교체.</p>
  <h2>표면·텍스트·테두리</h2>
  <div class="grid" id="g1"></div>
  <h2>브랜드·상태</h2>
  <div class="grid" id="g2"></div>
<script>
  const sem1=['--color-bg','--color-surface','--color-surface-2','--color-text','--color-text-muted','--color-border','--color-border-strong'];
  const sem2=['--color-primary','--color-primary-hover','--color-on-primary','--color-primary-weak','--color-danger','--color-success'];
  function val(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
  function fill(id,arr){document.getElementById(id).innerHTML=arr.map(v=>
    `<div class="sw"><div class="chip" style="background:var(${v})"></div><div class="meta"><b>${v}</b><span>${val(v)}</span></div></div>`).join('');}
  function render(){fill('g1',sem1);fill('g2',sem2);}
  const t=document.getElementById('t');
  t.addEventListener('click',()=>{const d=document.documentElement.getAttribute('data-theme')==='dark';
    document.documentElement.setAttribute('data-theme',d?'light':'dark');t.setAttribute('aria-pressed',d?'false':'true');t.textContent=d?'다크 모드':'라이트 모드';render();});
  render();
</script>
</body>
</html>
