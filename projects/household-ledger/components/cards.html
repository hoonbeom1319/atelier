<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cards & Rows · household-ledger</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{font-family:var(--font-sans);color:var(--color-text);background:var(--color-surface-alt);margin:0;padding:var(--sp-6);max-width:390px}
  h2{font-size:var(--fs-sm);color:var(--color-text-muted);margin:var(--sp-5) 0 var(--sp-2)}
  .card{background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--r-lg);padding:var(--sp-5);box-shadow:var(--shadow-1);margin-bottom:var(--sp-3)}
  .sum{display:flex;justify-content:space-between;text-align:center}
  .sum small{color:var(--color-text-muted);font-size:var(--fs-xs)} .sum b{display:block;font-size:var(--fs-h2);margin-top:4px;font-variant-numeric:tabular-nums}
  .row{display:flex;align-items:center;gap:var(--sp-3);background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--r-md);padding:var(--sp-3);margin-bottom:var(--sp-2)}
  .ic{width:40px;height:40px;border-radius:var(--r-md);background:var(--color-surface);display:grid;place-items:center;font-size:20px}
  .row .amt{margin-left:auto;font-weight:var(--fw-bold);font-variant-numeric:tabular-nums}
  .neg{color:var(--color-expense)} .pos{color:var(--color-income)}
  .meta{color:var(--color-text-muted);font-size:var(--fs-sm)}
  .badge{font-size:var(--fs-xs);color:var(--color-primary);background:var(--color-primary-weak);border-radius:var(--r-sm);padding:1px 6px}
  .ava{width:18px;height:18px;border-radius:var(--r-pill);display:inline-grid;place-items:center;color:#fff;font-size:9px;font-weight:700;vertical-align:middle}
</style></head>
<body>
<h2>Summary card (이번 달 요약)</h2>
<div class="card sum">
  <div><small>지출</small><b class="neg">1,240,000</b></div>
  <div><small>수입</small><b class="pos">3,200,000</b></div>
  <div><small>잔액</small><b>1,960,000</b></div>
</div>

<h2>Transaction row (멤버 귀속·뱃지)</h2>
<div class="row"><span class="ic">🍚</span><div><div>점심 — 김밥천국</div><div class="meta"><span class="ava" style="background:var(--blue-600)">나</span> 식비 · 공동</div></div><span class="amt neg">-9,000</span></div>
<div class="row"><span class="ic">🏠</span><div><div>월세 <span class="badge">🔁 자동</span></div><div class="meta"><span class="ava" style="background:var(--gray-600)">배</span> 주거 · 공동</div></div><span class="amt neg">-700,000</span></div>
<div class="row"><span class="ic">💰</span><div><div>월급</div><div class="meta"><span class="ava" style="background:var(--blue-600)">나</span> 수입</div></div><span class="amt pos">+3,200,000</span></div>

<h2>Recurring card (다음 발생일·활성)</h2>
<div class="card">
  <div style="display:flex;align-items:center;gap:var(--sp-3)"><span class="ic">🔁</span><div><b>넷플릭스</b><div class="meta">매월 15일 · 다음 발생 7/15</div></div><span class="amt" style="margin-left:auto;font-weight:700">₩17,000</span></div>
</div>
</body></html>
