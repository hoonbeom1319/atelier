<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chips & Segments · household-ledger</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{font-family:var(--font-sans);color:var(--color-text);background:var(--color-surface-alt);margin:0;padding:var(--sp-6)}
  h2{font-size:var(--fs-sm);color:var(--color-text-muted);margin:var(--sp-5) 0 var(--sp-2)}
  .row{display:flex;gap:var(--sp-2);flex-wrap:wrap;align-items:center}
  .seg{display:flex;background:var(--color-surface);border-radius:var(--r-md);padding:3px;width:240px}
  .seg button{flex:1;border:0;background:transparent;padding:var(--sp-2);border-radius:var(--r-sm);font:inherit;color:var(--color-text-muted);cursor:pointer}
  .seg button[aria-pressed=true]{background:var(--color-bg);color:var(--color-text);font-weight:var(--fw-bold);box-shadow:var(--shadow-1)}
  .chip{border:1px solid var(--color-border-strong);background:var(--color-bg);color:var(--color-text);border-radius:var(--r-pill);padding:var(--sp-2) var(--sp-4);font:inherit;font-size:var(--fs-sm);cursor:pointer}
  .chip[aria-pressed=true]{background:var(--color-primary);color:var(--color-on-primary);border-color:var(--color-primary)}
  .tile{width:72px;height:72px;border:1px solid var(--color-border);background:var(--color-bg);border-radius:var(--r-md);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:var(--fs-xs);cursor:pointer}
  .tile[aria-pressed=true]{border-color:var(--color-primary);background:var(--color-primary-weak);color:var(--color-primary);font-weight:var(--fw-bold)}
  .tile .e{font-size:22px}
  .ava{width:28px;height:28px;border-radius:var(--r-pill);display:grid;place-items:center;color:#fff;font-size:var(--fs-xs);font-weight:var(--fw-bold)}
</style></head>
<body>
<h2>Segment (수입/지출 · 단일선택)</h2>
<div class="seg" role="group"><button aria-pressed="true">지출</button><button aria-pressed="false">수입</button></div>

<h2>Filter / Member chip (토글)</h2>
<div class="row">
  <button class="chip" aria-pressed="true">이번 달</button>
  <button class="chip" aria-pressed="false">지난 달</button>
  <button class="chip" aria-pressed="false">🍚 식비</button>
  <button class="chip" aria-pressed="true">공동</button>
</div>

<h2>Category tile (아이콘 그리드 · 단일선택)</h2>
<div class="row">
  <button class="tile" aria-pressed="true"><span class="e">🍚</span>식비</button>
  <button class="tile" aria-pressed="false"><span class="e">🚆</span>교통</button>
  <button class="tile" aria-pressed="false"><span class="e">🏠</span>주거</button>
  <button class="tile" aria-pressed="false"><span class="e">🔁</span>구독</button>
</div>

<h2>Member avatar (멤버 귀속)</h2>
<div class="row">
  <span class="ava" style="background:var(--blue-600)">나</span>
  <span class="ava" style="background:var(--gray-600)">배</span>
  <span class="ava" style="background:var(--green-600)">딸</span>
</div>
</body></html>
