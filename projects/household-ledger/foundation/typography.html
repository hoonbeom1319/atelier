<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Typography · household-ledger</title>
<link rel="stylesheet" href="tokens.css">
<style>
  body{font-family:var(--font-sans);color:var(--color-text);background:var(--color-bg);margin:0;padding:var(--sp-6);line-height:var(--lh-base)}
  .row{padding:var(--sp-3) 0;border-bottom:1px solid var(--color-border)}
  .meta{font-size:var(--fs-xs);color:var(--color-text-muted)}
  .num{font-variant-numeric:tabular-nums}
</style></head>
<body>
<div class="row"><div style="font-size:var(--fs-display);font-weight:var(--fw-bold)" class="num">₩1,960,000</div><span class="meta">display 28 / bold — 잔액·금액 강조</span></div>
<div class="row"><div style="font-size:var(--fs-h1);font-weight:var(--fw-bold)">이번 달 가계부</div><span class="meta">h1 22 / bold</span></div>
<div class="row"><div style="font-size:var(--fs-h2);font-weight:var(--fw-bold)">최근 거래</div><span class="meta">h2 18 / bold</span></div>
<div class="row"><div style="font-size:var(--fs-body)">점심 — 김밥천국에서 결제했어요.</div><span class="meta">body 15 / regular</span></div>
<div class="row"><div style="font-size:var(--fs-sm);color:var(--color-text-muted)">나 · 식비 · 공동</div><span class="meta">sm 13 / muted — 보조정보</span></div>
<div class="row"><div style="font-size:var(--fs-xs);color:var(--color-text-muted)">🔁 자동</div><span class="meta">xs 11 — 뱃지·라벨</span></div>
<p class="meta" style="margin-top:var(--sp-6)">금액은 <code>tabular-nums</code>로 자릿수 정렬. 한글 본문 가독 우선(Pretendard/Apple SD Gothic).</p>
</body></html>
