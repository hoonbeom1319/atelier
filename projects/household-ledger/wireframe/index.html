<!-- @dsCard group="Wireframe" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>홈 · 우리집 가계부 (wire)</title>
<style>
  :root{--ink:#1a1a1a;--mut:#777;--line:#ccc;--bg:#f4f4f4;--card:#fff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#ddd;color:var(--ink)}
  .phone{max-width:390px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:64px}
  header{padding:16px;background:var(--card);border-bottom:1px solid var(--line)}
  .members{display:flex;gap:6px;margin-top:8px}
  .ava{width:28px;height:28px;border:1px solid var(--ink);border-radius:50%;display:grid;place-items:center;font-size:12px;background:#eee}
  main{padding:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px}
  .sum{display:flex;justify-content:space-between;text-align:center}
  .sum b{display:block;font-size:18px;margin-top:4px}
  h2{font-size:14px;color:var(--mut);margin:16px 0 8px}
  .row{display:flex;align-items:center;gap:10px;padding:12px;background:var(--card);border:1px solid var(--line);border-radius:8px;margin-bottom:8px;text-decoration:none;color:inherit}
  .ic{width:32px;height:32px;border:1px solid var(--line);border-radius:8px;display:grid;place-items:center}
  .row .amt{margin-left:auto;font-weight:600}
  .badge{font-size:11px;border:1px solid var(--mut);border-radius:4px;padding:0 4px;color:var(--mut)}
  .muted{color:var(--mut);font-size:13px}
  .fab{position:fixed;left:50%;transform:translateX(120px);bottom:80px;width:52px;height:52px;border-radius:50%;background:var(--ink);color:#fff;font-size:28px;display:grid;place-items:center;text-decoration:none}
  nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;display:flex;background:var(--card);border-top:1px solid var(--line)}
  nav a{flex:1;text-align:center;padding:12px 0;font-size:12px;text-decoration:none;color:var(--mut)}
  nav a[aria-current=page]{color:var(--ink);font-weight:700}
  button{font:inherit}
  .demo{margin-top:8px;padding:8px 12px;border:1px dashed var(--mut);background:none;border-radius:8px;color:var(--mut);font-size:12px;cursor:pointer}
  .scope{font-size:11px;color:var(--mut);border:1px dashed var(--line);border-radius:4px;padding:2px 6px;background:none}
  .hidden,.hidden *{display:none!important}
</style>
</head>
<body>
<div class="phone">
  <header>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <strong>우리집 · 2026년 6월</strong>
      <button class="scope" data-scope="out">설정 [범위 밖]</button>
    </div>
    <div class="members" aria-label="가구 멤버">
      <span class="ava">나</span><span class="ava">배</span>
    </div>
  </header>
  <main>
    <div class="card sum" id="summary">
      <div>지출<b>₩1,240,000</b></div>
      <div>수입<b>₩3,200,000</b></div>
      <div>잔액<b>₩1,960,000</b></div>
    </div>

    <div id="normal">
      <h2>최근 거래</h2>
      <a class="row" href="detail.html"><span class="ic">🍚</span><div><div>점심 — 김밥천국</div><div class="muted">나 · 식비</div></div><span class="amt">-9,000</span></a>
      <a class="row" href="detail.html"><span class="ic">🏠</span><div><div>월세 <span class="badge">🔁 자동</span></div><div class="muted">배우자 · 주거</div></div><span class="amt">-700,000</span></a>
      <a class="row" href="detail.html"><span class="ic">💰</span><div><div>월급</div><div class="muted">나 · 수입</div></div><span class="amt">+3,200,000</span></a>
    </div>

    <div id="empty" class="hidden">
      <div class="card" style="text-align:center">
        <p>아직 기록된 거래가 없어요.</p>
        <p class="muted">첫 거래를 기록해보세요.</p>
        <a class="row" href="add.html" style="justify-content:center;margin-top:8px">+ 첫 거래 기록</a>
      </div>
    </div>

    <button class="demo" type="button" id="toggleEmpty" aria-pressed="false">데모: 빈 상태 보기</button>
  </main>

  <a class="fab" href="add.html" aria-label="거래 추가">+</a>
  <nav aria-label="주요 탭">
    <a aria-current="page">홈</a>
    <a href="list.html">내역</a>
    <a href="stats.html">통계</a>
    <a href="recurring.html">반복</a>
  </nav>
</div>
<script>
  var t=document.getElementById('toggleEmpty');
  t.addEventListener('click',function(){
    var on=t.getAttribute('aria-pressed')==='true';
    on=!on; t.setAttribute('aria-pressed',String(on));
    document.getElementById('normal').classList.toggle('hidden',on);
    document.getElementById('empty').classList.toggle('hidden',!on);
    document.getElementById('summary').classList.toggle('hidden',on);
    t.textContent= on? '데모: 정상 상태 보기':'데모: 빈 상태 보기';
  });
</script>
</body>
</html>
