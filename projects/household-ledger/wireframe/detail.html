<!-- @dsCard group="Wireframe" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>거래 상세 (wire)</title>
<style>
  :root{--ink:#1a1a1a;--mut:#777;--line:#ccc;--bg:#f4f4f4;--card:#fff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#ddd;color:var(--ink)}
  .phone{max-width:390px;margin:0 auto;min-height:100vh;background:var(--bg)}
  header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--line)}
  .back{text-decoration:none;color:inherit;font-size:20px}
  main{padding:16px}
  .amt{font-size:32px;font-weight:800;text-align:center;margin:16px 0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 16px}
  .kv{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}
  .kv:last-child{border-bottom:0}
  .kv span:first-child{color:var(--mut)}
  .badge{font-size:11px;border:1px solid var(--mut);border-radius:4px;padding:0 4px;color:var(--mut)}
  .actions{display:flex;gap:8px;margin-top:20px}
  .btn{flex:1;padding:14px;border-radius:10px;text-align:center;text-decoration:none;font-weight:700;cursor:pointer;border:1px solid var(--ink);background:var(--card);color:var(--ink);font:inherit;font-weight:700}
  .btn.del{background:var(--ink);color:#fff;border-color:var(--ink)}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);padding:20px;max-width:390px;margin:0 auto}
  .sheet.hidden{display:none}
  .hidden *{display:none!important}
  .sheet .actions{margin-top:14px}
</style>
</head>
<body>
<div class="phone">
  <header><a class="back" href="list.html" aria-label="뒤로">←</a><strong>거래 상세</strong></header>
  <main>
    <div class="amt">- ₩700,000</div>
    <div class="card">
      <div class="kv"><span>유형</span><span>지출</span></div>
      <div class="kv"><span>카테고리</span><span>🏠 주거</span></div>
      <div class="kv"><span>날짜</span><span>2026-06-24</span></div>
      <div class="kv"><span>멤버</span><span>배우자</span></div>
      <div class="kv"><span>지출 구분</span><span>공동</span></div>
      <div class="kv"><span>메모</span><span>6월 월세</span></div>
      <div class="kv"><span>출처</span><span><span class="badge">🔁 자동</span> 반복 거래</span></div>
    </div>
    <div class="actions">
      <a class="btn" href="add.html">수정</a>
      <button type="button" class="btn del" id="delBtn">삭제</button>
    </div>
  </main>

  <div class="sheet hidden" id="sheet" role="dialog" aria-label="삭제 확인">
    <strong>이 거래를 삭제할까요?</strong>
    <p class="muted">되돌릴 수 없어요.</p>
    <div class="actions">
      <button type="button" class="btn" id="cancel">취소</button>
      <a class="btn del" href="list.html" id="confirm">삭제</a>
    </div>
  </div>
</div>
<script>
  var sheet=document.getElementById('sheet');
  document.getElementById('delBtn').addEventListener('click',function(){sheet.classList.remove('hidden')});
  document.getElementById('cancel').addEventListener('click',function(){sheet.classList.add('hidden')});
</script>
</body>
</html>
