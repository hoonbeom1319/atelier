<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>거래 입력</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--gray-200)}
  body{
    font-family:var(--font-sans);color:var(--color-text);
    font-size:var(--fs-body);line-height:var(--lh-base);
    -webkit-font-smoothing:antialiased;
  }
  .phone{
    max-width:var(--app-w);margin:0 auto;min-height:100vh;
    background:var(--color-bg);display:flex;flex-direction:column;
  }

  /* ── header ─────────────────────────────── */
  header{
    display:flex;align-items:center;gap:var(--sp-3);
    padding:var(--sp-3) var(--sp-4);
    background:var(--color-bg);border-bottom:1px solid var(--color-border);
    position:sticky;top:0;z-index:5;
  }
  .back{
    text-decoration:none;color:var(--color-text);font-size:22px;line-height:1;
    width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;
    margin-left:calc(var(--sp-2) * -1);border-radius:var(--r-sm);
  }
  .back:hover{background:var(--color-surface)}
  header strong{font-size:var(--fs-h2);font-weight:var(--fw-bold)}

  main{padding:var(--sp-5) var(--sp-4) var(--sp-4);flex:1}

  /* ── segment ────────────────────────────── */
  .seg{
    display:flex;gap:var(--sp-1);padding:var(--sp-1);
    background:var(--color-surface);border-radius:var(--r-md);
    margin-bottom:var(--sp-5);
  }
  .seg button{
    flex:1;padding:var(--sp-3) 0;border:0;border-radius:var(--r-sm);
    background:transparent;color:var(--color-text-muted);
    font:inherit;font-weight:var(--fw-medium);cursor:pointer;
    transition:background var(--dur-fast) var(--ease),color var(--dur-fast) var(--ease),box-shadow var(--dur-fast) var(--ease);
  }
  .seg button[aria-pressed=true]{
    background:var(--color-bg);color:var(--color-text);
    font-weight:var(--fw-bold);box-shadow:var(--shadow-1);
  }

  /* ── amount display ─────────────────────── */
  .amt-display{
    text-align:center;padding:var(--sp-4) 0 var(--sp-3);
  }
  .amt-display .cur{
    font-size:var(--fs-h1);font-weight:var(--fw-bold);
    color:var(--color-text-subtle);vertical-align:6px;margin-right:var(--sp-1);
  }
  .amt-input{
    border:0;outline:none;background:transparent;
    font-family:var(--font-sans);font-weight:var(--fw-bold);
    font-size:44px;line-height:var(--lh-tight);
    font-variant-numeric:tabular-nums;letter-spacing:-.02em;
    text-align:center;color:var(--color-text);
    width:auto;max-width:260px;padding:0;
  }
  .amt-input::placeholder{color:var(--color-border-strong)}
  .amt-input:focus{caret-color:var(--color-primary)}
  /* color shift for income vs expense */
  body[data-type=inc] .amt-input,
  body[data-type=inc] .amt-display .cur{color:var(--color-income)}

  /* ── on-screen keypad (always visible) ──── */
  .keypad{
    display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-2);
    margin-bottom:var(--sp-6);
  }
  .keypad button{
    padding:var(--sp-4) 0;border:1px solid var(--color-border);
    border-radius:var(--r-md);background:var(--color-bg);
    color:var(--color-text);font:inherit;
    font-size:var(--fs-h2);font-weight:var(--fw-medium);
    font-variant-numeric:tabular-nums;cursor:pointer;
    transition:background var(--dur-fast) var(--ease),border-color var(--dur-fast) var(--ease);
  }
  .keypad button:hover{background:var(--color-surface)}
  .keypad button:active{background:var(--color-surface);border-color:var(--color-border-strong)}
  .keypad .key-back{color:var(--color-text-muted)}
  .keypad button[disabled]{
    color:var(--color-text-subtle);background:var(--color-surface);
    cursor:not-allowed;opacity:.5;
  }

  /* ── field labels ───────────────────────── */
  label{
    display:block;font-size:var(--fs-sm);font-weight:var(--fw-medium);
    color:var(--color-text-muted);margin:var(--sp-5) 0 var(--sp-2);
  }
  /* visually-hidden label for the amount input (kept for a11y) */
  .sr-only{
    position:absolute;width:1px;height:1px;padding:0;margin:-1px;
    overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0;
  }

  input[type=date],
  #memo,#freq,#startd,#endr{
    width:100%;padding:var(--sp-3) var(--sp-4);
    border:1px solid var(--color-border);border-radius:var(--r-md);
    font:inherit;color:var(--color-text);background:var(--color-bg);
    transition:border-color var(--dur-fast) var(--ease),box-shadow var(--dur-fast) var(--ease);
  }
  input[type=date]:focus,
  #memo:focus,#freq:focus,#startd:focus,#endr:focus{
    outline:none;border-color:var(--color-primary);
    box-shadow:0 0 0 3px var(--color-primary-weak);
  }
  input::placeholder{color:var(--color-text-subtle)}

  /* ── category tile grid ─────────────────── */
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-2)}
  .grid button{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:var(--sp-1);padding:var(--sp-3) var(--sp-1);
    border:1px solid var(--color-border);border-radius:var(--r-md);
    background:var(--color-bg);color:var(--color-text-muted);
    cursor:pointer;font:inherit;font-size:var(--fs-xs);font-weight:var(--fw-medium);
    transition:border-color var(--dur-fast) var(--ease),background var(--dur-fast) var(--ease),color var(--dur-fast) var(--ease);
  }
  .grid button .ico{width:24px;height:24px;display:block}
  .grid button .ico svg{width:24px;height:24px;display:block}
  .grid button:hover{border-color:var(--color-border-strong)}
  .grid button[aria-pressed=true]{
    border-color:var(--color-primary);background:var(--color-primary-weak);
    color:var(--color-primary);font-weight:var(--fw-bold);
  }

  /* ── pill chips ─────────────────────────── */
  .chips{display:flex;gap:var(--sp-2);flex-wrap:wrap}
  .chip{
    padding:var(--sp-2) var(--sp-4);
    border:1px solid var(--color-border);border-radius:var(--r-pill);
    background:var(--color-bg);color:var(--color-text-muted);
    cursor:pointer;font:inherit;font-weight:var(--fw-medium);
    display:inline-flex;align-items:center;gap:var(--sp-1);
    transition:border-color var(--dur-fast) var(--ease),background var(--dur-fast) var(--ease),color var(--dur-fast) var(--ease);
  }
  .chip .ico{width:18px;height:18px;display:inline-flex}
  .chip .ico svg{width:18px;height:18px;display:block}
  .chip:hover{border-color:var(--color-border-strong)}
  .chip[aria-pressed=true]{
    border-color:var(--color-primary);background:var(--color-primary);
    color:var(--color-on-primary);font-weight:var(--fw-bold);
  }

  /* ── quick input area ───────────────────── */
  .quick{
    margin:var(--sp-5) 0;padding:var(--sp-4);
    border:1px dashed var(--color-border-strong);border-radius:var(--r-md);
    background:var(--color-surface-alt);
  }
  .quick .muted{
    font-size:var(--fs-sm);font-weight:var(--fw-medium);color:var(--color-text-muted);
  }
  .quick .chip{background:var(--color-bg)}

  /* repeat toggle button is wider/standalone */
  #rep{width:100%;text-align:left;padding:var(--sp-3) var(--sp-4);justify-content:flex-start}
  #rep[aria-pressed=true]{background:var(--color-primary);color:var(--color-on-primary)}

  /* ── repeat option card (slides) ────────── */
  .rep-opt{
    margin-top:var(--sp-3);padding:var(--sp-2) var(--sp-4) var(--sp-4);
    border:1px solid var(--color-border);border-radius:var(--r-md);
    background:var(--color-surface-alt);
    animation:slideIn var(--dur-base) var(--ease);
  }
  .rep-opt label:first-child{margin-top:var(--sp-3)}
  @keyframes slideIn{
    from{opacity:0;transform:translateY(-6px)}
    to{opacity:1;transform:translateY(0)}
  }

  .hint{
    font-size:var(--fs-sm);color:var(--color-text-subtle);
    text-align:center;margin-top:var(--sp-3);
  }

  /* ── sticky save bar ────────────────────── */
  .save-bar{
    position:sticky;bottom:0;
    padding:var(--sp-3) var(--sp-4) calc(var(--sp-4) + env(safe-area-inset-bottom,0px));
    background:var(--color-bg);border-top:1px solid var(--color-border);
  }
  .save{
    width:100%;padding:var(--sp-4);border:0;border-radius:var(--r-md);
    background:var(--color-primary);color:var(--color-on-primary);
    font:inherit;font-size:var(--fs-h2);font-weight:var(--fw-bold);
    cursor:pointer;
    transition:background var(--dur-fast) var(--ease);
  }
  .save:hover{background:var(--color-primary-hover)}
  .save[disabled]{
    background:var(--color-surface);color:var(--color-text-subtle);
    cursor:not-allowed;
  }

  /* ── focus visibility (a11y) ────────────── */
  button:focus-visible,a:focus-visible,input:focus-visible{
    outline:2px solid var(--color-primary);outline-offset:2px;
  }

  /* hidden-state contract (keep) */
  .hidden,.hidden *{display:none!important}
</style>
</head>
<body data-type="exp">
<div class="phone">
  <header><a class="back" href="index.html" aria-label="뒤로">←</a><strong>거래 입력</strong></header>
  <main>
    <div class="seg" role="group" aria-label="유형">
      <button type="button" id="t-exp" aria-pressed="true">지출</button>
      <button type="button" id="t-inc" aria-pressed="false">수입</button>
    </div>

    <div class="amt-display">
      <label for="amount" class="sr-only">금액</label>
      <span class="cur" aria-hidden="true">₩</span><input id="amount" class="amt-input" inputmode="numeric" placeholder="0" aria-label="금액" size="6">
    </div>

    <div class="keypad" id="keypad" role="group" aria-label="숫자 키패드">
      <button type="button" class="key-digit" data-key="1">1</button>
      <button type="button" class="key-digit" data-key="2">2</button>
      <button type="button" class="key-digit" data-key="3">3</button>
      <button type="button" class="key-digit" data-key="4">4</button>
      <button type="button" class="key-digit" data-key="5">5</button>
      <button type="button" class="key-digit" data-key="6">6</button>
      <button type="button" class="key-digit" data-key="7">7</button>
      <button type="button" class="key-digit" data-key="8">8</button>
      <button type="button" class="key-digit" data-key="9">9</button>
      <button type="button" class="key-digit" data-key="00">00</button>
      <button type="button" class="key-digit" data-key="0">0</button>
      <button type="button" class="key-back" id="keyBack" aria-label="지우기" disabled aria-disabled="true">⌫</button>
    </div>

    <label>카테고리</label>
    <div class="grid" id="cats" role="group" aria-label="카테고리">
      <button type="button" aria-pressed="false"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v7a2 2 0 0 0 4 0V3M8 10v11"/><path d="M16 3c-1.5 0-2.5 1.8-2.5 4.5S15 12 16 12s2.5-1.8 2.5-4.5S17.5 3 16 3zM16 12v9"/></svg></span><span>식비</span></button>
      <button type="button" aria-pressed="false"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h12v5a5 5 0 0 1-10 0z"/><path d="M16 9h2.5a2.5 2.5 0 0 1 0 5H16"/><path d="M6 3v2M10 3v2M14 3v2"/></svg></span><span>카페</span></button>
      <button type="button" aria-pressed="false"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="3" width="12" height="14" rx="3"/><path d="M6 11h12"/><circle cx="9" cy="14" r="1"/><circle cx="15" cy="14" r="1"/><path d="M8 21l1.5-2M16 21l-1.5-2"/></svg></span><span>교통</span></button>
      <button type="button" aria-pressed="false"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-6 8 6"/><path d="M6 10v9h12v-9"/><path d="M10 19v-5h4v5"/></svg></span><span>주거</span></button>
      <button type="button" aria-pressed="false"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="3" width="10" height="18" rx="2.5"/><path d="M11 18h2"/></svg></span><span>통신</span></button>
      <button type="button" aria-pressed="false"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c3 4 5 6.5 5 9a5 5 0 0 1-10 0c0-2.5 2-5 5-9z"/></svg></span><span>생활</span></button>
      <button type="button" aria-pressed="false"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1 12H7z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg></span><span>쇼핑</span></button>
      <button type="button" aria-pressed="false"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="18" cy="12" r="1.4"/></svg></span><span>기타</span></button>
    </div>

    <label for="date">날짜</label>
    <input id="date" type="date" value="2026-06-25">

    <label>입력 멤버</label>
    <div class="chips" id="members" role="group" aria-label="멤버">
      <button type="button" class="chip" aria-pressed="true">나</button>
      <button type="button" class="chip" aria-pressed="false">배우자</button>
    </div>

    <label>지출 구분</label>
    <div class="chips" id="scope" role="group" aria-label="공동/개인">
      <button type="button" class="chip" aria-pressed="true">공동</button>
      <button type="button" class="chip" aria-pressed="false">개인</button>
    </div>

    <div class="quick">
      <div class="muted">빠른 입력 (최근·즐겨찾기)</div>
      <div class="chips" style="margin-top:var(--sp-2)">
        <button type="button" class="chip" id="q1"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v7a2 2 0 0 0 4 0V3M8 10v11"/><path d="M16 3c-1.5 0-2.5 1.8-2.5 4.5S15 12 16 12s2.5-1.8 2.5-4.5S17.5 3 16 3zM16 12v9"/></svg></span> 점심 9,000</button>
        <button type="button" class="chip" id="q2"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h12v5a5 5 0 0 1-10 0z"/><path d="M16 9h2.5a2.5 2.5 0 0 1 0 5H16"/><path d="M6 3v2M10 3v2M14 3v2"/></svg></span> 커피 4,500</button>
      </div>
    </div>

    <label>반복</label>
    <div class="chips">
      <button type="button" class="chip" id="rep" aria-pressed="false">반복 거래로 설정</button>
    </div>
    <div class="rep-opt hidden" id="repOpt">
      <label for="freq">주기</label>
      <input id="freq" list="freqs" value="매월" aria-label="주기">
      <label for="startd">시작일</label>
      <input id="startd" type="date" value="2026-07-01">
      <label for="endr">종료</label>
      <input id="endr" value="없음(무한)" aria-label="종료 규칙">
    </div>

    <label for="memo">메모 (선택)</label>
    <input id="memo" placeholder="예: 마트 장보기">
  </main>

  <div class="save-bar">
    <button type="button" class="save" id="save" disabled aria-disabled="true">저장</button>
    <p class="hint" id="hint">금액과 카테고리를 입력하면 저장할 수 있어요.</p>
  </div>
</div>
<script>
  function single(group){
    group.addEventListener('click',function(e){
      var b=e.target.closest('button'); if(!b)return;
      [].forEach.call(group.querySelectorAll('button'),function(x){x.setAttribute('aria-pressed','false')});
      b.setAttribute('aria-pressed','true'); validate();
    });
  }
  single(document.getElementById('cats'));
  single(document.getElementById('members'));
  single(document.getElementById('scope'));
  single(document.querySelector('.seg'));

  var amount=document.getElementById('amount');
  amount.addEventListener('input',validate);

  /* ── on-screen keypad ──────────────────────
     digit/00/0 → append to #amount; ⌫ → drop last digit.
     fires #amount's 'input' so existing validate() runs. */
  var keyBack=document.getElementById('keyBack');
  function fireInput(){
    amount.dispatchEvent(new Event('input',{bubbles:true}));
  }
  function syncBack(){
    var raw=(amount.value||'').replace(/[^0-9]/g,'');
    keyBack.disabled = raw.length===0;
    keyBack.setAttribute('aria-disabled',String(raw.length===0));
  }
  function setAmount(raw){
    // raw digits in the input (no comma) — matches getByLabel('금액') 값 계약.
    // value '속성'에도 반영 → 죽은컨트롤 프로브가 키패드의 상태변화를 감지(프로퍼티만으론 안 보임).
    var n=raw.replace(/[^0-9]/g,'').slice(0,12);
    amount.value = n;
    if(n) amount.setAttribute('value', n); else amount.removeAttribute('value');
  }
  [].forEach.call(document.querySelectorAll('#keypad .key-digit'),function(btn){
    btn.addEventListener('click',function(){
      var cur=(amount.value||'').replace(/[^0-9]/g,'');
      setAmount(cur + btn.getAttribute('data-key'));
      fireInput();
    });
  });
  keyBack.addEventListener('click',function(){
    if(this.disabled)return;
    var cur=(amount.value||'').replace(/[^0-9]/g,'');
    setAmount(cur.slice(0,-1));
    fireInput();
  });

  var rep=document.getElementById('rep');
  rep.addEventListener('click',function(){
    var on=rep.getAttribute('aria-pressed')==='true'; on=!on;
    rep.setAttribute('aria-pressed',String(on));
    document.getElementById('repOpt').classList.toggle('hidden',!on);
  });

  function prefill(amt,catLabel){
    setAmount(String(amt));
    [].forEach.call(document.querySelectorAll('#cats button'),function(b){
      b.setAttribute('aria-pressed', b.textContent.indexOf(catLabel)>-1 ?'true':'false');
    });
    validate();
  }
  document.getElementById('q1').addEventListener('click',function(){prefill('9000','식비')});
  document.getElementById('q2').addEventListener('click',function(){prefill('4500','카페')});

  function validate(){
    var amt=parseInt((amount.value||'').replace(/[^0-9]/g,''),10)||0;
    var cat=document.querySelector('#cats button[aria-pressed=true]');
    var ok=amt>0 && cat;
    var s=document.getElementById('save');
    s.disabled=!ok; s.setAttribute('aria-disabled',String(!ok));
    document.getElementById('hint').textContent= ok? '저장할 준비가 됐어요.' : '금액과 카테고리를 입력하면 저장할 수 있어요.';
    syncBack();
  }
  document.getElementById('save').addEventListener('click',function(){
    if(this.disabled)return; location.href='index.html';
  });
</script>
</body>
</html>
