<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>홈 · 우리집 가계부</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--font-sans);
    background:var(--color-surface);
    color:var(--color-text);
    line-height:var(--lh-base);
    -webkit-font-smoothing:antialiased;
  }
  .phone{
    max-width:var(--app-w);
    margin:0 auto;
    min-height:100vh;
    background:var(--color-surface);
    position:relative;
    padding-bottom:calc(var(--tabbar-h) + var(--sp-6));
  }

  /* ── header ─────────────────────────────── */
  header{
    padding:var(--sp-5) var(--sp-4) var(--sp-4);
    background:var(--color-bg);
    border-bottom:1px solid var(--color-border);
  }
  .head-top strong{font-size:var(--fs-h2);font-weight:var(--fw-bold);letter-spacing:-.01em}
  .members{display:flex;gap:var(--sp-2);margin-top:var(--sp-3);align-items:center}
  .ava{
    width:32px;height:32px;
    border-radius:var(--r-pill);
    display:grid;place-items:center;
    font-size:var(--fs-sm);
    font-weight:var(--fw-bold);
    color:var(--color-on-primary);
  }
  .ava-me{background:var(--color-primary)}
  .ava-sp{background:var(--color-success)}
  .members .label{font-size:var(--fs-sm);color:var(--color-text-muted);margin-left:var(--sp-1)}

  main{padding:var(--sp-4)}

  /* ── hero summary card ──────────────────── */
  .hero{
    background:var(--color-bg);
    border-radius:var(--r-lg);
    padding:var(--sp-5);
    margin-bottom:var(--sp-5);
    box-shadow:var(--shadow-2);
  }
  .hero .cap{font-size:var(--fs-sm);color:var(--color-text-muted);font-weight:var(--fw-medium)}
  .hero .balance{
    font-size:var(--fs-display);
    font-weight:var(--fw-bold);
    letter-spacing:-.02em;
    margin-top:var(--sp-1);
    font-variant-numeric:tabular-nums;
  }
  .sum{
    display:flex;
    gap:var(--sp-3);
    margin-top:var(--sp-4);
    padding-top:var(--sp-4);
    border-top:1px solid var(--color-border);
  }
  .sum > div{flex:1}
  .sum .k{font-size:var(--fs-xs);color:var(--color-text-subtle);font-weight:var(--fw-medium)}
  .sum b{
    display:block;
    font-size:var(--fs-h2);
    font-weight:var(--fw-bold);
    margin-top:var(--sp-1);
    font-variant-numeric:tabular-nums;
    letter-spacing:-.01em;
  }
  .sum .v-out{color:var(--color-expense)}
  .sum .v-in{color:var(--color-income)}

  /* ── section heading ────────────────────── */
  h2{
    font-size:var(--fs-sm);
    color:var(--color-text-muted);
    font-weight:var(--fw-bold);
    margin:var(--sp-5) var(--sp-1) var(--sp-3);
    letter-spacing:.01em;
  }

  /* ── transaction list (한 카드, 리스트 행) ── */
  .tx-card{
    background:var(--color-bg);
    border-radius:var(--r-lg);
    box-shadow:var(--shadow-1);
    overflow:hidden;
  }
  .row{
    display:flex;
    align-items:center;
    gap:var(--sp-3);
    padding:var(--sp-3) var(--sp-4);
    text-decoration:none;
    color:inherit;
    transition:background var(--dur-fast) var(--ease);
  }
  .row + .row{border-top:1px solid var(--color-border)}
  .row:hover{background:var(--color-surface-alt)}
  .row:active{background:var(--color-surface)}
  .ic{
    width:40px;height:40px;flex:none;
    border-radius:var(--r-md);
    background:var(--color-surface);
    color:var(--color-text-muted);
    display:grid;place-items:center;
  }
  .ic svg{width:22px;height:22px}
  .row .body{min-width:0;flex:1}
  .row .ttl{font-size:var(--fs-body);font-weight:var(--fw-medium);display:flex;align-items:center;gap:var(--sp-2)}
  .row .meta{display:flex;align-items:center;gap:var(--sp-2);margin-top:2px}
  .dot{
    width:16px;height:16px;flex:none;
    border-radius:var(--r-pill);
    display:grid;place-items:center;
    font-size:9px;font-weight:var(--fw-bold);
    color:var(--color-on-primary);
  }
  .dot-me{background:var(--color-primary)}
  .dot-sp{background:var(--color-success)}
  .muted{color:var(--color-text-muted);font-size:var(--fs-sm)}
  .amt{
    margin-left:auto;
    font-weight:var(--fw-bold);
    font-size:var(--fs-body);
    font-variant-numeric:tabular-nums;
    letter-spacing:-.01em;
  }
  .amt-out{color:var(--color-expense)}
  .amt-in{color:var(--color-income)}
  .badge{
    display:inline-flex;
    align-items:center;
    gap:2px;
    font-size:var(--fs-xs);
    font-weight:var(--fw-medium);
    background:var(--color-primary-weak);
    color:var(--color-primary);
    border-radius:var(--r-pill);
    padding:1px var(--sp-2);
  }
  .badge svg{width:11px;height:11px}

  /* ── empty state ────────────────────────── */
  .empty-card{
    background:var(--color-bg);
    border-radius:var(--r-lg);
    padding:var(--sp-8) var(--sp-5);
    text-align:center;
    box-shadow:var(--shadow-1);
  }
  .empty-card .emo{color:var(--color-text-subtle);display:grid;place-items:center}
  .empty-card .emo svg{width:40px;height:40px}
  .empty-card p{margin-top:var(--sp-2)}
  .empty-card .p1{font-size:var(--fs-body);font-weight:var(--fw-medium)}
  .empty-cta{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    margin-top:var(--sp-4);
    padding:var(--sp-3) var(--sp-5);
    background:var(--color-primary);
    color:var(--color-on-primary);
    text-decoration:none;
    font-weight:var(--fw-bold);
    font-size:var(--fs-body);
    border-radius:var(--r-pill);
  }
  .empty-cta:active{background:var(--color-primary-hover)}

  /* ── demo toggle ────────────────────────── */
  .demo{
    display:block;
    width:100%;
    margin-top:var(--sp-4);
    padding:var(--sp-3);
    border:1px dashed var(--color-border-strong);
    background:none;
    border-radius:var(--r-md);
    color:var(--color-text-muted);
    font-size:var(--fs-sm);
    font-family:inherit;
    cursor:pointer;
    transition:background var(--dur-fast) var(--ease);
  }
  .demo:hover{background:var(--color-surface-alt)}

  /* ── FAB ────────────────────────────────── */
  .fab{
    position:fixed;
    left:50%;
    transform:translateX(123px);
    bottom:calc(var(--tabbar-h) + var(--sp-4));
    width:56px;height:56px;
    border-radius:var(--r-pill);
    background:var(--color-primary);
    color:var(--color-on-primary);
    display:grid;place-items:center;
    text-decoration:none;
    box-shadow:var(--shadow-fab);
    transition:transform var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease);
  }
  .fab svg{width:26px;height:26px}
  .fab:active{transform:translateX(123px) scale(.94);background:var(--color-primary-hover)}

  /* ── tab bar ────────────────────────────── */
  nav{
    position:fixed;bottom:0;left:50%;
    transform:translateX(-50%);
    width:100%;max-width:var(--app-w);
    height:var(--tabbar-h);
    display:flex;
    background:var(--color-bg);
    border-top:1px solid var(--color-border);
  }
  nav a{
    flex:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;
    font-size:var(--fs-xs);
    font-weight:var(--fw-medium);
    text-decoration:none;
    color:var(--color-text-subtle);
  }
  nav a .ico{display:grid;place-items:center;line-height:1}
  nav a .ico svg{width:22px;height:22px}
  nav a[aria-current=page]{color:var(--color-primary);font-weight:var(--fw-bold)}

  /* focus visibility */
  a:focus-visible,button:focus-visible{
    outline:2px solid var(--color-primary);
    outline-offset:2px;
    border-radius:var(--r-sm);
  }

  .hidden,.hidden *{display:none!important}
</style>
</head>
<body>
<div class="phone">
  <header>
    <div class="head-top">
      <strong>우리집 · 2026년 6월</strong>
    </div>
    <div class="members" aria-label="가구 멤버">
      <span class="ava ava-me">나</span><span class="ava ava-sp">배</span>
      <span class="label">2명 함께 쓰는 중</span>
    </div>
  </header>
  <main>
    <div class="hero" id="summary">
      <div class="cap">이번 달 잔액</div>
      <div class="balance v-in">₩1,960,000</div>
      <div class="sum">
        <div>
          <span class="k">지출</span>
          <b class="v-out">₩1,240,000</b>
        </div>
        <div>
          <span class="k">수입</span>
          <b class="v-in">₩3,200,000</b>
        </div>
      </div>
    </div>

    <div id="normal">
      <h2>최근 거래</h2>
      <div class="tx-card">
        <a class="row" href="detail.html">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3v7a2 2 0 0 0 4 0V3M8 10v11"/><path d="M16 3c-1.5 0-2.5 1.8-2.5 4.5S15 12 16 12s2.5-1.8 2.5-4.5S17.5 3 16 3zM16 12v9"/></svg></span>
          <div class="body">
            <div class="ttl">점심 — 김밥천국</div>
            <div class="meta"><span class="dot dot-me">나</span><span class="muted">식비</span></div>
          </div>
          <span class="amt amt-out">-9,000</span>
        </a>
        <a class="row" href="detail.html">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11l8-6 8 6"/><path d="M6 10v9h12v-9"/><path d="M10 19v-5h4v5"/></svg></span>
          <div class="body">
            <div class="ttl">월세 <span class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 8h11l-2-2M19 16H8l2 2"/></svg>자동</span></div>
            <div class="meta"><span class="dot dot-sp">배</span><span class="muted">주거</span></div>
          </div>
          <span class="amt amt-out">-700,000</span>
        </a>
        <a class="row" href="detail.html">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="6" width="18" height="13" rx="3"/><path d="M3 10h18"/><circle cx="16.5" cy="14" r="1.2"/></svg></span>
          <div class="body">
            <div class="ttl">월급</div>
            <div class="meta"><span class="dot dot-me">나</span><span class="muted">수입</span></div>
          </div>
          <span class="amt amt-in">+3,200,000</span>
        </a>
      </div>
    </div>

    <div id="empty" class="hidden">
      <div class="empty-card">
        <div class="emo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h9l3 3v15l-3-1.5L15 21l-3-1.5L9 21l-3-1.5L3 21V6z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg></div>
        <p class="p1">아직 기록된 거래가 없어요.</p>
        <p class="muted">첫 거래를 기록해보세요.</p>
        <a class="empty-cta" href="add.html">+ 첫 거래 기록</a>
      </div>
    </div>

    <button class="demo" type="button" id="toggleEmpty" aria-pressed="false">데모: 빈 상태 보기</button>
  </main>

  <a class="fab" href="add.html" aria-label="거래 추가"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg></a>
  <nav aria-label="주요 탭">
    <a aria-current="page"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11l8-6 8 6"/><path d="M6 10v9h12v-9"/></svg></span>홈</a>
    <a href="list.html"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 6h12M8 12h12M8 18h12"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg></span>내역</a>
    <a href="stats.html"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a9 9 0 1 0 9 9h-9z"/><path d="M12 3v6.5"/></svg></span>통계</a>
    <a href="recurring.html"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 8h11l-2-2M19 16H8l2 2"/></svg></span>반복</a>
  </nav>
</div>
<script>
  var t=document.getElementById('toggleEmpty');
  t.addEventListener('click',function(){
    var on=t.getAttribute('aria-pressed')==='true';
    on=!on; t.setAttribute('aria-pressed',String(on));
    document.getElementById('normal').classList.toggle('hidden',on);
    document.getElementById('empty').classList.toggle('hidden',!on);
    document.getElementById('summary').classList.toggle('hidden',on);
    t.textContent= on? '데모: 정상 상태 보기':'데모: 빈 상태 보기';
  });
</script>
</body>
</html>
