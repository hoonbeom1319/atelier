<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>반복 거래 — 가계부</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--font-sans);
    background:var(--color-surface);
    color:var(--color-text);
    line-height:var(--lh-base);
    -webkit-font-smoothing:antialiased;
  }
  .phone{
    max-width:var(--app-w);
    margin:0 auto;
    min-height:100vh;
    background:var(--color-surface);
    padding-bottom:calc(var(--tabbar-h) + var(--sp-4));
  }

  /* ── header ───────────────────────────── */
  header{
    position:sticky;top:0;z-index:5;
    display:flex;align-items:center;justify-content:space-between;
    padding:var(--sp-4) var(--sp-5);
    background:var(--color-bg);
    border-bottom:1px solid var(--color-border);
  }
  header .title{font-size:var(--fs-h1);font-weight:var(--fw-bold);letter-spacing:-.02em}
  .add{
    display:inline-flex;align-items:center;gap:var(--sp-1);
    border:0;background:var(--color-primary);color:var(--color-on-primary);
    border-radius:var(--r-pill);padding:var(--sp-2) var(--sp-4);
    font:inherit;font-size:var(--fs-sm);font-weight:var(--fw-bold);
    cursor:pointer;transition:background var(--dur-fast) var(--ease);
  }
  .add:hover{background:var(--color-primary-hover)}
  .add:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
  .add[aria-expanded=true]{background:var(--color-text);}

  main{padding:var(--sp-5)}

  /* 가치 헤드라인 */
  .lede{
    font-size:var(--fs-sm);color:var(--color-text-muted);
    margin:0 var(--sp-1) var(--sp-4);line-height:var(--lh-base);
  }

  /* ── 규칙 카드 ───────────────────────────── */
  .card{
    background:var(--color-bg);
    border:1px solid var(--color-border);
    border-radius:var(--r-lg);
    padding:var(--sp-4);
    margin-bottom:var(--sp-3);
    box-shadow:var(--shadow-1);
  }
  .top{display:flex;align-items:center;gap:var(--sp-3)}
  .ic{
    width:42px;height:42px;flex:0 0 42px;
    background:var(--color-surface);
    border-radius:var(--r-md);
    display:grid;place-items:center;font-size:20px;
  }
  .top .name{font-size:var(--fs-body);font-weight:var(--fw-bold);letter-spacing:-.01em}
  .top .amt{margin-left:auto;font-size:var(--fs-h2);font-weight:var(--fw-bold);letter-spacing:-.02em;white-space:nowrap}
  .meta{
    color:var(--color-text-muted);font-size:var(--fs-sm);
    margin-top:var(--sp-3);line-height:var(--lh-base);
  }
  /* 다음 발생일 강조 — meta 안 .next 를 추가하지만, 와이어 마크업(텍스트 meta)도 그대로 읽히게 함 */
  .meta .next{color:var(--color-primary);font-weight:var(--fw-bold)}
  .ctl{display:flex;align-items:center;gap:var(--sp-2);margin-top:var(--sp-4)}
  .toggle{
    display:inline-flex;align-items:center;gap:6px;
    border:1px solid var(--color-border-strong);
    background:var(--color-bg);color:var(--color-text-muted);
    border-radius:var(--r-pill);padding:var(--sp-2) var(--sp-3);
    cursor:pointer;font:inherit;font-size:var(--fs-sm);font-weight:var(--fw-medium);
    transition:all var(--dur-fast) var(--ease);
  }
  .toggle::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--color-text-subtle)}
  .toggle[aria-pressed=true]{
    background:var(--color-primary-weak);
    border-color:transparent;
    color:var(--color-primary-hover);
  }
  .toggle[aria-pressed=true]::before{background:var(--color-success)}
  .toggle:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
  .del{
    margin-left:auto;
    border:0;background:none;color:var(--color-text-subtle);
    border-radius:var(--r-pill);padding:var(--sp-2) var(--sp-3);
    cursor:pointer;font:inherit;font-size:var(--fs-sm);font-weight:var(--fw-medium);
  }
  .del:hover{color:var(--color-danger)}
  .del:focus-visible{outline:2px solid var(--color-danger);outline-offset:2px}

  /* ── 추가 폼 (카드형 인라인) ───────────────────────────── */
  .form{
    background:var(--color-bg);
    border:1px solid var(--color-border);
    border-radius:var(--r-lg);
    padding:var(--sp-5);
    margin-bottom:var(--sp-4);
    box-shadow:var(--shadow-2);
  }
  .form .form-h{font-size:var(--fs-body);font-weight:var(--fw-bold);margin-bottom:var(--sp-2)}
  .form label{
    display:block;font-size:var(--fs-xs);font-weight:var(--fw-medium);
    color:var(--color-text-muted);margin:var(--sp-3) 0 var(--sp-1);
  }
  .form input,.form select{
    width:100%;padding:var(--sp-3);
    border:1px solid var(--color-border-strong);
    border-radius:var(--r-sm);
    font:inherit;font-size:var(--fs-body);
    background:var(--color-surface-alt);color:var(--color-text);
    transition:border-color var(--dur-fast) var(--ease),box-shadow var(--dur-fast) var(--ease);
  }
  .form input:focus,.form select:focus{
    outline:none;border-color:var(--color-primary);
    box-shadow:0 0 0 3px var(--color-primary-weak);
    background:var(--color-bg);
  }
  .form .row2{display:flex;gap:var(--sp-2)}
  .form .row2 > div{flex:1}
  .save{
    margin-top:var(--sp-5);width:100%;padding:var(--sp-4);
    border:0;border-radius:var(--r-md);
    background:var(--color-primary);color:var(--color-on-primary);
    font:inherit;font-size:var(--fs-body);font-weight:var(--fw-bold);
    cursor:pointer;transition:background var(--dur-fast) var(--ease);
  }
  .save:hover{background:var(--color-primary-hover)}
  .save:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}

  /* 범위 밖 */
  .scope{
    display:block;width:100%;text-align:center;
    font-size:var(--fs-sm);color:var(--color-text-subtle);
    border:1px dashed var(--color-border-strong);border-radius:var(--r-md);
    padding:var(--sp-3);background:none;cursor:default;margin-top:var(--sp-4);
  }

  /* 빈 상태 */
  .empty{text-align:center;color:var(--color-text-muted);padding:var(--sp-8) var(--sp-4)}
  .empty .e-ic{font-size:32px;margin-bottom:var(--sp-3)}
  .empty p{font-size:var(--fs-sm);margin-top:var(--sp-1)}
  .empty p:first-of-type{font-size:var(--fs-body);font-weight:var(--fw-bold);color:var(--color-text)}

  /* ── 하단탭 ───────────────────────────── */
  nav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:var(--app-w);height:var(--tabbar-h);
    display:flex;background:var(--color-bg);
    border-top:1px solid var(--color-border);
  }
  nav a{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-size:var(--fs-xs);text-decoration:none;color:var(--color-text-subtle);
  }
  nav a[aria-current=page]{color:var(--color-primary);font-weight:var(--fw-bold)}
  nav a:focus-visible{outline:2px solid var(--color-primary);outline-offset:-2px}

  /* 계약: 가시성 토글 */
  .hidden,.hidden *{display:none!important}
</style>
</head>
<body>
<div class="phone">
  <header>
    <span class="title">반복 거래</span>
    <button type="button" class="add" id="addBtn" aria-expanded="false">+ 추가</button>
  </header>
  <main>
    <p class="lede">월세·구독 같은 고정비를 한 번 등록하면 매달 자동으로 기록돼요.</p>

    <div class="form hidden" id="form" aria-label="반복 규칙 추가">
      <div class="form-h">반복 규칙 추가</div>
      <label for="r-cat">카테고리</label>
      <select id="r-cat"><option>🏠 주거</option><option>📱 통신</option><option>🔁 구독</option></select>
      <div class="row2">
        <div><label for="r-amt">금액</label><input id="r-amt" inputmode="numeric" value="9,900"></div>
        <div><label for="r-freq">주기</label><select id="r-freq"><option>매월</option><option>매주</option></select></div>
      </div>
      <label for="r-day">시작일</label>
      <input id="r-day" type="date" value="2026-07-01">
      <label for="r-end">종료</label>
      <select id="r-end"><option>없음(무한)</option><option>횟수 지정</option><option>날짜 지정</option></select>
      <button type="button" class="save" id="formSave">규칙 저장</button>
    </div>

    <div id="rules">
      <div class="card">
        <div class="top"><span class="ic">🏠</span><div><div class="name">월세</div></div><span class="amt">₩700,000</span></div>
        <div class="meta">매월 1일 · <span class="next">다음 발생 2026-07-01</span> · 배우자 · 공동</div>
        <div class="ctl">
          <button type="button" class="toggle" aria-pressed="true">활성</button>
          <button type="button" class="del">삭제</button>
        </div>
      </div>
      <div class="card">
        <div class="top"><span class="ic">🔁</span><div><div class="name">넷플릭스</div></div><span class="amt">₩17,000</span></div>
        <div class="meta">매월 15일 · <span class="next">다음 발생 2026-07-15</span> · 나 · 공동</div>
        <div class="ctl">
          <button type="button" class="toggle" aria-pressed="true">활성</button>
          <button type="button" class="del">삭제</button>
        </div>
      </div>
    </div>

    <div class="empty hidden" id="empty">
      <div class="e-ic">🔁</div>
      <p>등록된 반복 거래가 없어요.</p>
      <p>고정비(월세·구독)를 한 번 등록해두면 매달 자동으로 기록돼요.</p>
    </div>

    <button type="button" class="scope" data-scope="out">카테고리별 예산 설정 [범위 밖]</button>
  </main>
  <nav aria-label="주요 탭">
    <a href="index.html">홈</a>
    <a href="list.html">내역</a>
    <a href="stats.html">통계</a>
    <a aria-current="page">반복</a>
  </nav>
</div>
<script>
  var form=document.getElementById('form'),addBtn=document.getElementById('addBtn');
  addBtn.addEventListener('click',function(){
    var on=form.classList.toggle('hidden')===false;
    addBtn.setAttribute('aria-expanded',String(on));
    addBtn.textContent= on? '닫기':'+ 추가';
  });
  document.getElementById('formSave').addEventListener('click',function(){
    var card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="top"><span class="ic">🔁</span><div><div>새 반복 거래</div></div><span class="amt">₩9,900</span></div>'+
      '<div class="meta">매월 · 다음 발생 2026-07-01 · 나 · 공동</div>'+
      '<div class="ctl"><button type="button" class="toggle" aria-pressed="true">활성</button><button type="button" class="del">삭제</button></div>';
    document.getElementById('rules').appendChild(card);
    form.classList.add('hidden');addBtn.setAttribute('aria-expanded','false');addBtn.textContent='+ 추가';
    refreshEmpty();
  });
  document.getElementById('rules').addEventListener('click',function(e){
    var t=e.target;
    if(t.classList.contains('toggle')){
      var on=t.getAttribute('aria-pressed')==='true';on=!on;
      t.setAttribute('aria-pressed',String(on));t.textContent=on?'활성':'일시중지';
    }else if(t.classList.contains('del')){
      t.closest('.card').remove();refreshEmpty();
    }
  });
  function refreshEmpty(){
    var n=document.querySelectorAll('#rules .card').length;
    document.getElementById('empty').classList.toggle('hidden',n!==0);
  }
</script>
</body>
</html>
