<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>거래 상세</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--font-sans);
    background:var(--color-surface);
    color:var(--color-text);
    -webkit-font-smoothing:antialiased;
  }
  .phone{
    max-width:var(--app-w);
    margin:0 auto;
    min-height:100vh;
    background:var(--color-surface);
    position:relative;
    overflow:hidden;
  }

  /* ── header ── */
  header{
    display:flex;
    align-items:center;
    gap:var(--sp-2);
    padding:var(--sp-3) var(--sp-2) var(--sp-3) var(--sp-1);
    background:var(--color-bg);
    position:sticky;top:0;z-index:5;
  }
  .back{
    display:flex;align-items:center;justify-content:center;
    width:40px;height:40px;
    text-decoration:none;
    color:var(--color-text);
    font-size:var(--fs-h1);
    border-radius:var(--r-pill);
  }
  .back:active{background:var(--color-surface)}
  header .title{
    font-size:var(--fs-h2);
    font-weight:var(--fw-bold);
    color:var(--color-text);
  }

  main{padding:0 var(--sp-4) var(--sp-8)}

  /* ── hero amount ── */
  .hero{
    text-align:center;
    padding:var(--sp-6) 0 var(--sp-8);
  }
  .hero .cat-chip{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--color-bg);
    border:1px solid var(--color-border);
    color:var(--color-text-muted);
    font-size:var(--fs-sm);
    font-weight:var(--fw-medium);
    padding:6px var(--sp-3);
    border-radius:var(--r-pill);
    margin-bottom:var(--sp-4);
  }
  .amt{
    font-size:var(--fs-display);
    font-weight:var(--fw-bold);
    letter-spacing:-.5px;
    line-height:var(--lh-tight);
    color:var(--color-expense);
  }
  .amt .sign{margin-right:2px}
  .hero .sub{
    margin-top:var(--sp-2);
    font-size:var(--fs-sm);
    color:var(--color-text-subtle);
  }

  /* ── info card ── */
  .card{
    background:var(--color-bg);
    border-radius:var(--r-lg);
    padding:var(--sp-1) var(--sp-4);
    box-shadow:var(--shadow-1);
  }
  .kv{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:var(--sp-4);
    padding:var(--sp-4) 0;
    border-bottom:1px solid var(--color-border);
    min-height:54px;
  }
  .kv:last-child{border-bottom:0}
  .kv .k{
    color:var(--color-text-muted);
    font-size:var(--fs-body);
    flex:none;
  }
  .kv .v{
    color:var(--color-text);
    font-size:var(--fs-body);
    font-weight:var(--fw-medium);
    text-align:right;
    display:flex;align-items:center;gap:var(--sp-2);
    justify-content:flex-end;
  }

  /* tag pills inside values */
  .tag{
    display:inline-flex;align-items:center;gap:5px;
    font-size:var(--fs-sm);
    font-weight:var(--fw-medium);
    padding:3px var(--sp-2);
    border-radius:var(--r-sm);
    line-height:1.3;
  }
  .tag.expense{background:var(--color-surface);color:var(--color-text)}
  .tag.shared{background:var(--color-primary-weak);color:var(--color-primary)}
  .badge{
    display:inline-flex;align-items:center;gap:4px;
    font-size:var(--fs-xs);
    font-weight:var(--fw-bold);
    color:var(--color-primary);
    background:var(--color-primary-weak);
    padding:3px var(--sp-2);
    border-radius:var(--r-pill);
  }

  /* member avatar */
  .member{display:inline-flex;align-items:center;gap:var(--sp-2)}
  .avatar{
    width:24px;height:24px;border-radius:var(--r-pill);
    background:var(--color-primary);
    color:var(--color-on-primary);
    font-size:var(--fs-xs);
    font-weight:var(--fw-bold);
    display:flex;align-items:center;justify-content:center;
    flex:none;
  }

  .memo .v{
    font-weight:var(--fw-regular);
    color:var(--color-text);
    text-align:right;
  }

  /* ── actions ── */
  .actions{
    display:flex;
    gap:var(--sp-3);
    margin-top:var(--sp-6);
  }
  .btn{
    flex:1;
    padding:15px var(--sp-4);
    border-radius:var(--r-md);
    text-align:center;
    text-decoration:none;
    font-family:inherit;
    font-size:var(--fs-body);
    font-weight:var(--fw-bold);
    cursor:pointer;
    border:1px solid var(--color-border-strong);
    background:var(--color-bg);
    color:var(--color-text);
    transition:transform var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease);
  }
  .btn:active{transform:scale(.98)}
  .btn.del{
    background:var(--color-bg);
    color:var(--color-danger);
    border-color:var(--color-border-strong);
  }
  .btn.del:active{background:var(--color-surface)}

  /* ── delete sheet ── */
  .scrim{
    position:fixed;inset:0;
    background:rgba(25,31,40,.45);
    max-width:var(--app-w);margin:0 auto;
    z-index:10;
    cursor:pointer;
  }
  .sheet{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--color-bg);
    border-radius:var(--r-lg) var(--r-lg) 0 0;
    padding:var(--sp-5) var(--sp-5) var(--sp-6);
    max-width:var(--app-w);
    margin:0 auto;
    z-index:11;
    box-shadow:var(--shadow-2);
  }
  .sheet .grab{
    width:36px;height:4px;border-radius:var(--r-pill);
    background:var(--color-border-strong);
    margin:0 auto var(--sp-5);
  }
  .sheet h2{
    font-size:var(--fs-h2);
    font-weight:var(--fw-bold);
    color:var(--color-text);
  }
  .sheet .muted{
    margin-top:var(--sp-2);
    font-size:var(--fs-body);
    color:var(--color-text-muted);
  }
  .sheet .actions{margin-top:var(--sp-5)}
  .sheet .btn.del{
    background:var(--color-danger);
    color:var(--color-on-primary);
    border-color:var(--color-danger);
  }

  /* contract: hide rules */
  .hidden,.hidden *{display:none!important}
  .sheet.hidden{display:none}
</style>
</head>
<body>
<div class="phone">
  <header>
    <a class="back" href="list.html" aria-label="뒤로">←</a>
    <span class="title">거래 상세</span>
  </header>
  <main>
    <div class="hero">
      <span class="cat-chip">🏠 주거</span>
      <div class="amt"><span class="sign">−</span>₩700,000</div>
      <div class="sub">2026년 6월 24일 (수)</div>
    </div>

    <div class="card">
      <div class="kv"><span class="k">유형</span><span class="v"><span class="tag expense">지출</span></span></div>
      <div class="kv"><span class="k">카테고리</span><span class="v">🏠 주거</span></div>
      <div class="kv"><span class="k">날짜</span><span class="v">2026-06-24</span></div>
      <div class="kv"><span class="k">멤버</span><span class="v"><span class="member"><span class="avatar" aria-hidden="true">배</span>배우자</span></span></div>
      <div class="kv"><span class="k">지출 구분</span><span class="v"><span class="tag shared">공동</span></span></div>
      <div class="kv memo"><span class="k">메모</span><span class="v">6월 월세</span></div>
      <div class="kv"><span class="k">출처</span><span class="v"><span class="badge">🔁 자동</span>반복 거래</span></div>
    </div>

    <div class="actions">
      <a class="btn" href="add.html">수정</a>
      <button type="button" class="btn del" id="delBtn">삭제</button>
    </div>
  </main>

  <div class="sheet hidden" id="sheet" role="dialog" aria-label="삭제 확인">
    <div class="grab" aria-hidden="true"></div>
    <h2>이 거래를 삭제할까요?</h2>
    <p class="muted">되돌릴 수 없어요.</p>
    <div class="actions">
      <button type="button" class="btn" id="cancel">취소</button>
      <a class="btn del" href="list.html" id="confirm">삭제</a>
    </div>
  </div>
</div>
<script>
  var sheet=document.getElementById('sheet');
  document.getElementById('delBtn').addEventListener('click',function(){sheet.classList.remove('hidden')});
  document.getElementById('cancel').addEventListener('click',function(){sheet.classList.add('hidden')});
</script>
</body>
</html>
