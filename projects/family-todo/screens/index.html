<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>family-todo · S1 PIN 입장</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<link rel="stylesheet" href="app.css">
<style>
  .shell { justify-content: center; }
  .pin-wrap { padding: 0 24px 40px; animation: fadeUp var(--dur-slow) var(--ease-standard); }
  .brand { text-align: center; margin-bottom: 34px; }
  .brand .mark {
    width: 76px; height: 76px; margin: 0 auto 18px; border-radius: var(--r-xl);
    background: var(--gradient-primary); box-shadow: var(--shadow-primary);
    display: flex; align-items: center; justify-content: center; font-size: 38px;
    animation: bob 3.6s var(--ease-standard) infinite;
  }
  .brand .title { font-size: var(--fs-2xl); font-weight: var(--fw-bold); letter-spacing: -.5px; }
  .brand .sub { color: var(--color-text-muted); font-size: var(--fs-sm); margin-top: 8px; line-height: var(--lh-base); }
  .pin-label { display: block; text-align: center; font-size: var(--fs-xs); color: var(--color-text-muted); margin-bottom: 10px; }
  .pin-input {
    width: 100%; text-align: center; letter-spacing: 14px; font-size: var(--fs-2xl); font-weight: var(--fw-bold);
    padding: 16px 14px 16px 28px; border: 1px solid var(--color-border-strong); border-radius: var(--r-lg);
    background: var(--color-surface); color: var(--color-text); font-family: inherit;
    transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
  }
  .pin-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 4px var(--color-primary-soft); }
  .enter { width: 100%; margin-top: 16px; padding: 15px; font-size: var(--fs-md); }
  .err { color: var(--color-danger); font-size: var(--fs-sm); min-height: 20px; margin-top: 12px; text-align: center; }
  .hint {
    margin-top: 26px; padding-top: 16px; border-top: 1px solid var(--color-border);
    font-size: var(--fs-xs); color: var(--color-text-subtle); text-align: center; line-height: var(--lh-base);
  }
</style>
</head>
<body>
<div class="shell">
  <div class="pin-wrap">
    <div class="brand">
      <div class="mark">🏠</div>
      <div class="title" id="title">우리집</div>
      <div class="sub" id="sub">우리 가족 PIN을 입력해 주세요</div>
    </div>

    <label class="pin-label" for="pin" id="pinLabel">PIN (4자리)</label>
    <input class="pin-input" type="tel" id="pin" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off">
    <button class="btn primary enter" id="enterBtn">입장</button>
    <div class="err" id="err"></div>

    <div class="hint" id="hint"></div>
  </div>
</div>

<script>
  // 가짜 백엔드: localStorage. 최초=PIN 설정 / 이후=PIN 입력.  [실제 PIN 저장·검증 = 범위 밖(개발 단계)]
  var savedPin = localStorage.getItem('ft_pin');
  var firstRun = !savedPin;
  var title = document.getElementById('title');
  var sub = document.getElementById('sub');
  var pinLabel = document.getElementById('pinLabel');
  var hint = document.getElementById('hint');
  var pin = document.getElementById('pin');
  var err = document.getElementById('err');
  var enterBtn = document.getElementById('enterBtn');

  function render() {
    if (firstRun) {
      sub.textContent = '우리집 PIN을 새로 정해 주세요';
      pinLabel.textContent = '새 PIN (4자리)';
      enterBtn.textContent = '이 PIN으로 시작';
      hint.textContent = '[최초 설정 모드] 정한 PIN이 우리집 입장 암호가 됩니다.';
    } else {
      hint.textContent = '[입력 모드] 데모 PIN: ' + savedPin + ' (확인용)';
    }
  }
  render();
  pin.focus();

  function fail(msg) {
    err.textContent = msg;
    pin.classList.remove('shake'); void pin.offsetWidth; pin.classList.add('shake');
  }

  function enter() {
    var v = (pin.value || '').trim();
    err.textContent = '';
    if (v.length !== 4 || /\D/.test(v)) { fail('4자리 숫자를 입력해 주세요'); return; }
    if (firstRun) {
      localStorage.setItem('ft_pin', v);
      sessionStorage.setItem('ft_entered', '1');
      location.href = 'list.html';
    } else if (v === savedPin) {
      sessionStorage.setItem('ft_entered', '1');
      location.href = 'list.html';
    } else {
      fail('PIN이 틀려요. 다시 입력해 주세요');   // 틀린 PIN 분기
      pin.value = ''; pin.focus();
    }
  }
  enterBtn.addEventListener('click', enter);
  pin.addEventListener('keydown', function(e){ if (e.key === 'Enter') enter(); });
</script>
</body>
</html>
