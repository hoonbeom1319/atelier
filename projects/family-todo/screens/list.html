<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>family-todo · S2 할 일 목록</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="shell">

  <!-- 상태 데모 컨트롤 (산출물 상태 확인·검증 보조) -->
  <div class="demobar">
    <b>상태</b>
    <button id="dmNormal">정상</button>
    <button id="dmLoad">로딩</button>
    <button id="dmOff">오프라인</button>
    <button id="dmClear">전체비우기</button>
  </div>

  <header class="app-header">
    <div class="title"><span class="home">🏠</span><span id="hdr">우리집</span></div>
    <a class="lock" href="index.html" title="잠금">🔒 잠금</a>
  </header>

  <div class="banner" id="offline" hidden>⚠ 오프라인 — 연결되면 자동으로 맞춰져요 <span class="scope">[동기화=범위 밖(백엔드 계약)]</span></div>

  <div class="count" id="count"></div>
  <div class="list" id="list"></div>

  <div class="addbar">
    <input class="input" id="quick" placeholder="할 일 빠르게 추가…" aria-label="할 일 빠른 추가">
    <button class="btn primary" id="quickAdd">추가</button>
  </div>
  <!-- 날짜는 항목을 눌러 편집(S3 시트)에서 붙인다 — 빠른추가는 텍스트만 -->

  <div class="toast" id="toast"></div>

  <!-- S3 바텀시트 (00-flow 결정: hi-fi에서 페이지 → 시트 승격) -->
  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="grab"></div>
    <div class="sheet-title" id="sheetTitle">할 일 편집</div>
    <label for="sheetText">할 일 내용</label>
    <textarea id="sheetText" placeholder="무엇을 할까요?"></textarea>
    <div class="err" id="sheetErr"></div>

    <label>날짜 (선택)</label>
    <div class="daterow">
      <button class="sw" id="dateToggle" role="button" aria-pressed="false" aria-label="날짜 추가"><span class="knob"></span></button>
      <span class="lab" id="dateLabel">날짜 없음 (메모형)</span>
    </div>
    <input type="date" id="date" hidden>

    <div class="sheet-actions">
      <button class="btn primary" id="sheetSave">저장</button>
      <button class="btn danger" id="sheetDel" hidden>삭제</button>
    </div>
  </div>

</div>

<script>
  var KEY = 'ft_tasks';
  function load(){ try { return JSON.parse(localStorage.getItem(KEY)) || null; } catch(e){ return null; } }
  function save(t){ localStorage.setItem(KEY, JSON.stringify(t)); }

  // 최초 1회 데모 시드(없을 때만). 빈 상태는 '전체비우기'로 도달.
  var tasks = load();
  if (tasks === null) {
    tasks = [
      { id:1, text:'기저귀 주문하기', date:'', done:false, doneAt:0 },
      { id:2, text:'관리비 납부', date:'2026-06-25', done:false, doneAt:0 },
      { id:3, text:'분리수거 내놓기', date:'', done:true, doneAt:1 }
    ];
    save(tasks);
  }

  var listEl = document.getElementById('list');
  var countEl = document.getElementById('count');
  var viewState = 'normal';   // normal | loading | offline
  var doneOpen = false;       // 완료됨(흔적) 기본 접힘
  var justAddedId = null;     // 방금 추가/복귀한 항목 → 진입 애니메이션

  function nextId(){ var m=0; tasks.forEach(function(t){ if(t.id>m)m=t.id; }); return m+1; }
  function escapeHtml(s){ return s.replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }

  function render() {
    document.getElementById('offline').hidden = (viewState !== 'offline');

    if (viewState === 'loading') {
      countEl.textContent = '';
      listEl.innerHTML = '<div class="skel"><div></div><div style="width:70%"></div><div style="width:85%"></div></div>';
      return;
    }

    var active = tasks.filter(function(t){ return !t.done; });
    var done = tasks.filter(function(t){ return t.done; });
    countEl.textContent = '진행 중 ' + active.length + ' · 완료됨 ' + done.length;

    if (tasks.length === 0) {
      listEl.innerHTML = '<div class="empty"><div class="big">🏠</div><div class="cap">아직 우리집 할 일이 없어요.<br>아래에 첫 할 일을 남겨보세요.</div></div>';
      return;
    }

    var html = '<div class="sec">진행 중</div>';
    if (active.length === 0) html += '<div class="empty mini">진행 중인 일이 없어요 🎉</div>';
    active.forEach(function(t){ html += itemHtml(t); });

    if (done.length) {
      html += '<button class="secToggle" data-act="toggleDone" aria-expanded="' + (doneOpen?'true':'false') + '">' +
              '<span class="chev">▸</span> 완료됨 · 흔적 ' + done.length + '개</button>';
      if (doneOpen) {
        done.forEach(function(t){ html += itemHtml(t); });
        html += '<button class="clearDone" data-act="clearDone">완료 비우기</button>';
      }
    }
    listEl.innerHTML = html;

    if (justAddedId != null) {
      var el = listEl.querySelector('.item[data-id="' + justAddedId + '"]');
      if (el) el.classList.add('entering');
      justAddedId = null;
    }
  }

  function itemHtml(t) {
    var badge = t.date ? '<div class="badge">📅 ' + escapeHtml(t.date) + '</div>' : '';
    return '<div class="item ' + (t.done?'done':'') + '" data-id="' + t.id + '">' +
      '<div class="cb" role="checkbox" aria-checked="' + (t.done?'true':'false') + '" tabindex="0" data-act="toggle"><span class="tick">✓</span></div>' +
      '<div class="body"><div class="txt" data-act="edit">' + escapeHtml(t.text) + '</div>' + badge + '</div>' +
      '<button class="del" data-act="del" aria-label="삭제">삭제</button>' +
    '</div>';
  }

  // 이벤트 위임
  listEl.addEventListener('click', function(e){
    var actEl = e.target.closest('[data-act]');
    if (!actEl) return;
    var act = actEl.getAttribute('data-act');
    if (act === 'toggleDone') { doneOpen = !doneOpen; render(); return; }
    if (act === 'clearDone') { tasks = tasks.filter(function(x){ return !x.done; }); save(tasks); render(); return; }
    var row = actEl.closest('.item'); if (!row) return;
    var id = parseInt(row.getAttribute('data-id'), 10);
    var t = tasks.find(function(x){ return x.id === id; });
    if (act === 'toggle') {
      t.done = !t.done; t.doneAt = t.done ? 1 : 0;
      if (!t.done) justAddedId = id;   // 진행 중 복귀 → 등장 애니메이션
      save(tasks); render();
    } else if (act === 'del') {
      row.classList.add('leaving');
      var commit = function(){ tasks = tasks.filter(function(x){ return x.id !== id; }); save(tasks); render(); };
      var done = false;
      row.addEventListener('animationend', function(){ if(!done){ done = true; commit(); } });
      setTimeout(function(){ if(!done){ done = true; commit(); } }, 240); // reduced-motion 대비
    } else if (act === 'edit') {
      openSheet(id);
    }
  });
  listEl.addEventListener('keydown', function(e){
    if ((e.key === 'Enter' || e.key === ' ') && e.target.getAttribute('data-act') === 'toggle') { e.preventDefault(); e.target.click(); }
  });

  // 빠른 추가 (텍스트만, 즉시)
  function quickAdd() {
    var inp = document.getElementById('quick');
    var v = (inp.value || '').trim();
    if (!v) return;
    var id = nextId();
    tasks.unshift({ id: id, text: v, date:'', done:false, doneAt:0 });
    justAddedId = id;
    save(tasks); inp.value=''; viewState='normal'; render(); inp.focus();
  }
  document.getElementById('quickAdd').addEventListener('click', quickAdd);
  document.getElementById('quick').addEventListener('keydown', function(e){ if (e.key==='Enter') quickAdd(); });

  // 토스트
  var toastEl = document.getElementById('toast'); var toastT;
  function toast(msg){ toastEl.textContent = msg; toastEl.classList.add('show'); clearTimeout(toastT);
    toastT = setTimeout(function(){ toastEl.classList.remove('show'); }, 1800); }

  // ── S3 바텀시트 (편집) ──
  var sheet = document.getElementById('sheet'), scrim = document.getElementById('scrim');
  var sheetText = document.getElementById('sheetText'), dateEl = document.getElementById('date');
  var dateToggle = document.getElementById('dateToggle'), dateLabel = document.getElementById('dateLabel');
  var sheetSave = document.getElementById('sheetSave'), sheetDel = document.getElementById('sheetDel');
  var sheetErr = document.getElementById('sheetErr');
  var editingId = null;

  function setDateOn(on){
    dateToggle.setAttribute('aria-pressed', on ? 'true' : 'false');
    dateEl.hidden = !on;
    dateLabel.textContent = on ? '날짜 있음 (일정형)' : '날짜 없음 (메모형)';
    if (!on) dateEl.value = '';
  }
  dateToggle.addEventListener('click', function(){ setDateOn(dateToggle.getAttribute('aria-pressed') !== 'true'); });

  function validateSheet(){
    var ok = (sheetText.value || '').trim().length > 0;
    sheetSave.disabled = !ok;
    if (ok) sheetErr.textContent = '';
    return ok;
  }
  sheetText.addEventListener('input', validateSheet);

  function openSheet(id){
    var t = tasks.find(function(x){ return x.id === id; });
    if (!t) return;
    editingId = id;
    document.getElementById('sheetTitle').textContent = '할 일 편집';
    sheetText.value = t.text;
    sheetDel.hidden = false;
    setDateOn(!!t.date);
    if (t.date) dateEl.value = t.date;
    sheetErr.textContent = '';
    validateSheet();
    scrim.classList.add('show'); sheet.classList.add('show');
    setTimeout(function(){ sheetText.focus(); }, 60);
  }
  function closeSheet(){ scrim.classList.remove('show'); sheet.classList.remove('show'); editingId = null; }

  sheetSave.addEventListener('click', function(){
    if (!validateSheet()) { sheetErr.textContent = '내용을 입력해 주세요'; return; }
    var date = (dateToggle.getAttribute('aria-pressed') === 'true') ? (dateEl.value || '') : '';
    var t = tasks.find(function(x){ return x.id === editingId; });
    if (t) { t.text = sheetText.value.trim(); t.date = date; }
    save(tasks); closeSheet(); render(); toast('저장됐어요 ✓');
  });
  sheetDel.addEventListener('click', function(){
    tasks = tasks.filter(function(x){ return x.id !== editingId; });
    save(tasks); closeSheet(); render();
  });
  scrim.addEventListener('click', closeSheet);

  // 상태 데모
  document.getElementById('dmNormal').addEventListener('click', function(){ viewState='normal'; render(); });
  document.getElementById('dmLoad').addEventListener('click', function(){ viewState='loading'; render(); });
  document.getElementById('dmOff').addEventListener('click', function(){ viewState='offline'; render(); });
  document.getElementById('dmClear').addEventListener('click', function(){ tasks=[]; save(tasks); viewState='normal'; render(); });

  render();
</script>
</body>
</html>
