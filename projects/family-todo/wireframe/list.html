<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>family-todo · S2 할 일 목록 (wire)</title>
<style>
  :root { --w: 390px; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background:#bbb; color:#111; }
  .phone { width:var(--w); min-height:100vh; margin:0 auto; background:#fff; border-left:1px solid #999; border-right:1px solid #999; display:flex; flex-direction:column; }
  .wirebar { font:11px/1.4 monospace; background:#eee; border-bottom:1px solid #ccc; padding:4px 8px; color:#555; }
  .wirebar a { color:#357; }
  header.app { padding:18px 18px 10px; border-bottom:1px solid #eee; display:flex; align-items:center; justify-content:space-between; }
  header.app .h { font-size:18px; font-weight:700; }
  header.app .lock { font:11px monospace; color:#888; text-decoration:none; border:1px solid #ccc; padding:3px 7px; }
  .demobar { font:11px monospace; color:#777; background:#f7f7f7; border-bottom:1px solid #eee; padding:6px 10px; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .demobar button { font:11px monospace; border:1px solid #bbb; background:#fff; padding:2px 6px; cursor:pointer; }
  .banner { background:#fff3cd; border-bottom:1px solid #e0d18a; padding:8px 14px; font-size:12px; color:#664d03; }
  .banner[hidden] { display:none; }
  .list { flex:1; overflow:auto; padding:6px 0 12px; }
  .sec { font:11px/1 monospace; color:#888; text-transform:uppercase; letter-spacing:1px; padding:14px 18px 6px; }
  .secToggle { display:block; width:100%; text-align:left; font:11px/1 monospace; color:#666; text-transform:uppercase; letter-spacing:1px; padding:16px 18px 8px; background:none; border:none; border-top:1px solid #eee; cursor:pointer; }
  .clearDone { display:block; margin:4px 18px 8px; font:11px monospace; color:#a00; background:none; border:1px solid #e0b4b4; padding:6px 10px; cursor:pointer; }
  .item { display:flex; align-items:center; gap:12px; padding:12px 18px; border-bottom:1px solid #f0f0f0; }
  .cb { width:22px; height:22px; border:2px solid #444; border-radius:6px; flex:0 0 auto; cursor:pointer; background:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff; }
  .cb[aria-checked="true"] { background:#444; }
  .item .body { flex:1; min-width:0; }
  .item .txt { font-size:15px; cursor:pointer; }
  .item.done .txt { text-decoration:line-through; color:#999; }
  .badge { display:inline-block; margin-top:4px; font:11px monospace; border:1px solid #aaa; color:#555; padding:1px 6px; border-radius:10px; }
  .del { border:none; background:none; color:#a00; font-size:13px; cursor:pointer; padding:6px; }
  .empty { text-align:center; color:#777; padding:60px 30px; }
  .empty .big { font-size:40px; }
  .empty .cap { margin-top:14px; font-size:14px; line-height:1.6; }
  .skel { padding:12px 18px; }
  .skel div { height:16px; background:#eee; margin:10px 0; border-radius:4px; }
  .addbar { border-top:1px solid #ddd; padding:10px 14px; display:flex; gap:8px; align-items:center; background:#fafafa; }
  .addbar input { flex:1; padding:11px; font-size:15px; border:1px solid #999; }
  .addbar .add { padding:11px 14px; border:1px solid #111; background:#111; color:#fff; cursor:pointer; }
  .count { font:11px monospace; color:#999; padding:2px 18px 0; }
</style>
</head>
<body>
<div class="phone">
  <div class="wirebar">WIRE · S2 할 일 목록 ★ · <a href="index.html">← S1</a> · <a href="edit.html">edit →</a></div>

  <header class="app">
    <div class="h" id="hdr">우리집</div>
    <a class="lock" href="index.html" title="잠금">🔒 잠금</a>
  </header>

  <div class="demobar">
    상태 데모:
    <button id="dmNormal">정상</button>
    <button id="dmLoad">로딩</button>
    <button id="dmOff">오프라인</button>
    <button id="dmClear">전체비우기(데모)</button>
  </div>

  <div class="banner" id="offline" hidden>⚠ 오프라인 — 연결되면 자동으로 맞춰져요 <span style="color:#998">[동기화=범위 밖(백엔드 계약)]</span></div>

  <div class="count" id="count"></div>
  <div class="list" id="list"></div>

  <div class="addbar">
    <input id="quick" placeholder="할 일 빠르게 추가…" aria-label="할 일 빠른 추가">
    <button class="add" id="quickAdd">추가</button>
  </div>
  <!-- 날짜는 항목을 눌러 편집(S3)에서 붙인다 — 빠른추가는 텍스트만 -->

</div>

<script>
  var KEY = 'ft_tasks';
  function load() { try { return JSON.parse(localStorage.getItem(KEY)) || null; } catch(e){ return null; } }
  function save(t) { localStorage.setItem(KEY, JSON.stringify(t)); }

  // 최초 1회 데모 시드 (없을 때만). 빈 상태는 '비우기'로 도달.
  var tasks = load();
  if (tasks === null) {
    tasks = [
      { id:1, text:'기저귀 주문하기', date:'', done:false, doneAt:0 },
      { id:2, text:'관리비 납부', date:'2026-06-25', done:false, doneAt:0 },
      { id:3, text:'분리수거 내놓기', date:'', done:true, doneAt:Date_now() }
    ];
    save(tasks);
  }
  function Date_now(){ return 1; } // 와이어: 시각 비교 안 함, 흔적 존재만 표시

  var listEl = document.getElementById('list');
  var countEl = document.getElementById('count');
  var viewState = 'normal'; // normal | loading
  var doneOpen = false;      // 완료됨(흔적)은 기본 접힘 — 무한 증식 방지

  function nextId(){ var m=0; tasks.forEach(function(t){ if(t.id>m)m=t.id; }); return m+1; }

  function render() {
    document.getElementById('offline').hidden = (viewState !== 'offline');

    if (viewState === 'loading') {
      countEl.textContent = '';
      listEl.innerHTML = '<div class="skel"><div></div><div></div><div></div></div>';
      return;
    }

    var active = tasks.filter(function(t){ return !t.done; });
    var done = tasks.filter(function(t){ return t.done; });
    countEl.textContent = '진행 중 ' + active.length + ' · 완료됨 ' + done.length;

    if (tasks.length === 0) {
      listEl.innerHTML = '<div class="empty"><div class="big">🏠</div><div class="cap">아직 우리집 할 일이 없어요.<br>아래에 첫 할 일을 남겨보세요.</div></div>';
      return;
    }

    var html = '';
    html += '<div class="sec">진행 중</div>';
    if (active.length === 0) html += '<div class="empty" style="padding:24px;color:#aaa">진행 중인 일이 없어요 🎉</div>';
    active.forEach(function(t){ html += itemHtml(t); });
    if (done.length) {
      // 접이식 헤더: 개수만 보이고, 펼치면 흔적 + 비우기(정리)
      html += '<button class="secToggle" data-act="toggleDone" aria-expanded="' + (doneOpen?'true':'false') + '">완료됨 · 흔적 ' + done.length + '개 ' + (doneOpen?'▾':'▸') + '</button>';
      if (doneOpen) {
        done.forEach(function(t){ html += itemHtml(t); });
        html += '<button class="clearDone" data-act="clearDone">완료 비우기</button>';
      }
    }
    listEl.innerHTML = html;
  }

  function itemHtml(t) {
    var badge = t.date ? '<div class="badge">📅 ' + t.date + '</div>' : '';
    return '<div class="item ' + (t.done?'done':'') + '" data-id="' + t.id + '">' +
      '<div class="cb" role="checkbox" aria-checked="' + (t.done?'true':'false') + '" tabindex="0" data-act="toggle">' + (t.done?'✓':'') + '</div>' +
      '<div class="body"><div class="txt" data-act="edit">' + escapeHtml(t.text) + '</div>' + badge + '</div>' +
      '<button class="del" data-act="del" aria-label="삭제">삭제</button>' +
    '</div>';
  }
  function escapeHtml(s){ return s.replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }

  // 이벤트 위임
  listEl.addEventListener('click', function(e){
    var act = e.target.getAttribute('data-act');
    if (!act) return;
    // 섹션 레벨 동작 (항목 행이 아님) — 먼저 처리
    if (act === 'toggleDone') { doneOpen = !doneOpen; render(); return; }
    if (act === 'clearDone') { tasks = tasks.filter(function(x){ return !x.done; }); save(tasks); render(); return; }
    var row = e.target.closest('.item'); if (!row) return;
    var id = parseInt(row.getAttribute('data-id'), 10);
    var t = tasks.find(function(x){ return x.id === id; });
    if (act === 'toggle') { t.done = !t.done; t.doneAt = t.done ? 1 : 0; save(tasks); render(); }
    else if (act === 'del') { tasks = tasks.filter(function(x){ return x.id !== id; }); save(tasks); render(); }
    else if (act === 'edit') { location.href = 'edit.html?id=' + id; }
  });
  listEl.addEventListener('keydown', function(e){
    if ((e.key === 'Enter' || e.key === ' ') && e.target.getAttribute('data-act') === 'toggle') { e.preventDefault(); e.target.click(); }
  });

  // 빠른 추가 (텍스트만, 날짜 없이 즉시)
  function quickAdd() {
    var inp = document.getElementById('quick');
    var v = (inp.value || '').trim();
    if (!v) return;
    tasks.unshift({ id: nextId(), text: v, date:'', done:false, doneAt:0 });
    save(tasks); inp.value=''; viewState='normal'; render(); inp.focus();
  }
  document.getElementById('quickAdd').addEventListener('click', quickAdd);
  document.getElementById('quick').addEventListener('keydown', function(e){ if (e.key==='Enter') quickAdd(); });

  // 상태 데모 (와이어 확인용 — 모두 실제 DOM 변화)
  document.getElementById('dmNormal').addEventListener('click', function(){ viewState='normal'; render(); });
  document.getElementById('dmLoad').addEventListener('click', function(){ viewState='loading'; render(); });
  document.getElementById('dmOff').addEventListener('click', function(){ viewState='offline'; render(); });
  document.getElementById('dmClear').addEventListener('click', function(){ tasks=[]; save(tasks); viewState='normal'; render(); });

  render();
</script>
</body>
</html>
