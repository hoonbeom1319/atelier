<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>family-todo · S1 PIN 입장 (wire)</title>
<style>
  :root { --w: 390px; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background:#bbb; color:#111; }
  .phone { width:var(--w); min-height:100vh; margin:0 auto; background:#fff; border-left:1px solid #999; border-right:1px solid #999; padding:0; }
  .wirebar { font:11px/1.4 monospace; background:#eee; border-bottom:1px solid #ccc; padding:4px 8px; color:#555; }
  .pad { padding:24px 20px; }
  .brand { margin:64px 0 8px; text-align:center; font-size:22px; font-weight:700; letter-spacing:-.5px; }
  .brand .box { display:inline-block; width:56px; height:56px; border:2px solid #111; border-radius:14px; line-height:56px; margin-bottom:14px; font-size:24px; }
  .sub { text-align:center; color:#666; font-size:13px; margin-bottom:36px; }
  label { display:block; font-size:12px; color:#444; margin:0 0 6px; }
  input[type=tel] { width:100%; font-size:24px; letter-spacing:10px; text-align:center; padding:14px; border:1px solid #888; background:#fafafa; }
  button.primary { width:100%; margin-top:16px; padding:14px; font-size:15px; border:1px solid #111; background:#111; color:#fff; cursor:pointer; }
  .err { color:#900; font-size:13px; min-height:18px; margin-top:10px; text-align:center; }
  .hint { margin-top:28px; font:11px/1.5 monospace; color:#888; text-align:center; border-top:1px dashed #ccc; padding-top:12px; }
</style>
</head>
<body>
<div class="phone">
  <div class="wirebar">WIRE · S1 PIN 입장 · 모바일 390 · <a href="list.html">list →</a></div>
  <div class="pad">
    <div class="brand"><span class="box">🏠</span><br><span id="title">우리집</span></div>
    <div class="sub" id="sub">우리 가족 PIN을 입력해 주세요</div>

    <label for="pin" id="pinLabel">PIN (4자리)</label>
    <input type="tel" id="pin" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off">
    <button class="primary" id="enterBtn">입장</button>
    <div class="err" id="err"></div>

    <div class="hint" id="hint"></div>
  </div>
</div>

<script>
  // 가짜 백엔드: localStorage. 최초엔 PIN 설정 모드, 이후엔 입력 모드.
  var savedPin = localStorage.getItem('ft_pin');
  var firstRun = !savedPin;
  var title = document.getElementById('title');
  var sub = document.getElementById('sub');
  var pinLabel = document.getElementById('pinLabel');
  var hint = document.getElementById('hint');
  var pin = document.getElementById('pin');
  var err = document.getElementById('err');

  function render() {
    if (firstRun) {
      sub.textContent = '우리집 PIN을 새로 정해 주세요';
      pinLabel.textContent = '새 PIN (4자리)';
      document.getElementById('enterBtn').textContent = '이 PIN으로 시작';
      hint.textContent = '[최초 설정 모드] 정한 PIN이 우리집 입장 암호가 됩니다.';
    } else {
      hint.textContent = '[입력 모드] 데모 PIN: ' + savedPin + ' (와이어 확인용)';
    }
  }
  render();

  function enter() {
    var v = (pin.value || '').trim();
    err.textContent = '';
    if (v.length !== 4 || /\D/.test(v)) { err.textContent = '4자리 숫자를 입력해 주세요'; return; }
    if (firstRun) {
      localStorage.setItem('ft_pin', v);
      sessionStorage.setItem('ft_entered', '1');
      location.href = 'list.html';
    } else if (v === savedPin) {
      sessionStorage.setItem('ft_entered', '1');
      location.href = 'list.html';
    } else {
      err.textContent = 'PIN이 틀려요. 다시 입력해 주세요';  // 틀린 PIN 분기
      pin.value = '';
      pin.focus();
    }
  }
  document.getElementById('enterBtn').addEventListener('click', enter);
  pin.addEventListener('keydown', function(e){ if (e.key === 'Enter') enter(); });
</script>
</body>
</html>
