<!-- @dsCard group="Screens" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotlog — 카드 상세</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  *{box-sizing:border-box}
  html,body{overflow-x:hidden}
  body{
    margin:0;
    background:var(--color-bg);
    color:var(--color-text);
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .shell{
    max-width:480px;margin:0 auto;min-height:100vh;
    background:var(--color-surface);
    border-left:1px solid var(--color-border);
    border-right:1px solid var(--color-border);
    display:flex;flex-direction:column;
  }

  /* ── 헤더 (히어로 위에 오버레이) ─────────────────── */
  header{
    position:sticky;top:0;z-index:3;
    display:flex;align-items:center;gap:var(--sp-3);
    padding:var(--sp-3) var(--sp-4);
    background:linear-gradient(180deg,rgba(11,14,17,.92),rgba(11,14,17,.55) 70%,rgba(11,14,17,0));
    backdrop-filter:blur(6px);
  }
  .back{
    display:inline-flex;align-items:center;gap:6px;
    text-decoration:none;color:var(--color-text);
    font-size:var(--fs-13);font-weight:var(--fw-medium);
    padding:7px var(--sp-3);border-radius:var(--r-full);
    background:rgba(26,31,36,.7);border:1px solid var(--color-border);
    transition:background var(--dur-1) var(--ease-standard),border-color var(--dur-1) var(--ease-standard);
  }
  .back:hover{background:var(--color-surface-2);border-color:var(--color-border-strong)}
  .back:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
  h1{font-size:var(--fs-15);font-weight:var(--fw-semibold);margin:0;letter-spacing:.01em}

  /* ── 히어로 대표 사진 ───────────────────────────── */
  .hero{
    position:relative;height:300px;margin-top:-64px;
    display:flex;align-items:flex-end;
    padding:var(--sp-4);
    background:
      radial-gradient(120% 90% at 30% 20%, rgba(255,107,92,.28), transparent 55%),
      linear-gradient(150deg, var(--gray-700), var(--gray-900) 60%, var(--gray-950));
    border-bottom:1px solid var(--color-border);
    overflow:hidden;
  }
  .hero::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(0deg,rgba(11,14,17,.85),transparent 45%);
    pointer-events:none;
  }
  .hero-tag{
    position:relative;z-index:1;
    font-size:var(--fs-12);color:var(--color-text);
    background:rgba(11,14,17,.55);
    border:1px solid var(--color-border);
    padding:5px var(--sp-3);border-radius:var(--r-full);
    transition:opacity var(--dur-2) var(--ease-out);
  }
  .hero-tag b{color:var(--color-primary);font-weight:var(--fw-semibold)}

  /* ── 썸네일 스트립 ──────────────────────────────── */
  .thumbs{
    display:flex;gap:var(--sp-2);
    padding:var(--sp-3) var(--sp-4);
    overflow-x:auto;scrollbar-width:thin;
    background:var(--color-surface);
    border-bottom:1px solid var(--color-border);
  }
  .thumb{
    position:relative;width:64px;height:64px;flex:none;
    border-radius:var(--r-1);cursor:pointer;
    border:1px solid var(--color-border);
    color:var(--color-text-muted);font-size:var(--fs-11);
    display:flex;align-items:flex-end;justify-content:flex-start;
    padding:5px;
    background:linear-gradient(135deg,var(--gray-700),var(--gray-800));
    transition:transform var(--dur-1) var(--ease-out),border-color var(--dur-1) var(--ease-standard),box-shadow var(--dur-1) var(--ease-standard);
  }
  .thumb:nth-child(2){background:linear-gradient(135deg,var(--gray-600),var(--gray-800))}
  .thumb:nth-child(3){background:linear-gradient(135deg,var(--gray-700),var(--gray-900))}
  .thumb:nth-child(4){background:linear-gradient(135deg,var(--gray-500),var(--gray-800))}
  .thumb:hover{transform:translateY(-2px)}
  .thumb:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
  .thumb[aria-pressed="true"]{
    border-color:var(--color-primary);
    box-shadow:0 0 0 2px var(--color-primary), var(--shadow-1);
    color:var(--color-text);
  }
  .thumb[aria-pressed="true"]::after{
    content:"";position:absolute;top:5px;right:5px;
    width:8px;height:8px;border-radius:var(--r-full);
    background:var(--color-primary);box-shadow:0 0 0 2px var(--color-surface);
  }

  /* ── 본문 ───────────────────────────────────────── */
  .body{padding:var(--sp-5) var(--sp-4) var(--sp-8);flex:1}
  .place{font-size:var(--fs-24);font-weight:var(--fw-bold);margin:0 0 var(--sp-2);line-height:var(--lh-tight)}
  .meta-list{display:flex;flex-direction:column;gap:var(--sp-2);margin:0 0 var(--sp-5)}
  .meta-row{display:flex;align-items:center;gap:var(--sp-2);font-size:var(--fs-13);color:var(--color-text-muted)}
  .meta-row .ic{width:16px;text-align:center;color:var(--color-primary);flex:none}
  .badge{
    margin-left:auto;font-size:var(--fs-11);font-weight:var(--fw-semibold);
    padding:2px var(--sp-2);border-radius:var(--r-full);
    color:var(--color-on-primary);background:var(--color-primary);
  }
  .memo{
    margin:0 0 var(--sp-5);font-size:var(--fs-15);line-height:var(--lh-base);
    color:var(--color-text);
    border-left:3px solid var(--color-primary);
    padding:var(--sp-1) 0 var(--sp-1) var(--sp-3);
    background:var(--color-primary-weak);
    border-radius:0 var(--r-1) var(--r-1) 0;
  }
  .memo-inner{padding:var(--sp-2) var(--sp-3) var(--sp-2) 0}
  .chips{display:flex;gap:var(--sp-2);flex-wrap:wrap;margin-bottom:var(--sp-6)}
  .chip{
    font-size:var(--fs-12);color:var(--color-primary);
    border:1px solid var(--color-border-strong);
    border-radius:var(--r-full);padding:3px var(--sp-3);
    background:var(--color-surface-2);
  }

  /* ── 위치 목업 ──────────────────────────────────── */
  .map-label{font-size:var(--fs-12);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 var(--sp-2)}
  #miniMap{
    position:relative;height:150px;border-radius:var(--r-2);
    border:1px solid var(--color-border);overflow:hidden;
    background:
      linear-gradient(0deg,rgba(11,14,17,.4),transparent),
      repeating-linear-gradient(0deg,transparent,transparent 26px,rgba(154,164,174,.07) 26px,rgba(154,164,174,.07) 27px),
      repeating-linear-gradient(90deg,transparent,transparent 26px,rgba(154,164,174,.07) 26px,rgba(154,164,174,.07) 27px),
      var(--color-surface-2);
    display:flex;align-items:flex-end;justify-content:flex-start;
    padding:var(--sp-3);
  }
  #miniMap .pin{
    position:absolute;top:48%;left:50%;transform:translate(-50%,-100%);
    width:22px;height:22px;border-radius:var(--r-full) var(--r-full) var(--r-full) 0;
    transform-origin:center;
    background:var(--color-primary);border:2px solid var(--color-on-primary);
    rotate:45deg;
    box-shadow:var(--shadow-2);
  }
  #miniMap .pulse{
    position:absolute;top:48%;left:50%;width:46px;height:46px;
    margin:-23px 0 0 -23px;border-radius:var(--r-full);
    background:radial-gradient(circle,rgba(255,107,92,.35),transparent 70%);
    animation:pulse 2.4s var(--ease-standard) infinite;
  }
  @keyframes pulse{0%{transform:scale(.6);opacity:.9}70%{transform:scale(1.6);opacity:0}100%{opacity:0}}
  @media (prefers-reduced-motion:reduce){#miniMap .pulse{animation:none}}
  #miniMap .hint{
    position:relative;font-size:var(--fs-11);color:var(--color-text-muted);
    background:rgba(11,14,17,.6);padding:3px var(--sp-2);border-radius:var(--r-1);
  }

  /* ── 액션 ───────────────────────────────────────── */
  .actions{margin-top:var(--sp-6)}
  .edit-card{
    display:flex;align-items:center;justify-content:center;gap:var(--sp-2);
    width:100%;text-decoration:none;
    font-size:var(--fs-15);font-weight:var(--fw-semibold);
    color:var(--color-on-primary);background:var(--color-primary);
    padding:var(--sp-3) var(--sp-4);border-radius:var(--r-2);
    box-shadow:var(--shadow-1);
    transition:background var(--dur-1) var(--ease-standard),transform var(--dur-1) var(--ease-out);
  }
  .edit-card:hover{background:var(--color-primary-hover)}
  .edit-card:active{transform:translateY(1px)}
  .edit-card:focus-visible{outline:2px solid var(--color-text);outline-offset:2px}
</style>
</head>
<body>
<div class="shell">
  <header>
    <a class="back" href="index.html"><span aria-hidden="true">←</span> 뒤로</a>
    <h1>장소 카드</h1>
  </header>

  <div class="hero" id="hero" aria-live="polite">
    <span class="hero-tag"><b>대표 사진 1</b></span>
  </div>

  <div class="thumbs" role="group" aria-label="사진 묶음(탭하여 대표 교체)">
    <button class="thumb" type="button" aria-pressed="true" aria-label="사진 1 보기">사진1</button>
    <button class="thumb" type="button" aria-pressed="false" aria-label="사진 2 보기">사진2</button>
    <button class="thumb" type="button" aria-pressed="false" aria-label="사진 3 보기">사진3</button>
    <button class="thumb" type="button" aria-pressed="false" aria-label="사진 4 보기">사진4</button>
  </div>

  <div class="body">
    <h2 class="place">성수동 카페 오니</h2>
    <div class="meta-list">
      <div class="meta-row"><span class="ic" aria-hidden="true">◎</span> 서울 성동구 성수동길 12</div>
      <div class="meta-row"><span class="ic" aria-hidden="true">◷</span> 오전 10:24–11:10 <span class="badge">공개</span></div>
    </div>

    <blockquote class="memo"><div class="memo-inner">햇살 좋은 창가. 플랫화이트가 좋았다.</div></blockquote>

    <div class="chips">
      <span class="chip">#카페</span>
      <span class="chip">#성수</span>
    </div>

    <p class="map-label">위치</p>
    <div id="miniMap" role="img" aria-label="장소 위치 목업">
      <span class="pulse" aria-hidden="true"></span>
      <span class="pin" aria-hidden="true"></span>
      <span class="hint">위치 목업 · 실연동은 handoff</span>
    </div>

    <div class="actions">
      <a class="edit-card" href="upload-group.html"><span aria-hidden="true">✎</span> 이 카드 편집</a>
    </div>
  </div>
</div>

<script>
  // 사진 썸네일 탭 — 대표 사진이 실제로 교체된다(단일 활성).
  var thumbs = document.querySelectorAll('.thumb');
  var hero = document.getElementById('hero');
  thumbs.forEach(function (t, i) {
    t.addEventListener('click', function () {
      thumbs.forEach(function (x) { x.setAttribute('aria-pressed', 'false'); });
      t.setAttribute('aria-pressed', 'true');
      hero.textContent = '대표 사진 ' + (i + 1);
      // 텍스트 노드 교체 후에도 강조 마크업 유지
      hero.innerHTML = '<span class="hero-tag"><b>대표 사진 ' + (i + 1) + '</b></span>';
    });
  });
</script>
</body>
</html>
