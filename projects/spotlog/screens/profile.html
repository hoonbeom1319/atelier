<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotlog — 프로필</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--color-bg);
    color:var(--color-text);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  /* 모바일 폭 컬럼 셸 — 넓은 화면에서도 480px 중앙 컬럼 유지(반응형 분기 없음) */
  .shell{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--color-bg);
    border-inline:1px solid var(--color-border);
    padding-bottom:76px;
    position:relative;
  }

  /* 헤더 */
  header.top{
    position:sticky;top:0;z-index:5;
    display:flex;align-items:center;gap:var(--sp-3);
    padding:var(--sp-4);
    background:color-mix(in srgb, var(--color-bg) 82%, transparent);
    backdrop-filter:saturate(160%) blur(12px);
    border-bottom:1px solid var(--color-border);
  }
  header.top h1{
    font-size:var(--fs-17);font-weight:var(--fw-bold);margin:0;
    letter-spacing:.2px;
  }
  header.top .at{
    margin-left:auto;font-size:var(--fs-12);color:var(--color-text-muted);
    border:1px solid var(--color-border);border-radius:var(--r-full);
    padding:5px var(--sp-3);
  }

  /* 프로필 헤더 카드 */
  .prof{
    padding:var(--sp-6) var(--sp-4) var(--sp-4);
    display:flex;flex-direction:column;gap:var(--sp-4);
  }
  .prof-row{display:flex;align-items:center;gap:var(--sp-4)}
  .avatar{
    width:78px;height:78px;border-radius:var(--r-full);
    flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    font-size:var(--fs-24);font-weight:var(--fw-bold);
    color:var(--color-text);
    background:var(--color-surface-2);
    border:1px solid var(--color-border-strong);
  }
  .ident{min-width:0}
  .who{font-size:var(--fs-20);font-weight:var(--fw-bold);line-height:var(--lh-tight)}
  .handle{font-size:var(--fs-13);color:var(--color-text-muted);margin-top:3px}

  /* 통계 행 */
  .stats{
    display:flex;align-items:stretch;
    border:1px solid var(--color-border);
    border-radius:var(--r-2);
    background:var(--color-surface);
    overflow:hidden;
  }
  .stat{
    flex:1;text-align:center;padding:var(--sp-3) var(--sp-2);
    display:flex;flex-direction:column;gap:2px;
  }
  .stat + .stat{border-left:1px solid var(--color-border)}
  .stat .num{font-size:var(--fs-17);font-weight:var(--fw-bold);font-variant-numeric:tabular-nums}
  .stat .lbl{font-size:var(--fs-12);color:var(--color-text-muted)}

  /* 팔로우 버튼 */
  .follow{
    width:100%;
    font:inherit;font-size:var(--fs-15);font-weight:var(--fw-semibold);
    padding:12px var(--sp-4);
    border-radius:var(--r-2);
    border:1px solid var(--color-primary);
    background:var(--color-primary);
    color:var(--color-on-primary);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:var(--sp-2);
    transition:background var(--dur-1) var(--ease-standard),
               border-color var(--dur-1) var(--ease-standard),
               color var(--dur-1) var(--ease-standard),
               transform var(--dur-1) var(--ease-standard);
  }
  .follow:hover{background:var(--color-primary-hover);border-color:var(--color-primary-hover)}
  .follow:active{transform:scale(.985)}
  .follow .ico{width:16px;height:16px;display:inline-block}
  .follow .ico path{stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  /* 팔로잉(눌린) 상태 — 채움 해제, 보더만 */
  .follow[aria-pressed="true"]{
    background:var(--color-primary-weak);
    color:var(--color-primary);
    border-color:color-mix(in srgb, var(--color-primary) 55%, transparent);
  }
  .follow[aria-pressed="true"]:hover{background:color-mix(in srgb, var(--color-primary-weak) 70%, var(--color-surface))}
  .follow .ico-check{display:none}
  .follow[aria-pressed="true"] .ico-plus{display:none}
  .follow[aria-pressed="true"] .ico-check{display:inline-block}

  /* 그리드 헤더(정적 섹션 라벨) */
  .grid-head{
    display:flex;align-items:center;gap:var(--sp-2);
    padding:var(--sp-5) var(--sp-4) var(--sp-3);
    font-size:var(--fs-13);font-weight:var(--fw-semibold);
    color:var(--color-text);
    letter-spacing:.3px;text-transform:uppercase;
    margin:0;
  }
  .grid-head .bar{
    flex:0 0 18px;height:2px;border-radius:var(--r-full);
    background:var(--color-primary);
  }
  .grid-head .cnt{margin-left:auto;color:var(--color-text-muted);font-weight:var(--fw-regular);text-transform:none}

  /* 카드 그리드 */
  .grid{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:3px;padding:0 3px;
  }
  .tile{
    position:relative;aspect-ratio:1;overflow:hidden;
    text-decoration:none;color:var(--color-text);
    display:block;
    background:var(--color-surface-2);
    transition:transform var(--dur-1) var(--ease-standard);
  }
  /* 사진 자리 — 코랄 틴트 그라데이션 변주(토큰 기반, 타일마다 다른 각/배합) */
  .tile .ph{position:absolute;inset:0;transition:filter var(--dur-1) var(--ease-standard)}
  /* 사진 placeholder — 중립 톤(사진이 주연; 색으로 주연 행세 금지). 코랄은 .pin 액센트에만. */
  .tile:nth-child(3n+1) .ph{background:linear-gradient(150deg, var(--color-surface-2) 0%, var(--color-surface) 100%)}
  .tile:nth-child(3n+2) .ph{background:linear-gradient(210deg, var(--color-surface) 0%, var(--color-bg) 100%)}
  .tile:nth-child(3n+3) .ph{background:linear-gradient(120deg, var(--color-surface-2) 0%, var(--color-bg) 100%)}
  .tile::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(to top, color-mix(in srgb,var(--color-bg) 88%,transparent) 0%, transparent 55%);
  }
  .tile .pin{
    position:absolute;top:var(--sp-2);right:var(--sp-2);z-index:2;
    width:20px;height:20px;border-radius:var(--r-full);
    background:color-mix(in srgb,var(--color-bg) 55%,transparent);
    display:flex;align-items:center;justify-content:center;
  }
  .tile .pin svg{width:11px;height:11px;display:block}
  .tile .pin path{fill:var(--color-primary)}
  .tile .name{
    position:absolute;left:0;right:0;bottom:0;z-index:2;
    padding:var(--sp-2) var(--sp-2) 7px;
    font-size:var(--fs-12);font-weight:var(--fw-semibold);
    line-height:var(--lh-tight);
    color:var(--color-text);
    text-shadow:0 1px 3px rgba(0,0,0,.6);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .tile:hover{transform:scale(.985)}
  .tile:hover .ph{filter:brightness(1.12)}

  /* 포커스 가시성(키보드) — 전역 */
  a:focus-visible, button:focus-visible{
    outline:2px solid var(--color-primary);
    outline-offset:2px;border-radius:var(--r-1);
  }
  .tile:focus-visible{outline-offset:-2px}

  /* 하단 내비 */
  nav.bottom{
    position:fixed;bottom:0;left:0;right:0;
    max-width:480px;margin:0 auto;z-index:10;
    display:flex;
    background:color-mix(in srgb, var(--color-surface) 92%, transparent);
    backdrop-filter:saturate(160%) blur(12px);
    border-top:1px solid var(--color-border);
  }
  nav.bottom a, nav.bottom span{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:10px 0 12px;
    font-size:var(--fs-11);text-decoration:none;
    color:var(--color-text-muted);
    transition:color var(--dur-1) var(--ease-standard);
  }
  nav.bottom svg{width:22px;height:22px;display:block}
  nav.bottom svg path, nav.bottom svg circle{stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  nav.bottom a:hover{color:var(--color-text)}
  nav.bottom [aria-current]{color:var(--color-primary);font-weight:var(--fw-semibold)}
  nav.bottom [aria-current] svg path[data-fill]{fill:var(--color-primary);stroke:var(--color-primary)}

  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body>
<div class="shell">

  <header class="top">
    <h1>프로필</h1>
    <span class="at">@mina_walks</span>
  </header>

  <section class="prof" aria-label="사용자 정보">
    <div class="prof-row">
      <div class="avatar" aria-hidden="true">민</div>
      <div class="ident">
        <div class="who">민아</div>
        <div class="handle">@mina_walks · 서울을 걷는 사람</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="num">24</span>
        <span class="lbl">장소 카드</span>
      </div>
      <div class="stat">
        <span class="num" id="followerCount">312</span>
        <span class="lbl">팔로워</span>
      </div>
      <div class="stat">
        <span class="num">180</span>
        <span class="lbl">팔로잉</span>
      </div>
    </div>

    <button class="follow" id="followBtn" aria-pressed="false">
      <svg class="ico ico-plus" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
      <svg class="ico ico-check" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 13l4 4 10-11"/></svg>
      <span id="followLabel">팔로우</span>
    </button>
  </section>

  <h2 class="grid-head">
    <span class="bar" aria-hidden="true"></span>
    장소 카드
    <span class="cnt">24개</span>
  </h2>

  <div class="grid" role="list" aria-label="장소 카드 모음">
    <a class="tile" role="listitem" href="card-detail.html" aria-label="장소 카드: 망원 한강공원">
      <span class="ph" aria-hidden="true"></span>
      <span class="pin" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg></span>
      <span class="name">망원 한강공원</span>
    </a>
    <a class="tile" role="listitem" href="card-detail.html" aria-label="장소 카드: 연남동 책방">
      <span class="ph" aria-hidden="true"></span>
      <span class="pin" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg></span>
      <span class="name">연남동 책방</span>
    </a>
    <a class="tile" role="listitem" href="card-detail.html" aria-label="장소 카드: 북한산 둘레길">
      <span class="ph" aria-hidden="true"></span>
      <span class="pin" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg></span>
      <span class="name">북한산 둘레길</span>
    </a>
    <a class="tile" role="listitem" href="card-detail.html" aria-label="장소 카드: 을지로 노가리골목">
      <span class="ph" aria-hidden="true"></span>
      <span class="pin" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg></span>
      <span class="name">을지로 노가리골목</span>
    </a>
    <a class="tile" role="listitem" href="card-detail.html" aria-label="장소 카드: 양양 죽도해변">
      <span class="ph" aria-hidden="true"></span>
      <span class="pin" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg></span>
      <span class="name">양양 죽도해변</span>
    </a>
    <a class="tile" role="listitem" href="card-detail.html" aria-label="장소 카드: 제주 사려니숲">
      <span class="ph" aria-hidden="true"></span>
      <span class="pin" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg></span>
      <span class="name">제주 사려니숲</span>
    </a>
  </div>

  <nav class="bottom" aria-label="주요 내비게이션">
    <a href="index.html">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11l8-7 8 7M6 10v9h12v-9"/></svg>
      홈
    </a>
    <a href="explore.html">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6"/><path d="M20 20l-4-4"/></svg>
      탐색
    </a>
    <a href="upload-select.html">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 6v12M6 12h12"/></svg>
      업로드
    </a>
    <span aria-current="page" aria-disabled="true">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4" data-fill/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6" data-fill/></svg>
      프로필
    </span>
  </nav>

</div>

<script>
  // 팔로우 토글 — aria-pressed 반전 + 버튼 텍스트(팔로우↔팔로잉) + 팔로워 수 ±1.
  (function () {
    var b = document.getElementById('followBtn');
    var lbl = document.getElementById('followLabel');
    var c = document.getElementById('followerCount');
    b.addEventListener('click', function () {
      var on = b.getAttribute('aria-pressed') === 'true';
      b.setAttribute('aria-pressed', String(!on));
      lbl.textContent = on ? '팔로우' : '팔로잉';
      c.textContent = String(parseInt(c.textContent, 10) + (on ? -1 : 1));
    });
  })();
</script>
</body>
</html>
