<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotlog — 메모 · 태그 · 공개 범위</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--color-bg);color:var(--color-text);
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  .shell{
    max-width:480px;margin:0 auto;min-height:100vh;
    background:var(--color-bg);position:relative;
    display:flex;flex-direction:column;padding-bottom:96px;
  }

  /* ── header ───────────────────────────── */
  header{
    position:sticky;top:0;z-index:5;
    display:flex;align-items:center;gap:var(--sp-3);
    padding:var(--sp-3) var(--sp-4);
    background:color-mix(in srgb, var(--color-bg) 85%, transparent);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--color-border);
  }
  .back{
    display:inline-flex;align-items:center;justify-content:center;
    width:38px;height:38px;flex:none;border-radius:var(--r-full);
    text-decoration:none;color:var(--color-text);
    border:1px solid var(--color-border);background:var(--color-surface);
    font-size:var(--fs-17);transition:background var(--dur-1) var(--ease-standard),border-color var(--dur-1);
  }
  .back:hover{background:var(--color-surface-2);border-color:var(--color-border-strong)}
  .back:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
  .htitle{display:flex;flex-direction:column;gap:2px;min-width:0}
  h1{font-size:var(--fs-17);font-weight:var(--fw-semibold);margin:0;line-height:var(--lh-tight)}
  .step{font-size:var(--fs-11);color:var(--color-text-muted);letter-spacing:.04em;text-transform:uppercase}

  /* ── body ─────────────────────────────── */
  .panel{padding:var(--sp-5) var(--sp-4);display:flex;flex-direction:column;gap:var(--sp-6)}

  .summary{
    display:flex;align-items:center;gap:var(--sp-3);
    padding:var(--sp-3) var(--sp-4);border-radius:var(--r-2);
    background:var(--color-surface);border:1px solid var(--color-border);
  }
  .summary .dot{
    width:36px;height:36px;flex:none;border-radius:var(--r-1);
    display:flex;align-items:center;justify-content:center;font-size:var(--fs-17);
    background:var(--color-primary-weak);border:1px solid var(--color-primary);
  }
  .summary .txt{display:flex;flex-direction:column;gap:1px}
  .summary .big{font-size:var(--fs-15);font-weight:var(--fw-semibold)}
  .summary .sub{font-size:var(--fs-12);color:var(--color-text-muted)}

  .field{display:flex;flex-direction:column}
  label{font-size:var(--fs-13);font-weight:var(--fw-medium);margin-bottom:var(--sp-2)}
  .opt{color:var(--color-text-muted);font-weight:var(--fw-regular)}
  textarea,input[type=text]{
    width:100%;background:var(--color-surface);border:1px solid var(--color-border);
    border-radius:var(--r-1);padding:var(--sp-3);color:var(--color-text);
    font:inherit;font-size:var(--fs-15);resize:vertical;
    transition:border-color var(--dur-1) var(--ease-standard);
  }
  textarea::placeholder,input::placeholder{color:var(--color-text-muted)}
  textarea:focus,input:focus{outline:2px solid var(--color-primary);outline-offset:-1px;border-color:transparent}

  .tagrow{display:flex;gap:var(--sp-2)}
  .tagrow input{flex:1}
  .tagadd{
    flex:none;border:1px solid var(--color-border-strong);background:transparent;
    color:var(--color-text);border-radius:var(--r-1);padding:0 var(--sp-4);
    font:inherit;font-size:var(--fs-13);font-weight:var(--fw-medium);cursor:pointer;
    transition:background var(--dur-1) var(--ease-standard),border-color var(--dur-1);
  }
  .tagadd:hover{background:var(--color-surface-2);border-color:var(--color-primary)}
  .tagadd:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
  .tagadd:active{transform:translateY(1px)}

  .chips{display:flex;flex-wrap:wrap;gap:var(--sp-2);margin-top:var(--sp-3)}
  .chips:empty{display:none}
  .chip{
    display:inline-flex;align-items:center;gap:var(--sp-2);
    font-size:var(--fs-12);color:var(--color-text);
    background:var(--color-primary-weak);border:1px solid var(--color-primary);
    border-radius:var(--r-full);padding:3px var(--sp-3);
    animation:pop var(--dur-2) var(--ease-out);
  }
  .chip button{
    background:none;border:0;color:var(--color-text-muted);cursor:pointer;
    font:inherit;line-height:1;padding:0;font-size:var(--fs-13);
  }
  .chip button:hover{color:var(--color-text)}
  .chip button:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px;border-radius:var(--r-full)}
  @keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

  /* ── visibility ───────────────────────── */
  .visbox{
    border:1px solid var(--color-border);background:var(--color-surface);
    border-radius:var(--r-2);padding:var(--sp-4);
    transition:border-color var(--dur-2) var(--ease-standard);
  }
  .visbox.is-public{border-color:var(--color-primary)}
  .vistop{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3)}
  .vislbl{display:flex;flex-direction:column;gap:2px}
  .vislbl .t{font-size:var(--fs-15);font-weight:var(--fw-semibold)}
  .vislbl .s{font-size:var(--fs-12);color:var(--color-text-muted)}
  .switch{
    position:relative;width:54px;height:31px;flex:none;
    border-radius:var(--r-full);border:1px solid var(--color-border-strong);
    background:var(--color-surface-2);cursor:pointer;padding:0;
    transition:background var(--dur-2) var(--ease-standard),border-color var(--dur-2);
  }
  .switch .knob{
    position:absolute;top:3px;left:3px;width:23px;height:23px;
    border-radius:var(--r-full);background:var(--color-text-muted);
    transition:left var(--dur-2) var(--ease-out),background var(--dur-2);
  }
  .switch[aria-checked="true"]{background:var(--color-primary);border-color:transparent}
  .switch[aria-checked="true"] .knob{left:26px;background:var(--color-on-primary)}
  .switch:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px}

  #notice{
    display:flex;gap:var(--sp-2);align-items:flex-start;
    margin:var(--sp-4) 0 0;font-size:var(--fs-13);line-height:var(--lh-base);
    padding:var(--sp-3);border-radius:var(--r-1);
  }
  .visbox:not(.is-public) #notice{color:var(--color-text-muted);background:var(--color-surface-2)}
  .visbox.is-public #notice{color:var(--color-text);background:var(--color-primary-weak);border:1px solid var(--color-primary)}
  #notice .ic{flex:none}

  /* ── footer cta ───────────────────────── */
  .footer{
    position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
    padding:var(--sp-3) var(--sp-4) var(--sp-5);
    background:color-mix(in srgb, var(--color-bg) 88%, transparent);
    backdrop-filter:blur(12px);border-top:1px solid var(--color-border);
  }
  .post{
    display:flex;align-items:center;justify-content:center;gap:var(--sp-2);
    width:100%;padding:var(--sp-4);border-radius:var(--r-2);
    background:var(--color-primary);color:var(--color-on-primary);
    text-decoration:none;font-size:var(--fs-15);font-weight:var(--fw-semibold);
    box-shadow:var(--shadow-1);
    transition:background var(--dur-1) var(--ease-standard),transform var(--dur-1);
  }
  .post:hover{background:var(--color-primary-hover)}
  .post:active{transform:translateY(1px)}
  .post:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px}
</style>
</head>
<body>
<div class="shell">
  <header>
    <a class="back" href="upload-group.html" aria-label="뒤로">←</a>
    <div class="htitle">
      <h1>메모 · 공개 범위</h1>
      <span class="step">업로드 3 / 3</span>
    </div>
  </header>

  <div class="panel">
    <div class="summary">
      <span class="dot" aria-hidden="true">📍</span>
      <span class="txt">
        <span class="big">장소 카드 3개를 게시합니다</span>
        <span class="sub">메모와 태그는 선택이에요 — 바로 게시해도 좋아요.</span>
      </span>
    </div>

    <div class="field">
      <label for="memo">메모 <span class="opt">(선택)</span></label>
      <textarea id="memo" rows="3" placeholder="이 장소에 대한 짧은 메모"></textarea>
    </div>

    <div class="field">
      <label for="tagInput">태그 <span class="opt">(선택)</span></label>
      <div class="tagrow">
        <input type="text" id="tagInput" placeholder="예: 카페, 데이트" aria-describedby="tagHint">
        <button class="tagadd" id="tagAdd" type="button">태그 추가</button>
      </div>
      <div class="chips" id="chips" aria-label="추가된 태그"></div>
    </div>

    <div class="visbox" id="visbox">
      <div class="vistop">
        <span class="vislbl">
          <span class="t">공개 범위</span>
          <span class="s" id="visState">기본값: 비공개</span>
        </span>
        <button class="switch" id="visToggle" type="button" role="switch" aria-checked="false" aria-label="공개 범위 토글">
          <span class="knob" aria-hidden="true"></span>
        </button>
      </div>
      <p id="notice" role="status">
        <span class="ic" aria-hidden="true">🔒</span>
        <span id="noticeText">비공개로 게시됩니다. 나만 볼 수 있어요. 집·민감 장소는 비공개를 권장해요.</span>
      </p>
    </div>
  </div>

  <div class="footer">
    <a class="post" href="index.html">게시하기</a>
  </div>
</div>

<p id="tagHint" hidden>태그를 입력하고 태그 추가 버튼을 누르세요.</p>

<script>
  // 태그 추가 — '#'+입력값 칩 생성(텍스트 입력 의존). 삭제 버튼 포함.
  var input = document.getElementById('tagInput');
  var chips = document.getElementById('chips');
  function addTag(){
    var v = input.value.trim();
    if (!v) return;
    var chip = document.createElement('span');
    chip.className = 'chip';
    var label = document.createElement('span');
    label.textContent = '#' + v;
    var del = document.createElement('button');
    del.type = 'button';
    del.textContent = '✕';
    del.setAttribute('aria-label', '태그 삭제: ' + v);
    del.addEventListener('click', function(){ chip.remove(); });
    chip.appendChild(label);
    chip.appendChild(del);
    chips.appendChild(chip);
    input.value = '';
    input.focus();
  }
  document.getElementById('tagAdd').addEventListener('click', addTag);
  input.addEventListener('keydown', function(e){
    if (e.key === 'Enter'){ e.preventDefault(); addTag(); }
  });

  // 공개 범위 스위치 — aria-checked 반전 + 고지 문구 변화(기본 비공개).
  var t = document.getElementById('visToggle');
  var box = document.getElementById('visbox');
  var ntx = document.getElementById('noticeText');
  var ic = document.querySelector('#notice .ic');
  var state = document.getElementById('visState');
  t.addEventListener('click', function(){
    var on = t.getAttribute('aria-checked') === 'true'; // on=true → 현재 공개
    var next = !on;
    t.setAttribute('aria-checked', String(next));
    box.classList.toggle('is-public', next);
    ic.textContent = next ? '🌐' : '🔒';
    state.textContent = next ? '현재: 공개' : '기본값: 비공개';
    ntx.textContent = next
      ? '이 장소가 공개됩니다. 팔로워·탐색에 노출돼요. (현재 위치가 아닌 과거 방문 기록만)'
      : '비공개로 게시됩니다. 나만 볼 수 있어요. 집·민감 장소는 비공개를 권장해요.';
  });
</script>
</body>
</html>
