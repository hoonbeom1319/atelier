<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotlog — 사진 선택</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--color-bg);
    color:var(--color-text);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;
    justify-content:center;
  }

  /* 모바일 컬럼 셸 — 480px 중앙, 넓은 화면에서도 동일 컬럼(반응형 분기 없음) */
  .shell{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--color-surface);
    display:flex;
    flex-direction:column;
    border-left:1px solid var(--color-border);
    border-right:1px solid var(--color-border);
  }

  /* ── 헤더 ─────────────────────────────────────────── */
  header{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:var(--sp-2);
    padding:var(--sp-3) var(--sp-4);
    background:color-mix(in srgb, var(--color-surface) 86%, transparent);
    backdrop-filter:saturate(140%) blur(12px);
    border-bottom:1px solid var(--color-border);
  }
  .back{
    display:inline-flex; align-items:center; justify-content:center;
    width:36px; height:36px; flex:0 0 auto;
    margin-left:calc(var(--sp-2) * -1);
    border-radius:var(--r-full);
    color:var(--color-text); text-decoration:none;
    transition:background var(--dur-1) var(--ease-standard);
  }
  .back:hover{background:var(--color-surface-2)}
  .back:focus-visible,
  .cell:focus-visible,
  .next:focus-visible{
    outline:2px solid var(--color-primary);
    outline-offset:2px;
  }
  .back svg{display:block}
  .titles{display:flex; flex-direction:column; line-height:1.1}
  h1{font-size:var(--fs-17); font-weight:var(--fw-semibold); margin:0; letter-spacing:-.01em}
  .sub{font-size:var(--fs-12); color:var(--color-text-muted); margin-top:2px}

  /* ── 선택 바 ──────────────────────────────────────── */
  .bar{
    position:sticky; top:61px; z-index:15;
    display:flex; align-items:center; justify-content:space-between;
    padding:var(--sp-3) var(--sp-4);
    background:var(--color-surface);
    border-bottom:1px solid var(--color-border);
  }
  .count{
    display:inline-flex; align-items:baseline; gap:6px;
    font-size:var(--fs-13); color:var(--color-text-muted);
    transition:color var(--dur-2) var(--ease-standard);
  }
  .count strong{
    font-size:var(--fs-15); font-weight:var(--fw-bold);
    color:var(--color-text); font-variant-numeric:tabular-nums;
  }
  .count.has strong{color:var(--color-primary)}

  .next{
    appearance:none; border:0; cursor:pointer;
    font-family:inherit; font-size:var(--fs-15); font-weight:var(--fw-semibold);
    padding:var(--sp-2) var(--sp-5);
    border-radius:var(--r-full);
    background:var(--color-primary); color:var(--color-on-primary);
    box-shadow:var(--shadow-1);
    transition:transform var(--dur-1) var(--ease-out),
               background var(--dur-1) var(--ease-standard),
               opacity var(--dur-2) var(--ease-standard);
  }
  .next:hover:not(:disabled){background:var(--color-primary-hover)}
  .next:active:not(:disabled){transform:scale(.96)}
  .next:disabled{
    background:var(--color-surface-2); color:var(--color-text-muted);
    cursor:not-allowed; box-shadow:none;
  }

  /* ── 그리드 ──────────────────────────────────────── */
  .grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:2px;
    padding:2px;
  }
  .cell{
    appearance:none; border:0; padding:0; margin:0;
    position:relative; aspect-ratio:1; width:100%;
    cursor:pointer; overflow:hidden;
    background-size:cover; background-position:center;
    transition:transform var(--dur-2) var(--ease-out),
               filter var(--dur-2) var(--ease-standard);
  }
  /* 선택 시 살짝 안쪽으로 축소되고 코랄 테두리 + 딤 오버레이 */
  .cell::after{
    content:""; position:absolute; inset:0;
    box-shadow:inset 0 0 0 0 var(--color-primary);
    background:transparent;
    transition:box-shadow var(--dur-2) var(--ease-out),
               background var(--dur-2) var(--ease-standard);
    pointer-events:none;
  }
  .cell[aria-checked="true"]{transform:scale(.9)}
  .cell[aria-checked="true"]::after{
    box-shadow:inset 0 0 0 3px var(--color-primary);
    background:color-mix(in srgb, var(--color-primary-weak) 55%, transparent);
  }

  /* 체크 배지(선택 순서 번호) */
  .badge{
    position:absolute; top:7px; right:7px; z-index:2;
    width:22px; height:22px; border-radius:var(--r-full);
    display:flex; align-items:center; justify-content:center;
    font-size:var(--fs-12); font-weight:var(--fw-bold);
    color:var(--color-on-primary); background:var(--color-primary);
    border:2px solid var(--color-on-primary);
    box-shadow:var(--shadow-1);
    transform:scale(0); opacity:0;
    transition:transform var(--dur-2) var(--ease-out), opacity var(--dur-1) var(--ease-standard);
  }
  /* 미선택 시 빈 동그라미 힌트 */
  .ring{
    position:absolute; top:7px; right:7px; z-index:1;
    width:22px; height:22px; border-radius:var(--r-full);
    border:2px solid rgba(255,255,255,.85);
    background:rgba(0,0,0,.18);
    transition:opacity var(--dur-1) var(--ease-standard);
  }
  .cell[aria-checked="true"] .badge{transform:scale(1); opacity:1}
  .cell[aria-checked="true"] .ring{opacity:0}

  .footnote{
    padding:var(--sp-4) var(--sp-4) var(--sp-6);
    font-size:var(--fs-12); color:var(--color-text-muted);
    text-align:center; line-height:var(--lh-base);
  }

  @media (prefers-reduced-motion:reduce){
    *{transition-duration:0ms !important}
  }
</style>
</head>
<body>
<div class="shell">
  <header>
    <a class="back" href="index.html" aria-label="뒤로">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </a>
    <div class="titles">
      <h1>사진 선택</h1>
      <span class="sub">한 장소의 사진들을 골라주세요</span>
    </div>
  </header>

  <div class="bar">
    <span class="count" id="countWrap"><span id="selCount">0장 선택</span></span>
    <button class="next" id="nextBtn" disabled aria-disabled="true">다음</button>
  </div>

  <div class="grid" role="group" aria-label="갤러리 사진(다중 선택)" id="grid"></div>

  <p class="footnote">최대 16장. 선택한 순서대로 묶음이 만들어져요.</p>
</div>

<script>
  // 인스타식 다중 선택(체크박스) — 카운터·다음 버튼·선택 순서 배지가 실제로 변한다.
  var grid = document.getElementById('grid');
  // 사진 자리표시: 코랄/뉴트럴 톤의 미세한 그라디언트로 셀마다 다른 질감
  var hues = [12, 200, 150, 28, 260, 8, 180, 95, 320, 40, 210, 130, 350, 60, 230, 110];
  for (var i = 1; i <= 16; i++) {
    var b = document.createElement('button');
    b.className = 'cell';
    b.type = 'button';
    b.setAttribute('role', 'checkbox');
    b.setAttribute('aria-checked', 'false');
    b.setAttribute('aria-label', '사진 ' + i + ' 선택');
    var h = hues[i - 1];
    b.style.background = 'linear-gradient(135deg, hsl(' + h + ',24%,26%), hsl(' + ((h + 40) % 360) + ',30%,15%))';
    b.innerHTML = '<span class="ring" aria-hidden="true"></span>' +
                  '<span class="badge" aria-hidden="true"></span>';
    grid.appendChild(b);
  }

  var count = 0;
  var order = [];
  var next = document.getElementById('nextBtn');
  var selCount = document.getElementById('selCount');
  var countWrap = document.getElementById('countWrap');

  function renumber() {
    // 배지 숫자를 선택 순서대로 다시 매김
    order.forEach(function (cell, idx) {
      cell.querySelector('.badge').textContent = String(idx + 1);
    });
  }

  grid.addEventListener('click', function (e) {
    var cell = e.target.closest('.cell');
    if (!cell) return;
    var on = cell.getAttribute('aria-checked') === 'true';
    cell.setAttribute('aria-checked', String(!on));
    if (on) {
      order.splice(order.indexOf(cell), 1);
      count -= 1;
    } else {
      order.push(cell);
      count += 1;
    }
    renumber();
    selCount.textContent = count + '장 선택';
    countWrap.classList.toggle('has', count > 0);
    var none = count === 0;
    next.disabled = none;
    next.setAttribute('aria-disabled', String(none));
  });

  next.addEventListener('click', function () {
    if (!next.disabled) location.href = 'upload-group.html';
  });
</script>
</body>
</html>
