<!-- @dsCard group="Screens" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotlog — 지도에서 위치 지정</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--color-bg);
    color:var(--color-text);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  /* 모바일 폭 컬럼 셸 — 넓은 화면에서도 같은 480 컬럼 */
  .shell{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--color-surface);
    border-left:1px solid var(--color-border);
    border-right:1px solid var(--color-border);
    display:flex;
    flex-direction:column;
  }

  /* ── 헤더 ───────────────────────────────────────────── */
  header{
    position:sticky;top:0;z-index:5;
    display:flex;align-items:center;gap:var(--sp-3);
    padding:var(--sp-3) var(--sp-4);
    background:color-mix(in srgb, var(--color-surface) 88%, transparent);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--color-border);
  }
  .back{
    display:inline-flex;align-items:center;gap:6px;
    text-decoration:none;color:var(--color-text);
    font-size:var(--fs-13);font-weight:var(--fw-medium);
    padding:7px 11px;border-radius:var(--r-full);
    border:1px solid var(--color-border-strong);
    background:var(--color-surface-2);
    transition:border-color var(--dur-1) var(--ease-standard),
               transform var(--dur-1) var(--ease-standard);
  }
  .back:hover{border-color:var(--color-primary)}
  .back:active{transform:scale(.96)}
  .back svg{width:14px;height:14px}
  h1{font-size:var(--fs-17);font-weight:var(--fw-semibold);margin:0;letter-spacing:-.01em}

  /* ── 지도 목업 ──────────────────────────────────────── */
  .map{
    position:relative;
    height:340px;
    overflow:hidden;
    background:
      radial-gradient(120% 90% at 50% 0%, #1c2530 0%, var(--color-surface) 55%, var(--color-bg) 100%);
    border-bottom:1px solid var(--color-border);
  }
  /* 격자 — 지도 타일 느낌 */
  .map::before{
    content:"";position:absolute;inset:-2px;
    background-image:
      linear-gradient(to right, rgba(255,255,255,.045) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,.045) 1px, transparent 1px);
    background-size:34px 34px;
    mask-image:radial-gradient(120% 100% at 50% 35%, #000 40%, transparent 100%);
  }
  /* 가짜 도로 */
  .roads{position:absolute;inset:0;opacity:.5}
  .roads i{position:absolute;background:linear-gradient(90deg,transparent,var(--color-border-strong),transparent)}
  .roads .h1{top:28%;left:0;right:0;height:6px;opacity:.6}
  .roads .h2{top:64%;left:0;right:0;height:10px}
  .roads .v1{top:0;bottom:0;left:32%;width:8px;background:linear-gradient(180deg,transparent,var(--color-border-strong),transparent)}
  .roads .v2{top:0;bottom:0;left:72%;width:5px;background:linear-gradient(180deg,transparent,var(--color-border-strong),transparent);opacity:.6}
  /* 가짜 블록(공원/물) */
  .blob{position:absolute;border-radius:40% 55% 50% 45%/55% 45% 55% 45%;filter:blur(1px)}
  .blob.park{left:8%;top:38%;width:90px;height:70px;background:color-mix(in srgb,var(--color-success) 16%, transparent)}
  .blob.water{right:6%;top:8%;width:120px;height:90px;border-radius:50% 50% 45% 55%/55% 50% 50% 45%;background:color-mix(in srgb,#3b82f6 16%, transparent)}

  .map-tag{
    position:absolute;top:var(--sp-3);left:var(--sp-3);z-index:3;
    display:inline-flex;align-items:center;gap:6px;
    font-size:var(--fs-11);font-weight:var(--fw-medium);
    color:var(--color-text-muted);
    background:color-mix(in srgb, var(--color-bg) 70%, transparent);
    backdrop-filter:blur(6px);
    border:1px solid var(--color-border);
    padding:5px 9px;border-radius:var(--r-full);
  }
  .map-tag .dot{width:6px;height:6px;border-radius:50%;background:var(--color-warning);box-shadow:0 0 6px var(--color-warning)}

  /* 핀 */
  #pinWrap{
    position:absolute;left:50%;top:50%;
    transform:translate(-50%,-100%);
    z-index:2;
    transition:top var(--dur-2) var(--ease-out);
    will-change:top;
  }
  /* 지면 글로우/그림자 */
  #pinWrap::after{
    content:"";position:absolute;left:50%;bottom:-4px;
    width:30px;height:9px;transform:translateX(-50%);
    background:radial-gradient(closest-side, rgba(0,0,0,.6), transparent);
  }
  .pulse{
    position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);
    width:18px;height:18px;border-radius:50%;
    border:2px solid var(--color-primary);
    animation:pulse 2s var(--ease-out) infinite;
  }
  @keyframes pulse{
    0%{opacity:.7;transform:translateX(-50%) scale(.4)}
    100%{opacity:0;transform:translateX(-50%) scale(2.6)}
  }
  .pin-icon{
    position:relative;
    width:34px;height:34px;border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);
    background:linear-gradient(135deg,var(--color-primary),var(--color-primary-hover));
    box-shadow:var(--shadow-2), 0 0 18px color-mix(in srgb,var(--color-primary) 50%, transparent);
  }
  .pin-icon::after{
    content:"";position:absolute;left:50%;top:50%;
    width:12px;height:12px;border-radius:50%;
    transform:translate(-50%,-50%);
    background:var(--color-on-primary);
  }
  #pinWrap.bump{animation:bump var(--dur-2) var(--ease-out)}
  @keyframes bump{
    0%{transform:translate(-50%,-100%)}
    40%{transform:translate(-50%,-118%)}
    100%{transform:translate(-50%,-100%)}
  }
  /* 핀 위 라벨 미리보기 */
  #pinLabel{
    position:absolute;left:50%;bottom:42px;transform:translateX(-50%);
    white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;
    font-size:var(--fs-12);font-weight:var(--fw-semibold);
    color:var(--color-text);
    background:var(--color-surface-2);
    border:1px solid var(--color-border-strong);
    padding:4px 9px;border-radius:var(--r-full);
    box-shadow:var(--shadow-1);
  }
  #pinLabel[hidden]{display:none}

  /* ── 패널 ───────────────────────────────────────────── */
  .panel{
    flex:1;
    padding:var(--sp-4);
    display:flex;flex-direction:column;gap:var(--sp-4);
  }
  .coordbox{
    display:flex;align-items:center;gap:var(--sp-3);
    padding:var(--sp-3) var(--sp-4);
    background:var(--color-surface-2);
    border:1px solid var(--color-border);
    border-radius:var(--r-2);
  }
  .coordbox .ic{
    flex:none;width:34px;height:34px;border-radius:var(--r-1);
    display:grid;place-items:center;
    background:var(--color-primary-weak);
    color:var(--color-primary);
  }
  .coordbox .ic svg{width:18px;height:18px}
  .coordbox .meta{display:flex;flex-direction:column;gap:2px;min-width:0}
  .coordbox .meta .k{font-size:var(--fs-11);color:var(--color-text-muted);letter-spacing:.02em}
  #coord{
    font-size:var(--fs-15);font-weight:var(--fw-semibold);
    font-variant-numeric:tabular-nums;letter-spacing:.01em;
  }

  /* 핀 이동 컨트롤 */
  .pinctrl{display:flex;gap:var(--sp-3)}
  .pinctrl button{
    flex:1;
    display:inline-flex;align-items:center;justify-content:center;gap:7px;
    padding:13px;border-radius:var(--r-2);
    font:inherit;font-size:var(--fs-13);font-weight:var(--fw-semibold);
    color:var(--color-text);
    background:var(--color-surface-2);
    border:1px solid var(--color-border-strong);
    cursor:pointer;
    transition:border-color var(--dur-1) var(--ease-standard),
               background var(--dur-1) var(--ease-standard),
               transform var(--dur-1) var(--ease-standard);
  }
  .pinctrl button svg{width:16px;height:16px;color:var(--color-primary)}
  .pinctrl button:hover{border-color:var(--color-primary);background:var(--color-primary-weak)}
  .pinctrl button:active{transform:translateY(1px)}

  /* 라벨 입력 */
  .field label{
    display:block;margin-bottom:var(--sp-2);
    font-size:var(--fs-13);font-weight:var(--fw-medium);color:var(--color-text);
  }
  .field .hint{font-size:var(--fs-11);color:var(--color-text-muted);font-weight:var(--fw-regular)}
  input[type=text]{
    width:100%;
    padding:13px var(--sp-4);
    font:inherit;font-size:var(--fs-15);
    color:var(--color-text);
    background:var(--color-surface-2);
    border:1px solid var(--color-border-strong);
    border-radius:var(--r-2);
    transition:border-color var(--dur-1) var(--ease-standard),
               box-shadow var(--dur-1) var(--ease-standard);
  }
  input[type=text]::placeholder{color:var(--color-text-muted)}
  input[type=text]:focus{
    outline:none;
    border-color:var(--color-primary);
    box-shadow:0 0 0 3px var(--color-primary-weak);
  }

  /* 확정 CTA */
  .confirm{
    margin-top:auto;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:15px;border-radius:var(--r-2);
    text-decoration:none;text-align:center;
    font-size:var(--fs-15);font-weight:var(--fw-semibold);
    color:var(--color-on-primary);
    background:var(--color-primary);
    box-shadow:var(--shadow-1);
    transition:background var(--dur-1) var(--ease-standard),
               transform var(--dur-1) var(--ease-standard);
  }
  .confirm:hover{background:var(--color-primary-hover)}
  .confirm:active{transform:translateY(1px)}
  .confirm svg{width:18px;height:18px}

  /* 접근성 — 포커스 가시성 */
  a:focus-visible,button:focus-visible{
    outline:2px solid var(--color-primary);
    outline-offset:2px;
  }
  @media (prefers-reduced-motion: reduce){
    .pulse{animation:none}
    #pinWrap,#pinWrap.bump{transition:none;animation:none}
  }
</style>
</head>
<body>
<div class="shell">
  <header>
    <a class="back" href="upload-group.html" aria-label="뒤로 — 그룹 편집으로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
      뒤로
    </a>
    <h1>지도에서 위치 지정</h1>
  </header>

  <div class="map" id="mapArea" role="img" aria-label="지도 목업 (실제 지도 SDK 미사용) — 핀이 현재 좌표를 가리킵니다">
    <div class="roads" aria-hidden="true"><i class="h1"></i><i class="h2"></i><i class="v1"></i><i class="v2"></i></div>
    <div class="blob park" aria-hidden="true"></div>
    <div class="blob water" aria-hidden="true"></div>
    <span class="map-tag"><span class="dot"></span>지도 목업 — 실연동은 handoff</span>

    <div id="pinWrap" aria-hidden="true">
      <span id="pinLabel" hidden></span>
      <span class="pulse"></span>
      <span class="pin-icon"></span>
    </div>
  </div>

  <div class="panel">
    <div class="coordbox">
      <span class="ic" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </span>
      <span class="meta">
        <span class="k">현재 핀 좌표</span>
        <span id="coord">37.5446, 127.0560</span>
      </span>
    </div>

    <div class="pinctrl" role="group" aria-label="핀 이동">
      <button id="pinUp" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        핀 위로
      </button>
      <button id="pinDown" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
        핀 아래로
      </button>
    </div>

    <div class="field">
      <label for="labelInput">장소 라벨 직접 입력 <span class="hint">(선택 — 입력하면 핀에 표시)</span></label>
      <input type="text" id="labelInput" placeholder="예: 할머니 분식" autocomplete="off">
    </div>

    <a class="confirm" href="upload-group.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6L9 17l-5-5"/></svg>
      이 위치로 확정
    </a>
  </div>
</div>

<script>
  // 핀 이동 — 좌표 텍스트가 실제로 바뀐다(목업). 계약 보존: #coord 갱신.
  var lat = 37.5446, lng = 127.0560, top = 50;
  var pinWrap = document.getElementById('pinWrap');
  var coord = document.getElementById('coord');

  function render(){
    coord.textContent = lat.toFixed(4) + ', ' + lng.toFixed(4);
    pinWrap.style.top = top + '%';
    // 살짝 튀는 마이크로 인터랙션
    pinWrap.classList.remove('bump');
    void pinWrap.offsetWidth;
    pinWrap.classList.add('bump');
  }

  document.getElementById('pinUp').addEventListener('click', function(){
    lat += 0.0008; top = Math.max(15, top - 8); render();
  });
  document.getElementById('pinDown').addEventListener('click', function(){
    lat -= 0.0008; top = Math.min(85, top + 8); render();
  });

  // 라벨 입력 → 핀 위 미리보기로 반영(관측 가능한 상태 변화).
  var labelInput = document.getElementById('labelInput');
  var pinLabel = document.getElementById('pinLabel');
  labelInput.addEventListener('input', function(){
    var v = labelInput.value.trim();
    if(v){ pinLabel.textContent = v; pinLabel.hidden = false; }
    else { pinLabel.hidden = true; }
  });
</script>
</body>
</html>
