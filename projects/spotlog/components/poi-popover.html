<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotlog — 컴포넌트: 장소명 후보 팝오버</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{margin:0;background:var(--color-bg);color:var(--color-text);font-family:system-ui,sans-serif;padding:var(--sp-6)}
  h1{font-size:var(--fs-20);margin:0 0 var(--sp-2)} .lead{color:var(--color-text-muted);font-size:var(--fs-13);margin:0 0 var(--sp-5)}
  h2{font-size:var(--fs-13);color:var(--color-text-muted);margin:var(--sp-6) 0 var(--sp-3)}
  .pop{max-width:440px;background:var(--color-surface);border:1px solid var(--color-border-strong);border-radius:var(--r-3);padding:var(--sp-4);box-shadow:var(--shadow-2);margin-bottom:var(--sp-4)}
  .pt{font-size:var(--fs-15);font-weight:var(--fw-semibold);margin:0 0 var(--sp-3)}
  .cand{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;background:var(--color-surface-2);border:1px solid var(--color-border);border-radius:var(--r-1);padding:var(--sp-3);margin-bottom:var(--sp-2);color:var(--color-text);font:inherit;cursor:pointer}
  .cand:hover{border-color:var(--color-primary)}
  .cand .nm{font-size:var(--fs-15);font-weight:var(--fw-medium)} .cand .ad{font-size:var(--fs-12);color:var(--color-text-muted);margin-top:2px}
  .cand .dist{font-size:var(--fs-12);color:var(--color-primary);font-weight:var(--fw-semibold)}
  .cand[aria-selected="true"]{border-color:var(--color-primary);background:var(--color-primary-weak)}
  .actions{display:flex;gap:var(--sp-2);margin-top:var(--sp-2)}
  .actions a,.actions button{flex:1;text-align:center;border:1px solid var(--color-border-strong);background:transparent;border-radius:var(--r-1);padding:var(--sp-3);color:var(--color-text);text-decoration:none;font:inherit;cursor:pointer}
  .empty{color:var(--color-text-muted);font-size:var(--fs-13);padding:var(--sp-2) 0 var(--sp-3)}
  .search{width:100%;background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--r-1);padding:var(--sp-3);color:var(--color-text);font:inherit;margin-bottom:var(--sp-3)}
</style>
</head>
<body>
  <h1>장소명 후보 팝오버 (SC4)</h1>
  <p class="lead">자동 추출명이 틀리면 탭 → 좌표 주변 POI 후보를 거리순으로. 선택 시 확정. 후보 0건이면 지도 폴백.</p>

  <h2>State — 후보 있음 (거리순, 1개 선택됨)</h2>
  <div class="pop" role="dialog" aria-label="장소명 후보">
    <p class="pt">주변 장소 후보 (거리순)</p>
    <input class="search" type="text" placeholder="장소명으로 재검색" aria-label="장소 검색">
    <button class="cand" aria-selected="true"><span><span class="nm">카페 오니</span><span class="ad">성수동길 12</span></span><span class="dist">32m</span></button>
    <button class="cand"><span><span class="nm">베이커리 호</span><span class="ad">성수동길 14</span></span><span class="dist">48m</span></button>
    <button class="cand"><span><span class="nm">오니로스터스</span><span class="ad">성수동길 9</span></span><span class="dist">60m</span></button>
    <div class="actions"><a href="#">지도에서 직접 지정</a><button>닫기</button></div>
  </div>

  <h2>State — 후보 0건 (노점·사유지·신규)</h2>
  <div class="pop" role="dialog" aria-label="장소명 후보">
    <p class="pt">주변 등록된 장소가 없습니다</p>
    <p class="empty">"지도에서 직접 지정"으로 위치를 찍거나, 라벨을 직접 입력하거나, 좌표만 둘 수 있어요.</p>
    <input class="search" type="text" placeholder="라벨 직접 입력 (예: 할머니 분식)" aria-label="라벨 입력">
    <div class="actions"><a href="#">지도에서 직접 지정</a><button>닫기</button></div>
  </div>
</body>
</html>
