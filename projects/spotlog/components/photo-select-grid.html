<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotlog — 컴포넌트: 사진 다중 선택 그리드</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{margin:0;background:var(--color-bg);color:var(--color-text);font-family:system-ui,sans-serif;padding:var(--sp-6)}
  h1{font-size:var(--fs-20);margin:0 0 var(--sp-2)} .lead{color:var(--color-text-muted);font-size:var(--fs-13);margin:0 0 var(--sp-5)}
  h2{font-size:var(--fs-13);color:var(--color-text-muted);margin:var(--sp-6) 0 var(--sp-3)}
  .bar{max-width:440px;display:flex;justify-content:space-between;align-items:center;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--r-1) var(--r-1) 0 0;padding:var(--sp-3) var(--sp-4);border-bottom:0}
  .cnt{font-size:var(--fs-13)}
  .next{background:var(--color-primary);color:var(--color-on-primary);border:0;border-radius:var(--r-1);padding:var(--sp-2) var(--sp-4);font:inherit;font-weight:var(--fw-semibold);cursor:pointer}
  .next:disabled{opacity:.4;cursor:not-allowed}
  .grid{max-width:440px;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;border:1px solid var(--color-border);border-radius:0 0 var(--r-1) var(--r-1);overflow:hidden;margin-bottom:var(--sp-4)}
  .cell{aspect-ratio:1;background:var(--color-surface-2);position:relative;cursor:pointer;border:0;color:var(--color-text-muted);font-size:var(--fs-11)}
  .cell .tick{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:var(--r-full);border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:11px}
  .cell[aria-checked="true"]{outline:3px solid var(--color-primary);outline-offset:-3px}
  .cell[aria-checked="true"] .tick{background:var(--color-primary);color:var(--color-on-primary);border-color:var(--color-primary)}
</style>
</head>
<body>
  <h1>사진 다중 선택 그리드 (SC2)</h1>
  <p class="lead">인스타식 다중 선택. role="checkbox" + aria-checked. 선택 카운터·다음 버튼 활성화. 카드상세 썸네일 스트립도 같은 시각언어.</p>

  <h2>State — 선택됨 (3장 → 다음 활성)</h2>
  <div class="bar"><span class="cnt">3장 선택</span><button class="next">다음</button></div>
  <div class="grid" role="group" aria-label="갤러리 사진(다중 선택)">
    <button class="cell" role="checkbox" aria-checked="true" aria-label="사진 1 선택"><span class="tick">✓</span>사진1</button>
    <button class="cell" role="checkbox" aria-checked="false" aria-label="사진 2 선택"><span class="tick"></span>사진2</button>
    <button class="cell" role="checkbox" aria-checked="true" aria-label="사진 3 선택"><span class="tick">✓</span>사진3</button>
    <button class="cell" role="checkbox" aria-checked="false" aria-label="사진 4 선택"><span class="tick"></span>사진4</button>
    <button class="cell" role="checkbox" aria-checked="true" aria-label="사진 5 선택"><span class="tick">✓</span>사진5</button>
    <button class="cell" role="checkbox" aria-checked="false" aria-label="사진 6 선택"><span class="tick"></span>사진6</button>
    <button class="cell" role="checkbox" aria-checked="false" aria-label="사진 7 선택"><span class="tick"></span>사진7</button>
    <button class="cell" role="checkbox" aria-checked="false" aria-label="사진 8 선택"><span class="tick"></span>사진8</button>
  </div>

  <h2>State — 미선택 (0장 → 다음 비활성)</h2>
  <div class="bar"><span class="cnt" style="color:var(--color-text-muted)">0장 선택</span><button class="next" disabled aria-disabled="true">다음</button></div>
  <div class="grid" role="group" aria-label="갤러리 사진(다중 선택, 미선택)">
    <button class="cell" role="checkbox" aria-checked="false" aria-label="사진 1 선택"><span class="tick"></span>사진1</button>
    <button class="cell" role="checkbox" aria-checked="false" aria-label="사진 2 선택"><span class="tick"></span>사진2</button>
    <button class="cell" role="checkbox" aria-checked="false" aria-label="사진 3 선택"><span class="tick"></span>사진3</button>
    <button class="cell" role="checkbox" aria-checked="false" aria-label="사진 4 선택"><span class="tick"></span>사진4</button>
  </div>
</body>
</html>
