<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotlog — 컴포넌트: 하단 내비</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{margin:0;background:var(--color-bg);color:var(--color-text);font-family:system-ui,sans-serif;padding:var(--sp-6)}
  h1{font-size:var(--fs-20);margin:0 0 var(--sp-2)} .lead{color:var(--color-text-muted);font-size:var(--fs-13);margin:0 0 var(--sp-5)}
  h2{font-size:var(--fs-13);color:var(--color-text-muted);margin:var(--sp-6) 0 var(--sp-3)}
  .demo{max-width:440px;border:1px solid var(--color-border);border-radius:var(--r-2);overflow:hidden;margin-bottom:var(--sp-4)}
  nav{display:flex;background:var(--color-surface);border-top:1px solid var(--color-border)}
  nav a,nav span{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:var(--sp-3) 0;font-size:var(--fs-11);color:var(--color-text-muted);text-decoration:none}
  nav .ico{font-size:var(--fs-20);line-height:1}
  nav [aria-current]{color:var(--color-primary);font-weight:var(--fw-semibold)}
  nav .up{color:var(--color-on-primary)}
  nav .up .ico{background:var(--color-primary);width:40px;height:40px;border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;color:var(--color-on-primary);box-shadow:var(--shadow-1)}
</style>
</head>
<body>
  <h1>하단 내비 (글로벌)</h1>
  <p class="lead">홈·탐색·＋업로드·프로필. 한 셸에서 기록+탐색 완결(탭 분리로 핵심 흐름 쪼개지 않음). 현재 화면은 aria-current="page"로 코랄 강조.</p>

  <h2>State — 홈 활성</h2>
  <div class="demo"><nav aria-label="주요 내비게이션">
    <span aria-current="page"><span class="ico" aria-hidden="true">⌂</span>홈</span>
    <a href="#"><span class="ico" aria-hidden="true">🔍</span>탐색</a>
    <a class="up" href="#"><span class="ico" aria-hidden="true">＋</span><span style="color:var(--color-text-muted)">업로드</span></a>
    <a href="#"><span class="ico" aria-hidden="true">◔</span>프로필</a>
  </nav></div>

  <h2>State — 탐색 활성</h2>
  <div class="demo"><nav aria-label="주요 내비게이션">
    <a href="#"><span class="ico" aria-hidden="true">⌂</span>홈</a>
    <span aria-current="page"><span class="ico" aria-hidden="true">🔍</span>탐색</span>
    <a class="up" href="#"><span class="ico" aria-hidden="true">＋</span><span style="color:var(--color-text-muted)">업로드</span></a>
    <a href="#"><span class="ico" aria-hidden="true">◔</span>프로필</a>
  </nav></div>

  <h2>State — 프로필 활성</h2>
  <div class="demo"><nav aria-label="주요 내비게이션">
    <a href="#"><span class="ico" aria-hidden="true">⌂</span>홈</a>
    <a href="#"><span class="ico" aria-hidden="true">🔍</span>탐색</a>
    <a class="up" href="#"><span class="ico" aria-hidden="true">＋</span><span style="color:var(--color-text-muted)">업로드</span></a>
    <span aria-current="page"><span class="ico" aria-hidden="true">◔</span>프로필</span>
  </nav></div>
</body>
</html>
