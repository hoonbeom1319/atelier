<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotlog — 컴포넌트: 미분류 트레이</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{margin:0;background:var(--color-bg);color:var(--color-text);font-family:system-ui,sans-serif;padding:var(--sp-6)}
  h1{font-size:var(--fs-20);margin:0 0 var(--sp-2)} .lead{color:var(--color-text-muted);font-size:var(--fs-13);margin:0 0 var(--sp-5)}
  h2{font-size:var(--fs-13);color:var(--color-text-muted);margin:var(--sp-6) 0 var(--sp-3)}
  .tray{max-width:440px;background:var(--color-surface);border:1px dashed var(--color-border-strong);border-radius:var(--r-2);padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-4)}
  .th{display:flex;align-items:center;gap:var(--sp-2);font-size:var(--fs-13);font-weight:var(--fw-semibold);margin-bottom:var(--sp-3)}
  .count{font-size:var(--fs-11);color:var(--color-on-primary);background:var(--color-warning);border-radius:var(--r-full);padding:0 var(--sp-2)}
  .sub{font-size:var(--fs-12);color:var(--color-text-muted);font-weight:var(--fw-regular)}
  .row{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-2) 0;border-top:1px solid var(--color-border)}
  .ph{width:44px;height:44px;background:var(--color-surface-2);border-radius:var(--r-1);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);font-size:var(--fs-11);flex:none}
  .fn{font-size:var(--fs-13);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .why{font-size:var(--fs-11);color:var(--color-warning)}
  .move{border:1px solid var(--color-primary);color:var(--color-primary);background:transparent;border-radius:var(--r-1);padding:var(--sp-2) var(--sp-3);font:inherit;font-size:var(--fs-12);cursor:pointer;white-space:nowrap}
  .empty{max-width:440px;color:var(--color-text-muted);font-size:var(--fs-13);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--r-2);padding:var(--sp-4)}
</style>
</head>
<body>
  <h1>미분류 트레이 (F3 — 상시 경로)</h1>
  <p class="lead">GPS 없는 사진(스크린샷·전송본)을 별도로 모은다. 에러가 아니라 업로드 주경로의 일부 — 1급 대우. 각 사진을 카드로 이동(≤3탭, E1).</p>

  <h2>State — 미분류 있음 (3장)</h2>
  <div class="tray">
    <div class="th">미분류 사진 <span class="count">3</span> <span class="sub">— GPS가 없어요. 카드로 옮기세요.</span></div>
    <div class="row"><span class="ph">사진</span><span class="fn">스크린샷.png</span><span class="why">위치 없음</span><button class="move">카드로 이동</button></div>
    <div class="row"><span class="ph">사진</span><span class="fn">받은사진.jpg</span><span class="why">전송본</span><button class="move">카드로 이동</button></div>
    <div class="row"><span class="ph">사진</span><span class="fn">카톡_001.jpg</span><span class="why">GPS strip</span><button class="move">카드로 이동</button></div>
  </div>

  <h2>State — 미분류 0장 (섹션 숨김 대신 완료 안내)</h2>
  <div class="empty">✓ 미분류 사진이 없어요. 모든 사진이 장소에 배치됐습니다.</div>
</body>
</html>
