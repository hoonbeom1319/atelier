<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotlog — 메인 피드 (와이어)</title>
<style>
  *{box-sizing:border-box} body{margin:0;font-family:system-ui,sans-serif;background:#ddd}
  .shell{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;border:1px solid #999;border-top:0;border-bottom:0;padding-bottom:64px}
  header{padding:12px 16px;border-bottom:1px solid #999;display:flex;justify-content:space-between;align-items:center}
  h1{font-size:18px;margin:0}
  .list{list-style:none;margin:0;padding:0}
  .card{display:block;padding:14px 16px;border-bottom:1px solid #ccc;color:inherit;text-decoration:none}
  .place-name{font-weight:700;font-size:15px}
  .meta{font-size:12px;color:#555;margin-top:2px}
  .photos{display:flex;gap:4px;margin-top:8px}
  .ph{width:60px;height:60px;background:#bbb;border:1px solid #999;display:flex;align-items:center;justify-content:center;font-size:10px;color:#444}
  .vis{font-size:11px;border:1px solid #999;padding:1px 6px;border-radius:3px;display:inline-block;margin-top:6px}
  nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;display:flex;background:#eee;border-top:1px solid #999}
  nav a,nav span{flex:1;text-align:center;padding:12px 0;font-size:12px;text-decoration:none;color:#222}
  nav span[aria-current]{font-weight:700;background:#ccc}
  .demo{font-size:11px;border:1px dashed #777;background:#f3f3f3;padding:4px 8px;cursor:pointer}
  .empty{padding:48px 16px;text-align:center;color:#555}
  .cta{display:inline-block;margin-top:12px;border:1px solid #333;padding:8px 14px;text-decoration:none;color:#111}
  [hidden]{display:none!important}
</style>
</head>
<body>
<div class="shell">
  <header>
    <h1>spotlog</h1>
    <button class="demo" id="emptyDemo" aria-pressed="false">빈 상태 토글 [데모]</button>
  </header>

  <ul class="list" id="feedList" aria-label="내 장소 카드 피드">
    <li>
      <a class="card" href="card-detail.html" aria-label="장소 카드: 성수동 카페 오니">
        <div class="place-name">성수동 카페 오니</div>
        <div class="meta">서울 성동구 · 오전 10:24–11:10 · 공개</div>
        <div class="photos" aria-hidden="true"><span class="ph">사진</span><span class="ph">사진</span><span class="ph">+3</span></div>
        <span class="vis">공개</span>
      </a>
    </li>
    <li>
      <a class="card" href="card-detail.html" aria-label="장소 카드: 서울숲 전망데크">
        <div class="place-name">서울숲 전망데크</div>
        <div class="meta">서울 성동구 · 오후 2:05–2:40 · 비공개 · 메모 있음</div>
        <div class="photos" aria-hidden="true"><span class="ph">사진</span><span class="ph">사진</span></div>
        <span class="vis">비공개</span>
      </a>
    </li>
    <li>
      <a class="card" href="card-detail.html" aria-label="장소 카드: 좌표만 기록 (할머니 분식)">
        <div class="place-name">할머니 분식 <small>(직접 라벨 · 좌표만)</small></div>
        <div class="meta">동네: 성수동 일대 · 오후 6:12 · 비공개</div>
        <div class="photos" aria-hidden="true"><span class="ph">사진</span></div>
        <span class="vis">비공개</span>
      </a>
    </li>
  </ul>

  <div class="empty" id="feedEmpty" hidden>
    <p id="emptyTitle">사진을 올려 첫 장소를 기록하세요</p>
    <a class="cta" href="upload-select.html">＋ 사진 올리기</a>
  </div>

  <nav aria-label="주요 내비게이션">
    <span aria-current="page" aria-disabled="true">홈</span>
    <a href="explore.html">탐색</a>
    <a href="upload-select.html">업로드</a>
    <a href="profile.html">프로필</a>
  </nav>
</div>
<script>
  // 빈 상태 데모 토글 — 실재하는 상태 변화(피드 ↔ 빈 상태).
  var btn = document.getElementById('emptyDemo');
  btn.addEventListener('click', function(){
    var empty = document.getElementById('feedEmpty');
    var list = document.getElementById('feedList');
    var on = btn.getAttribute('aria-pressed') === 'true';
    btn.setAttribute('aria-pressed', String(!on));
    empty.hidden = on;        // pressed→true면 빈 상태 표시
    list.hidden = !on;
  });
</script>
</body>
</html>
