<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotlog — 탐색 (와이어)</title>
<style>
  *{box-sizing:border-box} body{margin:0;font-family:system-ui,sans-serif;background:#ddd}
  .shell{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;border:1px solid #999;border-top:0;border-bottom:0;padding-bottom:64px}
  header{padding:12px 16px;border-bottom:1px solid #999;display:flex;justify-content:space-between;align-items:center}
  h1{font-size:18px;margin:0}
  .demo{font-size:11px;border:1px dashed #777;background:#f3f3f3;padding:4px 8px;cursor:pointer}
  .list{list-style:none;margin:0;padding:0}
  .card{padding:14px 16px;border-bottom:1px solid #ccc}
  .who{font-size:12px;color:#333;text-decoration:none;border:1px solid #aaa;padding:1px 6px;border-radius:3px}
  .open{display:block;color:inherit;text-decoration:none;margin-top:8px}
  .place-name{font-weight:700;font-size:15px}
  .meta{font-size:12px;color:#555;margin-top:2px}
  .photos{display:flex;gap:4px;margin-top:8px}
  .ph{width:60px;height:60px;background:#bbb;border:1px solid #999;display:flex;align-items:center;justify-content:center;font-size:10px;color:#444}
  .empty{padding:48px 16px;text-align:center;color:#555}
  nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;display:flex;background:#eee;border-top:1px solid #999}
  nav a,nav span{flex:1;text-align:center;padding:12px 0;font-size:12px;text-decoration:none;color:#222}
  nav span[aria-current]{font-weight:700;background:#ccc}
  [hidden]{display:none!important}
</style>
</head>
<body>
<div class="shell">
  <header>
    <h1>탐색</h1>
    <button class="demo" id="exploreEmptyDemo" aria-pressed="false">빈 상태 토글 [데모]</button>
  </header>

  <ul class="list" id="exploreList" aria-label="타인 공개 장소 카드">
    <li class="card">
      <a class="who" href="profile.html">@mina_walks</a>
      <a class="open" href="card-detail.html" aria-label="장소 카드 보기: 망원 한강공원">
        <div class="place-name">망원 한강공원</div>
        <div class="meta">서울 마포구 · 어제 오후</div>
        <div class="photos" aria-hidden="true"><span class="ph">사진</span><span class="ph">사진</span><span class="ph">+4</span></div>
      </a>
    </li>
    <li class="card">
      <a class="who" href="profile.html">@trip_jun</a>
      <a class="open" href="card-detail.html" aria-label="장소 카드 보기: 부산 흰여울문화마을">
        <div class="place-name">부산 흰여울문화마을</div>
        <div class="meta">부산 영도구 · 지난 주말</div>
        <div class="photos" aria-hidden="true"><span class="ph">사진</span><span class="ph">사진</span></div>
      </a>
    </li>
  </ul>

  <div class="empty" id="exploreEmpty" hidden>
    <p>아직 탐색할 공개 카드가 없어요. 누군가를 팔로우해 보세요.</p>
  </div>

  <nav aria-label="주요 내비게이션">
    <a href="index.html">홈</a>
    <span aria-current="page" aria-disabled="true">탐색</span>
    <a href="upload-select.html">업로드</a>
    <a href="profile.html">프로필</a>
  </nav>
</div>
<script>
  var btn = document.getElementById('exploreEmptyDemo');
  btn.addEventListener('click', function(){
    var on = btn.getAttribute('aria-pressed') === 'true';
    btn.setAttribute('aria-pressed', String(!on));
    document.getElementById('exploreEmpty').hidden = on;
    document.getElementById('exploreList').hidden = !on;
  });
</script>
</body>
</html>
