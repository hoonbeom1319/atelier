<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotlog — 메모·태그·공개 범위 (와이어)</title>
<style>
  *{box-sizing:border-box} body{margin:0;font-family:system-ui,sans-serif;background:#ddd}
  .shell{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;border:1px solid #999;border-top:0;border-bottom:0;padding-bottom:72px}
  header{padding:12px 16px;border-bottom:1px solid #999;display:flex;align-items:center;gap:12px}
  .back{text-decoration:none;color:#111;border:1px solid #999;padding:4px 8px;font-size:13px}
  h1{font-size:16px;margin:0}
  .panel{padding:14px 16px;display:flex;flex-direction:column;gap:16px}
  .sum{font-size:13px;color:#555}
  label{font-size:13px;display:block;margin-bottom:4px;font-weight:600}
  textarea,input[type=text]{width:100%;padding:8px;border:1px solid #999;font:inherit}
  .tagrow{display:flex;gap:8px}
  .tagrow input{flex:1}
  .tagadd{border:1px solid #777;background:#eee;padding:0 12px;font:inherit;cursor:pointer}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{font-size:12px;border:1px solid #999;border-radius:12px;padding:2px 10px;background:#f3f3f3}
  .visbox{border:1px solid #ccc;padding:12px;background:#f7f7f7}
  .switch{display:flex;align-items:center;gap:10px}
  .switch button{border:1px solid #333;background:#fff;padding:6px 14px;font:inherit;cursor:pointer}
  .switch button[aria-checked="true"]{background:#333;color:#fff}
  #notice{font-size:13px;margin-top:8px}
  .footer{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#eee;border-top:1px solid #999;padding:10px 16px;text-align:right}
  .post{display:inline-block;border:1px solid #333;background:#fff;padding:8px 18px;text-decoration:none;color:#111;font-size:14px}
</style>
</head>
<body>
<div class="shell">
  <header>
    <a class="back" href="upload-group.html">← 뒤로</a>
    <h1>메모 · 공개 범위</h1>
  </header>
  <div class="panel">
    <p class="sum">장소 카드 3개를 게시합니다.</p>
    <div>
      <label for="memo">메모 (선택)</label>
      <textarea id="memo" rows="3" placeholder="이 장소에 대한 짧은 메모"></textarea>
    </div>
    <div>
      <label for="tagInput">태그 (선택)</label>
      <div class="tagrow">
        <input type="text" id="tagInput" placeholder="예: 카페, 데이트">
        <button class="tagadd" id="tagAdd">태그 추가</button>
      </div>
      <div class="chips" id="chips" aria-label="추가된 태그"></div>
    </div>
    <div class="visbox">
      <div class="switch">
        <span id="visLabel">공개 범위:</span>
        <button id="visToggle" role="switch" aria-checked="false">비공개</button>
      </div>
      <p id="notice">🔒 비공개로 게시됩니다. 나만 볼 수 있어요.</p>
    </div>
  </div>
  <div class="footer">
    <a class="post" href="index.html">게시</a>
  </div>
</div>
<script>
  // 태그 추가 — 칩이 실제로 생성된다(텍스트 입력 의존).
  var input = document.getElementById('tagInput');
  document.getElementById('tagAdd').addEventListener('click', function () {
    var v = input.value.trim();
    if (!v) return;
    var chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = '#' + v;
    document.getElementById('chips').appendChild(chip);
    input.value = '';
  });
  // 공개 범위 스위치 — aria-checked 반전 + 고지 문구가 변한다(기본 비공개).
  var t = document.getElementById('visToggle');
  t.addEventListener('click', function () {
    var on = t.getAttribute('aria-checked') === 'true'; // on=true면 현재 공개
    t.setAttribute('aria-checked', String(!on));
    t.textContent = on ? '비공개' : '공개';
    document.getElementById('notice').textContent = on
      ? '🔒 비공개로 게시됩니다. 나만 볼 수 있어요.'
      : '🌐 이 장소가 공개됩니다. 팔로워·탐색에 노출돼요.';
  });
</script>
</body>
</html>
