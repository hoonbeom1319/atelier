<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotlog — 지도 핀 직접 지정 (와이어 · 목업)</title>
<style>
  *{box-sizing:border-box} body{margin:0;font-family:system-ui,sans-serif;background:#ddd}
  .shell{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;border:1px solid #999;border-top:0;border-bottom:0}
  header{padding:12px 16px;border-bottom:1px solid #999;display:flex;align-items:center;gap:12px}
  .back{text-decoration:none;color:#111;border:1px solid #999;padding:4px 8px;font-size:13px}
  h1{font-size:16px;margin:0}
  .map{position:relative;height:300px;background:repeating-linear-gradient(45deg,#cfcfcf,#cfcfcf 10px,#c4c4c4 10px,#c4c4c4 20px);border-bottom:1px solid #999;overflow:hidden}
  .map .tag{position:absolute;top:8px;left:8px;font-size:11px;background:#fff;border:1px solid #999;padding:2px 6px}
  #pin{position:absolute;left:50%;top:50%;transform:translate(-50%,-100%);font-size:28px;transition:top .15s}
  .panel{padding:14px 16px;display:flex;flex-direction:column;gap:12px}
  .coordbox{font-size:13px;border:1px solid #ccc;padding:8px;background:#f7f7f7}
  .pinctrl{display:flex;gap:8px}
  .pinctrl button{flex:1;border:1px solid #777;background:#eee;padding:8px;font:inherit;cursor:pointer}
  label{font-size:13px;display:block;margin-bottom:4px}
  input[type=text]{width:100%;padding:8px;border:1px solid #999;font:inherit}
  .confirm{display:inline-block;border:1px solid #333;background:#fff;padding:10px 18px;text-decoration:none;color:#111;text-align:center;font-size:14px}
</style>
</head>
<body>
<div class="shell">
  <header>
    <a class="back" href="upload-group.html">← 뒤로</a>
    <h1>지도에서 위치 지정</h1>
  </header>
  <div class="map" role="img" aria-label="지도 목업 (실제 지도 SDK 미사용)">
    <span class="tag">지도 목업 — 실연동은 handoff</span>
    <div id="pin" aria-hidden="true">📍</div>
  </div>
  <div class="panel">
    <div class="coordbox">현재 핀 좌표: <span id="coord">37.5446, 127.0560</span></div>
    <div class="pinctrl" role="group" aria-label="핀 이동">
      <button id="pinUp">핀 위로</button>
      <button id="pinDown">핀 아래로</button>
    </div>
    <div>
      <label for="labelInput">장소 라벨 직접 입력 (선택)</label>
      <input type="text" id="labelInput" placeholder="예: 할머니 분식">
    </div>
    <a class="confirm" href="upload-group.html">이 위치로 확정</a>
  </div>
</div>
<script>
  // 핀 이동 — 좌표 텍스트가 실제로 바뀐다(목업).
  var lat = 37.5446, lng = 127.0560, top = 50;
  var pin = document.getElementById('pin'), coord = document.getElementById('coord');
  function render(){ coord.textContent = lat.toFixed(4) + ', ' + lng.toFixed(4); pin.style.top = top + '%'; }
  document.getElementById('pinUp').addEventListener('click', function(){ lat += 0.0008; top = Math.max(15, top-8); render(); });
  document.getElementById('pinDown').addEventListener('click', function(){ lat -= 0.0008; top = Math.min(85, top+8); render(); });
</script>
</body>
</html>
