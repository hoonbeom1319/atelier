<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spotlog — 카드 상세 (와이어)</title>
<style>
  *{box-sizing:border-box} body{margin:0;font-family:system-ui,sans-serif;background:#ddd}
  .shell{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;border:1px solid #999;border-top:0;border-bottom:0}
  header{padding:12px 16px;border-bottom:1px solid #999;display:flex;align-items:center;gap:12px}
  .back{text-decoration:none;color:#111;border:1px solid #999;padding:4px 8px;font-size:13px}
  h1{font-size:16px;margin:0}
  .hero{height:240px;background:#bbb;border-bottom:1px solid #999;display:flex;align-items:center;justify-content:center;color:#444;font-size:14px}
  .thumbs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto}
  .thumb{width:56px;height:56px;flex:none;background:#cfcfcf;border:1px solid #999;cursor:pointer;font-size:10px;color:#444}
  .thumb[aria-pressed="true"]{outline:3px solid #333;outline-offset:-3px}
  .body{padding:0 16px 24px}
  .place{font-size:18px;font-weight:700;margin:8px 0 2px}
  .meta{font-size:13px;color:#555}
  .memo{margin-top:12px;font-size:14px;border-left:3px solid #999;padding-left:10px}
  .chips{display:flex;gap:6px;margin-top:10px}
  .chip{font-size:12px;border:1px solid #999;border-radius:12px;padding:2px 10px;background:#f3f3f3}
  #miniMap{height:120px;margin-top:14px;background:repeating-linear-gradient(45deg,#cfcfcf,#cfcfcf 10px,#c4c4c4 10px,#c4c4c4 20px);border:1px solid #999;display:flex;align-items:center;justify-content:center;font-size:12px;color:#444}
  .actions{margin-top:16px}
  .edit-card{border:1px solid #333;background:#eee;padding:8px 14px;text-decoration:none;color:#111;font-size:13px}
</style>
</head>
<body>
<div class="shell">
  <header>
    <a class="back" href="index.html">← 뒤로</a>
    <h1>장소 카드</h1>
  </header>
  <div class="hero" id="hero" aria-live="polite">대표 사진 1</div>
  <div class="thumbs" role="group" aria-label="사진 묶음(탭하여 대표 교체)">
    <button class="thumb" aria-pressed="true" aria-label="사진 1 보기">사진1</button>
    <button class="thumb" aria-pressed="false" aria-label="사진 2 보기">사진2</button>
    <button class="thumb" aria-pressed="false" aria-label="사진 3 보기">사진3</button>
    <button class="thumb" aria-pressed="false" aria-label="사진 4 보기">사진4</button>
  </div>
  <div class="body">
    <div class="place">성수동 카페 오니</div>
    <div class="meta">서울 성동구 성수동길 12 · 오전 10:24–11:10 · 공개</div>
    <p class="memo">햇살 좋은 창가. 플랫화이트가 좋았다.</p>
    <div class="chips"><span class="chip">#카페</span><span class="chip">#성수</span></div>
    <div id="miniMap" role="img" aria-label="장소 위치 목업">위치 목업 (실연동은 handoff)</div>
    <div class="actions">
      <a class="edit-card" href="upload-group.html">이 카드 편집</a>
    </div>
  </div>
</div>
<script>
  // 사진 썸네일 탭 — 대표 사진이 실제로 교체된다(단일 활성).
  var thumbs = document.querySelectorAll('.thumb');
  var hero = document.getElementById('hero');
  thumbs.forEach(function (t, i) {
    t.addEventListener('click', function () {
      thumbs.forEach(function (x) { x.setAttribute('aria-pressed', 'false'); });
      t.setAttribute('aria-pressed', 'true');
      hero.textContent = '대표 사진 ' + (i + 1);
    });
  });
</script>
</body>
</html>
