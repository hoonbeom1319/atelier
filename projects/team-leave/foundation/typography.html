<!-- @dsCard group="Foundation" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>타이포 — team-leave Foundation</title>
<link rel="stylesheet" href="tokens.css">
<style>
  body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);margin:0;padding:var(--sp-8);line-height:var(--lh-body)}
  .row{border-bottom:1px solid var(--color-border);padding:var(--sp-3) 0;display:flex;gap:var(--sp-6);align-items:baseline}
  .meta{color:var(--color-text-subtle);font-size:var(--fs-xs);min-width:160px}
</style>
</head>
<body>
  <div class="row"><span class="meta">display / 28 / bold</span><span style="font-size:var(--fs-display);font-weight:var(--fw-bold);line-height:var(--lh-tight)">남은 연차 10일</span></div>
  <div class="row"><span class="meta">h1 / 22 / semibold</span><span style="font-size:var(--fs-h1);font-weight:var(--fw-semibold)">휴가 신청·승인</span></div>
  <div class="row"><span class="meta">h2 / 18 / semibold</span><span style="font-size:var(--fs-h2);font-weight:var(--fw-semibold)">승인 대기 큐</span></div>
  <div class="row"><span class="meta">h3 / 15 / semibold</span><span style="font-size:var(--fs-h3);font-weight:var(--fw-semibold)">내 잔여 연차</span></div>
  <div class="row"><span class="meta">body / 14 / regular</span><span style="font-size:var(--fs-body)">직원이 종류·기간·사유를 입력하면 영업일 기준 일수를 계산해 예상 잔여를 보여준다.</span></div>
  <div class="row"><span class="meta">sm / 13 / regular</span><span style="font-size:var(--fs-sm)">대기 중 2일 포함 · 사용률 20%</span></div>
  <div class="row"><span class="meta">xs / 12 / muted</span><span style="font-size:var(--fs-xs);color:var(--color-text-muted)">2026-07-08 10:12 · 신청됨</span></div>
  <div class="row"><span class="meta">muted / 14</span><span style="font-size:var(--fs-body);color:var(--color-text-muted)">보조 설명 텍스트 (text-muted)</span></div>
</body>
</html>
