<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>데이터 테이블 — team-leave Components</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);margin:0;padding:var(--sp-8)}
  h2{font-size:var(--fs-h2)}
  .panel{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);overflow:hidden;max-width:860px}
  table{border-collapse:collapse;width:100%;font-size:var(--fs-sm)}
  thead th{text-align:left;background:var(--color-surface-alt);color:var(--color-text-muted);font-weight:var(--fw-semibold);font-size:var(--fs-xs);padding:10px 14px;border-bottom:1px solid var(--color-border)}
  tbody td{padding:12px 14px;border-bottom:1px solid var(--color-border)}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:var(--color-surface-alt)}
  .tag{display:inline-flex;align-items:center;gap:6px;padding:2px 9px;border-radius:var(--r-full);font-size:var(--fs-xs);font-weight:var(--fw-medium)}
  .dot{width:6px;height:6px;border-radius:50%}
  .s-pending{background:var(--color-warning-bg);color:var(--color-warning)}
  .s-approved{background:var(--color-success-bg);color:var(--color-success)}
  .empty{padding:var(--sp-10);text-align:center;color:var(--color-text-muted);font-size:var(--fs-sm)}
  .btn{font:inherit;font-size:var(--fs-xs);padding:4px 9px;border-radius:var(--r-sm);border:1px solid var(--color-border-strong);background:var(--color-surface);cursor:pointer}
</style>
</head>
<body>
  <h2>데이터 테이블 (정상 — 승인 큐 예)</h2>
  <div class="panel">
    <table>
      <thead><tr><th>신청자</th><th>종류</th><th>기간</th><th>일수</th><th>상태</th><th>액션</th></tr></thead>
      <tbody>
        <tr><td>김민수</td><td>연차</td><td>7/20~7/21</td><td>2</td><td><span class="tag s-pending"><span class="dot" style="background:var(--color-warning)"></span>대기</span></td><td><button class="btn">승인</button> <button class="btn">반려</button></td></tr>
        <tr><td>이서연</td><td>반차</td><td>7/22 오전</td><td>0.5</td><td><span class="tag s-approved"><span class="dot" style="background:var(--color-success)"></span>승인</span></td><td><button class="btn">상세</button></td></tr>
      </tbody>
    </table>
  </div>

  <h2>빈 상태 (대기 0건 — 막다른 길 0)</h2>
  <div class="panel">
    <div class="empty">대기 중인 신청이 없습니다.<br>팀 캘린더에서 부재 현황을 확인하세요.</div>
  </div>
</body>
</html>
