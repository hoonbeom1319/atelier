<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>모달 — team-leave Components</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);margin:0;padding:var(--sp-8)}
  h2{font-size:var(--fs-h2)}
  .stage{position:relative;background:var(--color-surface-alt);border:1px dashed var(--color-border-strong);border-radius:var(--r-lg);min-height:300px;display:flex;align-items:center;justify-content:center}
  .overlay{position:absolute;inset:0;background:rgba(24,27,32,.35);border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center}
  .modal{background:var(--color-surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:420px;padding:var(--sp-6)}
  .modal h3{margin:0 0 var(--sp-2);font-size:var(--fs-h2)}
  .modal p{margin:0 0 var(--sp-4);font-size:var(--fs-sm);color:var(--color-text-muted)}
  textarea{font:inherit;font-size:var(--fs-body);width:100%;box-sizing:border-box;padding:9px 11px;border:1px solid var(--color-border-strong);border-radius:var(--r-md)}
  .actions{display:flex;gap:var(--sp-2);justify-content:flex-end;margin-top:var(--sp-4)}
  .btn{font:inherit;font-size:var(--fs-body);font-weight:var(--fw-medium);padding:8px 14px;border-radius:var(--r-md);border:1px solid var(--color-border-strong);background:var(--color-surface);cursor:pointer}
  .btn-danger{background:var(--color-danger);color:#fff;border-color:transparent}
</style>
</head>
<body>
  <h2>모달 (반려 사유 — 필수 입력)</h2>
  <div class="stage">
    <div class="overlay">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="mt">
        <h3 id="mt">반려 사유</h3>
        <p>반려 사유는 필수입니다. 신청자에게 actionable한 이유를 남겨주세요.</p>
        <textarea rows="3" placeholder="예: Q3 출시 주간과 겹침"></textarea>
        <div class="actions">
          <button class="btn">취소</button>
          <button class="btn btn-danger">반려 제출</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
