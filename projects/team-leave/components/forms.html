<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>폼 필드 — team-leave Components</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);margin:0;padding:var(--sp-8);max-width:560px}
  h2{font-size:var(--fs-h2)}
  label{display:block;font-size:var(--fs-sm);font-weight:var(--fw-medium);margin:var(--sp-4) 0 var(--sp-1)}
  .field{font:inherit;font-size:var(--fs-body);width:100%;box-sizing:border-box;padding:9px 11px;border:1px solid var(--color-border-strong);border-radius:var(--r-md);background:var(--color-surface);color:var(--color-text);transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease)}
  .field:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-soft)}
  .field.error{border-color:var(--color-danger)}
  .hint{font-size:var(--fs-xs);color:var(--color-text-muted);margin-top:var(--sp-1)}
  .err{font-size:var(--fs-xs);color:var(--color-danger);margin-top:var(--sp-1)}
  .seg{display:inline-flex;border:1px solid var(--color-border-strong);border-radius:var(--r-md);overflow:hidden}
  .seg button{font:inherit;font-size:var(--fs-sm);padding:7px 14px;border:0;background:var(--color-surface);cursor:pointer}
  .seg button[aria-pressed="true"]{background:var(--color-primary);color:var(--color-on-primary)}
</style>
</head>
<body>
  <h2>폼 필드 (정상 · 포커스 · 에러 상태)</h2>
  <label for="t">휴가 종류 (select)</label>
  <select id="t" class="field"><option>연차</option><option>반차</option><option>병가</option><option>경조사</option></select>

  <label for="d">시작일 (정상)</label>
  <input id="d" class="field" type="date" value="2026-07-20">

  <label for="d2">종료일 (에러)</label>
  <input id="d2" class="field error" type="date" value="2026-07-18">
  <div class="err">⚠ 종료일이 시작일보다 빠릅니다 (기간 유효성).</div>

  <label>반차 시간대 (세그먼트 토글)</label>
  <div class="seg">
    <button type="button" aria-pressed="true">오전</button>
    <button type="button" aria-pressed="false">오후</button>
  </div>

  <label for="r">사유 (textarea)</label>
  <textarea id="r" class="field" rows="3" placeholder="사유 입력"></textarea>
  <div class="hint">병가·경조사는 증빙 메모로 대체할 수 있습니다.</div>
</body>
</html>
