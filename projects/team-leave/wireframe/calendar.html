<!-- @dsCard group="Wireframe" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>팀 캘린더 — team-leave 와이어</title>
<style>
  body{font-family:system-ui,sans-serif;background:#fff;color:#222;margin:0;display:flex;min-height:100vh}
  nav{width:200px;border-right:2px solid #999;padding:16px;box-sizing:border-box}
  nav a{display:block;padding:6px 8px;color:#222;text-decoration:none;border-bottom:1px solid #eee}
  nav .cur{display:block;padding:6px 8px;border-bottom:1px solid #eee;font-weight:bold;background:#eee}
  main{flex:1;padding:20px}
  h2{font-size:16px}
  .bar{display:flex;gap:14px;align-items:center;margin:10px 0}
  .btn{padding:5px 10px;border:1px solid #444;background:#eee;color:#222;cursor:pointer;text-decoration:none}
  select{padding:6px;border:1px solid #999}
  table{border-collapse:collapse;width:100%;table-layout:fixed}
  th{border:1px solid #ccc;padding:6px;font-size:12px;background:#f5f5f5}
  td{border:1px solid #ccc;height:70px;vertical-align:top;padding:4px;font-size:12px}
  .bar2{border:1px solid #999;margin-top:3px;padding:1px 3px;font-size:11px;cursor:pointer}
  .legend span{display:inline-block;border:1px solid #999;padding:1px 6px;margin-right:6px;font-size:12px}
  .widget{display:inline-block;border:1px solid #999;padding:6px 10px;margin-right:8px;font-size:13px}
</style>
</head>
<body>
  <nav>
    <strong>team-leave</strong><div style="margin-top:12px"></div>
    <a href="home.html">홈</a>
    <a href="request.html">휴가 신청</a>
    <a href="approvals.html">승인 큐</a>
    <span class="cur" aria-current="page">팀 캘린더</span>
    <a href="balance.html">잔여 연차</a>
    <a href="requests.html">내 신청</a>
    <a href="notifications.html">알림</a>
    <a href="members.html">멤버 관리</a>
    <a href="settings.html">설정</a>
  </nav>
  <main>
    <h2>팀 캘린더 / 현황</h2>
    <div class="bar">
      <button class="btn" onclick="moveMonth(-1)">◀</button>
      <strong id="month">2026년 7월</strong>
      <button class="btn" onclick="moveMonth(1)">▶</button>
      <label>팀 필터:
        <select id="team" onchange="filterTeam()">
          <option value="all">전체</option>
          <option value="dev">개발팀</option>
          <option value="biz">사업팀</option>
        </select>
      </label>
    </div>
    <div>
      <span class="widget">같은 날 최대 부재: <strong id="maxabs">3명</strong></span>
      <span class="widget">승인 대기: <strong>3건</strong></span>
    </div>
    <p class="legend" style="margin-top:10px">
      <span>■ 연차</span><span>▨ 반차</span><span>● 병가</span><span>◆ 경조사</span> (색+라벨 병기)
    </p>

    <table id="grid">
      <thead><tr><th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th></tr></thead>
      <tbody id="body"></tbody>
    </table>
    <p id="emptyMsg" style="color:#777;font-size:13px"></p>
  </main>

<script>
  var monthIdx=7;
  // 부재 시드: 날짜 -> [팀, 라벨]
  var absences={ '10':[['dev','김민수 연차']], '14':[['biz','이서연 반차']], '21':[['dev','박지훈 연차'],['biz','최유진 연차'],['dev','정해성 병가']], '28':[['dev','한지민 경조사']] };
  function render(){
    document.getElementById('month').textContent='2026년 '+monthIdx+'월';
    var team=document.getElementById('team').value;
    var body=document.getElementById('body'); body.innerHTML='';
    // 7월만 부재 데이터, 그 외 달은 빈 그리드
    var hasData=(monthIdx===7); var anyVisible=false;
    var day=1; var startCol=3; // 데모 시작 요일
    for(var w=0;w<5;w++){
      var tr=document.createElement('tr');
      for(var c=0;c<7;c++){
        var td=document.createElement('td');
        if((w>0||c>=startCol)&&day<=31){
          td.innerHTML='<div>'+day+'</div>';
          var key=String(day);
          if(hasData&&absences[key]){
            absences[key].forEach(function(a){
              if(team==='all'||a[0]===team){
                anyVisible=true;
                var b=document.createElement('div'); b.className='bar2'; b.textContent=a[1];
                b.onclick=function(){location.href='requests.html';};
                td.appendChild(b);
              }
            });
          }
          day++;
        }
        tr.appendChild(td);
      }
      body.appendChild(tr);
    }
    document.getElementById('emptyMsg').textContent = anyVisible ? '' : '이 달/필터에 부재가 없습니다 (빈 그리드 정상).';
    document.getElementById('maxabs').textContent = (hasData && (team==='all')) ? '3명' : (hasData?'1명':'0명');
  }
  function moveMonth(d){ monthIdx+=d; if(monthIdx<1)monthIdx=12; if(monthIdx>12)monthIdx=1; render(); }
  function filterTeam(){ render(); }
  render();
</script>
</body>
</html>
