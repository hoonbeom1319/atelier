<!-- @dsCard group="Wireframe" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>내 신청 — team-leave 와이어</title>
<style>
  body{font-family:system-ui,sans-serif;background:#fff;color:#222;margin:0;display:flex;min-height:100vh}
  nav{width:200px;border-right:2px solid #999;padding:16px;box-sizing:border-box}
  nav a{display:block;padding:6px 8px;color:#222;text-decoration:none;border-bottom:1px solid #eee}
  nav .cur{display:block;padding:6px 8px;border-bottom:1px solid #eee;font-weight:bold;background:#eee}
  main{flex:1;padding:20px}
  h2{font-size:16px}
  table{border-collapse:collapse;width:100%;max-width:760px}
  th,td{border:1px solid #ccc;padding:8px;font-size:13px;text-align:left}
  .tag{border:1px solid #999;padding:2px 6px;font-size:12px}
  .btn{padding:5px 9px;border:1px solid #444;background:#eee;color:#222;cursor:pointer}
  .detail{border:1px solid #999;padding:14px;margin-top:14px;max-width:760px}
  .detail.hidden{display:none}
  .tl{list-style:none;padding-left:0;font-size:13px}
  .tl li{border-left:2px solid #999;padding:4px 0 4px 10px;margin-left:6px}
  .empty{border:1px dashed #bbb;padding:14px;max-width:760px;color:#555}
  .empty.hidden{display:none}
</style>
</head>
<body>
  <nav>
    <strong>team-leave</strong><div style="margin-top:12px"></div>
    <a href="home.html">홈</a>
    <a href="request.html">휴가 신청</a>
    <a href="approvals.html">승인 큐</a>
    <a href="calendar.html">팀 캘린더</a>
    <a href="balance.html">잔여 연차</a>
    <span class="cur" aria-current="page">내 신청</span>
    <a href="notifications.html">알림</a>
    <a href="members.html">멤버 관리</a>
    <a href="settings.html">설정</a>
  </nav>
  <main>
    <h2>내 신청 목록</h2>
    <table>
      <thead><tr><th>종류</th><th>기간</th><th>일수</th><th>상태</th><th>신청일</th><th>액션</th></tr></thead>
      <tbody id="rows">
        <tr data-row><td>연차</td><td>2026-07-20~07-21</td><td>2</td><td><span class="tag">대기</span></td><td>07-08</td>
          <td><button class="btn" onclick="showDetail('대기 신청 (7/20~7/21)',false,this)">상세</button></td></tr>
        <tr data-row><td>연차</td><td>2026-08-10~08-12</td><td>3</td><td><span class="tag">승인</span></td><td>07-01</td>
          <td><button class="btn" onclick="showDetail('승인 신청 (8/10~8/12)',true,this)">상세</button>
              <button class="btn" data-cancel onclick="cancelRow(this)">취소</button></td></tr>
        <tr data-row><td>반차</td><td>2026-06-15 오전</td><td>0.5</td><td><span class="tag">승인</span></td><td>06-10</td>
          <td><button class="btn" onclick="showDetail('과거 승인 반차 (6/15)',false,this)">상세</button>
              <span style="font-size:12px;color:#777">[범위 밖] 과거 건 취소 불가</span></td></tr>
      </tbody>
    </table>

    <div class="empty hidden" id="empty">신청 내역이 없습니다. <a href="request.html">+ 휴가 신청</a>으로 시작하세요. (막다른 길 0)</div>

    <div id="detail" class="detail hidden">
      <h3 id="dTitle">신청 상세</h3>
      <p style="font-size:13px">상태 이력 (감사 추적):</p>
      <ul class="tl" id="timeline"></ul>
    </div>
  </main>

<script>
  function showDetail(title,future,btn){
    document.getElementById('dTitle').textContent=title;
    var tl=document.getElementById('timeline');
    tl.innerHTML='<li>신청 — 07-08 10:12 · 본인</li><li>승인 대기 → 팀장 큐 라우팅</li>'+
      (future?'<li>승인 — 07-09 09:30 · 팀장 (pending→used)</li>':'');
    document.getElementById('detail').classList.remove('hidden');
    btn.closest('main').scrollIntoView();
  }
  function cancelRow(btn){
    var tr=btn.closest('tr');
    tr.querySelector('.tag').textContent='취소';
    btn.closest('td').innerHTML='<span style="font-size:12px;color:#777">취소됨 (used→잔여 복원, 이력 잔존)</span>';
  }
</script>
</body>
</html>
