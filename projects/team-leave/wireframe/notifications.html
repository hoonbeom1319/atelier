<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>알림 — team-leave 와이어</title>
<style>
  body{font-family:system-ui,sans-serif;background:#fff;color:#222;margin:0;display:flex;min-height:100vh}
  nav{width:200px;border-right:2px solid #999;padding:16px;box-sizing:border-box}
  nav a{display:block;padding:6px 8px;color:#222;text-decoration:none;border-bottom:1px solid #eee}
  nav .cur{display:block;padding:6px 8px;border-bottom:1px solid #eee;font-weight:bold;background:#eee}
  main{flex:1;padding:20px;max-width:680px}
  h2{font-size:16px}
  .btn{padding:5px 10px;border:1px solid #444;background:#eee;color:#222;cursor:pointer}
  ul{list-style:none;padding:0}
  li{border:1px solid #ccc;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
  .dot{width:8px;height:8px;border-radius:50%;background:#333;display:inline-block;margin-right:6px}
  li.read .dot{visibility:hidden}
  li.read{color:#999}
  .empty{border:1px dashed #bbb;padding:14px;color:#555}
  .hidden{display:none}
</style>
</head>
<body>
  <nav>
    <strong>team-leave</strong><div style="margin-top:12px"></div>
    <a href="home.html">홈</a>
    <a href="request.html">휴가 신청</a>
    <a href="approvals.html">승인 큐</a>
    <a href="calendar.html">팀 캘린더</a>
    <a href="balance.html">잔여 연차</a>
    <a href="requests.html">내 신청</a>
    <span class="cur" aria-current="page">알림</span>
    <a href="members.html">멤버 관리</a>
    <a href="settings.html">설정</a>
  </nav>
  <main>
    <h2>알림 <span style="font-size:13px;color:#777">(인앱 개념 — 실 발송 [범위 밖])</span></h2>
    <p>안읽음 <span id="badge">2</span>건 <button class="btn" onclick="readAll()">모두 읽음</button></p>
    <ul id="list">
      <li data-n><span><span class="dot"></span>내 신청(7/20~7/21)이 <strong>승인</strong>되었습니다.</span>
        <span><button class="btn" onclick="readOne(this)">읽음</button> <a class="btn" href="requests.html">보기</a></span></li>
      <li data-n><span><span class="dot"></span>김민수님의 휴가 신청 <strong>승인 요청</strong>이 도착했습니다.</span>
        <span><button class="btn" onclick="readOne(this)">읽음</button> <a class="btn" href="approvals.html">보기</a></span></li>
      <li data-n class="read"><span><span class="dot"></span>반차 신청(6/15)이 승인되었습니다.</span>
        <span><a class="btn" href="requests.html">보기</a></span></li>
    </ul>
    <div id="empty" class="empty hidden">알림이 없습니다.</div>
  </main>

<script>
  function refresh(){
    var unread=document.querySelectorAll('#list li[data-n]:not(.read)').length;
    document.getElementById('badge').textContent=unread;
    document.getElementById('empty').classList.toggle('hidden', document.querySelectorAll('#list li[data-n]').length!==0 && true);
  }
  function readOne(btn){
    var li=btn.closest('li'); li.classList.add('read');
    btn.remove(); refresh();
  }
  function readAll(){
    document.querySelectorAll('#list li[data-n]').forEach(function(li){
      li.classList.add('read'); var b=li.querySelector('button'); if(b)b.remove();
    });
    refresh();
  }
  refresh();
</script>
</body>
</html>
