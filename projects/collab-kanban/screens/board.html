<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>collab-kanban — 제품 보드</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  /* collab-kanban 하이파이 보드 — 와이어 board.html을 토큰으로 리스킨.
     ★인터랙션·role·aria·class 훅·data-act·인라인 JS는 1:1 보존(아래 <script>는 와이어와 동일).
     비주얼만 입힌다: 사이드바 --gradient-brand, 카드 hover lift, drop-target 글로우,
     라벨칩 풀컬러(흰 텍스트 AA), 컬러 아바타. 데스크톱 1280 주·1440 무파손, 페이지 가로 오버플로 0.
     모든 텍스트는 solid 표면 위(양 모드 axe serious 0). semantic 토큰만 참조. */

  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    background: var(--color-bg);
    color: var(--color-text);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    transition: background .3s ease, color .3s ease;
  }

  button { font: inherit; color: inherit; }
  h1 { margin: 0; }
  h2 { font-size: 14px; margin: 0; font-weight: 650; letter-spacing: -.01em; }
  a { color: inherit; }
  :focus-visible { outline: 2px solid var(--color-focus); outline-offset: 2px; border-radius: var(--radius-sm); }

  /* ── 앱 셸: 사이드바 212 + 메인 ───────────────────────────── */
  .shell { display: flex; min-height: 100vh; }

  .sidebar {
    width: 212px; flex: none;
    background: var(--gradient-brand);
    color: #fff;
    padding: 16px 12px;
    display: flex; flex-direction: column; gap: 4px;
    position: relative;
    box-shadow: var(--shadow-pop);
    z-index: 2;
  }
  .sidebar::after { /* 우측 미세 경계 */
    content: ""; position: absolute; top: 0; right: 0; bottom: 0; width: 1px;
    background: rgba(255,255,255,.12);
  }
  .brand {
    font-weight: 750; font-size: 15px; letter-spacing: -.01em;
    padding: 6px 10px 18px; color: #fff;
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar nav { display: flex; flex-direction: column; gap: 3px; }
  .navitem {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 11px; border-radius: var(--radius-md);
    text-decoration: none; color: rgba(255,255,255,.82);
    border: 1px solid transparent; background: transparent;
    text-align: left; font: inherit; font-size: 13.5px; cursor: pointer;
    transition: background .16s ease, color .16s ease, transform .12s ease;
    width: 100%;
  }
  .navitem:hover { background: rgba(255,255,255,.12); color: #fff; }
  a.navitem:active, button.navitem:active { transform: translateX(1px); }
  .navitem[aria-current="page"] {
    background: rgba(255,255,255,.18);
    color: #fff; font-weight: 650;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.22);
  }
  .navitem.sub { margin-left: 14px; font-size: 12.5px; color: rgba(255,255,255,.74); padding-top: 6px; padding-bottom: 6px; }
  .navitem.sub[aria-current="page"] { color: #fff; }
  .navitem.scope { color: rgba(255,255,255,.62); }
  .navitem.scope:hover { color: #fff; }

  /* ── 메인 영역 ─────────────────────────────────────────────── */
  .mainpane { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--color-bg); }

  .topbar {
    position: relative; display: flex; align-items: center; gap: 10px;
    padding: 10px 18px; border-bottom: 1px solid var(--color-border);
    background: var(--color-bg); flex-wrap: wrap; z-index: 5;
  }
  .topbar .search {
    flex: 1; max-width: 360px;
    font: inherit; color: var(--color-text);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    padding: 8px 12px; border-radius: var(--radius-pill); width: 100%;
    transition: border-color .16s ease, box-shadow .16s ease;
  }
  .topbar .search::placeholder { color: var(--color-text-subtle); }
  .topbar .search:focus { outline: none; border-color: var(--color-focus); box-shadow: var(--ring-accent); }
  .tspacer { flex: 1; }

  /* 탑바 버튼 공통(검색 input 제외한 컨트롤) */
  .topbar > button {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    padding: 7px 12px; border-radius: var(--radius-pill);
    cursor: pointer; color: var(--color-text);
    display: inline-flex; align-items: center; gap: 6px;
    transition: background .14s ease, border-color .14s ease, color .14s ease, transform .12s ease;
  }
  .topbar > button:hover { border-color: var(--color-border-strong); background: var(--color-surface-2); }
  .topbar > button:active { transform: translateY(1px); }
  .topbar > button[aria-pressed="true"] {
    background: var(--color-primary-subtle);
    border-color: var(--color-primary);
    color: var(--color-text); font-weight: 600;
  }
  .topbar > button[aria-expanded="true"] { border-color: var(--color-primary); background: var(--color-surface-2); }
  .topbar > button.scope { color: var(--color-text-muted); }

  .dropdown {
    position: absolute; right: 16px; top: 54px; z-index: 40;
    background: var(--color-overlay); border: 1px solid var(--color-border);
    border-radius: var(--radius-md); padding: 8px; min-width: 252px;
    box-shadow: var(--shadow-pop);
    display: flex; flex-direction: column; gap: 3px;
    color: var(--color-text);
  }
  .dropdown .di { padding: 7px 10px; font-size: 13px; border-radius: var(--radius-sm); color: var(--color-text); }
  .dropdown .di b { color: var(--color-text); }
  .dropdown .navitem.scope {
    color: var(--color-text-muted); border-radius: var(--radius-sm);
  }
  .dropdown .navitem.scope:hover { background: var(--color-surface); color: var(--color-text); }

  /* ── 보드 헤더 ─────────────────────────────────────────────── */
  .boardhead { padding: 18px 18px 4px; }
  .boardhead h1 {
    font-size: 26px; font-weight: 760; letter-spacing: -.02em;
    display: flex; align-items: center; gap: 10px; color: var(--color-text);
  }
  .boardhead h1 .col-count {
    font-size: 13px; font-weight: 650;
  }

  /* ── 뷰어 안내 ─────────────────────────────────────────────── */
  .viewer-note {
    padding: 9px 18px;
    background: var(--color-primary-subtle);
    color: var(--color-text);
    border-bottom: 1px solid var(--color-border);
    font-size: 13px; font-weight: 550;
    display: flex; align-items: center; gap: 8px;
  }
  .viewer-note::before { content: "🔒"; }

  /* ── 필터바 ────────────────────────────────────────────────── */
  .filterbar {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 18px; border-bottom: 1px solid var(--color-border);
    background: var(--color-bg); flex-wrap: wrap;
  }
  .filterbar .group { display: flex; align-items: center; gap: 5px; }
  .filterbar .sep { width: 1px; height: 22px; background: var(--color-border); margin: 0 4px; }

  /* 필터바·메뉴 일반 버튼(라벨/마감/내카드/필터해제/이동/배정/타임라인) */
  .filterbar button:not(.avatar),
  .menu button, .addrow button, .assign-opts button, .group button,
  .commentbox button, .phead button {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    padding: 5px 11px; border-radius: var(--radius-pill);
    cursor: pointer; color: var(--color-text); font-size: 12.5px;
    transition: background .14s ease, border-color .14s ease, color .14s ease, transform .1s ease;
  }
  .filterbar button:not(.avatar):hover,
  .menu button:hover, .addrow button:hover, .assign-opts button:hover,
  .group button:hover, .commentbox button:hover, .phead button:hover {
    border-color: var(--color-border-strong); background: var(--color-surface-2);
  }
  .filterbar button:not(.avatar):active,
  .group button:active { transform: translateY(1px); }
  .filterbar button[aria-pressed="true"],
  .group button[aria-pressed="true"] {
    background: var(--color-primary-subtle);
    border-color: var(--color-primary);
    color: var(--color-text); font-weight: 650;
    box-shadow: var(--ring-accent);
  }
  /* 필터 해제 = 강조 액션 */
  .filterbar button[data-act="clearf"] {
    background: var(--color-primary); color: var(--color-on-primary);
    border-color: var(--color-primary); font-weight: 600;
  }
  .filterbar button[data-act="clearf"]:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }

  /* 아바타 — 컬러 아바타(브랜드 그라데이션) */
  .avatar {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 26px; height: 26px; padding: 0 6px;
    background: var(--gradient-brand); color: #fff;
    border: none; border-radius: var(--radius-pill);
    font-size: 11px; font-weight: 650; letter-spacing: .02em;
  }
  /* 필터바의 아바타는 클릭 가능 버튼 */
  button.avatar {
    cursor: pointer;
    transition: transform .12s ease, box-shadow .14s ease, filter .14s ease;
  }
  button.avatar:hover { filter: brightness(1.08); transform: translateY(-1px); }
  button.avatar[aria-pressed="true"] {
    box-shadow: var(--ring-accent), 0 0 0 2px var(--color-bg);
    transform: translateY(-1px);
  }
  .avatar.unassigned {
    background: transparent; color: var(--color-text-muted);
    border: 1px dashed var(--color-border-strong); border-radius: var(--radius-md);
    font-weight: 550;
  }
  .filterbar .group .avatar[aria-label="외 1명"] {
    background: var(--color-surface-2); color: var(--color-text-muted);
    border: 1px solid var(--color-border);
  }

  /* ── 보드 래퍼 — 컬럼영역만 가로 스크롤 ───────────────────── */
  .boardwrap { overflow-x: auto; overflow-y: hidden; padding: 16px 18px 22px; flex: 1; min-height: 0; }
  .boardwrap::-webkit-scrollbar { height: 10px; }
  .boardwrap::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: var(--radius-pill); border: 3px solid var(--color-bg); }
  .board { display: flex; gap: 14px; align-items: flex-start; min-height: 56vh; }

  .col {
    flex: 1 1 0; min-width: 248px; max-width: 320px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-surface);
    display: flex; flex-direction: column;
    max-height: 74vh;
    transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
  }
  .col.drop-target {
    border-color: var(--color-drop-target);
    background: var(--color-primary-subtle);
    box-shadow: var(--ring-accent);
  }
  .col-head {
    display: flex; align-items: center; gap: 8px;
    padding: 11px 13px; border-bottom: 1px solid var(--color-border);
  }
  .col-head h2 { flex: 1; }
  .col-count {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 20px; padding: 0 7px;
    background: var(--color-surface-2);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-pill);
    font-size: 11px; font-weight: 650; color: var(--color-text-muted);
  }

  .cards {
    list-style: none; margin: 0; padding: 10px;
    display: flex; flex-direction: column; gap: 10px;
    overflow-y: auto;
  }
  .cards::-webkit-scrollbar { width: 8px; }
  .cards::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: var(--radius-pill); border: 2px solid var(--color-surface); }

  .card {
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-bg);
    padding: 11px 12px;
    box-shadow: var(--shadow-card);
    transition: box-shadow .18s ease, transform .14s ease, border-color .16s ease;
    cursor: grab;
  }
  .card:hover {
    box-shadow: var(--shadow-bold);
    transform: translateY(-2px);
    border-color: var(--color-border-strong);
  }
  .card.dragging {
    opacity: .55; border-style: dashed; cursor: grabbing;
    box-shadow: none; transform: none;
  }
  .card-title {
    display: block; text-align: left; width: 100%;
    border: 0; padding: 0; background: transparent; cursor: pointer;
    font-weight: 640; font-size: 13.5px; line-height: 1.35; color: var(--color-text);
    letter-spacing: -.005em;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-title:hover { color: var(--color-primary); }
  .card-meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-top: 9px; color: var(--color-text-muted); font-size: 12px; }

  /* 칩 기본(댓글 수 등 중립) */
  .chip {
    border: 1px solid var(--color-border);
    background: var(--color-surface);
    color: var(--color-text-muted);
    border-radius: var(--radius-pill);
    padding: 2px 9px; font-size: 11px; font-weight: 550;
    white-space: nowrap;
  }
  /* 라벨칩 풀컬러(흰 텍스트, 토큰 보정값으로 AA) — aria-label로 라벨명 매칭 */
  .chip[aria-label^="라벨: 버그"]   { background: var(--label-bug);      border-color: var(--label-bug);      color: #fff; }
  .chip[aria-label^="라벨: 기능"]   { background: var(--label-feature);  border-color: var(--label-feature);  color: #fff; }
  .chip[aria-label^="라벨: 디자인"] { background: var(--label-design);   border-color: var(--label-design);   color: #fff; }
  .chip[aria-label^="라벨: 문서"]   { background: var(--label-docs);     border-color: var(--label-docs);     color: #fff; }
  .chip[aria-label^="라벨: 긴급"]   { background: var(--label-urgent);   border-color: var(--label-urgent);   color: #fff; }
  .chip[aria-label^="라벨: 리서치"] { background: var(--label-research); border-color: var(--label-research); color: #fff; }
  .chip.due { background: var(--color-surface-2); color: var(--color-text); border-color: var(--color-border-strong); font-weight: 600; }
  .chip.due.overdue {
    background: var(--color-danger); border-color: var(--color-danger);
    color: #fff; font-weight: 700;
  }

  .card-foot { display: flex; align-items: center; gap: 6px; margin-top: 9px; }
  .card-foot button {
    background: transparent; border: 1px solid var(--color-border);
    border-radius: var(--radius-pill); padding: 3px 10px; font-size: 12px;
    cursor: pointer; color: var(--color-text-muted);
    transition: background .14s ease, color .14s ease, border-color .14s ease;
  }
  .card-foot button:hover { background: var(--color-surface-2); color: var(--color-text); border-color: var(--color-border-strong); }
  .card-foot button[aria-expanded="true"] { background: var(--color-primary-subtle); border-color: var(--color-primary); color: var(--color-text); }

  .menu {
    margin-top: 9px; border: 1px solid var(--color-border);
    border-radius: var(--radius-md); padding: 7px;
    display: flex; flex-direction: column; gap: 4px;
    background: var(--color-surface); box-shadow: var(--shadow-card);
  }
  .menu button { text-align: left; }

  .addrow { padding: 10px; border-top: 1px solid var(--color-border); display: flex; flex-direction: column; gap: 7px; }
  .addrow .addform { display: flex; gap: 7px; }
  .addrow input[type=text] {
    font: inherit; color: var(--color-text); background: var(--color-bg);
    border: 1px solid var(--color-border); padding: 7px 10px;
    border-radius: var(--radius-md); width: 100%; flex: 1;
  }
  .addrow input[type=text]::placeholder { color: var(--color-text-subtle); }
  .addrow input[type=text]:focus { outline: none; border-color: var(--color-focus); box-shadow: var(--ring-accent); }
  /* + 카드 추가 = 점선 대시 버튼 느낌 */
  .addrow button[data-act="add-toggle"] {
    width: 100%; text-align: left;
    border-style: dashed; color: var(--color-text-muted);
    background: transparent;
  }
  .addrow button[data-act="add-toggle"]:hover { color: var(--color-primary); border-color: var(--color-primary); background: var(--color-primary-subtle); }
  .addrow button[data-act="add-confirm"] {
    background: var(--color-primary); color: var(--color-on-primary);
    border-color: var(--color-primary); font-weight: 600; white-space: nowrap;
  }
  .addrow button[data-act="add-confirm"]:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }

  .drop-empty { font-size: 12.5px; }

  .board-empty {
    padding: 56px 16px; text-align: center; color: var(--color-text-muted);
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    font-size: 14px;
  }
  .board-empty button {
    background: var(--color-primary); color: var(--color-on-primary);
    border: 1px solid var(--color-primary); border-radius: var(--radius-pill);
    padding: 8px 18px; font: inherit; font-weight: 600; cursor: pointer;
    transition: background .14s ease;
  }
  .board-empty button:hover { background: var(--color-primary-hover); }

  /* ── 상세 모달 ─────────────────────────────────────────────── */
  .overlay {
    position: fixed; inset: 0; background: var(--color-scrim);
    display: flex; justify-content: center; align-items: flex-start;
    padding: 6vh 16px; z-index: 100;
    backdrop-filter: blur(2px);
    animation: fade .18s ease;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop { from { opacity: 0; transform: translateY(10px) scale(.985); } to { opacity: 1; transform: none; } }
  .panel {
    background: var(--color-overlay);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    width: 580px; max-width: 100%; max-height: 88vh; overflow: auto;
    padding: 22px; color: var(--color-text);
    box-shadow: var(--shadow-pop);
    animation: pop .2s cubic-bezier(.2,.7,.3,1);
  }
  .panel::-webkit-scrollbar { width: 9px; }
  .panel::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: var(--radius-pill); border: 2px solid var(--color-overlay); }
  .panel .phead { display: flex; align-items: flex-start; gap: 10px; }
  .panel .phead h2 { font-size: 19px; font-weight: 720; letter-spacing: -.015em; line-height: 1.3; }
  .panel .phead .spacer { flex: 1; }
  .panel .phead button { white-space: nowrap; }
  .field { margin-top: 16px; }
  .field .lbl {
    color: var(--color-text-subtle); font-size: 11px; font-weight: 650;
    letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px;
  }
  .field > div:not(.lbl) { line-height: 1.6; }
  .field .chip { margin-right: 2px; }
  .assign-opts { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
  .field button[data-act="assign-change"] {
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: var(--radius-pill); padding: 3px 11px; font-size: 12px;
    cursor: pointer; color: var(--color-text);
    transition: background .14s ease, border-color .14s ease;
  }
  .field button[data-act="assign-change"]:hover { background: var(--color-surface-2); border-color: var(--color-border-strong); }
  .field button[data-act="assign-change"][aria-expanded="true"] { background: var(--color-primary-subtle); border-color: var(--color-primary); }

  .timeline { list-style: none; margin: 10px 0 0; padding: 0; display: flex; flex-direction: column; gap: 9px; }
  .tl-item {
    border: 1px solid var(--color-border); border-radius: var(--radius-md);
    padding: 9px 12px; background: var(--color-surface); position: relative;
  }
  .tl-item.comment { border-left: 3px solid var(--color-primary); }
  .tl-item.activity { border-style: dashed; color: var(--color-text-muted); background: transparent; }
  .tl-meta { font-size: 11px; color: var(--color-text-subtle); margin-bottom: 3px; }
  .tl-meta + div { line-height: 1.5; }
  .mention {
    background: var(--color-primary-subtle); color: var(--color-text);
    border-radius: var(--radius-sm); padding: 0 5px; font-weight: 650;
  }

  .commentbox { margin-top: 14px; display: flex; gap: 8px; align-items: stretch; }
  .commentbox input[type=text] {
    flex: 1; font: inherit; color: var(--color-text); background: var(--color-bg);
    border: 1px solid var(--color-border); padding: 9px 12px; border-radius: var(--radius-pill); width: 100%;
  }
  .commentbox input[type=text]::placeholder { color: var(--color-text-subtle); }
  .commentbox input[type=text]:focus { outline: none; border-color: var(--color-focus); box-shadow: var(--ring-accent); }
  .commentbox button[data-act="comment"] {
    background: var(--color-primary); color: var(--color-on-primary);
    border-color: var(--color-primary); font-weight: 600; white-space: nowrap; padding: 8px 16px;
  }
  .commentbox button[data-act="comment"]:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }
  /* 모달 안의 뷰어 안내(댓글 자리 대체) — solid 표면 위 */
  .panel .viewer-note {
    margin-top: 14px; padding: 11px 14px;
    border: 1px solid var(--color-border); border-radius: var(--radius-md);
    background: var(--color-surface); color: var(--color-text-muted);
  }
  .panel .viewer-note::before { content: "🔒"; }

  /* ── 반응: 1440 무파손 / 좁아지면 컬럼영역만 스크롤 ───────── */
  @media (max-width: 1100px) {
    .col { min-width: 240px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";
// ── 결정성: "오늘"을 고정(현재일 2026-06-26 기준). 목업 데이터.
var TODAY = "2026-06-26";
var KEY_THEME = "ck-theme";

// ── 시드 데이터 ──────────────────────────────────────────────
var CUR = "m1"; // 현재 사용자(내 카드)
var members = {
  m1:{id:"m1",name:"김지원",ini:"JW"}, m2:{id:"m2",name:"박서연",ini:"SY"},
  m3:{id:"m3",name:"이도현",ini:"DH"}, m4:{id:"m4",name:"최민준",ini:"MJ"},
  m5:{id:"m5",name:"정하늘",ini:"HN"}
};
var labels = {
  l1:{id:"l1",name:"버그"}, l2:{id:"l2",name:"기능"}, l3:{id:"l3",name:"디자인"},
  l4:{id:"l4",name:"문서"}, l5:{id:"l5",name:"긴급"}, l6:{id:"l6",name:"리서치"}
};
var columns = [
  {id:"c1",name:"백로그"}, {id:"c2",name:"할 일"}, {id:"c3",name:"진행 중"},
  {id:"c4",name:"검토"}, {id:"c5",name:"완료"}
];
function mkComments(n){ var a=[]; for(var i=0;i<n;i++){ a.push({author:"m"+((i%4)+2),text:"검토 의견 "+(i+1)+"입니다.",ts:"2026-06-2"+(i%9)}); } return a; }
var cards = [
  {id:"k1",title:"온보딩 플로우 개선 — 신규 사용자 첫 화면 단계 축소 및 안내 문구 전면 재작성",col:"c1",assignee:"m1",labels:["l2"],due:null,desc:"신규 가입 후 첫 화면의 단계를 줄이고 안내 문구를 다시 쓴다.",
   comments:mkComments(2),activity:[{type:"created",actor:"m1",ts:"2026-06-18"}],pos:1},
  {id:"k2",title:"결제 오류 수정",col:"c1",assignee:null,labels:["l1","l5"],due:"2026-06-20",desc:"특정 카드사 결제 실패 케이스를 수정한다.",
   comments:mkComments(1),activity:[{type:"created",actor:"m3",ts:"2026-06-15"}],pos:2},
  {id:"k3",title:"대시보드 차트 추가",col:"c2",assignee:"m2",labels:["l2"],due:"2026-06-30",desc:"주간 지표 차트를 대시보드에 추가한다.",
   comments:mkComments(0),activity:[{type:"created",actor:"m2",ts:"2026-06-21"}],pos:1},
  {id:"k4",title:"API 문서 작성",col:"c2",assignee:"m3",labels:["l4"],due:null,desc:"공개 API 레퍼런스 문서를 작성한다.",
   comments:mkComments(3),activity:[{type:"created",actor:"m3",ts:"2026-06-19"}],pos:2},
  {id:"k5",title:"로그인 화면 리디자인",col:"c3",assignee:"m4",labels:["l3"],due:"2026-06-28",desc:"로그인 화면을 미니멀 톤으로 다시 디자인한다.",
   comments:mkComments(5),activity:[{type:"created",actor:"m4",ts:"2026-06-17"},{type:"moved",actor:"m4",to:"진행 중",ts:"2026-06-22"}],pos:1},
  {id:"k6",title:"회원가입 버그 픽스",col:"c5",assignee:"m5",labels:["l1"],due:null,dueComplete:true,desc:"회원가입 단계의 검증 버그를 고친다.",
   comments:mkComments(1),activity:[{type:"created",actor:"m5",ts:"2026-06-10"},{type:"moved",actor:"m5",to:"완료",ts:"2026-06-23"}],pos:1}
];

// ── UI 상태(비영속 — 테마만 localStorage) ───────────────────
var ui = {
  role:"editor",          // editor | viewer
  fMembers:{}, myCards:false, fLabels:{}, fDue:null,
  openMenu:null, addingCol:null,
  openCard:null, assigning:false, tlFilter:"all",
  openDropdown:null   // 'notif' | 'user' | null (탑바 드롭다운)
};

// ── 헬퍼 ────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"})[c];}); }
function colName(id){ for(var i=0;i<columns.length;i++) if(columns[i].id===id) return columns[i].name; return ""; }
function daysBetween(a,b){ return Math.round((Date.parse(b)-Date.parse(a))/86400000); }
function isOverdue(c){ return c.due && !c.dueComplete && daysBetween(c.due,TODAY)>0; }
function dueMatch(c,kind){
  if(!c.due) return false;
  if(kind==="today") return c.due===TODAY;
  if(kind==="overdue") return isOverdue(c);
  if(kind==="week"){ var d=daysBetween(TODAY,c.due); return d>=0 && d<=6; }
  return true;
}
function anyFilter(){ return Object.keys(ui.fMembers).length||ui.myCards||Object.keys(ui.fLabels).length||ui.fDue; }
function cardVisible(c){
  var mem=Object.keys(ui.fMembers); if(ui.myCards && mem.indexOf(CUR)<0) mem=mem.concat(CUR);
  if(mem.length && (!c.assignee || mem.indexOf(c.assignee)<0)) return false;
  var lab=Object.keys(ui.fLabels);
  if(lab.length && !c.labels.some(function(l){return lab.indexOf(l)>=0;})) return false;
  if(ui.fDue && !dueMatch(c,ui.fDue)) return false;
  return true;
}
function visibleCards(){ return cards.filter(cardVisible); }

// ── 렌더 ────────────────────────────────────────────────────
function avatarHTML(mid){
  if(!mid) return '<span class="avatar unassigned" aria-label="미배정">미배정</span>';
  var m=members[mid]; return '<span class="avatar" aria-label="담당자: '+esc(m.name)+'">'+esc(m.ini)+'</span>';
}
function cardHTML(c){
  var editor = ui.role==="editor";
  var labelsHtml = c.labels.slice(0,2).map(function(l){
    return '<span class="chip" aria-label="라벨: '+esc(labels[l].name)+'">'+esc(labels[l].name)+'</span>';
  }).join("");
  var dueHtml = "";
  if(c.due){
    var od=isOverdue(c);
    dueHtml='<span class="chip due'+(od?" overdue":"")+'" aria-label="마감일'+(od?" 지남":"")+': '+c.due+'">'+(od?"지남 ":"")+c.due+'</span>';
  }
  var menuHtml="";
  if(editor && ui.openMenu===c.id){
    menuHtml='<div class="menu" role="menu">'+columns.filter(function(col){return col.id!==c.col;}).map(function(col){
      return '<button type="button" role="menuitem" data-act="move" data-id="'+c.id+'" data-col="'+col.id+'" aria-label="'+esc(col.name)+'(으)로 이동">'+esc(col.name)+'(으)로 이동</button>';
    }).join("")+'</div>';
  }
  return '<li class="card" role="listitem" draggable="'+(editor?"true":"false")+'" data-id="'+c.id+'">'+
    '<button type="button" class="card-title" data-act="open" data-id="'+c.id+'" aria-label="카드 열기: '+esc(c.title)+'">'+esc(c.title)+'</button>'+
    '<div class="card-meta">'+avatarHTML(c.assignee)+labelsHtml+dueHtml+
      '<span class="chip" aria-label="댓글 '+c.comments.length+'개">댓글 '+c.comments.length+'</span>'+
    '</div>'+
    (editor?'<div class="card-foot"><button type="button" data-act="menu" data-id="'+c.id+'" aria-haspopup="true" aria-expanded="'+(ui.openMenu===c.id?"true":"false")+'" aria-label="카드 메뉴: '+esc(c.title)+'">⋮ 이동</button></div>':"")+
    menuHtml+
  '</li>';
}
function columnHTML(col){
  var editor = ui.role==="editor";
  var cs = visibleCards().filter(function(c){return c.col===col.id;});
  var cardsHtml = cs.map(cardHTML).join("");
  var emptyDrop = cs.length===0 ? '<div class="drop-empty" style="border:1px dashed var(--color-border-strong);border-radius:var(--radius-md);color:var(--color-text-muted);text-align:center;padding:14px 8px;margin:0 10px 10px">여기에 카드를 놓기</div>' : "";
  var add="";
  if(editor){
    add = '<div class="addrow">'+
      (ui.addingCol===col.id
        ? '<div class="addform"><input type="text" aria-label="새 카드 제목: '+esc(col.name)+'" data-col="'+col.id+'" placeholder="카드 제목"><button type="button" data-act="add-confirm" data-col="'+col.id+'" aria-label="추가 확정: '+esc(col.name)+'">추가</button></div>'
        : '<button type="button" data-act="add-toggle" data-col="'+col.id+'" aria-expanded="false" aria-label="카드 추가: '+esc(col.name)+'">+ 카드 추가</button>')+
    '</div>';
  }
  return '<section class="col" aria-label="'+esc(col.name)+'" data-col="'+col.id+'">'+
    '<div class="col-head"><h2>'+esc(col.name)+'</h2><span class="col-count" aria-label="카드 '+cs.length+'개">'+cs.length+'</span></div>'+
    '<ul class="cards" data-col="'+col.id+'">'+cardsHtml+'</ul>'+emptyDrop+
    add+
  '</section>';
}
function filterbarHTML(){
  var avs = ["m1","m2","m3","m4"].map(function(mid){
    return '<button type="button" class="avatar" data-act="fmember" data-id="'+mid+'" aria-pressed="'+(ui.fMembers[mid]?"true":"false")+'" aria-label="담당자 필터: '+esc(members[mid].name)+'">'+esc(members[mid].ini)+'</button>';
  }).join("");
  var labs = Object.keys(labels).map(function(lid){
    return '<button type="button" data-act="flabel" data-id="'+lid+'" aria-pressed="'+(ui.fLabels[lid]?"true":"false")+'" aria-label="라벨 필터: '+esc(labels[lid].name)+'">'+esc(labels[lid].name)+'</button>';
  }).join("");
  var dues = [["today","오늘"],["week","이번주"],["overdue","지남"]].map(function(d){
    return '<button type="button" data-act="fdue" data-id="'+d[0]+'" aria-pressed="'+(ui.fDue===d[0]?"true":"false")+'" aria-label="마감 필터: '+d[1]+'">'+d[1]+'</button>';
  }).join("");
  return '<div class="filterbar">'+
    '<div class="group">'+avs+'<span class="avatar" aria-label="외 1명">+1</span></div>'+
    '<button type="button" data-act="mycards" aria-pressed="'+(ui.myCards?"true":"false")+'" aria-label="내 카드만">내 카드만</button>'+
    '<span class="sep"></span><div class="group">'+labs+'</div>'+
    '<span class="sep"></span><div class="group">'+dues+'</div>'+
    (anyFilter()?'<span class="sep"></span><button type="button" data-act="clearf" aria-label="필터 해제">필터 해제</button>':"")+
  '</div>';
}
function detailHTML(){
  if(!ui.openCard) return "";
  var c=null; for(var i=0;i<cards.length;i++) if(cards[i].id===ui.openCard) c=cards[i];
  if(!c) return "";
  var editor=ui.role==="editor";
  // 타임라인 = 댓글 + 활동 병합, 시간 역순
  var items=[];
  c.comments.forEach(function(cm){ items.push({kind:"comment",ts:cm.ts,author:cm.author,text:cm.text}); });
  c.activity.forEach(function(a){ items.push({kind:"activity",ts:a.ts,a:a}); });
  items.sort(function(x,y){ return (y.ts||"").localeCompare(x.ts||""); });
  var tl=items.filter(function(it){ return ui.tlFilter==="all" || (ui.tlFilter==="comments"&&it.kind==="comment") || (ui.tlFilter==="activity"&&it.kind==="activity"); });
  function mentionize(t){ return esc(t).replace(/@(\S+)/g,'<span class="mention">@$1</span>'); }
  function actSentence(a){
    var who=members[a.actor]?members[a.actor].name:"누군가";
    if(a.type==="moved") return esc(who)+' 님이 '+esc(a.to)+'(으)로 이동함';
    if(a.type==="assigned") return esc(who)+' 님이 '+esc(members[a.to]?members[a.to].name:"")+'에게 배정함';
    if(a.type==="created") return esc(who)+' 님이 카드를 생성함';
    return esc(who)+' 님이 변경함';
  }
  var tlHtml=tl.map(function(it){
    if(it.kind==="comment"){
      var nm=members[it.author]?members[it.author].name:"멤버";
      return '<li class="tl-item comment"><div class="tl-meta">'+esc(nm)+' · '+esc(it.ts)+'</div><div>'+mentionize(it.text)+'</div></li>';
    }
    return '<li class="tl-item activity"><div class="tl-meta">'+esc(it.ts)+'</div><div>'+actSentence(it.a)+'</div></li>';
  }).join("");

  var assignOpts="";
  if(editor && ui.assigning){
    assignOpts='<div class="assign-opts">'+Object.keys(members).map(function(mid){
      return '<button type="button" data-act="assign" data-id="'+mid+'" aria-label="담당자 지정: '+esc(members[mid].name)+'">'+esc(members[mid].name)+'</button>';
    }).join("")+'<button type="button" data-act="assign" data-id="" aria-label="담당자 지정: 미배정">미배정</button></div>';
  }
  var tlf=[["all","전체"],["comments","댓글"],["activity","활동"]].map(function(d){
    return '<button type="button" data-act="tlf" data-id="'+d[0]+'" aria-pressed="'+(ui.tlFilter===d[0]?"true":"false")+'" aria-label="타임라인 필터: '+d[1]+'">'+d[1]+'</button>';
  }).join("");

  return '<div class="overlay" data-act="overlay"><div class="panel" role="dialog" aria-modal="true" aria-label="'+esc(c.title)+'">'+
    '<div class="phead"><h2>'+esc(c.title)+'</h2><span class="spacer"></span>'+
      '<button type="button" data-act="close" aria-label="상세 닫기">닫기 ✕</button></div>'+
    '<div class="field"><div class="lbl">설명</div><div>'+esc(c.desc)+'</div></div>'+
    '<div class="field"><div class="lbl">담당자</div><div>'+avatarHTML(c.assignee)+' '+(c.assignee?esc(members[c.assignee].name):"미배정")+
      (editor?' <button type="button" data-act="assign-change" aria-expanded="'+(ui.assigning?"true":"false")+'" aria-label="담당자 변경">변경</button>':"")+assignOpts+'</div></div>'+
    '<div class="field"><div class="lbl">라벨·마감</div><div>'+
      c.labels.map(function(l){return '<span class="chip" aria-label="라벨: '+esc(labels[l].name)+'">'+esc(labels[l].name)+'</span> ';}).join("")+
      (c.due?'<span class="chip due'+(isOverdue(c)?" overdue":"")+'" aria-label="마감일'+(isOverdue(c)?" 지남":"")+': '+c.due+'">'+c.due+'</span>':'<span class="tl-meta">마감 없음</span>')+'</div></div>'+
    '<div class="field"><div class="lbl">타임라인</div><div class="group">'+tlf+'</div>'+
      '<ul class="timeline">'+(tlHtml||'<li class="tl-meta">표시할 항목이 없습니다.</li>')+'</ul></div>'+
    (editor
      ? '<div class="commentbox"><input type="text" aria-label="댓글 입력" id="cmt" placeholder="@멘션으로 댓글 남기기"><button type="button" data-act="comment" aria-label="댓글 작성">댓글 작성</button></div>'
      : '<div class="viewer-note">읽기 전용 — 댓글을 남길 수 없습니다.</div>')+
  '</div></div>';
}
// ── 앱 셸(사이드바·탑바·드롭다운) ────────────────────────────
function sidebarHTML(active){
  function item(key,href,icon,label){
    if(active===key) return '<span class="navitem" aria-current="page">'+icon+' '+label+'</span>';
    return '<a class="navitem" href="'+href+'" aria-label="'+label+'">'+icon+' '+label+'</a>';
  }
  return '<aside class="sidebar">'+
    '<div class="brand">▣ collab-kanban</div>'+
    '<nav aria-label="주요">'+
      item("home","index.html","🏠","홈")+
      item("board","board.html","📋","보드")+
      (active==="board"?'<span class="navitem sub" aria-current="page">▸ 제품</span>':'<a class="navitem sub" href="board.html" aria-label="제품 보드">▸ 제품</a>')+
      '<button type="button" class="navitem scope" data-scope="out" aria-label="멤버 [범위 밖]">👥 멤버</button>'+
      '<button type="button" class="navitem scope" data-scope="out" aria-label="설정 [범위 밖]">⚙ 설정</button>'+
    '</nav>'+
  '</aside>';
}
function dropdownHTML(){
  if(ui.openDropdown==="notif") return '<div class="dropdown" role="menu" aria-label="알림">'+
    '<div class="di">박서연 님이 <b>회원가입 버그 픽스</b>에 댓글</div>'+
    '<div class="di">최민준 님이 <b>로그인 화면 리디자인</b>을 진행 중으로 이동</div>'+
    '<div class="di">이도현 님이 <b>API 문서 작성</b>에 멘션</div></div>';
  if(ui.openDropdown==="user") return '<div class="dropdown" role="menu" aria-label="사용자 메뉴">'+
    '<div class="di"><b>김지원</b> (나)</div>'+
    '<button type="button" class="navitem scope" data-scope="out" aria-label="프로필 [범위 밖]">프로필</button>'+
    '<button type="button" class="navitem scope" data-scope="out" aria-label="로그아웃 [범위 밖]">로그아웃</button></div>';
  return "";
}
function topbarHTML(showRole){
  var dark=document.documentElement.getAttribute("data-theme")==="dark";
  return '<header class="topbar">'+
    '<input type="text" class="search" aria-label="검색" placeholder="카드·보드 검색">'+
    '<button type="button" class="scope" data-scope="out" aria-label="새로 만들기 [범위 밖]">+ 새로</button>'+
    '<span class="tspacer"></span>'+
    '<button type="button" data-act="dropdown" data-id="notif" aria-haspopup="true" aria-expanded="'+(ui.openDropdown==="notif"?"true":"false")+'" aria-label="알림">🔔</button>'+
    (showRole?'<button type="button" data-act="role" aria-pressed="'+(ui.role==="viewer"?"true":"false")+'" aria-label="역할 전환">역할: '+(ui.role==="viewer"?"뷰어":"편집자")+'</button>':"")+
    '<button type="button" data-act="theme" aria-pressed="'+(dark?"true":"false")+'" aria-label="테마 전환">테마: '+(dark?"다크":"라이트")+'</button>'+
    '<button type="button" data-act="dropdown" data-id="user" aria-haspopup="true" aria-expanded="'+(ui.openDropdown==="user"?"true":"false")+'" aria-label="사용자 메뉴"><span class="avatar">'+esc(members[CUR].ini)+'</span></button>'+
    dropdownHTML()+
  '</header>';
}
function render(){
  var boardArea=
    (ui.role==="viewer"?'<div class="viewer-note" role="status">읽기 전용 — 보기만 가능합니다.</div>':"")+
    filterbarHTML()+
    '<div class="boardwrap">'+
      (visibleCards().length===0
        ? '<div class="board-empty" role="status">조건에 맞는 카드가 없습니다. <button type="button" data-act="clearf" aria-label="필터 해제">필터 해제</button></div>'
        : '<div class="board">'+columns.map(columnHTML).join("")+'</div>')+
    '</div>';
  var html='<div class="shell">'+
    sidebarHTML("board")+
    '<div class="mainpane">'+
      topbarHTML(true)+
      '<div class="boardhead"><h1>제품 보드 <span class="col-count" aria-label="카드 총 '+cards.length+'개">'+cards.length+'</span></h1></div>'+
      boardArea+
    '</div>'+
  '</div>'+
  detailHTML();
  document.getElementById("app").innerHTML=html;
  // 포커스 보조
  if(ui.addingCol){ var ai=document.querySelector('input[aria-label="새 카드 제목: '+colName(ui.addingCol)+'"]'); if(ai) ai.focus(); }
  attachDnD();
}

// ── 액션 ────────────────────────────────────────────────────
function findCard(id){ for(var i=0;i<cards.length;i++) if(cards[i].id===id) return cards[i]; return null; }
function moveCard(id,toCol){
  var c=findCard(id); if(!c||c.col===toCol) return;
  c.col=toCol; c.activity.push({type:"moved",actor:CUR,to:colName(toCol),ts:TODAY});
  ui.openMenu=null; render();
}
function addCard(colId,title){
  title=(title||"").trim(); if(!title) return false;
  var id="k"+(cards.length+1)+"_"+Date.parse(TODAY);
  cards.push({id:id,title:title,col:colId,assignee:null,labels:[],due:null,desc:"",comments:[],activity:[{type:"created",actor:CUR,ts:TODAY}],pos:99});
  ui.addingCol=null; render(); return true;
}
function addComment(text){
  text=(text||"").trim(); if(!text||!ui.openCard) return false;
  var c=findCard(ui.openCard); c.comments.push({author:CUR,text:text,ts:TODAY}); render(); return true;
}

document.addEventListener("click",function(e){
  var t=e.target.closest("[data-act]"); if(!t) return;
  var act=t.getAttribute("data-act"), id=t.getAttribute("data-id"), col=t.getAttribute("data-col");
  if(act!=="dropdown" && ui.openDropdown){ ui.openDropdown=null; } // 다른 동작 시 드롭다운 닫힘
  switch(act){
    case "dropdown": ui.openDropdown = ui.openDropdown===id ? null : id; render(); break;
    case "theme":{ var cur=document.documentElement.getAttribute("data-theme"); var nx=cur==="dark"?"light":"dark";
      document.documentElement.setAttribute("data-theme",nx); localStorage.setItem(KEY_THEME,nx); render(); break; }
    case "role": ui.role=ui.role==="editor"?"viewer":"editor"; ui.openMenu=null; ui.addingCol=null; if(ui.role==="viewer"){ui.assigning=false;} render(); break;
    case "fmember": if(ui.fMembers[id]) delete ui.fMembers[id]; else ui.fMembers[id]=true; render(); break;
    case "mycards": ui.myCards=!ui.myCards; render(); break;
    case "flabel": if(ui.fLabels[id]) delete ui.fLabels[id]; else ui.fLabels[id]=true; render(); break;
    case "fdue": ui.fDue = ui.fDue===id ? null : id; render(); break;
    case "clearf": ui.fMembers={}; ui.fLabels={}; ui.myCards=false; ui.fDue=null; render(); break;
    case "menu": ui.openMenu = ui.openMenu===id ? null : id; render(); break;
    case "move": moveCard(id,col); break;
    case "add-toggle": ui.addingCol=col; render(); break;
    case "add-confirm":{ var inp=document.querySelector('input[aria-label="새 카드 제목: '+colName(col)+'"]'); addCard(col, inp?inp.value:""); break; }
    case "open": ui.openCard=id; ui.assigning=false; ui.tlFilter="all"; render(); break;
    case "close": case "overlay": if(act==="overlay" && e.target!==t) break; ui.openCard=null; ui.assigning=false; render(); break;
    case "assign-change": ui.assigning=!ui.assigning; render(); break;
    case "assign":{ var c=findCard(ui.openCard); if(c){ c.assignee=id||null; if(id) c.activity.push({type:"assigned",actor:CUR,to:id,ts:TODAY}); } ui.assigning=false; render(); break; }
    case "tlf": ui.tlFilter=id; render(); break;
    case "comment":{ var box=document.getElementById("cmt"); addComment(box?box.value:""); break; }
  }
});
document.addEventListener("keydown",function(e){
  if(e.key!=="Enter") return;
  var el=e.target;
  if(el.matches&&el.matches('input[aria-label^="새 카드 제목"]')){ e.preventDefault(); var col=el.getAttribute("data-col"); addCard(col,el.value); }
  else if(el.id==="cmt"){ e.preventDefault(); addComment(el.value); }
});

// ── 네이티브 드래그&드롭(시각 상태) ──────────────────────────
function attachDnD(){
  var dragId=null;
  document.querySelectorAll(".card[draggable='true']").forEach(function(card){
    card.addEventListener("dragstart",function(e){ dragId=card.getAttribute("data-id"); card.classList.add("dragging");
      if(e.dataTransfer){ try{ e.dataTransfer.setData("text/plain",dragId);}catch(_){} } });
    card.addEventListener("dragend",function(){ card.classList.remove("dragging"); dragId=null;
      document.querySelectorAll(".col.drop-target").forEach(function(c){c.classList.remove("drop-target");}); });
  });
  document.querySelectorAll(".col").forEach(function(colEl){
    colEl.addEventListener("dragenter",function(e){ e.preventDefault(); colEl.classList.add("drop-target"); });
    colEl.addEventListener("dragover",function(e){ e.preventDefault(); colEl.classList.add("drop-target"); });
    colEl.addEventListener("dragleave",function(e){ if(e.target===colEl) colEl.classList.remove("drop-target"); });
    colEl.addEventListener("drop",function(e){ e.preventDefault(); colEl.classList.remove("drop-target");
      var id=dragId || (e.dataTransfer&&e.dataTransfer.getData("text/plain")); if(id) moveCard(id,colEl.getAttribute("data-col")); });
  });
}

// ── 부트 ────────────────────────────────────────────────────
document.documentElement.setAttribute("data-theme", localStorage.getItem(KEY_THEME)||"light");
render();
</script>
