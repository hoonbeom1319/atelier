<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>collab-kanban — 필터바 / 아바타 스택</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{ font-family:var(--font-sans); background:var(--color-bg); color:var(--color-text); margin:0; padding:var(--space-5); }
  h1{ font-size:18px; } h2{ font-size:13px; color:var(--color-text-muted); margin-top:var(--space-5); }
  .bar{ display:flex; align-items:center; gap:var(--space-2); flex-wrap:wrap; padding:var(--space-3);
        background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-md); }
  .sep{ width:1px; height:22px; background:var(--color-border); margin:0 var(--space-1); }
  .av{ width:26px; height:26px; border-radius:var(--radius-pill); border:2px solid var(--color-surface);
       background:var(--color-surface-2); color:var(--color-text); display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; cursor:pointer; }
  .av[aria-pressed="true"]{ outline:2px solid var(--color-primary); }
  .stack{ display:flex; } .stack .av{ margin-left:-6px; } .stack .av:first-child{ margin-left:0; }
  .more{ width:26px; height:26px; border-radius:var(--radius-pill); background:var(--color-surface-2); color:var(--color-text-muted);
         display:inline-flex; align-items:center; justify-content:center; font-size:10px; margin-left:-6px; border:2px solid var(--color-surface); }
  .pill{ font:inherit; font-size:12px; color:var(--color-text); background:var(--color-bg); border:1px solid var(--color-border);
         border-radius:var(--radius-pill); padding:5px 12px; cursor:pointer; }
  .pill[aria-pressed="true"]{ background:var(--color-primary-subtle); border-color:var(--color-primary); color:var(--color-text); font-weight:600; }
  .seg{ display:inline-flex; border:1px solid var(--color-border); border-radius:var(--radius-sm); overflow:hidden; }
  .seg button{ font:inherit; font-size:12px; color:var(--color-text); background:var(--color-bg); border:0; border-right:1px solid var(--color-border); padding:5px 10px; cursor:pointer; }
  .seg button:last-child{ border-right:0; } .seg button[aria-pressed="true"]{ background:var(--color-primary); color:var(--color-on-primary); font-weight:600; }
</style>
</head>
<body>
  <h1>필터바 — 담당자·라벨·마감 + 내 카드만</h1>

  <h2>전체 필터바 (활성 상태 예시)</h2>
  <div class="bar">
    <div class="stack" role="group" aria-label="담당자 필터">
      <button class="av" aria-pressed="true" aria-label="담당자 필터: 김지원">JW</button>
      <button class="av" aria-pressed="false" aria-label="담당자 필터: 박서연">SY</button>
      <button class="av" aria-pressed="false" aria-label="담당자 필터: 이도현">DH</button>
      <button class="av" aria-pressed="false" aria-label="담당자 필터: 최민준">MJ</button>
      <span class="more" aria-label="외 1명">+1</span>
    </div>
    <button class="pill" aria-pressed="false" aria-label="내 카드만">내 카드만</button>
    <span class="sep"></span>
    <button class="pill" aria-pressed="true" aria-label="라벨 필터: 기능">기능</button>
    <button class="pill" aria-pressed="false" aria-label="라벨 필터: 버그">버그</button>
    <button class="pill" aria-pressed="false" aria-label="라벨 필터: 디자인">디자인</button>
    <span class="sep"></span>
    <div class="seg" role="group" aria-label="마감 필터">
      <button aria-pressed="false" aria-label="마감 필터: 오늘">오늘</button>
      <button aria-pressed="true" aria-label="마감 필터: 이번주">이번주</button>
      <button aria-pressed="false" aria-label="마감 필터: 지남">지남</button>
    </div>
    <span class="sep"></span>
    <button class="pill" aria-label="필터 해제">필터 해제</button>
  </div>

  <h2>아바타 스택 — 오버플로 +N(다중 담당자 확장 대비)</h2>
  <div class="stack">
    <span class="av">JW</span><span class="av">SY</span><span class="av">DH</span><span class="more">+3</span>
  </div>
</body>
</html>
