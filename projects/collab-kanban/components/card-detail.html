<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>collab-kanban — 카드 상세 패널</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{ font-family:var(--font-sans); background:var(--color-scrim); color:var(--color-text); margin:0; padding:5vh var(--space-5); min-height:100vh; }
  .panel{ max-width:560px; margin:0 auto; background:var(--color-overlay); border:1px solid var(--color-border); border-radius:var(--radius-md); box-shadow:var(--shadow-pop); padding:var(--space-4); }
  .phead{ display:flex; align-items:flex-start; gap:var(--space-2); }
  .phead h1{ font-size:16px; margin:0; flex:1; }
  .x{ font:inherit; color:var(--color-text-muted); background:transparent; border:1px solid var(--color-border); border-radius:var(--radius-sm); padding:4px 9px; cursor:pointer; }
  .field{ margin-top:var(--space-4); } .lbl{ font-size:11px; color:var(--color-text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
  .avatar{ width:22px; height:22px; border-radius:var(--radius-pill); background:var(--color-primary); color:var(--color-on-primary); display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; }
  .lchip{ font-size:11px; padding:1px 8px; border-radius:var(--radius-pill); color:#fff; }
  .seg{ display:inline-flex; border:1px solid var(--color-border); border-radius:var(--radius-sm); overflow:hidden; margin-bottom:var(--space-2); }
  .seg button{ font:inherit; font-size:12px; color:var(--color-text); background:var(--color-bg); border:0; border-right:1px solid var(--color-border); padding:4px 12px; cursor:pointer; }
  .seg button:last-child{ border-right:0; } .seg button[aria-pressed="true"]{ background:var(--color-primary); color:var(--color-on-primary); font-weight:600; }
  .tl{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:var(--space-2); }
  .item{ border:1px solid var(--color-border); border-radius:var(--radius-sm); padding:var(--space-2) var(--space-3); font-size:13px; }
  .item.act{ border-style:dashed; color:var(--color-text-muted); background:var(--color-surface); }
  .who{ font-size:11px; color:var(--color-text-muted); margin-bottom:2px; }
  .mention{ color:var(--color-primary); font-weight:600; }
  .box{ display:flex; gap:var(--space-2); margin-top:var(--space-3); }
  .box input{ flex:1; font:inherit; color:var(--color-text); background:var(--color-bg); border:1px solid var(--color-border); border-radius:var(--radius-sm); padding:7px 10px; }
  .box button{ font:inherit; font-weight:600; color:var(--color-on-primary); background:var(--color-primary); border:0; border-radius:var(--radius-sm); padding:7px 14px; cursor:pointer; }
</style>
</head>
<body>
  <div class="panel" role="dialog" aria-modal="true" aria-label="로그인 화면 리디자인">
    <div class="phead"><h1>로그인 화면 리디자인</h1><button class="x" type="button" aria-label="상세 닫기">닫기 ✕</button></div>
    <div class="field"><div class="lbl">설명</div><div>로그인 화면을 미니멀 톤으로 다시 디자인한다.</div></div>
    <div class="field"><div class="lbl">담당자</div><div style="display:flex;align-items:center;gap:8px"><span class="avatar">MJ</span> 최민준 <button class="x" type="button" aria-label="담당자 변경">변경</button></div></div>
    <div class="field"><div class="lbl">라벨 · 마감</div><div><span class="lchip" style="background:var(--label-design)">디자인</span> &nbsp; <span style="font-size:12px;color:var(--color-text-muted)">2026-06-28</span></div></div>
    <div class="field"><div class="lbl">타임라인</div>
      <div class="seg" role="group" aria-label="타임라인 필터">
        <button aria-pressed="true" aria-label="타임라인 필터: 전체">전체</button>
        <button aria-pressed="false" aria-label="타임라인 필터: 댓글">댓글</button>
        <button aria-pressed="false" aria-label="타임라인 필터: 활동">활동</button>
      </div>
      <ul class="tl">
        <li class="item"><div class="who">박서연 · 2026-06-26</div><div><span class="mention">@최민준</span> 시안 확인했어요, 여백 한 단계 더 줄이면 좋겠어요.</div></li>
        <li class="item act"><div class="who">2026-06-22</div><div>최민준 님이 진행 중(으)로 이동함</div></li>
        <li class="item act"><div class="who">2026-06-17</div><div>최민준 님이 카드를 생성함</div></li>
      </ul>
      <div class="box"><input type="text" aria-label="댓글 입력" placeholder="@멘션으로 댓글 남기기"><button type="button" aria-label="댓글 작성">댓글 작성</button></div>
    </div>
  </div>
</body>
</html>
