<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>collab-kanban — 컬럼 컴포넌트</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<style>
  body{ font-family:var(--font-sans); background:var(--color-bg); color:var(--color-text); margin:0; padding:var(--space-5); }
  h1{ font-size:18px; } h2{ font-size:13px; color:var(--color-text-muted); margin-top:var(--space-5); }
  .lane{ display:flex; gap:var(--space-3); align-items:flex-start; }
  .col{ width:260px; background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-md); display:flex; flex-direction:column; }
  .col.drop-target{ border:1px dashed var(--color-drop-target); background:var(--color-primary-subtle); }
  .head{ display:flex; align-items:center; gap:var(--space-2); padding:var(--space-2) var(--space-3); border-bottom:1px solid var(--color-border); }
  .head h3{ font-size:14px; font-weight:600; margin:0; }
  .count{ font-size:11px; color:var(--color-text-muted); background:var(--color-bg); border:1px solid var(--color-border); border-radius:var(--radius-pill); padding:0 7px; }
  .body{ padding:var(--space-2); display:flex; flex-direction:column; gap:var(--space-2); }
  .card{ background:var(--color-bg); border:1px solid var(--color-border); border-radius:var(--radius-sm); padding:var(--space-2) var(--space-3); font-size:13px; font-weight:600; box-shadow:var(--shadow-card); }
  .empty{ border:1px dashed var(--color-border-strong); border-radius:var(--radius-sm); padding:var(--space-4); text-align:center; color:var(--color-text-subtle); font-size:12px; }
  .add{ padding:var(--space-2) var(--space-3); border-top:1px solid var(--color-border); }
  .add button{ font:inherit; font-size:12px; color:var(--color-text-muted); background:transparent; border:0; cursor:pointer; padding:4px 0; }
</style>
</head>
<body>
  <h1>컬럼 — 헤더(이름+카드수) · 카드 리스트 · 추가 · 빈/드롭 상태</h1>
  <div class="lane">
    <section class="col" aria-label="진행 중">
      <div class="head"><h3>진행 중</h3><span class="count" aria-label="카드 1개">1</span></div>
      <div class="body"><div class="card">로그인 화면 리디자인</div></div>
      <div class="add"><button type="button">+ 카드 추가</button></div>
    </section>

    <section class="col" aria-label="검토">
      <div class="head"><h3>검토</h3><span class="count" aria-label="카드 0개">0</span></div>
      <div class="body"><div class="empty">여기에 카드를 놓기</div></div>
      <div class="add"><button type="button">+ 카드 추가</button></div>
    </section>

    <section class="col drop-target" aria-label="완료">
      <div class="head"><h3>완료</h3><span class="count" aria-label="카드 1개">1</span></div>
      <div class="body"><div class="empty" style="border-style:solid;border-color:var(--color-drop-target);color:var(--color-primary)">드롭하여 이동</div>
        <div class="card">회원가입 버그 픽스</div></div>
      <div class="add"><button type="button">+ 카드 추가</button></div>
    </section>
  </div>
  <p style="color:var(--color-text-muted);font-size:13px;margin-top:var(--space-5)">변형: 카드 있음 / 빈 컬럼 드롭존 / 드롭 타깃 하이라이트(<code>.drop-target</code>). 과밀 시 <code>.body</code> 세로 스크롤.</p>
</body>
</html>
