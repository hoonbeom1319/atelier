<!-- @dsCard group="Wireframe" -->
<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>collab-kanban — 홈 대시보드 (와이어프레임)</title>
<style>
  /* lo-fi: 색·브랜드 없음. board.html과 같은 셸 구조. */
  :root{ --ink:#222; --line:#aaa; --line2:#ccc; --bg:#fff; --surf:#f4f4f4; --muted:#666; }
  html[data-theme="dark"]{ --ink:#eee; --line:#777; --line2:#555; --bg:#1c1c1c; --surf:#262626; --muted:#aaa; }
  *{ box-sizing:border-box; }
  body{ font-family:system-ui,sans-serif; margin:0; background:var(--bg); color:var(--ink); font-size:14px; }
  button{ font:inherit; color:inherit; background:transparent; border:1px solid var(--line); padding:5px 9px; cursor:pointer; border-radius:3px; }
  button[aria-pressed="true"]{ border-color:var(--ink); background:var(--surf); font-weight:600; }
  input[type=text]{ font:inherit; color:inherit; background:var(--bg); border:1px solid var(--line); padding:6px 8px; border-radius:3px; width:100%; }
  a{ color:inherit; }
  .avatar{ display:inline-flex; align-items:center; justify-content:center; min-width:24px; height:24px; padding:0 5px; border:1px solid var(--line); border-radius:50%; font-size:11px; }

  .shell{ display:flex; min-height:100vh; }
  .sidebar{ width:212px; flex:none; border-right:1px solid var(--line); padding:14px 10px; display:flex; flex-direction:column; gap:4px; }
  .brand{ font-weight:700; font-size:15px; padding:6px 8px 14px; }
  .sidebar nav{ display:flex; flex-direction:column; gap:2px; }
  .navitem{ display:flex; align-items:center; gap:8px; padding:7px 9px; border-radius:4px; text-decoration:none; color:var(--ink);
            border:1px solid transparent; background:transparent; text-align:left; font:inherit; cursor:pointer; }
  .navitem[aria-current="page"]{ background:var(--surf); border-color:var(--line2); font-weight:600; }
  .navitem.sub{ margin-left:16px; font-size:13px; color:var(--muted); }
  .navitem.scope{ color:var(--muted); }
  .mainpane{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .topbar{ position:relative; display:flex; align-items:center; gap:10px; padding:8px 16px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .topbar .search{ flex:1; max-width:340px; } .topbar .tspacer{ flex:1; }
  .dropdown{ position:absolute; right:14px; top:48px; z-index:30; background:var(--bg); border:1px solid var(--line); border-radius:5px; padding:8px; min-width:230px; box-shadow:0 6px 20px rgba(0,0,0,.18); display:flex; flex-direction:column; gap:4px; }
  .dropdown .di{ padding:6px 8px; font-size:13px; }

  .content{ padding:18px 22px; max-width:1080px; }
  h1{ font-size:22px; margin:0 0 4px; } .sub{ color:var(--muted); margin:0 0 18px; }
  h2{ font-size:15px; margin:0 0 10px; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:18px; }
  .widget{ border:1px solid var(--line2); border-radius:6px; padding:14px; background:var(--surf); }
  .wlist{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
  .crow{ display:block; border:1px solid var(--line); border-radius:4px; background:var(--bg); padding:8px 10px; text-decoration:none; color:var(--ink); }
  .crow .m{ color:var(--muted); font-size:12px; margin-top:3px; }
  .act{ border:1px dashed var(--line2); border-radius:4px; padding:7px 10px; color:var(--muted); font-size:13px; }
  .boards{ display:flex; gap:12px; flex-wrap:wrap; }
  .bcard{ width:200px; border:1px solid var(--line); border-radius:6px; padding:14px; text-decoration:none; color:var(--ink); background:var(--bg); }
  .bcard .bt{ font-weight:600; margin-bottom:6px; } .bcard .bm{ color:var(--muted); font-size:12px; }
  .bcard.scope{ color:var(--muted); border-style:dashed; background:transparent; cursor:default; }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">▣ collab-kanban</div>
    <nav aria-label="주요">
      <span class="navitem" aria-current="page">🏠 홈</span>
      <a class="navitem" href="board.html" aria-label="보드">📋 보드</a>
      <a class="navitem sub" href="board.html" aria-label="제품 보드">▸ 제품</a>
      <button type="button" class="navitem scope" data-scope="out" aria-label="멤버 [범위 밖]">👥 멤버</button>
      <button type="button" class="navitem scope" data-scope="out" aria-label="설정 [범위 밖]">⚙ 설정</button>
    </nav>
  </aside>
  <div class="mainpane">
    <header class="topbar">
      <input type="text" class="search" aria-label="검색" placeholder="카드·보드 검색">
      <button type="button" class="scope" data-scope="out" aria-label="새로 만들기 [범위 밖]">+ 새로</button>
      <span class="tspacer"></span>
      <button type="button" id="notifBtn" aria-haspopup="true" aria-expanded="false" aria-label="알림">🔔</button>
      <button type="button" id="theme" aria-pressed="false" aria-label="테마 전환">테마: 라이트</button>
      <button type="button" id="userBtn" aria-haspopup="true" aria-expanded="false" aria-label="사용자 메뉴"><span class="avatar">JW</span></button>
      <div id="dd"></div>
    </header>

    <div class="content">
      <h1>안녕하세요, 김지원님</h1>
      <p class="sub">오늘의 협업 현황입니다. 제품 보드에서 일을 옮기고, 배정하고, 대화하세요.</p>

      <div class="grid">
        <section class="widget" aria-label="내게 배정된 카드">
          <h2>내게 배정된 카드</h2>
          <ul class="wlist">
            <li><a class="crow" href="board.html" aria-label="카드 열기: 온보딩 플로우 개선">온보딩 플로우 개선
              <span class="m">제품 · 백로그 · 기능 · 댓글 2</span></a></li>
          </ul>
        </section>
        <section class="widget" aria-label="최근 활동">
          <h2>최근 활동</h2>
          <ul class="wlist">
            <li class="act">최민준 님이 <b>로그인 화면 리디자인</b>을 진행 중으로 이동함</li>
            <li class="act">박서연 님이 <b>회원가입 버그 픽스</b>에 댓글을 남김</li>
            <li class="act">이도현 님이 <b>API 문서 작성</b>에서 @김지원 멘션함</li>
          </ul>
        </section>
      </div>

      <section aria-label="내 보드">
        <h2>내 보드</h2>
        <div class="boards">
          <a class="bcard" href="board.html" aria-label="제품 보드 열기">
            <div class="bt">제품</div><div class="bm">컬럼 5 · 카드 6 · 멤버 5</div></a>
          <button type="button" class="bcard scope" data-scope="out" aria-label="마케팅 보드 [범위 밖]">
            <div class="bt">마케팅</div><div class="bm">[범위 밖] — 멀티보드는 다음</div></button>
        </div>
      </section>
    </div>
  </div>
</div>

<script>
"use strict";
var KEY_THEME="ck-theme";
var html=document.documentElement;
function applyTheme(t){ html.setAttribute("data-theme",t);
  var b=document.getElementById("theme"); b.setAttribute("aria-pressed",t==="dark"?"true":"false");
  b.textContent="테마: "+(t==="dark"?"다크":"라이트"); }
applyTheme(localStorage.getItem(KEY_THEME)||"light");
document.getElementById("theme").addEventListener("click",function(){
  var t=html.getAttribute("data-theme")==="dark"?"light":"dark"; localStorage.setItem(KEY_THEME,t); applyTheme(t);
});
// 드롭다운(알림/유저)
var open=null;
function renderDD(){
  var dd=document.getElementById("dd");
  document.getElementById("notifBtn").setAttribute("aria-expanded", open==="notif"?"true":"false");
  document.getElementById("userBtn").setAttribute("aria-expanded", open==="user"?"true":"false");
  if(open==="notif") dd.innerHTML='<div class="dropdown" role="menu" aria-label="알림"><div class="di">박서연 님이 회원가입 버그 픽스에 댓글</div><div class="di">최민준 님이 로그인 화면 리디자인 이동</div></div>';
  else if(open==="user") dd.innerHTML='<div class="dropdown" role="menu" aria-label="사용자 메뉴"><div class="di"><b>김지원</b> (나)</div><button type="button" class="navitem scope" data-scope="out" aria-label="프로필 [범위 밖]">프로필</button><button type="button" class="navitem scope" data-scope="out" aria-label="로그아웃 [범위 밖]">로그아웃</button></div>';
  else dd.innerHTML="";
}
document.getElementById("notifBtn").addEventListener("click",function(){ open=open==="notif"?null:"notif"; renderDD(); });
document.getElementById("userBtn").addEventListener("click",function(){ open=open==="user"?null:"user"; renderDD(); });
</script>
</body>
</html>
