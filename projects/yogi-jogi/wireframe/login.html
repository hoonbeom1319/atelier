<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 로그인 (S5)</title>
<style>
  :root{ --ink:#222; --line:#999; --muted:#777; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#cfcfcf; font-family:-apple-system,system-ui,sans-serif; color:var(--ink); }
  .app{ width:390px; min-height:100vh; margin:0 auto; background:#fff; display:flex; flex-direction:column; }
  header.bar{ padding:14px 16px; border-bottom:2px solid var(--ink); display:flex; align-items:center; justify-content:space-between; }
  header.bar h1{ font-size:16px; margin:0; }
  .tag{ display:inline-block; border:1px dashed var(--line); border-radius:4px; padding:1px 6px; font-size:11px; color:var(--muted); }
  main{ flex:1; padding:24px 20px; display:flex; flex-direction:column; }
  .hero{ text-align:center; margin:24px 0 32px; }
  .hero .logo{ width:64px; height:64px; border:2px solid var(--ink); border-radius:18px; margin:0 auto 14px; display:flex; align-items:center; justify-content:center; font-size:28px; }
  .hero h2{ font-size:18px; margin:0 0 6px; }
  .hero p{ font-size:13px; color:var(--muted); margin:0; }
  .btns{ display:flex; flex-direction:column; gap:10px; }
  .lbtn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; text-decoration:none; color:var(--ink); border:2px solid var(--ink); border-radius:12px; padding:14px; font-size:15px; font-weight:600; background:#fff; cursor:pointer; }
  /* 카카오 가장 크게 — 마찰 최소(타깃) */
  .lbtn.kakao{ padding:18px; font-size:17px; border-width:3px; }
  .lbtn .ic{ width:20px; height:20px; border:1.5px solid currentColor; border-radius:4px; }
  .emailform{ display:none; flex-direction:column; gap:10px; margin-top:6px; border-top:1px dashed var(--line); padding-top:14px; }
  .emailform.show{ display:flex; }
  .emailform input{ border:1.5px solid var(--ink); border-radius:10px; padding:12px; font-size:14px; }
  .emailform .submit{ border:2px solid var(--ink); background:var(--ink); color:#fff; border-radius:12px; padding:13px; font-weight:700; text-align:center; text-decoration:none; cursor:pointer; }
  .foot{ margin-top:auto; text-align:center; font-size:11px; color:var(--muted); padding-top:24px; }
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <h1>로그인</h1>
    <span class="tag">S5 · 묶음3</span>
  </header>

  <main>
    <div class="hero">
      <div class="logo" aria-hidden="true">👣</div>
      <h2>발자취</h2>
      <p>다녀온 곳이 코스로 쌓이는 기록 앱</p>
    </div>

    <div class="btns">
      <a class="lbtn kakao" href="home.html" aria-label="카카오로 시작하기"><span class="ic"></span>카카오로 시작하기</a>
      <a class="lbtn" href="home.html" aria-label="구글로 계속하기"><span class="ic"></span>구글로 계속하기</a>
      <button class="lbtn" id="emailBtn" type="button" aria-expanded="false" aria-controls="emailform"><span class="ic"></span>이메일로 로그인</button>

      <div class="emailform" id="emailform" role="group" aria-label="이메일 로그인 폼">
        <input type="email" placeholder="이메일" aria-label="이메일 주소">
        <input type="password" placeholder="비밀번호" aria-label="비밀번호">
        <a class="submit" href="home.html" aria-label="이메일로 로그인 완료">로그인</a>
      </div>
    </div>

    <p class="foot">계속하면 약관 및 개인정보 처리방침에 동의하게 됩니다.</p>
  </main>
</div>

<script>
  // 이메일 폼 토글(관측 가능한 상태 변화)
  const b=document.getElementById('emailBtn'), f=document.getElementById('emailform');
  b.addEventListener('click',()=>{
    const on = b.getAttribute('aria-expanded')==='true';
    b.setAttribute('aria-expanded', on?'false':'true');
    f.classList.toggle('show', !on);
  });
</script>
</body>
</html>
