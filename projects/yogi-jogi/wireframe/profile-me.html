<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>요기조기 — 내 프로필 (SC-16)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Segoe UI',sans-serif}
body{width:390px;min-height:844px;margin:0 auto;background:#fff;color:#222;position:relative;padding-bottom:72px}
.appbar{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid #ccc;position:sticky;top:0;background:#fff;z-index:5}
.title{font-weight:700;font-size:17px}
.icons a{margin-left:10px;text-decoration:none;color:#444;font-size:13px;border:1px solid #bbb;border-radius:6px;padding:5px 8px}
.tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:390px;height:64px;display:flex;align-items:center;justify-content:space-around;border-top:1px solid #ccc;background:#fff;z-index:6}
.tabbar a{text-decoration:none;color:#555;font-size:13px;border:1px dashed #bbb;border-radius:6px;padding:7px 14px}
.tabbar a.fab{background:#222;color:#fff;border-style:solid;font-size:22px;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;padding:0}
.tabbar a[aria-current="page"]{font-weight:700;border-style:solid;color:#111;background:#eee}
.box{border:1px dashed #999;border-radius:8px;padding:12px;margin:10px 14px;color:#555}
.ph{background:#e8e8e8;border:1px solid #ccc;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#888;min-height:60px}
.btn{font:inherit;border:1px solid #888;background:#f3f3f3;border-radius:8px;padding:10px 14px;cursor:pointer;display:inline-block;text-decoration:none;color:#222}
.btn.primary{background:#333;color:#fff;border-color:#333}
.seg{display:flex;border:1px solid #999;border-radius:8px;overflow:hidden;margin:10px 14px}
.seg button{flex:1;border:0;border-right:1px solid #ccc;background:#fff;padding:10px;cursor:pointer}
.seg button[aria-selected="true"]{background:#333;color:#fff;font-weight:700}
.oos{color:#aaa;font-size:12px;border:1px dotted #bbb;border-radius:5px;padding:2px 6px}
.chip{display:inline-block;border:1px solid #999;border-radius:14px;padding:4px 10px;margin:3px;font-size:13px}
.badge{display:inline-block;background:#333;color:#fff;border-radius:10px;padding:1px 7px;font-size:12px}
.sheet{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:390px;background:#fff;border-top:2px solid #888;border-radius:14px 14px 0 0;padding:14px;box-shadow:0 -2px 8px rgba(0,0,0,.15);z-index:8}
.hidden{display:none}
</style>
</head>
<body>

<!-- 상단 앱바 (셸) -->
<div class="appbar">
  <a class="title" href="search.html" style="text-decoration:none;color:inherit">🔍 <span>내 프로필</span></a>
  <div class="icons"><a href="notifications.html">🔔</a><a href="profile-me.html" aria-current="page">👤</a></div>
</div>

<!-- 프로필 헤더 -->
<section style="padding:16px 14px 6px;display:flex;align-items:center;gap:14px">
  <div class="ph" style="width:72px;height:72px;min-height:72px;border-radius:50%">아바타</div>
  <div style="flex:1">
    <div style="font-weight:700;font-size:18px">김여행</div>
    <div style="color:#777;font-size:13px;margin-top:3px">성수·을지로 카페 기록 중 ☕️</div>
  </div>
</section>

<!-- 카운트 3종 -->
<section style="display:flex;text-align:center;margin:6px 14px 2px">
  <div style="flex:1">
    <div style="font-weight:700;font-size:17px" id="cnt-posts">24</div>
    <div style="color:#777;font-size:12px">게시물</div>
  </div>
  <div style="flex:1">
    <div style="font-weight:700;font-size:17px">318</div>
    <div style="color:#777;font-size:12px">팔로워</div>
  </div>
  <div style="flex:1">
    <div style="font-weight:700;font-size:17px">142</div>
    <div style="color:#777;font-size:12px">팔로잉</div>
  </div>
</section>

<!-- 액션 -->
<section style="display:flex;gap:8px;margin:10px 14px">
  <a class="btn" href="settings.html" style="flex:1;text-align:center">편집</a>
  <button class="btn" style="flex:1" onclick="share()">공유 <span class="oos">[범위 밖]</span></button>
</section>
<p id="share-note" class="hidden" style="margin:0 14px 4px;color:#777;font-size:12px">공유 링크 복사는 범위 밖(P1)이에요.</p>

<!-- 데모: 빈상태 토글 -->
<section style="margin:8px 14px 0">
  <button class="btn" id="demo-btn" aria-pressed="false" onclick="toggleEmpty()" style="width:100%;font-size:13px">데모: 게시물 0 빈상태 보기</button>
</section>

<!-- [그리드 | 지도] 토글 -->
<div class="seg" role="tablist" aria-label="보기 전환" id="view-seg">
  <button id="seg-grid" role="tab" aria-selected="true" onclick="showGrid()">▦ 그리드</button>
  <button id="seg-map" role="tab" aria-selected="false" onclick="showMap()">🗺 지도</button>
</div>

<!-- 채움: 그리드 뷰 -->
<section id="grid-view">
  <div id="grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin:0 3px">
    <a href="post-detail.html" class="ph" style="aspect-ratio:1;border-radius:0">사진</a>
    <a href="post-detail.html" class="ph" style="aspect-ratio:1;border-radius:0">사진</a>
    <a href="post-detail.html" class="ph" style="aspect-ratio:1;border-radius:0">사진</a>
    <a href="post-detail.html" class="ph" style="aspect-ratio:1;border-radius:0">사진</a>
    <a href="post-detail.html" class="ph" style="aspect-ratio:1;border-radius:0">사진</a>
    <a href="post-detail.html" class="ph" style="aspect-ratio:1;border-radius:0">사진</a>
    <a href="post-detail.html" class="ph" style="aspect-ratio:1;border-radius:0">사진</a>
    <a href="post-detail.html" class="ph" style="aspect-ratio:1;border-radius:0">사진</a>
    <a href="post-detail.html" class="ph" style="aspect-ratio:1;border-radius:0">사진</a>
  </div>
</section>

<!-- 채움: 지도 뷰 -->
<section id="map-view" class="hidden">
  <div class="ph" style="height:300px;margin:10px 14px">지도 — 내 방문 POI 핀 + 동선</div>
  <p style="margin:0 14px;color:#777;font-size:13px">내가 기록한 장소 24곳이 핀과 동선으로 이어져요.</p>
</section>

<!-- 빈 상태 (게시물 0) -->
<section id="empty-view" class="hidden">
  <div class="box" style="text-align:center;padding:40px 18px">
    <div class="ph" style="width:64px;height:64px;min-height:64px;border-radius:50%;margin:0 auto 14px">📷</div>
    <p style="font-weight:600;margin-bottom:6px">첫 게시물을 올려보세요</p>
    <p style="color:#777;font-size:13px;margin-bottom:16px">방문한 장소의 사진을 올리면 지도가 채워져요.</p>
    <a class="btn primary" href="upload-1-gallery.html">첫 게시물 올리기</a>
  </div>
</section>

<!-- 하단 탭바 -->
<nav class="tabbar" aria-label="주요 내비게이션">
  <a href="map-home.html">🗺 지도</a>
  <a class="fab" href="upload-1-gallery.html" aria-label="새 게시물 업로드">＋</a>
  <a href="feed.html">📋 피드</a>
</nav>

<script>
var emptyMode = false;

function showGrid(){
  document.getElementById('seg-grid').setAttribute('aria-selected','true');
  document.getElementById('seg-map').setAttribute('aria-selected','false');
  applyView();
}
function showMap(){
  document.getElementById('seg-grid').setAttribute('aria-selected','false');
  document.getElementById('seg-map').setAttribute('aria-selected','true');
  applyView();
}
function applyView(){
  var gridSel = document.getElementById('seg-grid').getAttribute('aria-selected') === 'true';
  if(emptyMode){
    // 빈상태면 그리드/지도 둘 다 빈뷰
    document.getElementById('grid-view').classList.add('hidden');
    document.getElementById('map-view').classList.add('hidden');
    document.getElementById('empty-view').classList.remove('hidden');
    return;
  }
  document.getElementById('empty-view').classList.add('hidden');
  document.getElementById('grid-view').classList.toggle('hidden', !gridSel);
  document.getElementById('map-view').classList.toggle('hidden', gridSel);
}
function toggleEmpty(){
  emptyMode = !emptyMode;
  var btn = document.getElementById('demo-btn');
  btn.setAttribute('aria-pressed', emptyMode ? 'true' : 'false');
  btn.textContent = emptyMode ? '데모: 채워진 상태 보기' : '데모: 게시물 0 빈상태 보기';
  document.getElementById('cnt-posts').textContent = emptyMode ? '0' : '24';
  applyView();
}
function share(){
  document.getElementById('share-note').classList.remove('hidden');
}
</script>

</body>
</html>
