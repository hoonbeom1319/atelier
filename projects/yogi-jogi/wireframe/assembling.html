<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 자동 조립 (C3)</title>
<style>
  :root{ --ink:#222; --line:#999; --muted:#777; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#cfcfcf; font-family:-apple-system,system-ui,sans-serif; color:var(--ink); }
  .app{ width:390px; min-height:100vh; margin:0 auto; background:#fff; display:flex; flex-direction:column; }
  header.bar{ padding:14px 16px; border-bottom:2px solid var(--ink); display:flex; align-items:center; justify-content:space-between; }
  header.bar h1{ font-size:16px; margin:0; }
  .tag{ display:inline-block; border:1px dashed var(--line); border-radius:4px; padding:1px 6px; font-size:11px; color:var(--muted); }
  main{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:24px; text-align:center; }
  .spinner{ width:64px; height:64px; border:3px dashed var(--ink); border-radius:50%; }
  .pct{ font-size:28px; font-weight:700; }
  .barwrap{ width:240px; height:14px; border:2px solid var(--ink); border-radius:8px; overflow:hidden; }
  .bar{ height:100%; width:0%; background:var(--ink); transition:width .2s linear; }
  .step{ font-size:13px; color:var(--muted); min-height:18px; }
  .btn{ text-decoration:none; border:2px solid var(--ink); border-radius:12px; padding:13px 26px; font-weight:600; background:var(--ink); color:#fff; cursor:pointer; }
  .btn[aria-disabled="true"]{ background:#fff; color:var(--line); border-color:var(--line); pointer-events:none; }
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <h1>자동 조립</h1>
    <span class="tag">C3 로딩</span>
  </header>
  <main>
    <div class="spinner" aria-hidden="true"></div>
    <p style="margin:0; font-weight:600">사진에서 장소를 찾는 중…</p>
    <div class="pct" id="pct" aria-live="polite">0%</div>
    <div class="barwrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="pb"><div class="bar" id="bar"></div></div>
    <div class="step" id="step" aria-live="polite">EXIF 위·경도 읽는 중</div>
    <a class="btn" id="go" href="review.html" aria-disabled="true">검토하기 →</a>
  </main>
</div>

<script>
  // 진행률이 실제로 차오르고, 100%에서 검토하기 활성화(관측 가능한 상태 변화)
  const steps = ['EXIF 위·경도 읽는 중','시간순으로 묶는 중','장소명 붙이는 중(역지오코딩)','동선 그리는 중'];
  let p = 0;
  const bar=document.getElementById('bar'), pct=document.getElementById('pct'),
        pb=document.getElementById('pb'), stepEl=document.getElementById('step'), go=document.getElementById('go');
  const t = setInterval(()=>{
    p = Math.min(100, p + 12);
    bar.style.width = p+'%'; pct.textContent = p+'%'; pb.setAttribute('aria-valuenow', p);
    stepEl.textContent = steps[Math.min(steps.length-1, Math.floor(p/26))];
    if(p>=100){
      clearInterval(t);
      stepEl.textContent = '코스 초안 완성! 미분류 사진을 정리해 주세요.';
      go.setAttribute('aria-disabled','false');
    }
  }, 350);
</script>
</body>
</html>
