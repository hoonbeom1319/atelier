<!-- @dsCard group="Wireframe" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 누적 지도 홈 (S1)</title>
<style>
  :root{ --ink:#222; --line:#999; --muted:#777; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#cfcfcf; font-family:-apple-system,system-ui,sans-serif; color:var(--ink); }
  .app{ width:390px; min-height:100vh; margin:0 auto; background:#fff; position:relative; display:flex; flex-direction:column; }
  header.bar{ padding:14px 16px; border-bottom:2px solid var(--ink); display:flex; align-items:center; justify-content:space-between; }
  header.bar h1{ font-size:16px; margin:0; }
  .tag{ display:inline-block; border:1px dashed var(--line); border-radius:4px; padding:1px 6px; font-size:11px; color:var(--muted); }
  main{ flex:1; padding:0 0 96px; }
  /* 누적 지도 */
  .map{ height:230px; border-bottom:2px solid var(--ink); background:repeating-linear-gradient(45deg,#f0f0f0 0 10px,#e7e7e7 10px 20px); position:relative; }
  .map .lbl{ position:absolute; top:8px; left:10px; font-size:11px; color:var(--muted); background:#fff; padding:1px 5px; border-radius:3px; }
  .map .count{ position:absolute; right:10px; top:8px; font-size:11px; background:#fff; border:1.5px solid var(--ink); border-radius:12px; padding:2px 8px; }
  .listhead{ display:flex; align-items:center; justify-content:space-between; padding:16px 16px 6px; }
  .listhead h2{ font-size:15px; margin:0; }
  .listhead a{ font-size:12px; color:var(--muted); }
  .courses{ padding:0 16px; display:flex; flex-direction:column; gap:12px; }
  .ccard{ border:1.5px solid var(--ink); border-radius:14px; overflow:hidden; text-decoration:none; color:inherit; display:block; }
  .ccard .mini{ height:96px; background:repeating-linear-gradient(45deg,#f2f2f2 0 9px,#e9e9e9 9px 18px); position:relative; border-bottom:1.5px solid var(--line); }
  .ccard .mini svg{ position:absolute; inset:0; }
  .ccard .m{ padding:9px 12px; }
  .ccard h3{ margin:0 0 3px; font-size:14px; }
  .ccard p{ margin:0; font-size:12px; color:var(--muted); }
  .ccard .lock{ font-size:11px; border:1px solid var(--line); border-radius:10px; padding:1px 7px; color:var(--muted); }
  /* tab shell */
  .tabbar{ position:fixed; left:50%; transform:translateX(-50%); bottom:0; width:390px; height:64px; border-top:2px solid var(--ink); background:#fff; display:flex; align-items:center; justify-content:space-around; }
  .tabbar a{ font-size:11px; color:var(--muted); text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:3px; position:relative; }
  .tabbar a[aria-current]{ color:var(--ink); font-weight:700; }
  .tabbar .ic{ width:22px; height:22px; border:1.5px solid currentColor; border-radius:5px; }
  .tabbar .badge{ position:absolute; top:-4px; right:6px; min-width:16px; height:16px; border:1.5px solid var(--ink); background:#fff; border-radius:9px; font-size:9px; line-height:13px; text-align:center; padding:0 3px; }
  .fab{ width:52px; height:52px; border-radius:50%; border:2px solid var(--ink); background:#fff; font-size:24px; margin-top:-20px; text-decoration:none; color:var(--ink); display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <h1>발자취 지도</h1>
    <span class="tag">S1 홈 · 묶음2</span>
  </header>

  <main>
    <div class="map" role="img" aria-label="내 모든 코스의 방문지가 누적된 지도">
      <span class="lbl">누적 지도 · 지금까지 다닌 곳</span>
      <span class="count" id="pinCount">방문한 곳 8</span>
      <svg width="100%" height="100%" viewBox="0 0 390 230" preserveAspectRatio="none" aria-hidden="true">
        <polyline points="40,170 90,120 150,150 200,90" fill="none" stroke="#222" stroke-width="2" stroke-dasharray="6 4"/>
        <polyline points="240,180 280,130 330,160 360,70" fill="none" stroke="#222" stroke-width="2" stroke-dasharray="6 4"/>
        <g id="pins"></g>
      </svg>
    </div>

    <div class="listhead">
      <h2>내 코스</h2>
      <a href="index.html" aria-label="코스 0개일 때 빈 상태 보기">코스 0개 상태 보기 →</a>
    </div>
    <div class="courses">
      <a class="ccard" href="course.html" aria-label="코스: 전주 한옥마을 가족 나들이">
        <div class="mini"><svg viewBox="0 0 360 96" preserveAspectRatio="none"><polyline points="30,70 120,40 230,55 320,25" fill="none" stroke="#222" stroke-width="2" stroke-dasharray="5 4"/></svg></div>
        <div class="m"><h3>전주 한옥마을 가족 나들이 <span class="lock">비공개</span></h3><p>2026.05.17 · 4곳 · 18장</p></div>
      </a>
      <a class="ccard" href="course.html" aria-label="코스: 서울숲 봄나들이">
        <div class="mini"><svg viewBox="0 0 360 96" preserveAspectRatio="none"><polyline points="40,30 130,60 240,40 320,65" fill="none" stroke="#222" stroke-width="2" stroke-dasharray="5 4"/></svg></div>
        <div class="m"><h3>서울숲 봄나들이 <span class="lock">공개</span></h3><p>2026.04.12 · 3곳 · 11장</p></div>
      </a>
    </div>
  </main>

  <nav class="tabbar" aria-label="주요 탭">
    <a href="home.html" aria-current="page"><span class="ic"></span>발자취</a>
    <a href="together.html" aria-label="다 같이 (안 읽음 3)"><span class="ic"></span>다 같이<span class="badge">3</span></a>
    <a href="picker.html" class="fab" aria-label="새 코스">＋</a>
    <a href="profile.html" aria-label="프로필"><span class="ic"></span>프로필</a>
  </nav>
</div>

<script>
  // 누적 핀 8개 생성(다닐수록 쌓이는 느낌)
  const pinXY=[[40,170],[90,120],[150,150],[200,90],[240,180],[280,130],[330,160],[360,70]];
  const g=document.getElementById('pins');
  g.innerHTML = pinXY.map(([x,y])=>'<circle cx="'+x+'" cy="'+y+'" r="6" fill="#fff" stroke="#222" stroke-width="2"/>').join('');
  document.getElementById('pinCount').textContent='방문한 곳 '+pinXY.length;
</script>
</body>
</html>
