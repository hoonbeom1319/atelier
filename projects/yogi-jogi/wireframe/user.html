<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 다른 사람 프로필 (S3b)</title>
<style>
  :root{ --ink:#222; --line:#999; --muted:#777; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#cfcfcf; font-family:-apple-system,system-ui,sans-serif; color:var(--ink); }
  .app{ width:390px; min-height:100vh; margin:0 auto; background:#fff; position:relative; display:flex; flex-direction:column; }
  header.bar{ padding:12px 16px; border-bottom:2px solid var(--ink); display:flex; align-items:center; gap:10px; }
  header.bar a.back{ text-decoration:none; color:var(--ink); font-size:18px; }
  header.bar h1{ font-size:16px; margin:0; flex:1; }
  .tag{ display:inline-block; border:1px dashed var(--line); border-radius:4px; padding:1px 6px; font-size:11px; color:var(--muted); }
  main{ flex:1; padding-bottom:24px; }
  .head{ padding:22px 16px; display:flex; align-items:center; gap:14px; border-bottom:1.5px dashed var(--line); }
  .ava{ width:64px; height:64px; border:2px solid var(--ink); border-radius:50%; background:repeating-linear-gradient(45deg,#f2f2f2 0 8px,#e9e9e9 8px 16px); }
  .head .info{ flex:1; }
  .head .nm{ font-size:18px; font-weight:700; margin:0; }
  .head .stat{ font-size:12px; color:var(--muted); margin:5px 0 0; }
  .followbtn{ border:2px solid var(--ink); background:var(--ink); color:#fff; border-radius:11px; padding:10px 18px; font-weight:700; cursor:pointer; }
  .followbtn[aria-pressed="true"]{ background:#fff; color:var(--ink); }
  .gridhead{ padding:14px 16px 8px; font-size:14px; font-weight:600; }
  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:4px; padding:0 16px; }
  .gtile{ aspect-ratio:1; border:1.5px solid var(--line); background:repeating-linear-gradient(45deg,#f2f2f2 0 8px,#e9e9e9 8px 16px); border-radius:6px; position:relative; text-decoration:none; }
  .gtile svg{ position:absolute; inset:0; }
  .gtile .lk{ position:absolute; bottom:3px; right:4px; font-size:9px; color:var(--muted); background:#fff; border-radius:3px; padding:0 3px; }
  .note{ font-size:11px; color:var(--muted); padding:10px 16px 0; }
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <a class="back" id="back" href="together.html" aria-label="뒤로">←</a>
    <h1>프로필</h1>
    <span class="tag">S3b · 묶음3</span>
  </header>

  <main>
    <div class="head">
      <div class="ava"></div>
      <div class="info">
        <p class="nm" id="nm">수아</p>
        <p class="stat">공개 코스 6 · 팔로워 12</p>
      </div>
      <button class="followbtn" id="followBtn" type="button" aria-pressed="false" aria-label="팔로우 토글">팔로우</button>
    </div>

    <div class="gridhead">공개 코스</div>
    <div class="grid" id="grid"></div>
    <p class="note">비공개 코스는 보이지 않아요. 일방 팔로우 — 상대 승인 없이 바로 구독됩니다.</p>
  </main>
</div>

<script>
  const params=new URLSearchParams(location.search);
  const who=params.get('of'); if(who){ document.getElementById('nm').textContent=who; }
  // 어디서 왔는지에 따라 뒤로 타깃(데모): from=search 면 검색으로
  if(params.get('from')==='search'){ document.getElementById('back').setAttribute('href','search.html'); }

  // 공개 코스 그리드 → 코스 상세
  const grid=document.getElementById('grid');
  for(let i=0;i<6;i++){
    const a=document.createElement('a'); a.className='gtile'; a.href='course.html';
    a.setAttribute('aria-label','코스 '+(i+1)+' 보기');
    a.innerHTML='<svg viewBox="0 0 100 100" preserveAspectRatio="none"><polyline points="15,70 45,40 70,55 90,25" fill="none" stroke="#222" stroke-width="2" stroke-dasharray="4 3"/></svg><span class="lk">공개</span>';
    grid.appendChild(a);
  }

  // 일방 팔로우 토글
  const fb=document.getElementById('followBtn');
  fb.addEventListener('click',()=>{
    const on = fb.getAttribute('aria-pressed')==='true';
    fb.setAttribute('aria-pressed', on?'false':'true');
    fb.textContent = on ? '팔로우' : '팔로잉 ✓';
  });
</script>
</body>
</html>
