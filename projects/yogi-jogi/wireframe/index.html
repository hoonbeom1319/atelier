<!-- @dsCard group="Wireframe" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 빈 상태 (C1)</title>
<style>
  /* === 와이어프레임 공통 (흑백 골격, 색·실폰트 없음) === */
  :root{ --ink:#222; --line:#999; --muted:#777; --fill:#eee; --fill2:#f4f4f4; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#cfcfcf; font-family:-apple-system,system-ui,sans-serif; color:var(--ink); }
  .app{ width:390px; min-height:100vh; margin:0 auto; background:#fff; position:relative;
        display:flex; flex-direction:column; }
  header.bar{ padding:14px 16px; border-bottom:2px solid var(--ink); display:flex; align-items:center; justify-content:space-between; }
  header.bar h1{ font-size:16px; margin:0; }
  main{ flex:1; padding:16px; padding-bottom:96px; }
  .tag{ display:inline-block; border:1px dashed var(--line); border-radius:4px; padding:1px 6px; font-size:11px; color:var(--muted); }
  /* faux map */
  .map{ border:2px dashed var(--line); background:
        repeating-linear-gradient(45deg,#f0f0f0 0 10px,#e7e7e7 10px 20px);
        border-radius:12px; position:relative; }
  .map .route{ position:absolute; inset:0; }
  .map .lbl{ position:absolute; top:6px; left:8px; font-size:11px; color:var(--muted); background:#fff; padding:1px 5px; border-radius:3px; }
  .pin{ position:absolute; width:20px; height:20px; border:2px solid var(--ink); border-radius:50% 50% 50% 0; transform:rotate(-45deg); background:#fff; font-size:10px; }
  .pin span{ display:block; transform:rotate(45deg); text-align:center; line-height:16px; }
  /* card */
  .card{ border:1.5px solid var(--ink); border-radius:14px; overflow:hidden; margin-top:14px; }
  .card .meta{ padding:10px 12px; }
  .card h3{ margin:0 0 4px; font-size:15px; }
  .card p{ margin:0; font-size:12px; color:var(--muted); }
  /* buttons */
  .btn{ display:block; width:100%; text-align:center; text-decoration:none; color:var(--ink);
        border:2px solid var(--ink); border-radius:12px; padding:14px; font-size:15px; font-weight:600; background:#fff; cursor:pointer; }
  .btn.primary{ background:var(--ink); color:#fff; }
  .hint{ font-size:13px; color:var(--muted); line-height:1.5; }
  /* bottom tab shell */
  .tabbar{ position:absolute; left:0; right:0; bottom:0; height:64px; border-top:2px solid var(--ink);
           background:#fff; display:flex; align-items:center; justify-content:space-around; }
  .tabbar a, .tabbar button{ background:none; border:none; font-size:11px; color:var(--muted); text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; }
  .tabbar a[aria-current]{ color:var(--ink); font-weight:700; }
  .tabbar .ic{ width:22px; height:22px; border:1.5px solid currentColor; border-radius:5px; }
  .fab{ width:52px; height:52px; border-radius:50%; border:2px solid var(--ink); background:#fff; font-size:24px; line-height:1; margin-top:-20px; text-decoration:none; color:var(--ink); display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <h1>발자취</h1>
    <span class="tag">와이어 · C1 빈 상태</span>
  </header>

  <main>
    <p class="hint" style="margin-top:4px">다녀온 곳 사진을 올리면 지도에 코스가 그려져요.</p>

    <!-- 완성 예시(샘플 코스) — 탭하면 코스 상세 미리보기 -->
    <h2 style="font-size:13px; color:var(--muted); margin:18px 0 0">이런 코스가 만들어져요</h2>
    <a class="card" href="course.html?sample=1" aria-label="샘플 코스 — 전주 한옥마을 가족 나들이 미리보기" style="text-decoration:none; color:inherit; display:block">
      <div class="map" style="height:150px">
        <span class="lbl">지도 영역(동선)</span>
        <svg class="route" viewBox="0 0 390 150" preserveAspectRatio="none" aria-hidden="true">
          <polyline points="50,110 140,70 250,95 320,45" fill="none" stroke="#222" stroke-width="2" stroke-dasharray="6 4"/>
        </svg>
        <div class="pin" style="left:42px; top:96px"><span>1</span></div>
        <div class="pin" style="left:132px; top:56px"><span>2</span></div>
        <div class="pin" style="left:242px; top:81px"><span>3</span></div>
        <div class="pin" style="left:312px; top:31px"><span>4</span></div>
      </div>
      <div class="meta">
        <h3>전주 한옥마을 가족 나들이</h3>
        <p>2026.05.17 · 4곳 · 사진 18장</p>
      </div>
    </a>

    <div style="margin-top:24px">
      <a class="btn primary" href="picker.html">＋ 첫 코스 만들기</a>
    </div>
  </main>

  <!-- 하단 탭 셸: 발자취=현재, 다같이/프로필은 다음 묶음(스텁) -->
  <nav class="tabbar" aria-label="주요 탭">
    <a href="index.html" aria-current="page"><span class="ic"></span>발자취</a>
    <a href="together.html" aria-label="다 같이"><span class="ic"></span>다 같이</a>
    <a href="picker.html" class="fab" aria-label="새 코스">＋</a>
    <a href="profile.html" aria-label="프로필"><span class="ic"></span>프로필</a>
  </nav>
</div>
</body>
</html>
