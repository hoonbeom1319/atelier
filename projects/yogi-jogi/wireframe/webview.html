<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 코스 웹뷰 (S4)</title>
<style>
  :root{ --ink:#222; --line:#999; --muted:#777; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#cfcfcf; font-family:-apple-system,system-ui,sans-serif; color:var(--ink); }
  .app{ width:390px; min-height:100vh; margin:0 auto; background:#fff; position:relative; display:flex; flex-direction:column; }
  header.bar{ padding:12px 16px; border-bottom:2px solid var(--ink); display:flex; align-items:center; justify-content:space-between; }
  header.bar .brand{ font-size:14px; font-weight:700; }
  .tag{ display:inline-block; border:1px dashed var(--line); border-radius:4px; padding:1px 6px; font-size:11px; color:var(--muted); }
  main{ flex:1; padding-bottom:84px; }
  .map{ height:190px; border-bottom:2px solid var(--ink); background:repeating-linear-gradient(45deg,#f0f0f0 0 10px,#e7e7e7 10px 20px); position:relative; }
  .map .lbl{ position:absolute; top:8px; left:10px; font-size:11px; color:var(--muted); background:#fff; padding:1px 5px; border-radius:3px; }
  .body{ padding:16px; }
  .title{ font-size:19px; font-weight:700; margin:0; }
  .date{ color:var(--muted); font-size:13px; margin:4px 0 0; }
  .memo{ font-size:14px; line-height:1.6; margin:12px 0 0; }
  .photo{ width:100%; aspect-ratio:4/3; border:1.5px solid var(--line); background:repeating-linear-gradient(45deg,#f2f2f2 0 10px,#e9e9e9 10px 20px); border-radius:10px; margin-top:10px; }
  /* private blocked state */
  .blocked{ display:none; flex-direction:column; align-items:center; text-align:center; gap:14px; padding:60px 28px; }
  .blocked.show{ display:flex; }
  .blocked .lock{ width:70px; height:70px; border:2px solid var(--ink); border-radius:14px; }
  .contentwrap.hide{ display:none; }
  .statebar{ padding:10px 16px; border-bottom:1.5px dashed var(--line); display:flex; align-items:center; justify-content:space-between; }
  .statebar button{ border:1.5px dashed var(--ink); background:#fff; border-radius:9px; padding:6px 10px; font-size:12px; cursor:pointer; }
  /* CTA bar (앱 없는 사람용) */
  .cta{ position:fixed; left:50%; transform:translateX(-50%); bottom:0; width:390px; border-top:2px solid var(--ink); background:#fff; padding:12px 16px; display:flex; gap:10px; align-items:center; }
  .cta .txt{ flex:1; font-size:12px; color:var(--muted); }
  .cta a{ text-decoration:none; border:2px solid var(--ink); background:var(--ink); color:#fff; border-radius:11px; padding:11px 16px; font-weight:700; }
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <span class="brand">발자취 · 웹으로 보기</span>
    <span class="tag">S4 웹뷰 · 묶음2</span>
  </header>

  <div class="statebar">
    <span style="font-size:12px; color:var(--muted)" id="stateLabel">공개 코스 — 누구나 열람</span>
    <button id="privToggle" type="button" aria-pressed="false">비공개 링크였다면?</button>
  </div>

  <main>
    <!-- 공개 코스 정상 -->
    <div class="contentwrap" id="content">
      <div class="map">
        <span class="lbl">지도 영역 · 동선</span>
        <svg width="100%" height="100%" viewBox="0 0 390 190" preserveAspectRatio="none" aria-hidden="true">
          <polyline points="40,140 130,90 250,110 330,50" fill="none" stroke="#222" stroke-width="2.5" stroke-dasharray="7 5"/>
          <circle cx="40" cy="140" r="9" fill="#fff" stroke="#222" stroke-width="2"/>
          <circle cx="130" cy="90" r="9" fill="#fff" stroke="#222" stroke-width="2"/>
          <circle cx="250" cy="110" r="9" fill="#fff" stroke="#222" stroke-width="2"/>
          <circle cx="330" cy="50" r="9" fill="#fff" stroke="#222" stroke-width="2"/>
        </svg>
      </div>
      <div class="body">
        <h1 class="title">서울숲 봄나들이</h1>
        <p class="date">2026.04.12 · 방문지 3곳 · 사진 11장 · 수아 님</p>
        <p class="memo">벚꽃 끝물에 겨우 맞춰 다녀온 봄 산책.</p>
        <div class="photo"></div>
        <div class="photo"></div>
      </div>
    </div>

    <!-- 비공개 링크 접근 불가 -->
    <div class="blocked" id="blocked" role="region" aria-label="비공개 코스 접근 불가">
      <div class="lock" aria-hidden="true"></div>
      <p style="margin:0; font-weight:600">비공개 코스예요</p>
      <p style="margin:0; color:var(--muted); font-size:13px; line-height:1.6">만든 사람이 공개로 설정해야<br>링크로 볼 수 있어요.</p>
    </div>
  </main>

  <div class="cta">
    <span class="txt">앱 없이 웹으로 보는 중이에요.</span>
    <a href="index.html" aria-label="앱에서 나도 코스 만들기">나도 만들기</a>
  </div>
</div>

<script>
  // 공개/비공개 상태 전환 — 비공개면 접근 불가 패널(관측 가능한 상태 변화)
  const t=document.getElementById('privToggle'), content=document.getElementById('content'),
        blocked=document.getElementById('blocked'), label=document.getElementById('stateLabel');
  t.addEventListener('click',()=>{
    const on = t.getAttribute('aria-pressed')==='true';
    t.setAttribute('aria-pressed', on?'false':'true');
    blocked.classList.toggle('show', !on);
    content.classList.toggle('hide', !on);
    label.textContent = on ? '공개 코스 — 누구나 열람' : '비공개 코스 — 접근 불가';
    t.textContent = on ? '비공개 링크였다면?' : '공개 코스로 보기';
  });
</script>
</body>
</html>
