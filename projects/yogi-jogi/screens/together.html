<!-- @dsCard group="Screens" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 다 같이 (S2)</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<link rel="stylesheet" href="app.css">
<style>
  /* ---- S2 다 같이(팔로우 피드) 전용 ---- */
  main{ padding:12px var(--pad) 96px; }

  .appbar .find{
    appearance:none; text-decoration:none; white-space:nowrap;
    display:inline-flex; align-items:center; gap:6px;
    font-size:var(--fs-caption); font-weight:var(--fw-semibold); color:var(--color-text);
    background:var(--color-surface); border:1px solid var(--color-border-strong);
    border-radius:var(--r-pill); padding:7px 13px;
    transition:background var(--dur) var(--ease), border-color var(--dur) var(--ease);
  }
  .appbar .find:hover{ background:var(--color-primary-tint); border-color:var(--color-primary); }
  .appbar .find .gl{ font-size:13px; }

  /* 상단 행: 안읽음 카운터 + 빈상태 토글 */
  .toprow{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin:2px 2px 14px; }
  .unread{ font-weight:var(--fw-bold); font-size:var(--fs-label); letter-spacing:var(--ls-tight); display:inline-flex; align-items:center; gap:7px; }
  .unread .udot{ width:8px; height:8px; }
  .unread[data-allread="true"]{ color:var(--color-text-muted); }
  .emptyToggle{
    appearance:none; font-family:inherit; font-size:var(--fs-small); color:var(--color-text-muted);
    background:var(--color-surface); border:1px solid var(--color-border-strong);
    border-radius:var(--r-pill); padding:6px 12px; cursor:pointer;
    transition:background var(--dur) var(--ease), border-color var(--dur) var(--ease);
  }
  .emptyToggle:hover{ background:var(--color-bg); }
  .emptyToggle[aria-pressed="true"]{ border-color:var(--color-primary); color:var(--color-primary); background:var(--color-primary-tint); }

  /* 피드 */
  .feed{ display:flex; flex-direction:column; gap:14px; }
  .fcard{ padding:13px; transition:box-shadow var(--dur) var(--ease), transform var(--dur) var(--ease); }
  .fcard.read{ background:var(--color-bg); }

  .who{ display:flex; align-items:center; gap:9px; }
  .who .person{
    display:flex; align-items:center; gap:9px; flex:1; min-width:0;
    text-decoration:none; color:inherit; border-radius:var(--r-md); margin:-4px; padding:4px;
    transition:background var(--dur) var(--ease);
  }
  .who .person:hover{ background:var(--color-primary-tint); }
  .ava{
    width:34px; height:34px; flex:none; border-radius:50%;
    border:1px solid var(--color-border-strong);
    background:linear-gradient(135deg,#e9e6df,#f3f1ec);
    display:flex; align-items:center; justify-content:center;
    font-size:var(--fs-caption); font-weight:var(--fw-bold); color:var(--color-text-muted);
  }
  .nm{ font-weight:var(--fw-semibold); font-size:var(--fs-body); letter-spacing:var(--ls-tight); }
  .who .dot{ flex:none; box-shadow:0 0 0 3px var(--color-primary-tint); }
  .who .dot[hidden]{ display:none; }
  .when{ font-size:var(--fs-small); color:var(--color-text-muted); white-space:nowrap; }

  /* 미니 faux-map */
  .mini{ height:96px; margin:11px 0 9px; border-radius:var(--r-md); border:1px solid var(--color-border); }
  .mini .map-label{ font-size:var(--fs-tiny); top:8px; left:9px; padding:2px 8px; }

  .ct{ font-size:var(--fs-body); font-weight:var(--fw-semibold); letter-spacing:var(--ls-tight); margin:0; }

  .actions{ display:flex; gap:8px; margin-top:12px; }
  .actions .btn{ flex:1; padding:10px 14px; font-size:var(--fs-caption); border-radius:var(--r-md); }
  .actions .read[disabled]{ background:var(--color-border); color:var(--color-text-muted); border-color:transparent; }

  .allread{ color:var(--color-text-muted); font-size:var(--fs-caption); padding:14px 4px 4px; text-align:center; }
  .allread[hidden]{ display:none; }

  /* 빈 상태(팔로우 0명) */
  .empty{ display:none; flex-direction:column; align-items:center; text-align:center; gap:14px; padding:44px 24px; }
  .empty.show{ display:flex; }
  .empty .ill{
    width:88px; height:88px; border-radius:50%;
    background:radial-gradient(circle at 50% 38%, var(--color-primary-tint), var(--color-bg));
    border:1px solid var(--color-border-strong);
    display:flex; align-items:center; justify-content:center; font-size:30px;
  }
  .empty .et{ margin:0; font-weight:var(--fw-semibold); font-size:var(--fs-h2); letter-spacing:var(--ls-tight); }
  .empty .es{ margin:0; color:var(--color-text-muted); font-size:var(--fs-caption); line-height:var(--lh-relaxed); }
  .empty .btn{ padding:12px 22px; box-shadow:var(--shadow-primary); }
  .feedwrap.hide{ display:none; }

  /* 잔잔한 진입 */
  @media (prefers-reduced-motion:no-preference){
    .reveal{ opacity:0; transform:translateY(10px); animation:reveal .5s var(--ease-out) forwards; }
  }
  @keyframes reveal{ to{ opacity:1; transform:none; } }
</style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <h1>다 같이</h1>
    <a class="find" href="search.html" aria-label="사람 찾기"><span class="gl" aria-hidden="true">🔍</span>사람 찾기</a>
    <span class="scope-tag">S2</span>
  </header>

  <main>
    <div class="toprow">
      <span class="unread" id="unread" aria-live="polite"><span class="dot udot" id="unreadDot" aria-hidden="true"></span>안 읽음 3개</span>
      <button class="emptyToggle" id="emptyToggle" type="button" aria-pressed="false">팔로우 0명 상태 보기</button>
    </div>

    <!-- 정상: 팔로우 피드 -->
    <div class="feedwrap" id="feedwrap">
      <div class="feed" id="feed"></div>
      <p class="allread" id="allread" hidden>다 읽었어요. 새 코스가 올라오면 알려줄게요.</p>
    </div>

    <!-- 빈 상태: 팔로우 0명 -->
    <div class="empty" id="empty" role="region" aria-label="팔로우 0명 빈 상태">
      <div class="ill" aria-hidden="true">👣</div>
      <p class="et">아직 팔로우한 사람이 없어요</p>
      <p class="es">친구를 팔로우하면 여기 뜨고,<br>누가 새 코스를 올리면 알려줘요.</p>
      <a class="btn btn-primary" href="search.html" aria-label="사람 찾기">사람 찾기 →</a>
    </div>
  </main>

  <nav class="tabbar" aria-label="주요 탭">
    <a href="home.html" aria-label="발자취"><span class="ic"></span>발자취</a>
    <a href="together.html" aria-current="page"><span class="ic"></span>다 같이<span class="badge" id="tabBadge">3</span></a>
    <a href="picker.html" class="tab-fab" aria-label="새 코스">＋</a>
    <a href="profile.html" aria-label="프로필"><span class="ic"></span>프로필</a>
  </nav>
</div>

<script>
  // 팔로우 피드 — 각 카드 안읽음. '읽음'으로 표시하면 배지 -1 (관측 가능한 상태 변화)
  const data = [
    {nm:'민지', when:'2시간 전', ct:'남산 야경 산책', unread:true,
      route:'24,68 110,40 210,58 312,30', pins:[[24,68],[110,40],[210,58],[312,30]]},
    {nm:'재호', when:'어제',     ct:'양양 서피비치',   unread:true,
      route:'30,38 120,72 230,44 308,66', pins:[[30,38],[120,72],[230,44],[308,66]]},
    {nm:'수아', when:'3일 전',   ct:'제주 오름 투어',   unread:true,
      route:'26,54 130,30 224,70 314,42', pins:[[26,54],[130,30],[224,70],[314,42]]},
  ];
  const feed=document.getElementById('feed'), unreadEl=document.getElementById('unread'),
        unreadDot=document.getElementById('unreadDot'),
        tabBadge=document.getElementById('tabBadge'), allread=document.getElementById('allread');

  function miniMap(d){
    const poly='<polyline class="route" points="'+d.route+'"/>';
    const pins=d.pins.map((p,i)=>'<g class="pin"><circle cx="'+p[0]+'" cy="'+p[1]+'" r="9"/><text x="'+p[0]+'" y="'+(p[1]+4)+'">'+(i+1)+'</text></g>').join('');
    return '<div class="map mini"><span class="map-label">동선</span>'+
           '<svg width="100%" height="100%" viewBox="0 0 336 96" preserveAspectRatio="none" aria-hidden="true">'+poly+pins+'</svg></div>';
  }

  function render(){
    feed.innerHTML='';
    data.forEach((d)=>{
      const c=document.createElement('div'); c.className='card fcard reveal'+(d.unread?'':' read');
      c.innerHTML =
        '<div class="who">'+
          '<a class="person" href="user.html?of='+encodeURIComponent(d.nm)+'&from=together" aria-label="'+d.nm+' 프로필 보기">'+
            '<span class="ava" aria-hidden="true">'+d.nm.charAt(0)+'</span><span class="nm">'+d.nm+'</span>'+
          '</a>'+
          '<span class="dot" '+(d.unread?'':'hidden')+' aria-label="안 읽음"></span>'+
          '<span class="when">'+d.when+'</span>'+
        '</div>'+
        miniMap(d)+
        '<p class="ct">'+d.ct+'</p>'+
        '<div class="actions">'+
          '<button class="btn btn-secondary read" type="button" '+(d.unread?'':'disabled')+' aria-label="'+d.nm+' 코스 읽음 표시">'+(d.unread?'읽음으로 표시':'읽음')+'</button>'+
          '<a class="btn btn-primary open" href="course.html" aria-label="'+d.nm+' 코스 보기">코스 보기 →</a>'+
        '</div>';
      const rb=c.querySelector('.read');
      rb.addEventListener('click',()=>{ if(!d.unread) return; d.unread=false; render(); });
      feed.appendChild(c);
    });
    const n = data.filter(d=>d.unread).length;
    unreadEl.lastChild.textContent = n>0 ? ('안 읽음 '+n+'개') : '모두 읽음';
    unreadEl.setAttribute('data-allread', n>0?'false':'true');
    unreadDot.hidden = n===0;
    if(n>0){ tabBadge.textContent=n; tabBadge.hidden=false; } else { tabBadge.hidden=true; }
    allread.hidden = n>0;
  }
  render();

  // 빈 상태(팔로우 0명) 토글
  const et=document.getElementById('emptyToggle'), empty=document.getElementById('empty'), feedwrap=document.getElementById('feedwrap');
  et.addEventListener('click',()=>{
    const on = et.getAttribute('aria-pressed')==='true';
    et.setAttribute('aria-pressed', on?'false':'true');
    empty.classList.toggle('show', !on);
    feedwrap.classList.toggle('hide', !on);
    et.textContent = on ? '팔로우 0명 상태 보기' : '팔로우 있는 상태 보기';
  });
</script>
</body>
</html>
