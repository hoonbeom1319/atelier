<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 코스 웹뷰 (S4)</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<link rel="stylesheet" href="app.css">
<style>
  /* ---- S4 공개 코스 웹뷰 전용 (앱 없는 사람용 read-only) ---- */
  main{ padding-bottom:88px; }

  /* 가벼운 브랜드 바 (앱 없는 웹뷰 — 탭바 없음) */
  .brandbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:11px var(--pad); min-height:var(--header-h);
    background:color-mix(in srgb, var(--color-bg) 86%, transparent);
    backdrop-filter:saturate(1.4) blur(8px);
    border-bottom:1px solid var(--color-border);
  }
  .brandbar .brand{ display:flex; align-items:center; gap:8px; font-size:var(--fs-label); font-weight:var(--fw-bold); letter-spacing:var(--ls-tight); }
  .brandbar .brand .dot{ width:8px; height:8px; }
  .brandbar .web-tag{ font-size:var(--fs-tiny); color:var(--color-text-muted); }

  /* 상태 행 (공개/비공개 데모 토글) */
  .statebar{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px var(--pad);
    background:var(--color-surface); border-bottom:1px solid var(--color-border);
  }
  .statebar .state-label{ display:flex; align-items:center; gap:7px; font-size:var(--fs-caption); color:var(--color-text-muted); font-weight:var(--fw-medium); }
  .statebar .state-label .ind{ width:8px; height:8px; border-radius:50%; background:var(--color-success); flex:none; transition:background var(--dur) var(--ease); }
  .statebar.is-private .state-label .ind{ background:var(--color-warn); }
  .priv-toggle{
    appearance:none; font-family:inherit; font-size:var(--fs-small); font-weight:var(--fw-medium);
    color:var(--color-text); background:var(--color-surface);
    border:1px solid var(--color-border-strong); border-radius:var(--r-pill);
    padding:7px 13px; cursor:pointer; transition:background var(--dur) var(--ease), border-color var(--dur) var(--ease);
  }
  .priv-toggle:hover{ background:var(--color-bg); }
  .priv-toggle[aria-pressed="true"]{ border-color:var(--color-primary); color:var(--color-primary); background:var(--color-primary-tint); }

  /* 풀블리드 히어로 지도 (course.html과 동일 톤) */
  .hero-map{ height:210px; border-bottom:1px solid var(--color-border); border-radius:0; }
  .hero-map .map-label{ font-size:var(--fs-small); }

  /* 본문 헤더 */
  .body{ padding:18px var(--pad) 4px; }
  .title{ font-size:var(--fs-display); font-weight:var(--fw-bold); letter-spacing:var(--ls-tight); line-height:var(--lh-tight); margin:0; }
  .date{ color:var(--color-text-muted); font-size:var(--fs-caption); margin:7px 0 0; }
  .memo{ font-size:var(--fs-body); line-height:var(--lh-relaxed); color:var(--color-text); margin:14px 0 0; }

  /* 큰 사진 (따뜻한 그라데이션 — 콘텐츠로 읽히게) */
  .photo{ width:100%; aspect-ratio:4/3; border-radius:0; border-left:none; border-right:none; display:block;
          background:linear-gradient(135deg,#d8d1c4 0%, #e7e1d6 55%, #ddd6c9 100%); position:relative; margin-top:18px; }
  .photo::after{ content:"사진"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
          color:var(--color-text-muted); font-size:var(--fs-caption); letter-spacing:.04em; opacity:.55; }
  .photo + .photo{ margin-top:2px; }

  /* 비공개 접근 불가 상태 */
  .blocked{ display:none; flex-direction:column; align-items:center; text-align:center; gap:14px; padding:64px 28px; }
  .blocked.show{ display:flex; }
  .blocked .lock{
    width:72px; height:72px; border-radius:var(--r-lg);
    background:var(--color-primary-tint); border:1.5px solid var(--color-primary);
    display:flex; align-items:center; justify-content:center; color:var(--color-primary); font-size:30px;
  }
  .blocked .bl-title{ margin:0; font-weight:var(--fw-bold); font-size:var(--fs-h2); }
  .blocked .bl-sub{ margin:0; color:var(--color-text-muted); font-size:var(--fs-caption); line-height:var(--lh-relaxed); }
  .contentwrap.hide{ display:none; }

  /* 하단 CTA (앱 없는 사람 → 나도 만들기) */
  .cta{
    position:fixed; left:50%; transform:translateX(-50%); bottom:0; z-index:30;
    width:100%; max-width:var(--app-w); min-width:var(--app-min);
    display:flex; align-items:center; gap:12px;
    padding:12px var(--pad) max(14px, env(safe-area-inset-bottom));
    background:color-mix(in srgb, var(--color-surface) 92%, transparent);
    backdrop-filter:blur(10px);
    border-top:1px solid var(--color-border);
    box-shadow:0 -6px 20px rgba(43,43,43,.06);
  }
  .cta .txt{ flex:1; font-size:var(--fs-small); color:var(--color-text-muted); line-height:var(--lh-normal); }
  .cta .btn-primary{ flex:none; }
</style>
</head>
<body>
<div class="app">
  <div class="brandbar">
    <span class="brand"><span class="dot"></span>발자취 · 웹으로 보기</span>
    <span class="web-tag">앱 없이 열람 중</span>
  </div>

  <div class="statebar" id="statebar">
    <span class="state-label" id="stateLabel"><span class="ind" aria-hidden="true"></span>공개 코스 — 누구나 열람</span>
    <button class="priv-toggle" id="privToggle" type="button" aria-pressed="false">비공개 링크였다면?</button>
  </div>

  <main>
    <!-- 공개 코스 정상 -->
    <div class="contentwrap" id="content">
      <div class="map hero-map" id="map">
        <span class="map-label">지도 영역 · 동선</span>
        <svg width="100%" height="100%" viewBox="0 0 390 210" preserveAspectRatio="none" aria-hidden="true">
          <polyline class="route" points="44,160 138,100 268,124 350,54"/>
          <g class="pin"><circle cx="44"  cy="160" r="13"/><text x="44"  y="164">1</text></g>
          <g class="pin"><circle cx="138" cy="100" r="13"/><text x="138" y="104">2</text></g>
          <g class="pin"><circle cx="268" cy="124" r="13"/><text x="268" y="128">3</text></g>
          <g class="pin"><circle cx="350" cy="54"  r="13"/><text x="350" y="58">4</text></g>
        </svg>
      </div>
      <div class="body">
        <h1 class="title">서울숲 봄나들이</h1>
        <p class="date">2026.04.12 · 방문지 3곳 · 사진 11장 · 수아 님</p>
        <p class="memo">벚꽃 끝물에 겨우 맞춰 다녀온 봄 산책.</p>
      </div>
      <div class="photo"></div>
      <div class="photo"></div>
    </div>

    <!-- 비공개 링크 접근 불가 -->
    <div class="blocked" id="blocked" role="region" aria-label="비공개 코스 접근 불가">
      <div class="lock" aria-hidden="true">🔒</div>
      <p class="bl-title">비공개 코스예요</p>
      <p class="bl-sub">만든 사람이 공개로 설정해야<br>링크로 볼 수 있어요.</p>
    </div>
  </main>

  <div class="cta">
    <span class="txt">앱 없이 웹으로 보는 중이에요.</span>
    <a class="btn btn-primary" href="index.html" aria-label="앱에서 나도 코스 만들기">나도 만들기</a>
  </div>
</div>

<script>
  // 공개/비공개 상태 전환 — 비공개면 접근 불가 패널(관측 가능한 상태 변화)
  const t=document.getElementById('privToggle'), content=document.getElementById('content'),
        blocked=document.getElementById('blocked'), label=document.getElementById('stateLabel'),
        statebar=document.getElementById('statebar');
  const indHTML='<span class="ind" aria-hidden="true"></span>';
  t.addEventListener('click',()=>{
    const on = t.getAttribute('aria-pressed')==='true';
    t.setAttribute('aria-pressed', on?'false':'true');
    blocked.classList.toggle('show', !on);
    content.classList.toggle('hide', !on);
    statebar.classList.toggle('is-private', !on);
    label.innerHTML = indHTML + (on ? '공개 코스 — 누구나 열람' : '비공개 코스 — 접근 불가');
    t.textContent = on ? '비공개 링크였다면?' : '공개 코스로 보기';
  });
</script>
</body>
</html>
