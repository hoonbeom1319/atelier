<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>요기조기 — 설정 (SC-20)</title>
<style>
  @import url("../foundation/tokens.css");

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--color-surface-alt)}
  body{
    width:var(--app-width);min-height:844px;margin:0 auto;position:relative;
    font-family:var(--font-sans);color:var(--color-text);
    -webkit-font-smoothing:antialiased;background:var(--color-surface-alt);
    padding-bottom:calc(var(--tabbar-h) + 34px);
  }
  a{color:inherit}
  svg{display:block;flex:none}

  /* ── 앱바 (인스타식 슬림 48px + 헤어라인, 뒤로) ───────────────── */
  .appbar{
    height:var(--appbar-h);display:grid;grid-template-columns:44px 1fr 44px;align-items:center;
    position:sticky;top:0;z-index:var(--z-appbar);
    background:rgba(16,16,18,.86);backdrop-filter:saturate(180%) blur(14px);
    -webkit-backdrop-filter:saturate(180%) blur(14px);
    border-bottom:1px solid var(--color-border);
  }
  .ab-back{
    width:44px;height:44px;display:grid;place-items:center;text-decoration:none;color:var(--color-text);
    border-radius:var(--radius-full);transition:background .12s ease,transform .12s ease;
  }
  .ab-back:active{background:var(--color-surface-alt);transform:scale(.9)}
  .ab-back svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .ab-title{text-align:center;font-size:var(--fs-h2);font-weight:var(--fw-h2);letter-spacing:-.02em}

  /* ── 그룹 리스트 (iOS식) ─────────────────────────────── */
  .wrap{padding:var(--space-2) var(--space-3) 0}
  .sec-label{
    margin:var(--space-6) var(--space-2) var(--space-2);
    font-size:var(--fs-xs);line-height:var(--lh-xs);font-weight:var(--fw-semibold);
    letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-muted);
  }
  .sec-label:first-of-type{margin-top:var(--space-3)}
  .card{
    background:var(--color-surface);border-radius:var(--radius-md);
    box-shadow:var(--shadow-1),inset 0 0 0 1px var(--color-border);
    overflow:hidden;
  }
  .row{
    display:flex;align-items:center;gap:var(--space-3);
    padding:13px var(--space-4);min-height:52px;text-decoration:none;color:inherit;position:relative;
  }
  .row + .row::before{
    content:"";position:absolute;top:0;left:52px;right:0;height:1px;background:var(--color-divider);
  }
  a.row{transition:background .12s ease}
  a.row:active{background:var(--color-surface-alt)}
  .ic{
    width:28px;height:28px;flex:none;display:grid;place-items:center;border-radius:var(--radius-sm);
    background:var(--color-primary-tint);color:var(--color-text-secondary);
  }
  .ic svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .row .body{flex:1;min-width:0}
  .row .k{display:block;font-size:var(--fs-body);line-height:var(--lh-body);font-weight:var(--fw-medium);letter-spacing:-.01em}
  .row .desc{display:block;margin-top:2px;font-size:var(--fs-sm);line-height:var(--lh-sm);color:var(--color-text-muted)}
  .row .v{font-size:var(--fs-sm);color:var(--color-text-muted);font-weight:var(--fw-medium);white-space:nowrap}
  .chev{width:18px;height:18px;flex:none;stroke:var(--color-border-strong);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

  /* 계정 헤더 (아바타 큰 행) */
  .acct{padding:var(--space-4);gap:var(--space-4)}
  .avatar{
    width:56px;height:56px;flex:none;border-radius:var(--radius-full);position:relative;
    display:grid;place-items:center;font-size:var(--fs-h2);font-weight:var(--fw-h1);color:#fff;
    background:linear-gradient(140deg,#e8c9a0,#c98a5a 60%,#9c5f38);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.12);letter-spacing:-.02em;
  }
  .avatar span{text-shadow:0 1px 2px rgba(0,0,0,.25)}
  .acct .nm{font-size:var(--fs-h2);line-height:var(--lh-h2);font-weight:var(--fw-h2);letter-spacing:-.02em}
  .acct .hd{margin-top:2px;font-size:var(--fs-sm);color:var(--color-text-muted);font-weight:var(--fw-medium)}

  /* ── iOS 스위치 (검정 on) ────────────────────────────── */
  .switch{
    position:relative;width:50px;height:30px;flex:none;border:0;padding:0;cursor:pointer;
    border-radius:var(--radius-full);background:var(--color-border-strong);
    transition:background .22s cubic-bezier(.4,0,.2,1);
  }
  .switch::after{
    content:"";position:absolute;top:2px;left:2px;width:26px;height:26px;border-radius:var(--radius-full);
    background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.28);
    transition:transform .22s cubic-bezier(.4,0,.2,1);
  }
  .switch[aria-checked="true"]{background:var(--color-primary)}
  .switch[aria-checked="true"]::after{transform:translateX(20px)}
  .switch:focus-visible{outline:2px solid var(--color-focus-ring);outline-offset:2px}

  /* ── 공개범위 라디오 (투명 오버레이 input) ───────────────── */
  .scope-hint{
    margin:0 var(--space-2) var(--space-2);font-size:var(--fs-sm);line-height:var(--lh-sm);
    color:var(--color-text-muted);
  }
  .opt{
    display:flex;align-items:center;gap:var(--space-3);padding:13px var(--space-4);
    min-height:56px;position:relative;cursor:pointer;
  }
  .opt + .opt::before{
    content:"";position:absolute;top:0;left:var(--space-4);right:0;height:1px;background:var(--color-divider);
  }
  .opt input{
    position:absolute;inset:0;width:100%;height:100%;margin:0;opacity:0;cursor:pointer;
  }
  .opt .dot{
    width:22px;height:22px;flex:none;border-radius:var(--radius-full);
    border:2px solid var(--color-border-strong);display:grid;place-items:center;
    transition:border-color .15s ease;
  }
  .opt .dot::after{
    content:"";width:12px;height:12px;border-radius:var(--radius-full);background:var(--color-primary);
    transform:scale(0);transition:transform .18s cubic-bezier(.34,1.56,.64,1);
  }
  .opt .otxt{flex:1;min-width:0}
  .opt .ot{display:block;font-size:var(--fs-body);font-weight:var(--fw-medium);letter-spacing:-.01em}
  .opt .osub{display:block;margin-top:1px;font-size:var(--fs-sm);color:var(--color-text-muted)}
  .opt input:checked ~ .dot{border-color:var(--color-primary)}
  .opt input:checked ~ .dot::after{transform:scale(1)}
  .opt input:checked ~ .otxt .ot{font-weight:var(--fw-semibold)}
  .opt:has(input:checked){background:var(--color-surface-alt)}
  .opt input:focus-visible ~ .dot{outline:2px solid var(--color-focus-ring);outline-offset:2px}

  /* ── 재요청 버튼 ─────────────────────────────────── */
  .req{
    font:inherit;font-size:var(--fs-sm);font-weight:var(--fw-semibold);color:var(--color-primary);
    background:var(--color-surface-alt);border:1px solid var(--color-border);
    border-radius:var(--radius-full);padding:7px 15px;cursor:pointer;white-space:nowrap;
    transition:background .12s ease,transform .12s ease;
  }
  .req:hover{background:var(--color-primary-tint)}
  .req:active{transform:scale(.95)}
  .req[data-done="true"]{color:var(--color-text-muted);background:transparent}

  /* ── 로그아웃 ────────────────────────────────────── */
  .logout{
    display:block;margin:var(--space-6) var(--space-3) var(--space-4);
    background:var(--color-surface);border-radius:var(--radius-md);
    box-shadow:var(--shadow-1),inset 0 0 0 1px var(--color-border);
    text-align:center;text-decoration:none;color:var(--color-danger);
    font-size:var(--fs-body);font-weight:var(--fw-semibold);padding:15px;
    transition:background .12s ease;
  }
  .logout:active{background:var(--color-surface-alt)}
  .ver{text-align:center;font-size:var(--fs-xs);color:var(--color-text-muted);margin-bottom:var(--space-4)}

  /* ── 토스트 ─────────────────────────────────────── */
  .toast{
    position:fixed;left:50%;transform:translateX(-50%) translateY(8px);
    bottom:calc(var(--tabbar-h) + 22px);max-width:340px;
    background:var(--color-text);color:var(--color-on-dark);
    font-size:var(--fs-sm);font-weight:var(--fw-medium);line-height:var(--lh-sm);
    padding:11px 16px;border-radius:var(--radius-md);box-shadow:var(--shadow-3);
    z-index:var(--z-toast);display:flex;align-items:center;gap:9px;
    opacity:0;pointer-events:none;transition:opacity .22s ease,transform .22s ease;
  }
  .toast svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ── 하단 탭바 + FAB ─────────────────────────────── */
  .tabbar{
    position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:var(--app-width);
    height:var(--tabbar-h);display:flex;align-items:stretch;z-index:var(--z-tabbar);
    background:var(--color-surface);box-shadow:0 -1px 0 var(--color-border);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tab{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    text-decoration:none;color:var(--color-text-muted);font-size:var(--fs-xs);font-weight:var(--fw-medium);
    transition:color .12s ease;
  }
  .tab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .tab:active{color:var(--color-text)}
  .tab[aria-current="page"]{color:var(--color-text);font-weight:var(--fw-semibold)}
  .fab{position:relative;flex:0 0 84px;display:flex;align-items:center;justify-content:center;text-decoration:none}
  .fab .knob{
    width:48px;height:34px;border-radius:var(--radius-md);background:var(--color-primary);
    display:grid;place-items:center;box-shadow:var(--shadow-2);transition:transform .12s ease;
  }
  .fab:active .knob{transform:scale(.93)}
  .fab .knob svg{width:22px;height:22px;stroke:var(--color-on-primary);fill:none;stroke-width:2.4;stroke-linecap:round}
</style>
</head>
<body>

<header class="appbar">
  <a class="ab-back" href="profile-me.html" aria-label="뒤로">
    <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg>
  </a>
  <h1 class="ab-title">설정</h1>
  <span aria-hidden="true"></span>
</header>

<main class="wrap">

  <!-- 계정 -->
  <div class="sec-label">계정</div>
  <section class="card">
    <a class="row acct" href="profile-me.html" aria-label="프로필 편집: 이도윤 @yogi_user">
      <span class="avatar" aria-hidden="true"><span>이</span></span>
      <span class="body">
        <span class="nm">이도윤</span>
        <span class="hd">@yogi_user · 프로필 편집</span>
      </span>
      <svg class="chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
    </a>
    <div class="row">
      <span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M4 7l8 6 8-6"/></svg></span>
      <span class="body"><span class="k">이메일</span></span>
      <span class="v">dylee@yogijogi.app</span>
    </div>
    <div class="row">
      <span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M16 12v1.5a2.5 2.5 0 0 0 5 0V12a9 9 0 1 0-3.5 7.1"/></svg></span>
      <span class="body"><span class="k">핸들</span></span>
      <span class="v">@yogi_user</span>
    </div>
  </section>

  <!-- 공개범위 기본값 -->
  <div class="sec-label">공개범위 기본값</div>
  <p class="scope-hint">새로 올리는 게시물의 기본 공개 범위입니다. 게시물마다 개별 변경할 수 있어요.</p>
  <section class="card" role="radiogroup" aria-label="공개범위 기본값">
    <label class="opt">
      <input type="radio" name="scope" value="public" onchange="pickScope('공개')">
      <span class="dot" aria-hidden="true"></span>
      <span class="otxt"><span class="ot">공개</span><span class="osub">누구나 볼 수 있어요</span></span>
    </label>
    <label class="opt">
      <input type="radio" name="scope" value="followers" checked onchange="pickScope('팔로워')">
      <span class="dot" aria-hidden="true"></span>
      <span class="otxt"><span class="ot">팔로워</span><span class="osub">맞팔·팔로워에게만</span></span>
    </label>
    <label class="opt">
      <input type="radio" name="scope" value="private" onchange="pickScope('비공개')">
      <span class="dot" aria-hidden="true"></span>
      <span class="otxt"><span class="ot">비공개</span><span class="osub">나만 볼 수 있어요</span></span>
    </label>
  </section>
  <p class="scope-hint" style="margin-top:var(--space-2)">현재 기본값 · <b id="scopeNow" style="color:var(--color-text);font-weight:var(--fw-semibold)">팔로워</b></p>

  <!-- 프라이버시 -->
  <div class="sec-label">프라이버시</div>
  <section class="card">
    <div class="row">
      <span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 17l5-9 5 5 6-9"/><circle cx="9" cy="8" r="1.4"/><circle cx="14" cy="13" r="1.4"/></svg></span>
      <span class="body"><span class="k">동선 공개</span><span class="desc" id="routeDesc">지도에 방문 동선 폴리라인 표시</span></span>
      <button type="button" class="switch" id="routeSw" role="switch" aria-checked="true" aria-label="동선 공개" onclick="toggleSw('routeSw','routeDesc','지도에 방문 동선 폴리라인 표시','동선 숨김 · 개별 핀만 표시')"></button>
    </div>
  </section>

  <!-- 권한 재설정 -->
  <div class="sec-label">권한 재설정</div>
  <section class="card">
    <div class="row">
      <span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 21s7-6 7-11a7 7 0 1 0-14 0c0 5 7 11 7 11z"/><circle cx="12" cy="10" r="2.4"/></svg></span>
      <span class="body"><span class="k">위치 권한</span><span class="desc">방문한 장소를 지도에 기록</span></span>
      <button type="button" class="req" onclick="reqPerm(this,'위치')">재요청</button>
    </div>
    <div class="row">
      <span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M8 6l1.5-2h5L16 6"/><circle cx="12" cy="13" r="3.2"/></svg></span>
      <span class="body"><span class="k">사진 권한</span><span class="desc">갤러리에서 여정 사진 불러오기</span></span>
      <button type="button" class="req" onclick="reqPerm(this,'사진')">재요청</button>
    </div>
  </section>

  <!-- 알림 -->
  <div class="sec-label">알림</div>
  <section class="card">
    <div class="row">
      <span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6z"/><path d="M10 19a2 2 0 0 0 4 0"/></svg></span>
      <span class="body"><span class="k">푸시 알림</span><span class="desc" id="pushDesc">좋아요 · 팔로우 · 장소 액티비티</span></span>
      <button type="button" class="switch" id="pushSw" role="switch" aria-checked="true" aria-label="푸시 알림" onclick="toggleSw('pushSw','pushDesc','좋아요 · 팔로우 · 장소 액티비티','모든 푸시 알림이 꺼졌어요')"></button>
    </div>
  </section>

  <!-- 로그아웃 -->
  <a class="logout" href="auth.html">로그아웃</a>
  <p class="ver">요기조기 · 버전 1.0.0 (24)</p>

</main>

<!-- 토스트 -->
<div class="toast" id="toast" role="status" aria-live="polite">
  <svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6"/></svg>
  <span id="toastMsg"></span>
</div>

<!-- 하단 탭바 -->
<nav class="tabbar" aria-label="주요 내비게이션">
  <a class="tab" href="map-home.html">
    <svg viewBox="0 0 24 24"><path d="M4 11.5 12 4l8 7.5"/><path d="M6 10v9h12v-9"/><path d="M10 19v-5h4v5"/></svg>홈
  </a>
  <a class="fab" href="upload-1-gallery.html" aria-label="새 게시물 업로드">
    <span class="knob"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></span>
  </a>
  <a class="tab" href="profile-me.html">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.6"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>프로필
  </a>
</nav>

<script>
  var toastTimer;
  function showToast(msg){
    var t=document.getElementById('toast');
    document.getElementById('toastMsg').textContent=msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){t.classList.remove('show');},2400);
  }
  function pickScope(label){
    document.getElementById('scopeNow').textContent=label;
    showToast('기본 공개범위를 ‘'+label+'’(으)로 저장했어요');
  }
  function toggleSw(id, descId, onText, offText){
    var b=document.getElementById(id);
    var on=b.getAttribute('aria-checked')!=='true';
    b.setAttribute('aria-checked', on);
    document.getElementById(descId).textContent = on ? onText : offText;
  }
  function reqPerm(btn, name){
    btn.setAttribute('data-done','true');
    btn.textContent='요청됨';
    showToast(name+' 권한 재요청 안내를 보냈어요 · 실제 OS 권한창은 [범위 밖]');
  }
</script>
</body>
</html>
