<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 사람 찾기 (S7)</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<link rel="stylesheet" href="app.css">
<style>
  /* ---- S7 사람 찾기(검색→팔로우) 전용 ---- */
  main{ padding:8px 0 40px; }

  /* 검색 필드 행: 돋보기 아이콘 인셋 */
  .searchwrap{ padding:14px var(--pad) 16px; }
  .searchbox{ position:relative; }
  .searchbox .gl{
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    font-size:15px; color:var(--color-text-muted); pointer-events:none;
  }
  .searchbox .field{ padding-left:40px; font-size:var(--fs-body); }

  /* 초기 안내(발견 surface 설명) */
  .hint{
    display:flex; flex-direction:column; align-items:center; text-align:center;
    gap:12px; padding:40px 28px; color:var(--color-text-muted);
  }
  .hint[hidden]{ display:none; }
  .hint .ill{
    width:80px; height:80px; border-radius:50%;
    background:radial-gradient(circle at 50% 38%, var(--color-primary-tint), var(--color-bg));
    border:1px solid var(--color-border-strong);
    display:flex; align-items:center; justify-content:center; font-size:30px;
  }
  .hint .ht{ margin:0; font-size:var(--fs-h2); font-weight:var(--fw-semibold); color:var(--color-text); letter-spacing:var(--ls-tight); }
  .hint .hs{ margin:0; font-size:var(--fs-caption); line-height:var(--lh-relaxed); }
  .hint .hs b{ color:var(--color-text); font-weight:var(--fw-semibold); }

  /* 결과 카운트 라벨 */
  .reslabel{
    font-size:var(--fs-small); color:var(--color-text-muted); font-weight:var(--fw-semibold);
    padding:4px var(--pad) 8px;
  }
  .reslabel[hidden]{ display:none; }

  /* 결과 리스트 */
  #results{ display:flex; flex-direction:column; }
  .row{
    display:flex; align-items:center; gap:12px;
    padding:11px var(--pad); border-bottom:1px solid var(--color-border);
  }
  .row .person{
    display:flex; align-items:center; gap:12px; flex:1; min-width:0;
    text-decoration:none; color:inherit;
    border-radius:var(--r-md); margin:-6px; padding:6px;
    transition:background var(--dur) var(--ease);
  }
  .row .person:hover{ background:var(--color-primary-tint); }
  .ava{
    width:44px; height:44px; flex:none; border-radius:50%;
    border:1px solid var(--color-border-strong);
    background:linear-gradient(135deg,#e9e6df,#f3f1ec);
    display:flex; align-items:center; justify-content:center;
    font-size:var(--fs-body); font-weight:var(--fw-bold); color:var(--color-text-muted);
  }
  .row .meta{ min-width:0; }
  .row .nm{ font-weight:var(--fw-semibold); font-size:var(--fs-body); letter-spacing:var(--ls-tight); }
  .row .sub{ display:block; font-size:var(--fs-small); color:var(--color-text-muted); margin-top:2px; }

  /* 결과 없음 */
  .noresult{
    text-align:center; color:var(--color-text-muted); font-size:var(--fs-caption);
    line-height:var(--lh-relaxed); padding:40px 28px;
  }
  .noresult[hidden]{ display:none; }
  .noresult .nr-emoji{ display:block; font-size:26px; margin-bottom:8px; }

  /* 잔잔한 진입 */
  @media (prefers-reduced-motion:no-preference){
    .row{ opacity:0; transform:translateY(8px); animation:reveal .42s var(--ease-out) forwards; }
    .row:nth-child(2){ animation-delay:.04s; }
    .row:nth-child(3){ animation-delay:.08s; }
    .row:nth-child(4){ animation-delay:.12s; }
    .row:nth-child(5){ animation-delay:.16s; }
  }
  @keyframes reveal{ to{ opacity:1; transform:none; } }
</style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <a class="iconbtn" href="together.html" aria-label="뒤로(다 같이)">←</a>
    <h1>사람 찾기</h1>
    <span class="scope-tag">S7</span>
  </header>

  <div class="searchwrap">
    <div class="searchbox">
      <span class="gl" aria-hidden="true">🔍</span>
      <input class="field" id="q" type="search" placeholder="닉네임으로 검색 (예: 민지)" aria-label="닉네임 검색">
    </div>
  </div>

  <main>
    <div class="hint" id="hint">
      <div class="ill" aria-hidden="true">🧭</div>
      <p class="ht">팔로우하고 싶은 사람의 닉네임을 검색하세요.</p>
      <p class="hs">다 같이는 <b>이미 팔로우한</b> 사람들의 코스를 보는 곳,<br>여기는 <b>새 사람을 발견</b>하는 곳이에요.</p>
    </div>

    <p class="reslabel" id="reslabel" aria-live="polite" hidden></p>
    <div id="results" role="list" aria-label="검색 결과"></div>
    <p class="noresult" id="noresult" hidden><span class="nr-emoji" aria-hidden="true">🔎</span>일치하는 사람이 없어요.</p>
  </main>
</div>

<script>
  const ALL = [
    {nm:'민지', sub:'코스 8 · 팔로워 20'},
    {nm:'재호', sub:'코스 5 · 팔로워 9'},
    {nm:'수아', sub:'코스 6 · 팔로워 12'},
    {nm:'지우', sub:'코스 3 · 팔로워 5'},
    {nm:'현우', sub:'코스 11 · 팔로워 33'},
  ];
  const q=document.getElementById('q'), results=document.getElementById('results'),
        hint=document.getElementById('hint'), noresult=document.getElementById('noresult'),
        reslabel=document.getElementById('reslabel');

  function render(list){
    results.innerHTML='';
    list.forEach(p=>{
      const r=document.createElement('div'); r.className='row'; r.setAttribute('role','listitem');
      r.innerHTML =
        '<a class="person" href="user.html?of='+encodeURIComponent(p.nm)+'&from=search" aria-label="'+p.nm+' 프로필 보기">'+
          '<span class="ava" aria-hidden="true">'+p.nm.charAt(0)+'</span>'+
          '<span class="meta"><span class="nm">'+p.nm+'</span><span class="sub">'+p.sub+'</span></span>'+
        '</a>'+
        '<button class="follow" type="button" aria-pressed="false" aria-label="'+p.nm+' 팔로우">팔로우</button>';
      const b=r.querySelector('.follow');
      b.addEventListener('click',()=>{
        const on=b.getAttribute('aria-pressed')==='true';
        b.setAttribute('aria-pressed', on?'false':'true');
        b.textContent = on ? '팔로우' : '팔로잉 ✓';
      });
      results.appendChild(r);
    });
  }

  q.addEventListener('input', ()=>{
    const v=q.value.trim();
    if(!v){ hint.hidden=false; noresult.hidden=true; reslabel.hidden=true; results.innerHTML=''; return; }
    hint.hidden=true;
    const list=ALL.filter(p=>p.nm.includes(v));
    noresult.hidden = list.length>0;
    reslabel.hidden = list.length===0;
    if(list.length>0) reslabel.textContent='검색 결과 '+list.length+'명';
    render(list);
  });
</script>
</body>
</html>
