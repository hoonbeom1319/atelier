<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 마무리 (C5)</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<link rel="stylesheet" href="app.css">
<style>
  /* ---- C5 마무리 전용 ---- */
  main{ padding:8px var(--pad) 120px; }

  .intro{ margin:6px 2px 2px; }
  .intro h2{ font-size:var(--fs-title); font-weight:var(--fw-bold); letter-spacing:var(--ls-tight); margin:0 0 4px; }
  .intro p{ margin:0; font-size:var(--fs-caption); color:var(--color-text-muted); }

  /* 섹션 라벨 */
  .fld{ display:flex; align-items:baseline; gap:8px; font-size:var(--fs-label); font-weight:var(--fw-bold);
        margin:22px 2px 8px; }
  .fld .opt{ font-size:var(--fs-tiny); font-weight:var(--fw-medium); color:var(--color-text-muted); }

  textarea.field{ min-height:84px; resize:vertical; line-height:var(--lh-normal); }

  /* 태그 */
  .tags{ display:flex; gap:7px; flex-wrap:wrap; margin-top:4px; }
  .tags:empty{ display:none; }
  .tags .chip{ animation:chipIn var(--dur) var(--ease-spring); }
  .chip--remove button:hover{ color:var(--color-primary); }
  @keyframes chipIn{ from{ opacity:0; transform:scale(.8); } to{ opacity:1; transform:none; } }
  .addtag{ display:flex; gap:8px; margin-top:10px; }
  .addtag .field{ flex:1; }
  .addtag button{ flex:none; font-family:inherit; font-size:var(--fs-label); font-weight:var(--fw-semibold);
                  color:var(--color-text); background:var(--color-surface); border:1.5px solid var(--color-border-strong);
                  border-radius:var(--r-md); padding:0 18px; cursor:pointer; transition:background var(--dur) var(--ease), border-color var(--dur) var(--ease); }
  .addtag button:hover{ background:var(--color-bg); border-color:var(--color-primary); }
  .addtag button:active{ transform:translateY(1px); }

  /* 공개 토글 카드 */
  .toggle{ display:flex; align-items:center; gap:14px; background:var(--color-surface);
           border:1px solid var(--color-border); border-radius:var(--r-lg); box-shadow:var(--shadow-card);
           padding:16px; margin-top:4px; transition:border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease); }
  .toggle.on{ border-color:var(--color-primary); box-shadow:0 0 0 1px var(--color-primary), var(--shadow-card); }
  .toggle .ic{ width:40px; height:40px; flex:none; border-radius:50%; display:flex; align-items:center; justify-content:center;
               font-size:19px; background:var(--color-bg); color:var(--color-text-muted); transition:all var(--dur) var(--ease); }
  .toggle.on .ic{ background:var(--color-primary-tint); color:var(--color-primary); }
  .toggle .txt{ flex:1; min-width:0; }
  .toggle .txt b{ display:block; font-size:var(--fs-body); font-weight:var(--fw-semibold); }
  .toggle .txt small{ display:block; margin-top:2px; font-size:var(--fs-small); color:var(--color-text-muted); line-height:var(--lh-normal); }

  .pubnote{ display:flex; align-items:flex-start; gap:7px; font-size:var(--fs-small); color:var(--color-text-muted);
            margin:10px 2px 0; line-height:var(--lh-normal); }
  .pubnote .lk{ flex:none; }

  /* 하단 고정 액션 */
  .foot{ position:absolute; left:0; right:0; bottom:0; z-index:30;
         padding:12px var(--pad) max(14px, env(safe-area-inset-bottom));
         background:color-mix(in srgb, var(--color-surface) 92%, transparent); backdrop-filter:blur(8px);
         border-top:1px solid var(--color-border); }
</style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <a class="iconbtn" href="review.html" aria-label="뒤로(검토)">←</a>
    <h1>마무리</h1>
    <span class="scope-tag">C5</span>
  </header>

  <main>
    <div class="intro">
      <h2>거의 다 왔어요</h2>
      <p>제목만 정하면 코스가 완성돼요. 나머지는 선택이에요.</p>
    </div>

    <label class="fld" for="title">코스 제목</label>
    <input id="title" class="field" type="text" placeholder="예: 전주 한옥마을 가족 나들이" value="전주 한옥마을 가족 나들이">

    <label class="fld" for="memo">짧은 글 <span class="opt">선택</span></label>
    <textarea id="memo" class="field" placeholder="비워도 코스는 완성돼요."></textarea>

    <span class="fld">태그 <span class="opt">선택</span></span>
    <div class="tags" id="tags" aria-label="태그 목록"></div>
    <div class="addtag">
      <input id="tagInput" class="field" type="text" placeholder="태그 입력 후 추가" aria-label="태그 입력">
      <button id="addTag" type="button">추가</button>
    </div>

    <span class="fld">공개 설정</span>
    <div class="toggle" id="pubCard">
      <span class="ic" id="pubIc" aria-hidden="true">🔒</span>
      <div class="txt">
        <b id="pubLabel">비공개</b>
        <small id="pubDesc">나만 봐요. 공개로 켜야 공유·노출돼요.</small>
      </div>
      <button class="switch" id="pubSwitch" type="button" aria-pressed="false" aria-label="공개 여부 토글">
        <span class="knob"></span>
      </button>
    </div>
    <p class="pubnote" id="pubNote"><span class="lk" aria-hidden="true">📍</span><span>위치 정보가 담기므로 기본은 비공개예요.</span></p>
  </main>

  <div class="foot">
    <a class="btn btn-primary btn-block" id="finish" href="course.html?from=finalize">코스 완성</a>
  </div>
</div>

<script>
  /* 태그 추가/삭제 */
  const tagsEl=document.getElementById('tags'), tagInput=document.getElementById('tagInput');
  let tags=['가족','주말'];
  function renderTags(){
    tagsEl.innerHTML='';
    tags.forEach((t,i)=>{
      const c=document.createElement('span'); c.className='chip chip--remove';
      c.innerHTML='#'+t+' <button type="button" aria-label="태그 '+t+' 삭제">✕</button>';
      c.querySelector('button').addEventListener('click',()=>{ tags.splice(i,1); renderTags(); });
      tagsEl.appendChild(c);
    });
  }
  function addTag(){
    const v=tagInput.value.trim().replace(/^#/,''); if(!v) return;
    tags.push(v); tagInput.value=''; renderTags();
  }
  document.getElementById('addTag').addEventListener('click', addTag);
  tagInput.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); addTag(); }});
  renderTags();

  /* 공개 토글 — 실제 상태 변화(aria-pressed) */
  const sw=document.getElementById('pubSwitch'), pl=document.getElementById('pubLabel'),
        pd=document.getElementById('pubDesc'), pn=document.getElementById('pubNote'),
        card=document.getElementById('pubCard'), ic=document.getElementById('pubIc');
  sw.addEventListener('click',()=>{
    const on = sw.getAttribute('aria-pressed')==='true';
    sw.setAttribute('aria-pressed', on?'false':'true');
    if(!on){
      pl.textContent='공개'; pd.textContent='링크가 있는 사람이 볼 수 있어요.';
      pn.lastElementChild.textContent='공개됨 — 공유 링크로 누구나 열람 가능.';
      card.classList.add('on'); ic.textContent='🌐';
    } else {
      pl.textContent='비공개'; pd.textContent='나만 봐요. 공개로 켜야 공유·노출돼요.';
      pn.lastElementChild.textContent='위치 정보가 담기므로 기본은 비공개예요.';
      card.classList.remove('on'); ic.textContent='🔒';
    }
  });
</script>
</body>
</html>
