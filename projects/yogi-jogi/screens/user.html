<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 다른 사람 프로필 (S3b)</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<link rel="stylesheet" href="app.css">
<style>
  /* ---- S3b 다른 사람 프로필 전용 ---- */
  main{ padding:0 0 28px; }

  /* 프로필 헤더 */
  .head{ display:flex; align-items:center; gap:14px; padding:22px var(--pad) 20px; border-bottom:1px solid var(--color-border); }
  .ava{
    width:66px; height:66px; flex:none; border-radius:50%;
    background:linear-gradient(135deg,#e9e6df,#f3f1ec);
    border:1px solid var(--color-border); box-shadow:var(--shadow-sm);
  }
  .head .info{ flex:1; min-width:0; }
  .head .nm{ font-size:var(--fs-title); font-weight:var(--fw-bold); letter-spacing:var(--ls-tight); margin:0;
             overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .head .stat{ font-size:var(--fs-caption); color:var(--color-text-muted); margin:6px 0 0; }

  /* 그리드 헤더 */
  .gridhead{ padding:18px var(--pad) 10px; font-size:var(--fs-h2); font-weight:var(--fw-bold); letter-spacing:var(--ls-tight); }

  /* 공개 코스 그리드 (사진/faux-map 타일) */
  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:3px; padding:0 var(--pad); }
  .gtile{
    aspect-ratio:1; position:relative; text-decoration:none; overflow:hidden;
    border-radius:var(--r-sm); border:1px solid var(--color-border);
    transition:transform var(--dur-fast) var(--ease), box-shadow var(--dur) var(--ease);
  }
  .gtile:hover{ transform:translateY(-2px); box-shadow:var(--shadow-card); z-index:1; }
  .gtile:active{ transform:translateY(0) scale(.98); }
  .gtile .map{ position:absolute; inset:0; border-radius:0; }
  .gtile .map svg{ inset:0; }
  .gtile .route{ stroke-width:3; }
  .gtile .lk{
    position:absolute; bottom:5px; right:5px; z-index:2;
    font-size:var(--fs-tiny); font-weight:var(--fw-semibold); color:var(--color-text-muted);
    background:color-mix(in srgb, var(--color-surface) 90%, transparent); border-radius:var(--r-pill);
    padding:1px 7px; box-shadow:var(--shadow-sm);
  }

  /* 비공개·일방 팔로우 안내 */
  .note{ font-size:var(--fs-small); color:var(--color-text-muted); line-height:var(--lh-normal); padding:14px var(--pad) 0; }

  /* 잔잔한 진입 */
  @media (prefers-reduced-motion:no-preference){
    .reveal{ opacity:0; transform:translateY(10px); animation:reveal .5s var(--ease-out) forwards; }
    .d1{ animation-delay:.04s; } .d2{ animation-delay:.14s; }
  }
  @keyframes reveal{ to{ opacity:1; transform:none; } }
</style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <a class="iconbtn" id="back" href="together.html" aria-label="뒤로">←</a>
    <h1>프로필</h1>
    <span class="scope-tag">S3b</span>
  </header>

  <main>
    <div class="head reveal d1">
      <div class="ava" aria-hidden="true"></div>
      <div class="info">
        <p class="nm" id="nm">수아</p>
        <p class="stat">공개 코스 6 · 팔로워 12</p>
      </div>
      <button class="follow" id="followBtn" type="button" aria-pressed="false" aria-label="팔로우 토글">팔로우</button>
    </div>

    <div class="gridhead reveal d2">공개 코스</div>
    <div class="grid reveal d2" id="grid"></div>
    <p class="note reveal d2">비공개 코스는 보이지 않아요. 일방 팔로우 — 상대 승인 없이 바로 구독됩니다.</p>
  </main>
</div>

<script>
  const params=new URLSearchParams(location.search);
  const who=params.get('of'); if(who){ document.getElementById('nm').textContent=who; }
  // 어디서 왔는지에 따라 뒤로 타깃(데모): from=search 면 검색으로
  if(params.get('from')==='search'){ document.getElementById('back').setAttribute('href','search.html'); }

  // 공개 코스 그리드 → 코스 상세 (faux-map 타일, 코스마다 다른 동선)
  const routes=[
    '20,72 46,42 70,56 90,28',
    '16,34 44,60 70,40 92,64',
    '18,60 40,30 64,52 88,34',
    '22,40 44,66 68,38 90,58',
    '16,66 42,46 66,62 90,32',
    '20,30 46,56 70,34 92,60'
  ];
  const grid=document.getElementById('grid');
  for(let i=0;i<6;i++){
    const a=document.createElement('a'); a.className='gtile'; a.href='course.html';
    a.setAttribute('aria-label','코스 '+(i+1)+' 보기');
    a.innerHTML=
      '<div class="map" aria-hidden="true">'
      +'<svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">'
      +'<polyline class="route" points="'+routes[i]+'"/>'
      +'</svg></div>'
      +'<span class="lk">공개</span>';
    grid.appendChild(a);
  }

  // 일방 팔로우 토글
  const fb=document.getElementById('followBtn');
  fb.addEventListener('click',()=>{
    const on = fb.getAttribute('aria-pressed')==='true';
    fb.setAttribute('aria-pressed', on?'false':'true');
    fb.textContent = on ? '팔로우' : '팔로잉 ✓';
  });
</script>
</body>
</html>
