<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 로그인 (S5)</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<link rel="stylesheet" href="app.css">
<style>
  /* ---- S5 로그인 전용 ---- */
  main{ padding:8px var(--pad) 28px; display:flex; flex-direction:column; }

  /* 브랜드 히어로 */
  .hero{ text-align:center; margin:40px 0 36px; }
  .hero .logo{
    width:76px; height:76px; margin:0 auto 18px;
    border-radius:var(--r-xl);
    background:var(--color-primary-tint);
    box-shadow:0 0 0 1px var(--color-primary) inset, var(--shadow-card);
    display:flex; align-items:center; justify-content:center;
    font-size:38px; line-height:1;
  }
  .hero h2{
    font-size:var(--fs-display); font-weight:var(--fw-bold);
    letter-spacing:var(--ls-tight); margin:0 0 8px;
  }
  .hero p{
    margin:0; font-size:var(--fs-body); color:var(--color-text-muted);
    line-height:var(--lh-normal);
  }

  /* 인증 버튼 묶음 */
  .btns{ display:flex; flex-direction:column; gap:10px; }

  /* 카카오 — 가장 크게(마찰 최소, 타깃 1순위) */
  .lbtn.kakao{
    padding:17px 20px; font-size:var(--fs-h2);
    background:#FEE500; color:#191600; border-color:#FEE500;
    box-shadow:var(--shadow-card);
  }
  .lbtn.kakao:hover{ background:#F5DB00; border-color:#F5DB00; }

  /* 구글 — 또렷하지만 보조 */
  .lbtn.google{ background:var(--color-surface); }

  /* 이메일 토글 버튼 */
  .lbtn.email{ background:var(--color-surface); }

  /* 소셜 아이콘(브랜드 글리프 대용, 외부 의존성 없음) */
  .lbtn .ic{
    width:22px; height:22px; flex:none;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:var(--fw-bold); border-radius:6px;
  }
  .lbtn.kakao .ic{ background:#191600; color:#FEE500; }
  .lbtn.google .ic{ border:1.5px solid var(--color-border-strong); color:var(--color-text); }
  .lbtn.email .ic{ background:var(--color-primary-tint); color:var(--color-primary); }

  .lbtn.email .chev{
    margin-left:auto; color:var(--color-text-muted); font-size:13px;
    transition:transform var(--dur) var(--ease);
  }
  .lbtn.email[aria-expanded="true"] .chev{ transform:rotate(180deg); }

  /* 이메일 로그인 폼 — 인라인 펼침 */
  .emailform{
    display:grid; grid-template-rows:0fr;
    transition:grid-template-rows var(--dur-slow) var(--ease);
    margin-top:2px;
  }
  .emailform.show{ grid-template-rows:1fr; }
  .emailform > .inner{
    overflow:hidden; min-height:0;
    display:flex; flex-direction:column; gap:10px;
  }
  .emailform.show > .inner{
    padding-top:14px; margin-top:6px;
    border-top:1px solid var(--color-border);
  }
  .emailform .submit{ margin-top:2px; }

  /* 약관 푸터 */
  .foot{
    margin-top:auto; padding-top:28px; text-align:center;
    font-size:var(--fs-small); color:var(--color-text-muted);
    line-height:var(--lh-normal);
  }
  .foot a{ color:var(--color-text-muted); text-decoration:underline; text-underline-offset:2px; }

  /* 잔잔한 진입 폴리시 */
  @media (prefers-reduced-motion:no-preference){
    .reveal{ opacity:0; transform:translateY(10px); animation:reveal .5s var(--ease-out) forwards; }
    .d1{ animation-delay:.04s; } .d2{ animation-delay:.12s; }
    .d3{ animation-delay:.20s; } .d4{ animation-delay:.28s; }
  }
  @keyframes reveal{ to{ opacity:1; transform:none; } }
</style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <h1>로그인</h1>
    <span class="scope-tag">S5</span>
  </header>

  <main>
    <div class="hero reveal d1">
      <div class="logo" aria-hidden="true">👣</div>
      <h2>발자취</h2>
      <p>다녀온 곳이 코스로 쌓이는 기록 앱</p>
    </div>

    <div class="btns">
      <a class="btn btn-secondary btn-block lbtn kakao reveal d2" href="home.html" aria-label="카카오로 시작하기">
        <span class="ic" aria-hidden="true">K</span>카카오로 시작하기
      </a>
      <a class="btn btn-secondary btn-block lbtn google reveal d3" href="home.html" aria-label="구글로 계속하기">
        <span class="ic" aria-hidden="true">G</span>구글로 계속하기
      </a>
      <button class="btn btn-secondary btn-block lbtn email reveal d3" id="emailBtn" type="button" aria-expanded="false" aria-controls="emailform">
        <span class="ic" aria-hidden="true">@</span>이메일로 로그인
        <span class="chev" aria-hidden="true">▾</span>
      </button>

      <div class="emailform" id="emailform" role="group" aria-label="이메일 로그인 폼">
        <div class="inner">
          <input class="field" type="email" placeholder="이메일" aria-label="이메일 주소">
          <input class="field" type="password" placeholder="비밀번호" aria-label="비밀번호">
          <a class="btn btn-primary btn-block submit" href="home.html" aria-label="이메일로 로그인 완료">로그인</a>
        </div>
      </div>
    </div>

    <p class="foot reveal d4">계속하면 <a href="#">약관</a> 및 <a href="#">개인정보 처리방침</a>에<br>동의하게 됩니다.</p>
  </main>
</div>

<script>
  // 이메일 폼 토글(관측 가능한 상태 변화) — 와이어와 동일 로직
  const b=document.getElementById('emailBtn'), f=document.getElementById('emailform');
  b.addEventListener('click',()=>{
    const on = b.getAttribute('aria-expanded')==='true';
    b.setAttribute('aria-expanded', on?'false':'true');
    f.classList.toggle('show', !on);
  });
</script>
</body>
</html>
