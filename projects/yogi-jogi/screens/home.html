<!-- @dsCard group="Screens" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 누적 지도 홈 (S1)</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<link rel="stylesheet" href="app.css">
<style>
  /* ---- S1 누적 지도 홈 전용 ---- */
  main{ padding:0 0 96px; }

  /* 히어로: 누적 지도 — 감정적 중심. 풀블리드 */
  .hero-map{ height:248px; border-bottom:1px solid var(--color-border); border-radius:0; }
  .hero-map .map-label{ font-size:var(--fs-small); }
  /* 누적 지도의 핀은 번호 없이 작은 점들로(쌓이는 느낌). app.css .pin 스타일 활용 */
  .hero-map .pin circle{ r:6; }
  /* 누적 카운트 칩(우상단) — 중립 표면, 숫자만 코랄 강조 안 함(코랄은 지도 위에서만) */
  .countchip{
    position:absolute; top:10px; right:12px; z-index:2;
    display:inline-flex; align-items:center; gap:6px;
    font-size:var(--fs-small); font-weight:var(--fw-semibold); color:var(--color-text);
    background:var(--color-surface); padding:5px 11px; border-radius:var(--r-pill);
    box-shadow:var(--shadow-sm);
  }
  .countchip .dot{ width:7px; height:7px; }

  /* 리스트 헤더 */
  .listhead{ display:flex; align-items:baseline; justify-content:space-between; padding:18px var(--pad) 8px; }
  .listhead h2{ font-size:var(--fs-h2); font-weight:var(--fw-bold); letter-spacing:var(--ls-tight); margin:0; }
  .listhead a{ font-size:var(--fs-caption); color:var(--color-text-muted); text-decoration:none; font-weight:var(--fw-medium); transition:color var(--dur) var(--ease); }
  .listhead a:hover{ color:var(--color-text); }

  /* 코스 카드 리스트 */
  .courses{ padding:0 var(--pad); display:flex; flex-direction:column; gap:12px; }
  .ccard{ display:flex; align-items:stretch; gap:0; text-decoration:none; color:inherit;
          transition:transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease); }
  .ccard:hover{ transform:translateY(-2px); box-shadow:var(--shadow-pop); }
  .ccard:active{ transform:translateY(0) scale(.995); }
  /* faux-map 썸네일 */
  .ccard .mini{ width:108px; flex:none; border-right:1px solid var(--color-border); }
  .ccard .mini .map-label{ display:none; }
  .ccard .m{ flex:1; padding:12px 14px; display:flex; flex-direction:column; justify-content:center; min-width:0; }
  .ccard h3{ margin:0; font-size:var(--fs-body); font-weight:var(--fw-semibold); letter-spacing:var(--ls-tight);
             display:flex; align-items:center; gap:8px; }
  .ccard h3 .nm{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ccard p{ margin:6px 0 0; font-size:var(--fs-caption); color:var(--color-text-muted); }
  /* 공개/비공개 lock 칩 — 중립(코랄 금지) */
  .lock{ flex:none; display:inline-flex; align-items:center; gap:4px; font-size:var(--fs-tiny); font-weight:var(--fw-semibold);
         border-radius:var(--r-pill); padding:2px 9px; border:1px solid var(--color-border-strong);
         color:var(--color-text-muted); background:var(--color-bg); }
  .lock--public{ color:var(--color-success); border-color:color-mix(in srgb,var(--color-success) 38%,var(--color-border-strong)); }

  /* 잔잔한 진입 폴리시 */
  @media (prefers-reduced-motion:no-preference){
    .reveal{ opacity:0; transform:translateY(10px); animation:reveal .5s var(--ease-out) forwards; }
    .d1{ animation-delay:.06s; } .d2{ animation-delay:.16s; } .d3{ animation-delay:.24s; }
  }
  @keyframes reveal{ to{ opacity:1; transform:none; } }
</style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <h1>발자취 지도</h1>
    <span class="scope-tag">S1</span>
  </header>

  <main>
    <!-- 히어로: 누적 지도. 다닐수록 쌓이는 발자취 — 코랄 동선 2갈래 + 누적 핀 -->
    <div class="map draw hero-map reveal d1" id="cumMap" role="img" aria-label="내 모든 코스의 방문지가 누적된 지도">
      <span class="map-label">누적 지도 · 지금까지 다닌 곳</span>
      <span class="countchip"><span class="dot"></span><span id="pinCount">방문한 곳 8</span></span>
      <svg width="100%" height="100%" viewBox="0 0 390 248" preserveAspectRatio="none" aria-hidden="true">
        <polyline class="route" points="42,182 96,128 158,160 212,96"/>
        <polyline class="route" points="252,194 296,140 348,172 372,76"/>
        <g id="pins"></g>
      </svg>
    </div>

    <div class="listhead reveal d2">
      <h2>내 코스</h2>
      <a href="index.html" aria-label="코스 0개일 때 빈 상태 보기">첫 화면 미리보기 →</a>
    </div>

    <div class="courses">
      <a class="card ccard reveal d2" href="course.html" aria-label="코스: 전주 한옥마을 가족 나들이">
        <div class="map mini" aria-hidden="true">
          <span class="map-label"></span>
          <svg width="100%" height="100%" viewBox="0 0 108 96" preserveAspectRatio="none">
            <polyline class="route" style="stroke-width:3" points="16,70 44,40 72,54 94,24"/>
            <g class="pin"><circle cx="16" cy="70" r="5"/></g>
            <g class="pin"><circle cx="44" cy="40" r="5"/></g>
            <g class="pin"><circle cx="72" cy="54" r="5"/></g>
            <g class="pin"><circle cx="94" cy="24" r="5"/></g>
          </svg>
        </div>
        <div class="m">
          <h3><span class="nm">전주 한옥마을 가족 나들이</span><span class="lock">🔒 비공개</span></h3>
          <p>2026.05.17 · 4곳 · 18장</p>
        </div>
      </a>

      <a class="card ccard reveal d3" href="course.html" aria-label="코스: 서울숲 봄나들이">
        <div class="map mini" aria-hidden="true">
          <span class="map-label"></span>
          <svg width="100%" height="100%" viewBox="0 0 108 96" preserveAspectRatio="none">
            <polyline class="route" style="stroke-width:3" points="14,32 42,60 70,38 96,62"/>
            <g class="pin"><circle cx="14" cy="32" r="5"/></g>
            <g class="pin"><circle cx="42" cy="60" r="5"/></g>
            <g class="pin"><circle cx="96" cy="62" r="5"/></g>
          </svg>
        </div>
        <div class="m">
          <h3><span class="nm">서울숲 봄나들이</span><span class="lock lock--public">공개</span></h3>
          <p>2026.04.12 · 3곳 · 11장</p>
        </div>
      </a>
    </div>
  </main>

  <nav class="tabbar" aria-label="주요 탭">
    <a href="home.html" aria-current="page"><span class="ic"></span>발자취</a>
    <a href="together.html" aria-label="다 같이 (안 읽음 3)"><span class="ic"></span>다 같이<span class="badge">3</span></a>
    <a href="picker.html" class="tab-fab" aria-label="새 코스">＋</a>
    <a href="profile.html" aria-label="프로필"><span class="ic"></span>프로필</a>
  </nav>
</div>

<script>
  // 누적 핀 8개 생성(다닐수록 쌓이는 느낌) — app.css .map .pin 스타일(흰 채움+코랄 테두리) 사용
  const pinXY=[[42,182],[96,128],[158,160],[212,96],[252,194],[296,140],[348,172],[372,76]];
  const g=document.getElementById('pins');
  g.innerHTML = pinXY.map(([x,y])=>'<g class="pin"><circle cx="'+x+'" cy="'+y+'" r="6"/></g>').join('');
  document.getElementById('pinCount').textContent='방문한 곳 '+pinXY.length;
</script>
</body>
</html>
