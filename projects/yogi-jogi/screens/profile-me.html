<html lang="ko">
<head>
<meta charset="utf-8">

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  width:var(--app-width);min-height:844px;margin:0 auto;position:relative;
  font-family:var(--font-sans);color:var(--color-text);background:var(--color-bg);
  padding-bottom:calc(var(--tabbar-h) + 8px);
  -webkit-font-smoothing:antialiased;
}

/* ─────────────────── 상단 앱바 (인스타식 슬림) ─────────────────── */
.appbar{
  position:sticky;top:0;z-index:var(--z-appbar);height:var(--appbar-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--space-3);background:var(--color-surface);
  box-shadow:0 1px 0 var(--color-border);
}
.appbar .title{display:flex;align-items:center;gap:6px;font-size:var(--fs-h2);font-weight:var(--fw-h1);letter-spacing:-.01em;color:var(--color-text)}
.appbar .lock{width:15px;height:15px;stroke:var(--color-text-muted);fill:none;stroke-width:2}
.appbar .icons{display:flex;gap:2px}
.iconbtn{
  position:relative;width:40px;height:40px;border-radius:var(--radius-full);
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;color:var(--color-text);background:transparent;border:0;cursor:pointer;
  transition:background .12s ease, transform .12s ease;
}
.iconbtn:hover{background:var(--color-surface-alt)}
.iconbtn:active{transform:scale(.9)}
.iconbtn svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.iconbtn .dot{
  position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;
  background:var(--color-unread);border:1.6px solid var(--color-surface);
}

/* ─────────────────── 프로필 헤더 ─────────────────── */
.head{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-5) var(--space-4) var(--space-3)}
.avatar{
  width:80px;height:80px;border-radius:50%;flex:none;position:relative;overflow:hidden;
  /* 아바타는 컬러(콘텐츠) — 따뜻한 인물 톤 */
  background:linear-gradient(150deg,#f2b978 0%,#e08a52 48%,#b85a3c 100%);
  box-shadow:0 0 0 1px var(--color-border);
}
.avatar::after{
  content:"";position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.55;
  background:radial-gradient(70% 55% at 32% 26%, rgba(16,16,18,.86), transparent 60%);
}
.avatar .init{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:var(--fs-h1);font-weight:var(--fw-h1);color:rgba(16,16,18,.86);letter-spacing:-.02em}
.head-info{flex:1;min-width:0}
.head-info .name{font-size:var(--fs-h1);line-height:var(--lh-h1);font-weight:var(--fw-h1);letter-spacing:-.01em;color:var(--color-text)}
.head-info .handle{font-size:var(--fs-sm);line-height:var(--lh-sm);color:var(--color-text-muted);margin-top:1px}
.head-info .bio{font-size:var(--fs-body);line-height:var(--lh-body);color:var(--color-text);margin-top:8px}
.head-info .bio .sub{color:var(--color-text-muted)}

/* ─────────────────── 카운트 3종 (비인터랙티브 텍스트) ─────────────────── */
.counts{display:flex;padding:2px var(--space-4) 0;margin-top:2px}
.counts .cnt{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px}
.counts .num{font-size:var(--fs-h2);line-height:1.15;font-weight:var(--fw-h1);letter-spacing:-.01em;color:var(--color-text);font-variant-numeric:tabular-nums}
.counts .lbl{font-size:var(--fs-xs);line-height:var(--lh-xs);color:var(--color-text-muted)}

/* ─────────────────── 액션 (편집 / 공유) ─────────────────── */
.acts{display:flex;gap:var(--space-2);padding:var(--space-4) var(--space-4) 0}
.acts .btn{
  flex:1;height:36px;display:inline-flex;align-items:center;justify-content:center;gap:6px;
  font-size:var(--fs-sm);font-weight:var(--fw-semibold);text-decoration:none;
  border-radius:var(--radius-sm);border:1px solid var(--color-border);
  background:var(--color-surface);color:var(--color-text);cursor:pointer;font-family:inherit;
  transition:background .12s ease, transform .12s ease;
}
.acts .btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.acts .btn:hover{background:var(--color-surface-alt)}
.acts .btn:active{transform:scale(.98)}
.acts .btn .oos{font-size:9px;font-weight:var(--fw-medium);color:var(--color-text-muted);border:1px solid var(--color-border);border-radius:4px;padding:0 4px;line-height:14px}
.share-note{
  overflow:hidden;max-height:0;opacity:0;
  margin:0 var(--space-4);font-size:var(--fs-xs);line-height:var(--lh-xs);color:var(--color-text-muted);
  transition:max-height .22s ease, opacity .22s ease, padding .22s ease;
}
.share-note.show{max-height:40px;opacity:1;padding-top:8px}

/* ─────────────────── 데모 토글 ─────────────────── */
.demo-row{padding:var(--space-4) var(--space-4) 0}
.demo-toggle{
  width:100%;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;
  font-size:var(--fs-xs);font-weight:var(--fw-semibold);color:var(--color-text-secondary);
  background:var(--color-surface);border:1px dashed var(--color-border-strong);
  border-radius:var(--radius-sm);padding:8px;cursor:pointer;
  transition:transform .12s ease, background .12s ease;
}
.demo-toggle::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--color-text)}
.demo-toggle:active{transform:scale(.99)}
.demo-toggle[aria-pressed="true"]{background:var(--color-surface-alt)}

/* ─────────────────── [그리드 ｜ 지도] 세그먼트 ─────────────────── */
.segbar{
  position:sticky;top:var(--appbar-h);z-index:40;margin-top:var(--space-5);
  background:var(--color-surface);border-top:1px solid var(--color-border);
  display:flex;
}
.segbar [role="tab"]{
  flex:1;height:46px;display:inline-flex;align-items:center;justify-content:center;gap:6px;
  font-size:var(--fs-sm);font-weight:var(--fw-semibold);letter-spacing:.01em;
  border:0;background:transparent;color:var(--color-text-muted);cursor:pointer;font-family:inherit;
  position:relative;transition:color .12s ease;
}
.segbar [role="tab"] svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.segbar [role="tab"]:hover{color:var(--color-text-secondary)}
.segbar [role="tab"][aria-selected="true"]{color:var(--color-text)}
.segbar [role="tab"][aria-selected="true"]::after{
  content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--color-text);
}

/* ─────────────────── 그리드 뷰 (컬러 사진 3열) ─────────────────── */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--color-surface)}
.cell{
  position:relative;aspect-ratio:1;overflow:hidden;text-decoration:none;display:block;
  background-color:var(--color-surface-sunken);background-size:cover;background-position:center;
  transition:transform .12s ease, filter .12s ease;
}
.cell::after{ /* 사진 질감 — 컬러 위에 하이라이트/그레인 */
  content:"";position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.5;
  background:
    radial-gradient(120% 80% at 22% 14%, rgba(255,255,255,.55), transparent 46%),
    repeating-linear-gradient(118deg, rgba(0,0,0,.05) 0 8px, transparent 8px 20px);
}
.cell:hover{filter:brightness(.94)}
.cell:active{transform:scale(.985)}
.cell .stack{
  position:absolute;top:6px;right:6px;z-index:2;color:#fff;
  filter:drop-shadow(0 1px 1.5px rgba(0,0,0,.45));
}
.cell .stack svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ─────────────────── 지도 뷰 ─────────────────── */
.mapwrap{padding:var(--space-4)}
.mapcard{
  position:relative;width:100%;border:1px solid var(--color-border);border-radius:var(--radius-md);
  overflow:hidden;box-shadow:var(--shadow-1);background:var(--color-map-canvas);
}
.mapcard svg.map{display:block;width:100%;height:auto}
.map-legend{
  position:absolute;left:10px;bottom:10px;z-index:3;display:flex;align-items:center;gap:10px;
  background:rgba(16,16,18,.86);border:1px solid var(--color-border);border-radius:var(--radius-full);
  padding:5px 11px;box-shadow:var(--shadow-1);
}
.map-legend .lg{display:inline-flex;align-items:center;gap:5px;font-size:var(--fs-xs);font-weight:var(--fw-medium);color:var(--color-text-secondary)}
.map-legend .swatch-line{width:16px;height:0;border-top:2.5px solid var(--color-text)}
.map-legend .swatch-pin{width:9px;height:9px;border-radius:50% 50% 50% 0;transform:rotate(45deg);background:var(--color-text)}
.map-zoom{
  position:absolute;right:10px;bottom:10px;z-index:3;display:flex;flex-direction:column;
  background:rgba(16,16,18,.86);border:1px solid var(--color-border);border-radius:var(--radius-sm);
  overflow:hidden;box-shadow:var(--shadow-1);
}
.map-zoom button{
  width:34px;height:34px;border:0;background:transparent;font-size:18px;line-height:1;color:var(--color-text);cursor:pointer;font-family:inherit;
  transition:background .12s ease;
}
.map-zoom button:first-child{border-bottom:1px solid var(--color-border)}
.map-zoom button:hover{background:var(--color-surface-alt)}
.map-zoom button:active{background:var(--color-surface-sunken)}
.map-note{display:flex;gap:8px;align-items:flex-start;padding:var(--space-3) 2px 0}
.map-note svg{width:15px;height:15px;flex:none;margin-top:2px;stroke:var(--color-text-muted);fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.map-note p{font-size:var(--fs-sm);line-height:var(--lh-sm);color:var(--color-text-secondary)}
.map-note b{color:var(--color-text);font-weight:var(--fw-semibold)}

/* ─────────────────── 빈 상태 ─────────────────── */
.empty{
  display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  gap:var(--space-3);padding:var(--space-10) var(--space-6);min-height:44vh;
}
.empty.show{display:flex}
.empty .illus{
  width:88px;height:88px;border-radius:var(--radius-lg);background:var(--color-surface-sunken);
  display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);
  box-shadow:inset 0 0 0 1px var(--color-border);margin-bottom:var(--space-1);
}
.empty .illus svg{width:42px;height:42px;stroke:currentColor;fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.empty h2{font-size:var(--fs-h2);line-height:var(--lh-h2);font-weight:var(--fw-h1);color:var(--color-text)}
.empty p{font-size:var(--fs-body);line-height:var(--lh-body);color:var(--color-text-muted);max-width:250px}
.empty .cta{
  margin-top:var(--space-2);background:var(--color-primary);color:var(--color-on-primary);
  font-size:var(--fs-body);font-weight:var(--fw-semibold);text-decoration:none;
  padding:12px var(--space-6);border-radius:var(--radius-md);transition:transform .12s ease, background .12s ease;
}
.empty .cta:hover{background:var(--color-primary-hover)}
.empty .cta:active{transform:scale(.97)}

/* ─────────────────── 하단 탭바 + FAB (불투명 배경) ─────────────────── */
.tabbar{
  position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:var(--app-width);
  height:var(--tabbar-h);display:flex;align-items:stretch;z-index:var(--z-tabbar);
  background:var(--color-surface);box-shadow:0 -1px 0 var(--color-border);
  padding-bottom:env(safe-area-inset-bottom);
}
.tabbar .tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  text-decoration:none;color:var(--color-text-muted);font-size:var(--fs-xs);font-weight:var(--fw-medium);
  transition:color .12s ease;
}
.tabbar .tab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.tabbar .tab[aria-current="page"]{color:var(--color-text);font-weight:var(--fw-semibold)}
.tabbar .tab[aria-current="page"] svg{stroke-width:2.4}
.tabbar .tab:active{color:var(--color-text)}
.tabbar .fab{position:relative;flex:0 0 84px;display:flex;align-items:center;justify-content:center;text-decoration:none}
.tabbar .fab .knob{
  width:52px;height:52px;border-radius:18px;background:var(--color-primary);color:var(--color-on-primary);
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-2);
  transition:transform .14s cubic-bezier(.2,.8,.3,1), background .12s ease;
}
.tabbar .fab .knob svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:2.6;stroke-linecap:round}
.tabbar .fab:hover .knob{background:var(--color-primary-hover)}
.tabbar .fab:active .knob{transform:scale(.92)}
</style>
</head>

<script>
var emptyMode = false;

function showGrid(){
  document.getElementById('seg-grid').setAttribute('aria-selected','true');
  document.getElementById('seg-map').setAttribute('aria-selected','false');
  applyView();
}
function showMap(){
  document.getElementById('seg-grid').setAttribute('aria-selected','false');
  document.getElementById('seg-map').setAttribute('aria-selected','true');
  applyView();
}
function applyView(){
  var gridSel = document.getElementById('seg-grid').getAttribute('aria-selected') === 'true';
  var grid = document.getElementById('grid-view');
  var map = document.getElementById('map-view');
  var empty = document.getElementById('empty-view');
  if(emptyMode){
    grid.hidden = true; map.hidden = true;
    empty.classList.add('show');
    return;
  }
  empty.classList.remove('show');
  grid.hidden = !gridSel;
  map.hidden = gridSel;
}
function toggleEmpty(){
  emptyMode = !emptyMode;
  var btn = document.getElementById('demo-btn');
  btn.setAttribute('aria-pressed', emptyMode ? 'true' : 'false');
  btn.textContent = emptyMode ? '데모: 채워진 상태 보기' : '데모: 게시물 0 빈 상태 보기';
  document.getElementById('cnt-posts').textContent = emptyMode ? '0' : '24';
  applyView();
}
function share(){
  document.getElementById('share-note').classList.add('show');
}
function mapZoom(kind){
  document.getElementById('map-note-text').innerHTML =
    '지도 ' + kind + ' 인터랙션은 다음 단계(카카오맵 SDK 연동)에서 동작해요. <b>[범위 밖]</b>';
}
</script>
