<!-- @dsCard group="Screens" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 코스 상세 (C6)</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<link rel="stylesheet" href="app.css">
<style>
  /* ---- C6 코스 상세 전용 (인스타-like 콘텐츠 우선) ---- */
  main{ padding-bottom:96px; }

  /* 진입 맥락 배너 */
  .banner{
    background:var(--color-primary-tint); color:var(--color-primary-strong);
    border-bottom:1px solid var(--color-border);
    padding:9px var(--pad); font-size:var(--fs-caption); font-weight:var(--fw-medium);
    display:flex; align-items:center; gap:7px;
  }
  .banner .dot{ flex:none; }

  /* 풀블리드 히어로 지도 */
  .hero-map{ height:220px; border-bottom:1px solid var(--color-border); border-radius:0; }
  .hero-map .map-label{ font-size:var(--fs-small); }

  /* 본문 헤더 */
  .body{ padding:18px var(--pad) 4px; }
  .title{ font-size:var(--fs-display); font-weight:var(--fw-bold); letter-spacing:var(--ls-tight); line-height:var(--lh-tight); margin:0; }
  .date{ color:var(--color-text-muted); font-size:var(--fs-caption); margin:7px 0 0; }
  .memo{ font-size:var(--fs-body); line-height:var(--lh-relaxed); color:var(--color-text); margin:14px 0 0; }
  .tags{ display:flex; gap:6px; flex-wrap:wrap; margin-top:14px; }

  /* Stop별 사진 인스타처럼 크게 */
  .stopblock{ margin-top:26px; }
  .stopblock:first-of-type{ margin-top:20px; }
  .stopblock .shead{ display:flex; align-items:center; gap:9px; padding:0 var(--pad); margin:0 0 10px; }
  .stopblock .num{ width:22px; height:22px; font-size:var(--fs-small); }
  .stopblock .snm{ font-size:var(--fs-h2); font-weight:var(--fw-semibold); }
  .stopblock .stm{ font-size:var(--fs-caption); color:var(--color-text-muted); margin-left:auto; }
  .photo{ width:100%; aspect-ratio:4/3; border-radius:0; border-left:none; border-right:none; display:block;
          background:linear-gradient(135deg,#d8d1c4 0%, #e7e1d6 55%, #ddd6c9 100%); position:relative; }
  .photo::after{ content:"사진"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
          color:var(--color-text-muted); font-size:var(--fs-caption); letter-spacing:.04em; opacity:.55; }
  .photo + .photo{ margin-top:2px; }

  /* 공유 링크박스 (부드럽게 슬라이드/페이드) */
  .linkwrap{ padding:0 var(--pad); }
  .linkbox{
    overflow:hidden; max-height:0; opacity:0; transform:translateY(-6px);
    border:1.5px dashed var(--color-primary); border-radius:var(--r-md);
    background:var(--color-primary-tint); color:var(--color-text);
    font-size:var(--fs-caption); margin:14px 0 0;
    padding:0 14px;
    transition:max-height var(--dur-slow) var(--ease), opacity var(--dur) var(--ease),
               transform var(--dur-slow) var(--ease-spring), padding var(--dur) var(--ease), margin var(--dur) var(--ease);
  }
  .linkbox.show{ max-height:160px; opacity:1; transform:translateY(0); padding:12px 14px; }
  .linkbox .lk-top{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .linkbox a{ color:var(--color-primary-strong); font-weight:var(--fw-semibold); text-decoration:none; }
  .linkbox a:hover{ text-decoration:underline; }
  .linkbox .lk-sub{ display:block; margin-top:5px; color:var(--color-text-muted); font-size:var(--fs-small); }

  /* 하단 고정 공유 바 */
  .foot{
    position:fixed; left:50%; transform:translateX(-50%); bottom:0; z-index:30;
    width:100%; max-width:var(--app-w); min-width:var(--app-min);
    display:flex; align-items:center; gap:10px;
    padding:12px var(--pad) max(14px, env(safe-area-inset-bottom));
    background:color-mix(in srgb, var(--color-surface) 92%, transparent);
    backdrop-filter:blur(10px);
    border-top:1px solid var(--color-border);
    box-shadow:0 -6px 20px rgba(43,43,43,.06);
  }
  .foot .home{ flex:none; }
  .foot .share{ flex:1; }
  .foot .share[aria-pressed="true"]{ background:var(--color-primary-strong); }
</style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <a class="iconbtn" href="index.html" aria-label="홈으로">←</a>
    <h1>코스</h1>
    <span class="scope-tag">C6</span>
  </header>

  <div class="banner" id="banner"><span class="dot"></span><span id="bannerText">발자취 지도에 합산됐어요.</span></div>

  <main>
    <!-- 풀블리드 히어로 지도: 코랄 동선 + 번호 핀, 그려지는 애니메이션 -->
    <div class="map draw hero-map" id="map">
      <span class="map-label">지도 영역 · 동선(코스 전체)</span>
      <svg width="100%" height="100%" viewBox="0 0 390 220" preserveAspectRatio="none" aria-hidden="true">
        <polyline class="route" points="44,168 138,104 268,132 350,58"/>
        <g class="pin"><circle cx="44"  cy="168" r="13"/><text x="44"  y="172">1</text></g>
        <g class="pin"><circle cx="138" cy="104" r="13"/><text x="138" y="108">2</text></g>
        <g class="pin"><circle cx="268" cy="132" r="13"/><text x="268" y="136">3</text></g>
        <g class="pin"><circle cx="350" cy="58"  r="13"/><text x="350" y="62">4</text></g>
      </svg>
    </div>

    <div class="body">
      <h1 class="title">전주 한옥마을 가족 나들이</h1>
      <p class="date">2026.05.17 · 방문지 4곳 · 사진 18장</p>
      <p class="memo">아이랑 한복 입고 한 바퀴. 경기전 돌담이 제일 좋았다.</p>
      <div class="tags">
        <span class="chip">#가족</span>
        <span class="chip">#주말</span>
        <span class="chip">#전주</span>
      </div>
    </div>

    <div class="stopblock">
      <div class="shead"><span class="num">1</span><span class="snm">한옥마을</span><span class="stm">10:20</span></div>
      <div class="photo"></div><div class="photo"></div>
    </div>
    <div class="stopblock">
      <div class="shead"><span class="num">2</span><span class="snm">경기전</span><span class="stm">11:05</span></div>
      <div class="photo"></div>
    </div>
    <div class="stopblock">
      <div class="shead"><span class="num">3</span><span class="snm">오목대</span><span class="stm">13:40</span></div>
      <div class="photo"></div>
    </div>
    <div class="stopblock">
      <div class="shead"><span class="num">4</span><span class="snm">풍남문</span><span class="stm">15:10</span></div>
      <div class="photo"></div>
    </div>

    <div class="linkwrap">
      <div class="linkbox" id="linkbox" role="status" aria-live="polite">
        <span class="lk-top">🔗 공유 링크 생성됨: <a href="webview.html">balja.chwi/c/ab12cd</a></span>
        <span class="lk-sub">앱 없는 사람도 웹으로 열려요.</span>
      </div>
    </div>
  </main>

  <div class="foot">
    <a class="btn btn-secondary home" href="index.html" aria-label="발자취 홈으로">발자취</a>
    <button class="btn btn-primary share" id="shareBtn" type="button" aria-label="공유 링크 만들기" aria-pressed="false">공유 링크 만들기</button>
  </div>
</div>

<script>
  // 진입 맥락 배너: 샘플 미리보기 vs 방금 완성 vs 기본(합산됨)
  const params = new URLSearchParams(location.search);
  const bannerText = document.getElementById('bannerText');
  if(params.get('sample')==='1'){ bannerText.textContent = '샘플 코스 미리보기 — 이렇게 만들어져요.'; }
  else if(params.get('from')==='finalize'){ bannerText.textContent = '코스 완성! 발자취 지도에 합산됐어요.'; }

  // 공유: 링크 생성(관측 가능한 상태 변화) — 부드러운 슬라이드/페이드
  const shareBtn=document.getElementById('shareBtn'), linkbox=document.getElementById('linkbox');
  shareBtn.addEventListener('click',()=>{
    const on = shareBtn.getAttribute('aria-pressed')==='true';
    if(!on){
      shareBtn.setAttribute('aria-pressed','true');
      shareBtn.setAttribute('aria-label','공유 링크 만들기 — 링크 생성됨');
      shareBtn.textContent='링크 생성됨 ✓';
      linkbox.classList.add('show');
      linkbox.scrollIntoView({behavior:'smooth', block:'center'});
    } else {
      shareBtn.setAttribute('aria-pressed','false');
      shareBtn.setAttribute('aria-label','공유 링크 만들기');
      shareBtn.textContent='공유 링크 만들기';
      linkbox.classList.remove('show');
    }
  });
</script>
</body>
</html>
