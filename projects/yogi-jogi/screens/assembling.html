<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자취 — 자동 조립 (C3)</title>
<link rel="stylesheet" href="../foundation/tokens.css">
<link rel="stylesheet" href="app.css">
<style>
  /* ---- C3 자동 조립 로딩 전용 ---- */
  main{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:var(--sp-5); padding:var(--sp-8) var(--pad) calc(var(--sp-10) + var(--sp-6));
    text-align:center; min-height:0;
  }

  /* 안심되는 펄스 + 스피너 (멈춘 느낌 금지) */
  .orb{
    position:relative; width:96px; height:96px; display:grid; place-items:center;
    margin-bottom:var(--sp-1);
  }
  .orb .pulse{
    position:absolute; inset:0; border-radius:50%;
    background:var(--color-primary-tint);
    animation:orbPulse 2s var(--ease-out) infinite;
  }
  .orb .pulse.b{ animation-delay:1s; }
  .orb .ring{
    position:relative; width:64px; height:64px; border-radius:50%;
    border:3px solid var(--color-border);
    border-top-color:var(--color-primary);
    animation:spin 1s linear infinite;
  }
  .orb .dot{
    position:absolute; width:11px; height:11px; border-radius:50%;
    background:var(--color-primary); box-shadow:var(--shadow-primary);
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes orbPulse{
    0%{ transform:scale(.62); opacity:.55; }
    70%{ transform:scale(1.25); opacity:0; }
    100%{ transform:scale(1.25); opacity:0; }
  }

  .headline{ margin:0; font-size:var(--fs-title); font-weight:var(--fw-bold); letter-spacing:var(--ls-tight); }
  .sub{ margin:-8px 0 0; font-size:var(--fs-caption); color:var(--color-text-muted); }

  .pct{ font-size:var(--fs-display); font-weight:var(--fw-bold); letter-spacing:var(--ls-tight); margin:var(--sp-1) 0 0; font-variant-numeric:tabular-nums; }

  .pbar{ width:240px; max-width:78%; }

  .step{
    min-height:20px; font-size:var(--fs-caption); color:var(--color-text-muted); margin:0;
    transition:opacity var(--dur) var(--ease);
  }
  .step.swap{ opacity:0; }

  /* CTA: 100% 전엔 숨었다가 팝업 */
  .cta{
    width:240px; max-width:78%; margin-top:var(--sp-3);
    opacity:0; transform:translateY(8px) scale(.96); pointer-events:none;
    transition:opacity var(--dur-slow) var(--ease), transform var(--dur-slow) var(--ease-spring);
  }
  .cta.reveal{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .cta.reveal .btn-primary{ animation:ctaPop var(--dur-slow) var(--ease-spring); }
  @keyframes ctaPop{
    0%{ transform:scale(.92); }
    60%{ transform:scale(1.04); }
    100%{ transform:scale(1); }
  }
</style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <h1>자동 조립</h1>
    <span class="scope-tag">C3 로딩</span>
  </header>

  <main>
    <div class="orb" aria-hidden="true">
      <span class="pulse"></span>
      <span class="pulse b"></span>
      <span class="ring"></span>
      <span class="dot"></span>
    </div>

    <p class="headline">사진에서 장소를 찾는 중…</p>
    <p class="sub">잠시만요, 그날의 동선을 그리고 있어요</p>

    <div class="pct" id="pct" aria-live="polite">0%</div>

    <div class="pbar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="pb"><i id="bar"></i></div>

    <p class="step" id="step" aria-live="polite">EXIF 위·경도 읽는 중</p>

    <div class="cta" id="cta">
      <a class="btn btn-primary btn-block" id="go" href="review.html" aria-disabled="true">검토하기 →</a>
    </div>
  </main>
</div>

<script>
  // 진행률이 실제로 차오르고, 100%에서 검토하기 활성화(관측 가능한 상태 변화)
  const steps = ['EXIF 위·경도 읽는 중','시간순으로 묶는 중','장소명 붙이는 중(역지오코딩)','동선 그리는 중'];
  let p = 0;
  const bar=document.getElementById('bar'), pct=document.getElementById('pct'),
        pb=document.getElementById('pb'), stepEl=document.getElementById('step'),
        go=document.getElementById('go'), cta=document.getElementById('cta');

  let lastStep = '';
  function setStep(txt){
    if(txt === lastStep){ stepEl.textContent = txt; return; }
    lastStep = txt;
    stepEl.classList.add('swap');
    setTimeout(()=>{ stepEl.textContent = txt; stepEl.classList.remove('swap'); }, 120);
  }

  const t = setInterval(()=>{
    p = Math.min(100, p + 12);
    bar.style.width = p+'%'; pct.textContent = p+'%'; pb.setAttribute('aria-valuenow', p);
    setStep(steps[Math.min(steps.length-1, Math.floor(p/26))]);
    if(p>=100){
      clearInterval(t);
      setStep('코스 초안 완성! 미분류 사진을 정리해 주세요.');
      go.setAttribute('aria-disabled','false');
      cta.classList.add('reveal');
    }
  }, 350);
</script>
</body>
</html>
